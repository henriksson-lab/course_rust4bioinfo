<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <title>How operation count grows with input size (log-log scale)</title>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#222">How operation count grows with input size (log-log scale)</text>

  <!-- Plot background -->
  <rect x="80" y="60" width="700" height="370" fill="#fafbfc" stroke="#ccc" stroke-width="1"/>

  <!-- Horizontal gridlines at log y = 0,1,2,3,4,5,6,10 -->
  <!-- y = 1   => 430 -->
  <!-- y = 10  => 393 -->
  <!-- y = 100 => 356 -->
  <!-- y = 1000=> 319 -->
  <!-- y = 1e4 => 282 -->
  <!-- y = 1e5 => 245 -->
  <!-- y = 1e6 => 208 -->
  <!-- y = 1e10=> 60  -->
  <g stroke="#e6e6e6" stroke-width="1">
    <line x1="80" y1="393" x2="780" y2="393"/>
    <line x1="80" y1="356" x2="780" y2="356"/>
    <line x1="80" y1="319" x2="780" y2="319"/>
    <line x1="80" y1="282" x2="780" y2="282"/>
    <line x1="80" y1="245" x2="780" y2="245"/>
    <line x1="80" y1="208" x2="780" y2="208"/>
    <line x1="80" y1="60"  x2="780" y2="60"/>
  </g>

  <!-- Vertical gridlines at x = 1, 10, 100, 1000 -->
  <!-- x=1   => 80,  x=10 => 313.3, x=100 => 546.7, x=1000 => 780 -->
  <g stroke="#e6e6e6" stroke-width="1">
    <line x1="313.3" y1="60" x2="313.3" y2="430"/>
    <line x1="546.7" y1="60" x2="546.7" y2="430"/>
  </g>

  <!-- Y axis -->
  <line x1="80" y1="60" x2="80" y2="430" stroke="#444" stroke-width="1.2"/>
  <!-- X axis -->
  <line x1="80" y1="430" x2="780" y2="430" stroke="#444" stroke-width="1.2"/>

  <!-- Y tick labels -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="#444" text-anchor="end">
    <text x="74" y="434">1</text>
    <text x="74" y="397">10</text>
    <text x="74" y="360">100</text>
    <text x="74" y="323">1000</text>
    <text x="74" y="286">10^4</text>
    <text x="74" y="249">10^5</text>
    <text x="74" y="212">10^6</text>
    <text x="74" y="64">10^10</text>
  </g>

  <!-- X tick labels -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="#444" text-anchor="middle">
    <text x="80"    y="448">1</text>
    <text x="313.3" y="448">10</text>
    <text x="546.7" y="448">100</text>
    <text x="780"   y="448">1000</text>
  </g>

  <!-- X tick marks -->
  <g stroke="#444" stroke-width="1.2">
    <line x1="80"    y1="430" x2="80"    y2="434"/>
    <line x1="313.3" y1="430" x2="313.3" y2="434"/>
    <line x1="546.7" y1="430" x2="546.7" y2="434"/>
    <line x1="780"   y1="430" x2="780"   y2="434"/>
  </g>

  <!-- Axis labels -->
  <text x="430" y="475" text-anchor="middle" font-size="14" fill="#222">input size n</text>
  <text x="22" y="245" text-anchor="middle" font-size="14" fill="#222" transform="rotate(-90 22 245)">operations performed</text>

