    <text x="786" y="434" fill="#2e7d32">O(1)</text>
    <!-- O(log n) at y=391.5 -->
    <text x="786" y="395" fill="#66bb6a">O(log n)</text>
    <!-- O(n) at y=319 -->
    <text x="786" y="323" fill="#1976d2">O(n)</text>
