  </g>

  <!-- Caption -->
  <text x="450" y="492" text-anchor="middle" font-size="13" font-style="italic" fill="#888">Above n &#8776; 10, O(n!) is off the chart. Above n &#8776; 1000, O(n&#178;) starts becoming painful. O(n log n) handles essentially anything.</text>
</svg>
