<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="600" fill="#222">
    Why Big-O can lie - cache locality beats asymptotics for small n
  </text>

  <!-- LEFT PANEL: BTreeMap -->
  <rect x="20" y="50" width="430" height="370" rx="10" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="235" y="78" text-anchor="middle" font-size="16" font-weight="600" fill="#d97706">
    BTreeMap (O(log n) - 7 pointer hops)
  </text>

  <!-- Heap band label -->
  <text x="35" y="100" font-size="12" fill="#888" font-style="italic">heap (pointers chase to random addresses)</text>
  <rect x="35" y="108" width="400" height="220" rx="6" fill="#ffffff" stroke="#e0d4a0" stroke-dasharray="4,3"/>

  <!-- 7 scattered nodes -->
  <!-- node 1 (root) -->
  <g>
    <rect x="55" y="125" width="56" height="28" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
    <text x="83" y="143" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace">root</text>
  </g>
  <!-- node 2 -->
  <g>
    <rect x="310" y="135" width="50" height="26" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
    <text x="335" y="152" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace">n2</text>
  </g>
  <!-- node 3 -->
  <g>
    <rect x="160" y="180" width="50" height="26" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
    <text x="185" y="197" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace">n3</text>
  </g>
  <!-- node 4 -->
  <g>
    <rect x="380" y="200" width="50" height="26" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
    <text x="405" y="217" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace">n4</text>
  </g>
  <!-- node 5 -->
  <g>
    <rect x="70" y="235" width="50" height="26" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
    <text x="95" y="252" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace">n5</text>
  </g>
  <!-- node 6 -->
  <g>
    <rect x="245" y="245" width="50" height="26" rx="4" fill="#fff" stroke="#d97706" stroke-width="1.5"/>
    <text x="270" y="262" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace">n6</text>
  </g>
  <!-- node 7 (target) -->
  <g>
    <rect x="350" y="285" width="70" height="28" rx="4" fill="#ffe0b2" stroke="#c62828" stroke-width="2"/>
    <text x="385" y="303" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" font-weight="600">target</text>
  </g>

  <!-- Red arrows chasing pointers (7 hops) -->
  <path d="M 111 139 Q 200 110 310 145" fill="none" stroke="#c62828" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <path d="M 335 161 Q 280 175 210 188" fill="none" stroke="#c62828" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <path d="M 210 195 Q 300 195 380 208" fill="none" stroke="#c62828" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <path d="M 380 220 Q 250 230 120 240" fill="none" stroke="#c62828" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <path d="M 120 250 Q 190 255 245 256" fill="none" stroke="#c62828" stroke-width="1.8" marker-end="url(#arrow-red)"/>
  <path d="M 295 260 Q 330 275 360 285" fill="none" stroke="#c62828" stroke-width="1.8" marker-end="url(#arrow-red)"/>

  <!-- ~100 ns labels (one shared annotation) -->
  <text x="235" y="345" text-anchor="middle" font-size="13" fill="#c62828" font-family="ui-monospace, monospace">each red arrow = cache miss ~100 ns</text>

  <!-- Total cost -->
  <rect x="40" y="362" width="390" height="48" rx="6" fill="#ffffff" stroke="#d97706"/>
  <text x="235" y="382" text-anchor="middle" font-size="13" fill="#222" font-family="ui-monospace, monospace">
    7 hops x ~100 ns + 7 cheap compares
  </text>
  <text x="235" y="402" text-anchor="middle" font-size="15" font-weight="700" fill="#d97706" font-family="ui-monospace, monospace">
    total: ~700 ns
  </text>

  <!-- RIGHT PANEL: Sorted Vec -->
  <rect x="470" y="50" width="410" height="370" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="675" y="78" text-anchor="middle" font-size="16" font-weight="600" fill="#2e7d32">
    Sorted Vec (O(n) - 100 comparisons)
  </text>

  <!-- Contiguous label -->
  <text x="485" y="100" font-size="12" fill="#888" font-style="italic">contiguous memory (prefetcher loves this)</text>

  <!-- Contiguous row of cells -->
  <g font-family="ui-monospace, monospace" font-size="11">
    <!-- 20 explicit cells then ... -->
    <g transform="translate(485,115)">
      <rect x="0" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="18" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="36" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="54" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="72" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="90" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="108" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="126" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="144" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="162" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="180" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="198" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="216" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="234" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="252" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="270" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="288" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="306" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="324" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="342" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
    </g>
    <text x="855" y="132" text-anchor="end" font-size="14" fill="#2e7d32">...</text>
  </g>

  <!-- second row of cells -->
  <g font-family="ui-monospace, monospace" font-size="11">
    <g transform="translate(485,150)">
      <rect x="0" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="18" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="36" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="54" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="72" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="90" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="108" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="126" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="144" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="162" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="180" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="198" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="216" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="234" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="252" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="270" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="288" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="306" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
      <rect x="324" y="0" width="18" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <rect x="342" y="0" width="18" height="22" fill="#fff" stroke="#2e7d32"/>
    </g>
  </g>

  <!-- Blue scanning arrow -->
  <path d="M 490 200 L 855 200" fill="none" stroke="#1976d2" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="675" y="222" text-anchor="middle" font-size="13" fill="#1976d2" font-family="ui-monospace, monospace">
    linear scan, fully in L1 cache
  </text>

  <!-- Annotation -->
  <text x="675" y="280" text-anchor="middle" font-size="13" fill="#2e7d32" font-family="ui-monospace, monospace">
    each comparison ~1 ns (in cache, predictable stride)
  </text>

  <!-- small visual: cache line as a chunk -->
  <rect x="540" y="295" width="270" height="32" rx="4" fill="#c8e6c9" stroke="#2e7d32" stroke-dasharray="3,2"/>
  <text x="675" y="316" text-anchor="middle" font-size="12" fill="#2e7d32" font-style="italic">
    one 64-byte cache line = 16 ints prefetched at once
  </text>

  <!-- Total cost -->
  <rect x="490" y="362" width="370" height="48" rx="6" fill="#ffffff" stroke="#2e7d32"/>
  <text x="675" y="382" text-anchor="middle" font-size="13" fill="#222" font-family="ui-monospace, monospace">
    100 compares x ~1 ns
  </text>
  <text x="675" y="402" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d32" font-family="ui-monospace, monospace">
    total: ~100 ns
  </text>

  <!-- Footer caption -->
  <text x="450" y="450" text-anchor="middle" font-size="14" fill="#444">
    For n = 100, the "asymptotically slower" linear scan is ~7x faster than the tree.
  </text>
</svg>
