      <rect x="85" y="320" width="20" height="20"/><rect x="105" y="320" width="20" height="20"/><rect x="125" y="320" width="20" height="20"/><rect x="145" y="320" width="20" height="20"/><rect x="165" y="320" width="20" height="20"/><rect x="185" y="320" width="20" height="20"/><rect x="205" y="320" width="20" height="20"/><rect x="225" y="320" width="20" height="20"/><rect x="245" y="320" width="20" height="20"/><rect x="265" y="320" width="20" height="20"/><rect x="285" y="320" width="20" height="20"/><rect x="305" y="320" width="20" height="20"/>
    </g>
  </g>

  <!-- axes labels -->
  <text x="195" y="355" text-anchor="middle" font-size="13" fill="#666" font-family="ui-monospace, monospace">i = 0 .. n-1</text>
  <text x="60" y="225" text-anchor="middle" font-size="13" fill="#666" font-family="ui-monospace, monospace" transform="rotate(-90 60 225)">j = 0 .. n-1</text>

  <!-- annotations -->
  <text x="235" y="385" text-anchor="middle" font-size="14" fill="#222" font-family="ui-monospace, monospace">
    n × n cells = n² visits
  </text>
  <text x="235" y="404" text-anchor="middle" font-size="14" fill="#222" font-family="ui-monospace, monospace">
    for n = 12: 144 comparisons
  </text>
  <text x="235" y="425" text-anchor="middle" font-size="14" fill="#c62828" font-weight="600" font-family="ui-monospace, monospace">
    for n = 10⁷: 10¹⁴ comparisons — years
  </text>

  <!-- =========================================================
       RIGHT PANEL — HashMap O(n)
       ========================================================= -->
  <rect x="460" y="55" width="410" height="380" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="665" y="82" text-anchor="middle" font-size="18" font-weight="600" fill="#2e7d32">
    HashMap — O(n)
  </text>

  <!-- single row of 12 cells -->
  <g stroke="#2e7d32" stroke-width="0.8" fill="#ffffff">
    <rect x="515" y="210" width="25" height="25"/>
    <rect x="540" y="210" width="25" height="25"/>
    <rect x="565" y="210" width="25" height="25"/>
    <rect x="590" y="210" width="25" height="25"/>
    <rect x="615" y="210" width="25" height="25"/>
    <rect x="640" y="210" width="25" height="25"/>
    <rect x="665" y="210" width="25" height="25"/>
    <rect x="690" y="210" width="25" height="25"/>
    <rect x="715" y="210" width="25" height="25"/>
    <rect x="740" y="210" width="25" height="25"/>
    <rect x="765" y="210" width="25" height="25"/>
    <rect x="790" y="210" width="25" height="25"/>
  </g>

  <!-- arrow above row -->
  <line x1="515" y1="195" x2="815" y2="195" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="665" y="185" text-anchor="middle" font-size="13" fill="#1976d2" font-family="ui-monospace, monospace">scan once</text>

  <!-- index labels -->
  <text x="665" y="260" text-anchor="middle" font-size="13" fill="#666" font-family="ui-monospace, monospace">i = 0 .. n-1</text>

  <!-- annotations -->
  <text x="665" y="320" text-anchor="middle" font-size="14" fill="#222" font-family="ui-monospace, monospace">
    n cells = n visits
  </text>
  <text x="665" y="339" text-anchor="middle" font-size="14" fill="#222" font-family="ui-monospace, monospace">
    for n = 12: 12 hash insertions
  </text>
  <text x="665" y="360" text-anchor="middle" font-size="14" fill="#2e7d32" font-weight="600" font-family="ui-monospace, monospace">
    for n = 10⁷: 10⁷ insertions — seconds
  </text>

  <!-- Caption -->
  <text x="450" y="465" text-anchor="middle" font-size="14" fill="#555">
    The grid scales square; the row scales linearly.
  </text>
  <text x="450" y="485" text-anchor="middle" font-size="14" fill="#555">
    For 10 Mb of sequence the gap is hours vs seconds.
  </text>
</svg>
