<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#222">
    Same problem, two algorithms — n² vs n
  </text>

  <!-- =========================================================
       LEFT PANEL — Naive O(n²)
       ========================================================= -->
  <rect x="30" y="55" width="410" height="380" rx="10" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="235" y="82" text-anchor="middle" font-size="18" font-weight="600" fill="#d97706">
    Naive — O(n²)
  </text>

