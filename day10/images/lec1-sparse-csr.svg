<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <title>Sparse CSR format</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="600" fill="#111">CSR — compressed sparse row</text>

  <!-- ============== Left matrix ============== -->
  <g transform="translate(60,80)" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle">
    <text x="125" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">5 x 5 sparse matrix</text>

    <!-- row 0 -->
    <rect x="0"   y="0"   width="50" height="40" fill="#e8f5e9" stroke="#2e7d32"/><text x="25"  y="25" fill="#1b5e20">1.0</text>
    <rect x="50"  y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="0"   width="50" height="40" fill="#e8f5e9" stroke="#2e7d32"/><text x="225" y="25" fill="#1b5e20">2.0</text>
    <!-- row 1 -->
    <rect x="0"   y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="40"  width="50" height="40" fill="#e8f5e9" stroke="#2e7d32"/><text x="75"  y="65" fill="#1b5e20">3.0</text>
    <rect x="100" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 2 -->
    <rect x="0"   y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="80"  width="50" height="40" fill="#e8f5e9" stroke="#2e7d32"/><text x="175" y="105" fill="#1b5e20">4.0</text>
    <rect x="200" y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 3 (empty) -->
    <rect x="0"   y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 4 -->
    <rect x="0"   y="160" width="50" height="40" fill="#e8f5e9" stroke="#2e7d32"/><text x="25"  y="185" fill="#1b5e20">5.0</text>
    <rect x="50"  y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="160" width="50" height="40" fill="#e8f5e9" stroke="#2e7d32"/><text x="225" y="185" fill="#1b5e20">6.0</text>

    <!-- row labels -->
    <g font-size="11" fill="#2e7d32" text-anchor="end" font-weight="600">
      <text x="-8" y="25">row 0</text>
      <text x="-8" y="65">row 1</text>
      <text x="-8" y="105">row 2</text>
      <text x="-8" y="145">row 3</text>
      <text x="-8" y="185">row 4</text>
    </g>

    <!-- per-row nnz hint to right -->
    <g font-size="10" fill="#888" text-anchor="start">
      <text x="258" y="25">2 nz</text>
      <text x="258" y="65">1 nz</text>
      <text x="258" y="105">1 nz</text>
      <text x="258" y="145">0 nz</text>
      <text x="258" y="185">2 nz</text>
    </g>
  </g>

  <!-- ============== Right arrays ============== -->
  <g transform="translate(420,80)" font-family="ui-monospace, monospace" font-size="13" text-anchor="middle">
    <text x="210" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">three arrays</text>

    <!-- values[] (length nnz=6) -->
    <text x="-20" y="22" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2e7d32">values[]</text>
    <rect x="0"   y="5" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="30"  y="25" fill="#1b5e20">1.0</text>
    <rect x="60"  y="5" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="90"  y="25" fill="#1b5e20">2.0</text>
    <rect x="120" y="5" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="150" y="25" fill="#1b5e20">3.0</text>
    <rect x="180" y="5" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="210" y="25" fill="#1b5e20">4.0</text>
    <rect x="240" y="5" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="270" y="25" fill="#1b5e20">5.0</text>
    <rect x="300" y="5" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="330" y="25" fill="#1b5e20">6.0</text>

    <!-- col_indices[] (length nnz=6) -->
    <text x="-20" y="72" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#2e7d32">col_indices[]</text>
    <rect x="0"   y="55" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="30"  y="75" fill="#1b5e20">0</text>
    <rect x="60"  y="55" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="90"  y="75" fill="#1b5e20">4</text>
    <rect x="120" y="55" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="150" y="75" fill="#1b5e20">1</text>
    <rect x="180" y="55" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="210" y="75" fill="#1b5e20">3</text>
    <rect x="240" y="55" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="270" y="75" fill="#1b5e20">0</text>
    <rect x="300" y="55" width="60" height="30" fill="#e8f5e9" stroke="#2e7d32"/><text x="330" y="75" fill="#1b5e20">4</text>

    <!-- index labels -->
    <g font-size="10" fill="#888" text-anchor="middle">
      <text x="30"  y="98">0</text>
      <text x="90"  y="98">1</text>
      <text x="150" y="98">2</text>
      <text x="210" y="98">3</text>
      <text x="270" y="98">4</text>
      <text x="330" y="98">5</text>
    </g>

    <!-- row_ptr[] length nrows+1=6 -->
    <text x="-20" y="142" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d97706">row_ptr[]</text>
    <rect x="0"   y="125" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="30"  y="145" fill="#7a3d00">0</text>
    <rect x="60"  y="125" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="90"  y="145" fill="#7a3d00">2</text>
    <rect x="120" y="125" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="150" y="145" fill="#7a3d00">3</text>
    <rect x="180" y="125" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="210" y="145" fill="#7a3d00">4</text>
    <rect x="240" y="125" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="270" y="145" fill="#7a3d00">4</text>
    <rect x="300" y="125" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="330" y="145" fill="#7a3d00">6</text>

    <!-- row_ptr index labels -->
    <g font-size="10" fill="#888" text-anchor="middle">
      <text x="30"  y="170">i=0</text>
      <text x="90"  y="170">i=1</text>
      <text x="150" y="170">i=2</text>
      <text x="210" y="170">i=3</text>
      <text x="270" y="170">i=4</text>
      <text x="330" y="170">i=5</text>
    </g>
  </g>

  <!-- ============== Annotation box ============== -->
  <g transform="translate(60,360)">
    <rect x="0" y="0" width="780" height="65" fill="#fff8e1" stroke="#d97706" stroke-width="1.2" rx="6"/>
    <text x="20" y="22" font-size="13" font-weight="600" fill="#7a3d00">Reading row i:</text>
    <text x="20" y="42" font-size="13" font-family="ui-monospace, monospace" fill="#222">
      non-zeros for row i are at indices  row_ptr[i] .. row_ptr[i+1]  in values[] and col_indices[]
    </text>
    <text x="20" y="58" font-size="12" fill="#555">
      e.g. row 0: row_ptr[0]=0, row_ptr[1]=2  →  values[0..2]=[1.0,2.0] at cols [0,4]. Row 3 is empty (row_ptr[3]=row_ptr[4]=4).
    </text>
  </g>

  <text x="450" y="450" text-anchor="middle" font-size="13" fill="#555">
    Fast row access, fast matrix-vector multiplication.
  </text>
</svg>
