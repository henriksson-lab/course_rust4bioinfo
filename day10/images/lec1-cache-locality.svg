<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="system-ui, -apple-system, sans-serif">
  <title>Cache locality — same matrix, four access patterns</title>

  <text x="550" y="28" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Cache locality — same matrix, four access patterns</text>

  <!-- =================== TOP-LEFT: Row-major, read row 1 (FAST) =================== -->
