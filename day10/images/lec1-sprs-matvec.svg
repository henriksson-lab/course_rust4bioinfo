<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="system-ui, -apple-system, sans-serif">
  <title>Sparse matrix-vector multiplication with sprs</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Sparse matrix-vector multiplication with sprs</text>

  <!-- ============== Matrix A (4x4) ============== -->
  <g font-family="ui-monospace, monospace" font-size="16" text-anchor="middle">
    <!-- Label -->
    <text x="270" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#555">A  (4 x 4, 4 non-zeros)</text>

    <!-- Brackets, matrix from y=95 to y=255, x=170..370 -->
    <path d="M170,95 L160,95 L160,255 L170,255" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M370,95 L380,95 L380,255 L370,255" stroke="#333" stroke-width="2" fill="none"/>

    <!-- Row 0: (0,2)=5 -->
    <rect x="180" y="100" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="202.5" y="124" fill="#bbb">0</text>
    <rect x="225" y="100" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="247.5" y="124" fill="#bbb">0</text>
    <rect x="270" y="100" width="45" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="292.5" y="124" fill="#0d47a1" font-weight="700">5</text>
    <rect x="315" y="100" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="337.5" y="124" fill="#bbb">0</text>

    <!-- Row 1: (1,1)=8 -->
    <rect x="180" y="135" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="202.5" y="159" fill="#bbb">0</text>
    <rect x="225" y="135" width="45" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="247.5" y="159" fill="#0d47a1" font-weight="700">8</text>
    <rect x="270" y="135" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="292.5" y="159" fill="#bbb">0</text>
    <rect x="315" y="135" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="337.5" y="159" fill="#bbb">0</text>

    <!-- Row 2: (2,0)=2 -->
    <rect x="180" y="170" width="45" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="202.5" y="194" fill="#0d47a1" font-weight="700">2</text>
    <rect x="225" y="170" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="247.5" y="194" fill="#bbb">0</text>
    <rect x="270" y="170" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="292.5" y="194" fill="#bbb">0</text>
    <rect x="315" y="170" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="337.5" y="194" fill="#bbb">0</text>

    <!-- Row 3: (3,3)=7 -->
    <rect x="180" y="205" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="202.5" y="229" fill="#bbb">0</text>
    <rect x="225" y="205" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="247.5" y="229" fill="#bbb">0</text>
    <rect x="270" y="205" width="45" height="35" fill="#f5f5f5" stroke="#ddd"/>
    <text x="292.5" y="229" fill="#bbb">0</text>
    <rect x="315" y="205" width="45" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="337.5" y="229" fill="#0d47a1" font-weight="700">7</text>
  </g>

  <!-- Dot operator -->
  <text x="410" y="180" text-anchor="middle" font-size="34" fill="#333">·</text>

  <!-- ============== Vector x ============== -->
  <g font-family="ui-monospace, monospace" font-size="16" text-anchor="middle">
    <text x="470" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#555">x</text>

    <path d="M450,95 L440,95 L440,255 L450,255" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M500,95 L510,95 L510,255 L500,255" stroke="#333" stroke-width="2" fill="none"/>

    <rect x="450" y="100" width="50" height="35" fill="#f5f5f5" stroke="#888"/>
    <text x="475" y="124" fill="#333">1</text>
    <rect x="450" y="135" width="50" height="35" fill="#f5f5f5" stroke="#888"/>
    <text x="475" y="159" fill="#333">1</text>
    <rect x="450" y="170" width="50" height="35" fill="#f5f5f5" stroke="#888"/>
    <text x="475" y="194" fill="#333">1</text>
    <rect x="450" y="205" width="50" height="35" fill="#f5f5f5" stroke="#888"/>
    <text x="475" y="229" fill="#333">1</text>
  </g>

  <!-- Equals -->
  <text x="555" y="180" text-anchor="middle" font-size="34" fill="#333">=</text>

  <!-- ============== Vector y ============== -->
  <g font-family="ui-monospace, monospace" font-size="16" text-anchor="middle">
    <text x="625" y="78" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#555">y</text>

    <path d="M605,95 L595,95 L595,255 L605,255" stroke="#333" stroke-width="2" fill="none"/>
    <path d="M655,95 L665,95 L665,255 L655,255" stroke="#333" stroke-width="2" fill="none"/>

    <rect x="605" y="100" width="50" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="630" y="124" fill="#0d47a1" font-weight="700">5</text>
    <rect x="605" y="135" width="50" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="630" y="159" fill="#0d47a1" font-weight="700">8</text>
    <rect x="605" y="170" width="50" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="630" y="194" fill="#0d47a1" font-weight="700">2</text>
    <rect x="605" y="205" width="50" height="35" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.6"/>
    <text x="630" y="229" fill="#0d47a1" font-weight="700">7</text>
  </g>

  <!-- ============== Annotation box (cost) ============== -->
  <g transform="translate(720,100)">
    <rect x="0" y="0" width="340" height="140" fill="#fff8e1" stroke="#d97706" stroke-width="1.2" rx="6"/>
    <text x="20" y="26" font-size="14" font-weight="600" fill="#7a3d00">Cost: O(nnz)</text>
    <text x="20" y="50" font-size="13" fill="#333">Only the 4 non-zero entries are</text>
    <text x="20" y="68" font-size="13" fill="#333">visited — not all 16 cells.</text>
    <text x="20" y="98" font-size="12" fill="#555" font-style="italic">Dense would do 16 multiplies;</text>
    <text x="20" y="116" font-size="12" fill="#555" font-style="italic">sprs does just 4.</text>
  </g>

  <!-- ============== Code note ============== -->
  <g transform="translate(0,330)">
    <rect x="180" y="0" width="740" height="48" fill="#f8f9fa" stroke="#888" stroke-width="1" rx="4"/>
    <text x="200" y="30" font-family="ui-monospace, monospace" font-size="16" fill="#222">
      <tspan fill="#7a3d00">let</tspan>
      <tspan> y = &amp;csr * &amp;x;</tspan>
      <tspan fill="#888">   // sprs sparse mat-vec</tspan>
    </text>
  </g>

  <!-- Bottom caption -->
  <text x="550" y="430" text-anchor="middle" font-size="14" fill="#555">
    A CSR matrix multiplied by a dense vector — sprs walks only the stored non-zeros, row by row.
  </text>
  <text x="550" y="455" text-anchor="middle" font-size="13" fill="#888" font-style="italic">
    y[i] = sum over stored (i, j) of  A[i, j] * x[j]
  </text>
</svg>
