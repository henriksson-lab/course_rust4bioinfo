<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 380" font-family="system-ui, -apple-system, sans-serif">
  <title>Sparse matrix-vector multiplication with sprs</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="600" y="28" text-anchor="middle" font-size="20" font-weight="600" fill="#111">Sparse matrix-vector multiplication with sprs</text>

  <!-- ============== Matrix A (4x4) ============== -->
  <g font-family="ui-monospace, monospace" font-size="20" text-anchor="middle">
    <!-- Label -->
    <text x="170" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#555">A  (4 x 4, 4 non-zeros)</text>

    <!-- Brackets, matrix cells: x 60..300, y 100..300 (cell 60 x 50) -->
    <path d="M50,100 L40,100 L40,300 L50,300" stroke="#333" stroke-width="2.4" fill="none"/>
    <path d="M300,100 L310,100 L310,300 L300,300" stroke="#333" stroke-width="2.4" fill="none"/>

    <!-- Row 0: (0,2)=5 -->
    <rect x="60"  y="100" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="90"  y="134" fill="#bbb">0</text>
    <rect x="120" y="100" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="150" y="134" fill="#bbb">0</text>
    <rect x="180" y="100" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="210" y="134" fill="#0d47a1" font-weight="700">5</text>
    <rect x="240" y="100" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="270" y="134" fill="#bbb">0</text>

    <!-- Row 1: (1,1)=8 -->
    <rect x="60"  y="150" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="90"  y="184" fill="#bbb">0</text>
    <rect x="120" y="150" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="150" y="184" fill="#0d47a1" font-weight="700">8</text>
    <rect x="180" y="150" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="210" y="184" fill="#bbb">0</text>
    <rect x="240" y="150" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="270" y="184" fill="#bbb">0</text>

    <!-- Row 2: (2,0)=2 -->
    <rect x="60"  y="200" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="90"  y="234" fill="#0d47a1" font-weight="700">2</text>
    <rect x="120" y="200" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="150" y="234" fill="#bbb">0</text>
    <rect x="180" y="200" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="210" y="234" fill="#bbb">0</text>
    <rect x="240" y="200" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="270" y="234" fill="#bbb">0</text>

    <!-- Row 3: (3,3)=7 -->
    <rect x="60"  y="250" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="90"  y="284" fill="#bbb">0</text>
    <rect x="120" y="250" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="150" y="284" fill="#bbb">0</text>
    <rect x="180" y="250" width="60" height="50" fill="#f5f5f5" stroke="#ddd"/>
    <text x="210" y="284" fill="#bbb">0</text>
    <rect x="240" y="250" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="270" y="284" fill="#0d47a1" font-weight="700">7</text>
  </g>

  <!-- Dot operator -->
  <text x="355" y="210" text-anchor="middle" font-size="42" fill="#333">·</text>

  <!-- ============== Vector x (length 4) ============== -->
  <g font-family="ui-monospace, monospace" font-size="20" text-anchor="middle">
    <text x="440" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#555">x</text>

    <path d="M410,100 L400,100 L400,300 L410,300" stroke="#333" stroke-width="2.4" fill="none"/>
    <path d="M470,100 L480,100 L480,300 L470,300" stroke="#333" stroke-width="2.4" fill="none"/>

    <rect x="410" y="100" width="60" height="50" fill="#f5f5f5" stroke="#888"/>
    <text x="440" y="134" fill="#333">1</text>
    <rect x="410" y="150" width="60" height="50" fill="#f5f5f5" stroke="#888"/>
    <text x="440" y="184" fill="#333">1</text>
    <rect x="410" y="200" width="60" height="50" fill="#f5f5f5" stroke="#888"/>
    <text x="440" y="234" fill="#333">1</text>
    <rect x="410" y="250" width="60" height="50" fill="#f5f5f5" stroke="#888"/>
    <text x="440" y="284" fill="#333">1</text>
  </g>

  <!-- Equals -->
  <text x="525" y="210" text-anchor="middle" font-size="42" fill="#333">=</text>

  <!-- ============== Vector y ============== -->
  <g font-family="ui-monospace, monospace" font-size="20" text-anchor="middle">
    <text x="610" y="82" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#555">y</text>

    <path d="M580,100 L570,100 L570,300 L580,300" stroke="#333" stroke-width="2.4" fill="none"/>
    <path d="M640,100 L650,100 L650,300 L640,300" stroke="#333" stroke-width="2.4" fill="none"/>

    <rect x="580" y="100" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="610" y="134" fill="#0d47a1" font-weight="700">5</text>
    <rect x="580" y="150" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="610" y="184" fill="#0d47a1" font-weight="700">8</text>
    <rect x="580" y="200" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="610" y="234" fill="#0d47a1" font-weight="700">2</text>
    <rect x="580" y="250" width="60" height="50" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.8"/>
    <text x="610" y="284" fill="#0d47a1" font-weight="700">7</text>
  </g>

  <!-- ============== Annotation box (cost) ============== -->
  <g transform="translate(720,110)">
    <rect x="0" y="0" width="450" height="120" fill="#fff8e1" stroke="#d97706" stroke-width="1.4" rx="8"/>
    <text x="22" y="32" font-size="17" font-weight="700" fill="#7a3d00">Cost: O(nnz)</text>
    <text x="22" y="60" font-size="15" fill="#333">Only the 4 non-zero entries are visited —</text>
    <text x="22" y="80" font-size="15" fill="#333">not all 16 cells.</text>
    <text x="22" y="106" font-size="14" fill="#555" font-style="italic">Dense would do 16 multiplies; sprs does 4.</text>
  </g>

  <!-- ============== Code note ============== -->
  <g transform="translate(720,250)">
    <rect x="0" y="0" width="450" height="52" fill="#f8f9fa" stroke="#888" stroke-width="1" rx="4"/>
    <text x="22" y="33" font-family="ui-monospace, monospace" font-size="17" fill="#222">
      <tspan fill="#7a3d00">let</tspan>
      <tspan> y = &amp;csr * &amp;x;</tspan>
    </text>
  </g>

  <!-- Bottom caption -->
  <text x="600" y="350" text-anchor="middle" font-size="14" fill="#555">
    A CSR matrix times a dense vector — sprs walks only the stored non-zeros, row by row.
  </text>
</svg>
