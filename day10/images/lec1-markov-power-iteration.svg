<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="system-ui, -apple-system, sans-serif">
  <title>Power iteration — the distribution converges to pi</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrFlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="600" y="30" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Power iteration — the distribution converges to π</text>

  <!-- =================================================== -->
  <!-- LEFT (~40% width): state diagram + transition matrix P -->
  <!-- =================================================== -->

  <!-- State diagram -->
  <g transform="translate(40,60)">
    <text x="230" y="14" text-anchor="middle" font-size="15" font-weight="600" fill="#1976d2">3-state Markov chain</text>

    <!-- Nodes: A at (90,120), B at (370,120), C at (230,260) -->

    <!-- A -> B (curved upper) -->
    <path d="M115,110 Q230,65 345,110" stroke="#1976d2" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
    <text x="230" y="65" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">0.2</text>

    <!-- B -> A (curved lower) -->
    <path d="M345,130 Q230,155 115,130" stroke="#1976d2" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
    <text x="230" y="153" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">0.3</text>

    <!-- A -> C -->
    <path d="M100,140 Q150,200 210,250" stroke="#1976d2" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
    <text x="130" y="220" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">0.1</text>

    <!-- C -> A -->
    <path d="M215,243 Q170,180 110,145" stroke="#1976d2" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
    <text x="145" y="175" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">0.1</text>

    <!-- B -> C -->
    <path d="M355,140 Q310,200 250,250" stroke="#1976d2" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
    <text x="330" y="220" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">0.2</text>

    <!-- C -> B -->
    <path d="M253,243 Q305,180 360,145" stroke="#1976d2" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
    <text x="315" y="175" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">0.1</text>

    <!-- A self-loop (top-left) -->
    <path d="M72,105 C50,65 110,65 90,105" stroke="#d97706" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
    <text x="74" y="58" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#7a3d00">0.7</text>

    <!-- B self-loop (top-right) -->
    <path d="M355,105 C335,65 395,65 375,105" stroke="#d97706" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
    <text x="370" y="58" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#7a3d00">0.5</text>

    <!-- C self-loop (bottom) -->
    <path d="M215,275 C200,315 260,315 245,275" stroke="#d97706" stroke-width="1.4" fill="none" marker-end="url(#arr)"/>
    <text x="230" y="325" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#7a3d00">0.8</text>

    <!-- Nodes -->
    <circle cx="90"  cy="120" r="24" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
    <text x="90" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#0d47a1">A</text>

    <circle cx="370" cy="120" r="24" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
    <text x="370" y="126" text-anchor="middle" font-size="17" font-weight="700" fill="#7a3d00">B</text>

    <circle cx="230" cy="260" r="24" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
    <text x="230" y="266" text-anchor="middle" font-size="17" font-weight="700" fill="#1b5e20">C</text>
  </g>

  <!-- Transition matrix P below the state diagram -->
  <g transform="translate(70,400)" font-family="ui-monospace, monospace" font-size="14">
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#555">P =</text>
    <text x="40" y="0"  fill="#0d47a1">| 0.7  0.2  0.1 |  from A</text>
    <text x="40" y="22" fill="#7a3d00">| 0.3  0.5  0.2 |  from B</text>
    <text x="40" y="44" fill="#1b5e20">| 0.1  0.1  0.8 |  from C</text>
    <text x="40" y="74" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555" font-style="italic">start with all mass on A:  p_0 = [1, 0, 0]</text>
  </g>

  <!-- =================================================== -->
  <!-- RIGHT (~60% width): four bar charts in one row -->
  <!-- =================================================== -->
  <!-- Each chart inside a 170-wide slot. 4 charts × 175 = 700px, starting around x=500. -->

  <!-- ===== p_0 chart ===== -->
  <g transform="translate(500,80)">
    <text x="80" y="0" text-anchor="middle" font-size="15" font-weight="600" fill="#333">p_0</text>
    <text x="80" y="20" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">[1.00, 0.00, 0.00]</text>

    <!-- axes (plot area: x 30..150, y 40..260) -->
    <g stroke="#333" stroke-width="1" fill="none">
      <line x1="30" y1="260" x2="150" y2="260"/>
      <line x1="30" y1="40"  x2="30"  y2="260"/>
    </g>
    <!-- gridlines -->
    <g stroke="#eee" stroke-width="1">
      <line x1="30" y1="216" x2="150" y2="216"/>
      <line x1="30" y1="172" x2="150" y2="172"/>
      <line x1="30" y1="128" x2="150" y2="128"/>
      <line x1="30" y1="84"  x2="150" y2="84"/>
    </g>
    <!-- y labels (height 220 px = 1.0) -->
    <g font-size="10" fill="#666" text-anchor="end">
      <text x="26" y="263">0</text>
      <text x="26" y="219">.2</text>
      <text x="26" y="175">.4</text>
      <text x="26" y="131">.6</text>
      <text x="26" y="87">.8</text>
      <text x="26" y="43">1</text>
    </g>

    <!-- Bars: A=1.0 (h=220), B=0, C=0 -->
    <rect x="48"  y="40"  width="28" height="220" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4"/>
    <line x1="86" y1="260" x2="114" y2="260" stroke="#d97706" stroke-width="2"/>
    <line x1="124" y1="260" x2="152" y2="260" stroke="#2e7d32" stroke-width="2"/>

    <g font-size="12" fill="#333" text-anchor="middle" font-weight="600">
      <text x="62"  y="278">A</text>
      <text x="100" y="278">B</text>
      <text x="138" y="278">C</text>
    </g>
  </g>

  <!-- ===== p_1 chart ===== -->
  <g transform="translate(675,80)">
    <text x="80" y="0" text-anchor="middle" font-size="15" font-weight="600" fill="#333">p_1</text>
    <text x="80" y="20" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">[0.70, 0.20, 0.10]</text>

    <g stroke="#333" stroke-width="1" fill="none">
      <line x1="30" y1="260" x2="150" y2="260"/>
      <line x1="30" y1="40"  x2="30"  y2="260"/>
    </g>
    <g stroke="#eee" stroke-width="1">
      <line x1="30" y1="216" x2="150" y2="216"/>
      <line x1="30" y1="172" x2="150" y2="172"/>
      <line x1="30" y1="128" x2="150" y2="128"/>
      <line x1="30" y1="84"  x2="150" y2="84"/>
    </g>
    <g font-size="10" fill="#666" text-anchor="end">
      <text x="26" y="263">0</text>
      <text x="26" y="219">.2</text>
      <text x="26" y="175">.4</text>
      <text x="26" y="131">.6</text>
      <text x="26" y="87">.8</text>
      <text x="26" y="43">1</text>
    </g>

    <!-- A=0.70 (h=154), B=0.20 (h=44), C=0.10 (h=22) -->
    <rect x="48"  y="106" width="28" height="154" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4"/>
    <rect x="86"  y="216" width="28" height="44"  fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
    <rect x="124" y="238" width="28" height="22"  fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>

    <g font-size="12" fill="#333" text-anchor="middle" font-weight="600">
      <text x="62"  y="278">A</text>
      <text x="100" y="278">B</text>
      <text x="138" y="278">C</text>
    </g>
  </g>

  <!-- ===== p_2 chart ===== -->
  <g transform="translate(850,80)">
    <text x="80" y="0" text-anchor="middle" font-size="15" font-weight="600" fill="#333">p_2</text>
    <text x="80" y="20" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">[0.56, 0.25, 0.19]</text>

    <g stroke="#333" stroke-width="1" fill="none">
      <line x1="30" y1="260" x2="150" y2="260"/>
      <line x1="30" y1="40"  x2="30"  y2="260"/>
    </g>
    <g stroke="#eee" stroke-width="1">
      <line x1="30" y1="216" x2="150" y2="216"/>
      <line x1="30" y1="172" x2="150" y2="172"/>
      <line x1="30" y1="128" x2="150" y2="128"/>
      <line x1="30" y1="84"  x2="150" y2="84"/>
    </g>
    <g font-size="10" fill="#666" text-anchor="end">
      <text x="26" y="263">0</text>
      <text x="26" y="219">.2</text>
      <text x="26" y="175">.4</text>
      <text x="26" y="131">.6</text>
      <text x="26" y="87">.8</text>
      <text x="26" y="43">1</text>
    </g>

    <!-- A=0.56 (h=123), B=0.25 (h=55), C=0.19 (h=42) -->
    <rect x="48"  y="137" width="28" height="123" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4"/>
    <rect x="86"  y="205" width="28" height="55"  fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
    <rect x="124" y="218" width="28" height="42"  fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>

    <g font-size="12" fill="#333" text-anchor="middle" font-weight="600">
      <text x="62"  y="278">A</text>
      <text x="100" y="278">B</text>
      <text x="138" y="278">C</text>
    </g>
  </g>

  <!-- ===== p_inf chart ===== -->
  <g transform="translate(1025,80)">
    <text x="80" y="0" text-anchor="middle" font-size="15" font-weight="600" fill="#c62828">p_∞ ≈ π</text>
    <text x="80" y="20" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">[0.296, 0.185, 0.519]</text>

    <g stroke="#333" stroke-width="1" fill="none">
      <line x1="30" y1="260" x2="150" y2="260"/>
      <line x1="30" y1="40"  x2="30"  y2="260"/>
    </g>
    <g stroke="#eee" stroke-width="1">
      <line x1="30" y1="216" x2="150" y2="216"/>
      <line x1="30" y1="172" x2="150" y2="172"/>
      <line x1="30" y1="128" x2="150" y2="128"/>
      <line x1="30" y1="84"  x2="150" y2="84"/>
    </g>
    <g font-size="10" fill="#666" text-anchor="end">
      <text x="26" y="263">0</text>
      <text x="26" y="219">.2</text>
      <text x="26" y="175">.4</text>
      <text x="26" y="131">.6</text>
      <text x="26" y="87">.8</text>
      <text x="26" y="43">1</text>
    </g>

    <!-- A=0.296 (h=65), B=0.185 (h=41), C=0.519 (h=114) -->
    <rect x="48"  y="195" width="28" height="65"  fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4"/>
    <rect x="86"  y="219" width="28" height="41"  fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
    <rect x="124" y="146" width="28" height="114" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4"/>

    <g font-size="12" fill="#333" text-anchor="middle" font-weight="600">
      <text x="62"  y="278">A</text>
      <text x="100" y="278">B</text>
      <text x="138" y="278">C</text>
    </g>
  </g>

  <!-- Flow arrows between charts -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- p_0 -> p_1 -->
    <line x1="660" y1="200" x2="700" y2="200" stroke="#555" stroke-width="1.4" marker-end="url(#arrFlow)"/>
    <text x="680" y="188" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">× P^T</text>

    <!-- p_1 -> p_2 -->
    <line x1="835" y1="200" x2="875" y2="200" stroke="#555" stroke-width="1.4" marker-end="url(#arrFlow)"/>
    <text x="855" y="188" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">× P^T</text>

    <!-- p_2 -> p_inf (dashed, longer) -->
    <line x1="1010" y1="200" x2="1050" y2="200" stroke="#555" stroke-width="1.4" stroke-dasharray="6,4" marker-end="url(#arrFlow)"/>
    <text x="1030" y="188" text-anchor="middle" font-size="11" fill="#555" font-style="italic">many steps</text>
  </g>

  <!-- Caption -->
  <text x="600" y="500" text-anchor="middle" font-size="14" fill="#333">
    After enough steps the distribution stops changing — that is the stationary distribution π.
  </text>
</svg>
