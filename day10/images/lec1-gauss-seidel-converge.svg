<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <title>Gauss-Seidel convergence</title>

  <defs>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrGrey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
    <marker id="arrAxis" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Gauss-Seidel iterations — converging on the solution</text>

  <!-- ============== Plot frame ============== -->
  <!-- Plot area: x from 60 to 560 (500 wide), y from 70 to 420 (350 tall).
       Domain x0,x1 from -0.1 to 1.3. So scale: x_pix = 60 + (x+0.1)/1.4 * 500
                                                y_pix = 420 - (y+0.1)/1.4 * 350
       Compute points:
         x0_to_px(v) = 60 + (v+0.1)/1.4*500
         x1_to_px(v) = 420 - (v+0.1)/1.4*350

         (0,0): (60 + 0.1/1.4*500, 420 - 0.1/1.4*350) = (60+35.7, 420-25) = (95.7, 395)
         (0.5, 0.4): (60 + 0.6/1.4*500, 420 - 0.5/1.4*350) = (60+214.3, 420-125) = (274.3, 295)
         (0.85, 0.83): (60 + 0.95/1.4*500, 420 - 0.93/1.4*350) = (60+339.3, 420-232.5) = (399.3, 187.5)
         (0.96, 0.95): (60 + 1.06/1.4*500, 420 - 1.05/1.4*350) = (60+378.6, 420-262.5) = (438.6, 157.5)
         (0.99, 0.99): (60 + 1.09/1.4*500, 420 - 1.09/1.4*350) = (60+389.3, 420-272.5) = (449.3, 147.5)
         (1.0, 1.0) star: (60 + 1.1/1.4*500, 420 - 1.1/1.4*350) = (60+392.86, 420-275) = (452.86, 145)
   -->

  <!-- axes -->
  <g stroke="#333" stroke-width="1.4" fill="none">
    <line x1="60" y1="420" x2="600" y2="420" marker-end="url(#arrAxis)"/>
    <line x1="60" y1="420" x2="60" y2="50"  marker-end="url(#arrAxis)"/>
  </g>
  <text x="610" y="424" font-size="14" fill="#333" font-style="italic">x</text>
  <text x="615" y="430" font-size="10" fill="#333">0</text>
  <text x="50" y="44" font-size="14" fill="#333" font-style="italic" text-anchor="end">x</text>
  <text x="58" y="50" font-size="10" fill="#333" text-anchor="end">1</text>

  <!-- Light gridlines -->
  <g stroke="#eee" stroke-width="1" fill="none">
    <line x1="60" y1="420" x2="60" y2="50"/>
    <line x1="95.7" y1="50" x2="95.7" y2="420"/>
    <line x1="452.86" y1="50" x2="452.86" y2="420"/>
    <line x1="60" y1="395" x2="600" y2="395"/>
    <line x1="60" y1="145" x2="600" y2="145"/>
  </g>

  <!-- tick labels -->
  <g font-size="11" fill="#666" text-anchor="middle">
    <text x="95.7"  y="438">0</text>
    <text x="452.86" y="438">1</text>
  </g>
  <g font-size="11" fill="#666" text-anchor="end">
    <text x="55" y="399">0</text>
    <text x="55" y="149">1</text>
  </g>

  <!-- ============== Poorly-conditioned (grey dashed) trajectory ============== -->
  <!-- A slow zig-zag: starts at (0,0), zigzags toward (1,1) -->
  <!-- Points (data): (0,0) (0.55,0.05) (0.6,0.5) (0.92,0.55) (0.94,0.85) (0.99,0.88) (0.99,0.99) -->
  <!-- Compute pixels (px = 60 + (x+0.1)/1.4*500 ; py = 420 - (y+0.1)/1.4*350) -->
  <!--
    (0.55,0.05) -> (60+0.65/1.4*500, 420-0.15/1.4*350) = (60+232.1, 420-37.5) = (292.1, 382.5)
    (0.6,0.5)   -> (60+250, 420-150) = (310, 270)
    (0.92,0.55) -> (60+364.3, 420-162.5) = (424.3, 257.5)
    (0.94,0.85) -> (60+371.4, 420-237.5) = (431.4, 182.5)
    (0.99,0.88) -> (60+389.3, 420-245) = (449.3, 175)
    (0.99,0.99) -> (449.3, 147.5)
  -->
  <g stroke="#888" stroke-width="1.8" fill="none" stroke-dasharray="5,4" opacity="0.8" marker-end="url(#arrGrey)">
    <path d="M95.7,395 L292.1,382.5 L310,270 L424.3,257.5 L431.4,182.5 L449.3,175 L449.3,147.5"/>
  </g>
  <g fill="#888">
    <circle cx="292.1" cy="382.5" r="3"/>
    <circle cx="310" cy="270" r="3"/>
    <circle cx="424.3" cy="257.5" r="3"/>
    <circle cx="431.4" cy="182.5" r="3"/>
    <circle cx="449.3" cy="175" r="3"/>
  </g>
  <text x="350" y="320" font-size="12" fill="#888" font-style="italic">poorly conditioned: slow zig-zag</text>

  <!-- ============== Well-conditioned (blue) trajectory ============== -->
  <g stroke="#1976d2" stroke-width="2.2" fill="none" marker-end="url(#arrBlue)">
    <path d="M95.7,395 L274.3,295"/>
    <path d="M274.3,295 L399.3,187.5"/>
    <path d="M399.3,187.5 L438.6,157.5"/>
    <path d="M438.6,157.5 L449.3,147.5"/>
  </g>

  <!-- iterates (blue dots) and labels -->
  <g>
    <circle cx="95.7" cy="395" r="6" fill="#1976d2" stroke="#0d47a1" stroke-width="1.4"/>
    <text x="78" y="412" font-size="13" fill="#0d47a1" font-family="ui-monospace, monospace">x(0)</text>

    <circle cx="274.3" cy="295" r="5" fill="#1976d2" stroke="#0d47a1" stroke-width="1.2"/>
    <text x="282" y="298" font-size="13" fill="#0d47a1" font-family="ui-monospace, monospace">x(1)</text>

    <circle cx="399.3" cy="187.5" r="5" fill="#1976d2" stroke="#0d47a1" stroke-width="1.2"/>
    <text x="345" y="183" font-size="13" fill="#0d47a1" font-family="ui-monospace, monospace">x(2)</text>

    <circle cx="438.6" cy="157.5" r="4.5" fill="#1976d2" stroke="#0d47a1" stroke-width="1.2"/>
    <text x="395" y="148" font-size="12" fill="#0d47a1" font-family="ui-monospace, monospace">x(3)</text>

    <circle cx="449.3" cy="147.5" r="4" fill="#1976d2" stroke="#0d47a1" stroke-width="1"/>
    <text x="395" y="135" font-size="11" fill="#0d47a1" font-family="ui-monospace, monospace">x(4)</text>
  </g>

  <!-- True solution star at (1,1) -->
  <g transform="translate(452.86,145)">
    <polygon points="0,-14 4,-4 14,-4 6,3 9,13 0,7 -9,13 -6,3 -14,-4 -4,-4" fill="#2e7d32" stroke="#1b5e20" stroke-width="1.2"/>
  </g>
  <text x="470" y="138" font-size="13" font-weight="600" fill="#2e7d32">true solution x* = (1, 1)</text>

  <!-- ============== Side annotation ============== -->
  <g transform="translate(640,90)">
    <rect x="0" y="0" width="230" height="115" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2" rx="6"/>
    <text x="115" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#0d47a1">well-conditioned</text>
    <text x="12" y="48" font-size="12" fill="#222">fast convergence:</text>
    <text x="12" y="68" font-size="12" fill="#222">each step cuts the error by</text>
    <text x="12" y="86" font-size="12" fill="#222">a constant fraction (ratio &lt; 1).</text>
    <text x="12" y="106" font-size="11" fill="#555" font-family="ui-monospace, monospace">|| e_(k+1) || ≈ ρ · || e_k ||</text>
  </g>

  <g transform="translate(640,220)">
    <rect x="0" y="0" width="230" height="115" fill="#f5f5f5" stroke="#888" stroke-width="1.2" rx="6"/>
    <text x="115" y="22" text-anchor="middle" font-size="13" font-weight="600" fill="#555">poorly conditioned</text>
    <text x="12" y="48" font-size="12" fill="#222">slow zig-zag:</text>
    <text x="12" y="68" font-size="12" fill="#222">large condition number,</text>
    <text x="12" y="86" font-size="12" fill="#222">many iterations needed.</text>
    <text x="12" y="106" font-size="11" fill="#555" font-family="ui-monospace, monospace">ρ close to 1</text>
  </g>

  <!-- ============== Caption ============== -->
  <text x="450" y="475" text-anchor="middle" font-size="13" fill="#333">
    Condition number near 1: fast. Condition number large: slow zig-zag. Singular (condition number infinite): no convergence.
  </text>
</svg>
