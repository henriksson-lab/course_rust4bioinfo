<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="system-ui, -apple-system, sans-serif">
  <title>Same matrix, two memory layouts</title>

  <defs>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7b1fa2"/>
    </marker>
  </defs>

  <text x="550" y="32" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Same matrix, two memory layouts</text>

  <!-- =================== LEFT PANEL: ROW-MAJOR =================== -->
  <g transform="translate(40,70)">
    <text x="260" y="0" text-anchor="middle" font-size="16" font-weight="600" fill="#1976d2">Row-major (ndarray, NumPy, C)</text>

    <!-- 3 x 4 matrix, cell 60 x 40, at (100, 30); rows colored -->
    <g font-family="ui-monospace, monospace" font-size="15" text-anchor="middle">
      <!-- Row 0 (blue) -->
      <rect x="100" y="30"  width="60" height="40" fill="#bbdefb" stroke="#1976d2"/><text x="130" y="56" fill="#0d47a1">1</text>
      <rect x="160" y="30"  width="60" height="40" fill="#bbdefb" stroke="#1976d2"/><text x="190" y="56" fill="#0d47a1">2</text>
      <rect x="220" y="30"  width="60" height="40" fill="#bbdefb" stroke="#1976d2"/><text x="250" y="56" fill="#0d47a1">3</text>
      <rect x="280" y="30"  width="60" height="40" fill="#bbdefb" stroke="#1976d2"/><text x="310" y="56" fill="#0d47a1">4</text>
      <!-- Row 1 (orange) -->
      <rect x="100" y="70"  width="60" height="40" fill="#ffe0b2" stroke="#d97706"/><text x="130" y="96" fill="#7a3d00">5</text>
      <rect x="160" y="70"  width="60" height="40" fill="#ffe0b2" stroke="#d97706"/><text x="190" y="96" fill="#7a3d00">6</text>
      <rect x="220" y="70"  width="60" height="40" fill="#ffe0b2" stroke="#d97706"/><text x="250" y="96" fill="#7a3d00">7</text>
      <rect x="280" y="70"  width="60" height="40" fill="#ffe0b2" stroke="#d97706"/><text x="310" y="96" fill="#7a3d00">8</text>
      <!-- Row 2 (green) -->
      <rect x="100" y="110" width="60" height="40" fill="#c8e6c9" stroke="#2e7d32"/><text x="130" y="136" fill="#1b5e20">9</text>
      <rect x="160" y="110" width="60" height="40" fill="#c8e6c9" stroke="#2e7d32"/><text x="190" y="136" fill="#1b5e20">10</text>
      <rect x="220" y="110" width="60" height="40" fill="#c8e6c9" stroke="#2e7d32"/><text x="250" y="136" fill="#1b5e20">11</text>
      <rect x="280" y="110" width="60" height="40" fill="#c8e6c9" stroke="#2e7d32"/><text x="310" y="136" fill="#1b5e20">12</text>
    </g>

    <!-- Row labels left -->
    <g font-family="ui-monospace, monospace" font-size="11" fill="#888" text-anchor="end">
      <text x="92" y="55">row 0</text>
      <text x="92" y="95">row 1</text>
      <text x="92" y="135">row 2</text>
    </g>

    <!-- Memory strip caption -->
    <text x="260" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555">Linear memory (one byte stream):</text>

    <!-- 12 cells, width 40, at (20, 215) -->
    <g font-family="ui-monospace, monospace" font-size="13" text-anchor="middle">
      <!-- Row 0 group (blue) -->
      <rect x="20"  y="215" width="40" height="32" fill="#bbdefb" stroke="#1976d2"/><text x="40"  y="236" fill="#0d47a1">1</text>
      <rect x="60"  y="215" width="40" height="32" fill="#bbdefb" stroke="#1976d2"/><text x="80"  y="236" fill="#0d47a1">2</text>
      <rect x="100" y="215" width="40" height="32" fill="#bbdefb" stroke="#1976d2"/><text x="120" y="236" fill="#0d47a1">3</text>
      <rect x="140" y="215" width="40" height="32" fill="#bbdefb" stroke="#1976d2"/><text x="160" y="236" fill="#0d47a1">4</text>
      <!-- Row 1 group (orange) -->
      <rect x="180" y="215" width="40" height="32" fill="#ffe0b2" stroke="#d97706"/><text x="200" y="236" fill="#7a3d00">5</text>
      <rect x="220" y="215" width="40" height="32" fill="#ffe0b2" stroke="#d97706"/><text x="240" y="236" fill="#7a3d00">6</text>
      <rect x="260" y="215" width="40" height="32" fill="#ffe0b2" stroke="#d97706"/><text x="280" y="236" fill="#7a3d00">7</text>
      <rect x="300" y="215" width="40" height="32" fill="#ffe0b2" stroke="#d97706"/><text x="320" y="236" fill="#7a3d00">8</text>
      <!-- Row 2 group (green) -->
      <rect x="340" y="215" width="40" height="32" fill="#c8e6c9" stroke="#2e7d32"/><text x="360" y="236" fill="#1b5e20">9</text>
      <rect x="380" y="215" width="40" height="32" fill="#c8e6c9" stroke="#2e7d32"/><text x="400" y="236" fill="#1b5e20">10</text>
      <rect x="420" y="215" width="40" height="32" fill="#c8e6c9" stroke="#2e7d32"/><text x="440" y="236" fill="#1b5e20">11</text>
      <rect x="460" y="215" width="40" height="32" fill="#c8e6c9" stroke="#2e7d32"/><text x="480" y="236" fill="#1b5e20">12</text>
    </g>

    <!-- Memory offsets below -->
    <g font-family="ui-monospace, monospace" font-size="10" fill="#888" text-anchor="middle">
      <text x="40"  y="260">0</text>
      <text x="80"  y="260">1</text>
      <text x="120" y="260">2</text>
      <text x="160" y="260">3</text>
      <text x="200" y="260">4</text>
      <text x="240" y="260">5</text>
      <text x="280" y="260">6</text>
      <text x="320" y="260">7</text>
      <text x="360" y="260">8</text>
      <text x="400" y="260">9</text>
      <text x="440" y="260">10</text>
      <text x="480" y="260">11</text>
    </g>

    <!-- Curved arrows from rows to strip groups -->
    <!-- Row 0 center: (220, 50) -> blue group center (100, 215) -->
    <path d="M220,50 C 180,130 100,170 100,210" stroke="#1976d2" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
    <!-- Row 1 center: (220, 90) -> orange group center (260, 215) -->
    <path d="M220,90 C 250,140 260,180 260,210" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrOrange)"/>
    <!-- Row 2 center: (220, 130) -> green group center (420, 215) -->
    <path d="M220,130 C 320,150 420,170 420,210" stroke="#2e7d32" stroke-width="1.5" fill="none" marker-end="url(#arrGreen)"/>

    <!-- Bottom caption -->
    <text x="260" y="300" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#333">offset(i, j) = i · cols + j</text>
    <text x="260" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">walk a row → contiguous bytes</text>
  </g>

  <!-- =================== RIGHT PANEL: COLUMN-MAJOR =================== -->
  <g transform="translate(560,70)">
    <text x="260" y="0" text-anchor="middle" font-size="16" font-weight="600" fill="#d97706">Column-major (nalgebra, R, Fortran)</text>

    <!-- 3 x 4 matrix, cell 60 x 40, at (100, 30); columns colored -->
    <g font-family="ui-monospace, monospace" font-size="15" text-anchor="middle">
      <!-- Row 0 -->
      <rect x="100" y="30"  width="60" height="40" fill="#bbdefb" stroke="#1976d2"/><text x="130" y="56" fill="#0d47a1">1</text>
      <rect x="160" y="30"  width="60" height="40" fill="#ffe0b2" stroke="#d97706"/><text x="190" y="56" fill="#7a3d00">2</text>
      <rect x="220" y="30"  width="60" height="40" fill="#c8e6c9" stroke="#2e7d32"/><text x="250" y="56" fill="#1b5e20">3</text>
      <rect x="280" y="30"  width="60" height="40" fill="#e1bee7" stroke="#7b1fa2"/><text x="310" y="56" fill="#4a148c">4</text>
      <!-- Row 1 -->
      <rect x="100" y="70"  width="60" height="40" fill="#bbdefb" stroke="#1976d2"/><text x="130" y="96" fill="#0d47a1">5</text>
      <rect x="160" y="70"  width="60" height="40" fill="#ffe0b2" stroke="#d97706"/><text x="190" y="96" fill="#7a3d00">6</text>
      <rect x="220" y="70"  width="60" height="40" fill="#c8e6c9" stroke="#2e7d32"/><text x="250" y="96" fill="#1b5e20">7</text>
      <rect x="280" y="70"  width="60" height="40" fill="#e1bee7" stroke="#7b1fa2"/><text x="310" y="96" fill="#4a148c">8</text>
      <!-- Row 2 -->
      <rect x="100" y="110" width="60" height="40" fill="#bbdefb" stroke="#1976d2"/><text x="130" y="136" fill="#0d47a1">9</text>
      <rect x="160" y="110" width="60" height="40" fill="#ffe0b2" stroke="#d97706"/><text x="190" y="136" fill="#7a3d00">10</text>
      <rect x="220" y="110" width="60" height="40" fill="#c8e6c9" stroke="#2e7d32"/><text x="250" y="136" fill="#1b5e20">11</text>
      <rect x="280" y="110" width="60" height="40" fill="#e1bee7" stroke="#7b1fa2"/><text x="310" y="136" fill="#4a148c">12</text>
    </g>

    <!-- Column labels above -->
    <g font-family="ui-monospace, monospace" font-size="11" fill="#888" text-anchor="middle">
      <text x="130" y="22">col 0</text>
      <text x="190" y="22">col 1</text>
      <text x="250" y="22">col 2</text>
      <text x="310" y="22">col 3</text>
    </g>

    <!-- Memory strip caption -->
    <text x="260" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555">Linear memory (one byte stream):</text>

    <!-- 12 cells, width 40, at (20, 215). Order: col0(1,5,9), col1(2,6,10), col2(3,7,11), col3(4,8,12) -->
    <g font-family="ui-monospace, monospace" font-size="13" text-anchor="middle">
      <!-- Col 0 (blue) -->
      <rect x="20"  y="215" width="40" height="32" fill="#bbdefb" stroke="#1976d2"/><text x="40"  y="236" fill="#0d47a1">1</text>
      <rect x="60"  y="215" width="40" height="32" fill="#bbdefb" stroke="#1976d2"/><text x="80"  y="236" fill="#0d47a1">5</text>
      <rect x="100" y="215" width="40" height="32" fill="#bbdefb" stroke="#1976d2"/><text x="120" y="236" fill="#0d47a1">9</text>
      <!-- Col 1 (orange) -->
      <rect x="140" y="215" width="40" height="32" fill="#ffe0b2" stroke="#d97706"/><text x="160" y="236" fill="#7a3d00">2</text>
      <rect x="180" y="215" width="40" height="32" fill="#ffe0b2" stroke="#d97706"/><text x="200" y="236" fill="#7a3d00">6</text>
      <rect x="220" y="215" width="40" height="32" fill="#ffe0b2" stroke="#d97706"/><text x="240" y="236" fill="#7a3d00">10</text>
      <!-- Col 2 (green) -->
      <rect x="260" y="215" width="40" height="32" fill="#c8e6c9" stroke="#2e7d32"/><text x="280" y="236" fill="#1b5e20">3</text>
      <rect x="300" y="215" width="40" height="32" fill="#c8e6c9" stroke="#2e7d32"/><text x="320" y="236" fill="#1b5e20">7</text>
      <rect x="340" y="215" width="40" height="32" fill="#c8e6c9" stroke="#2e7d32"/><text x="360" y="236" fill="#1b5e20">11</text>
      <!-- Col 3 (purple) -->
      <rect x="380" y="215" width="40" height="32" fill="#e1bee7" stroke="#7b1fa2"/><text x="400" y="236" fill="#4a148c">4</text>
      <rect x="420" y="215" width="40" height="32" fill="#e1bee7" stroke="#7b1fa2"/><text x="440" y="236" fill="#4a148c">8</text>
      <rect x="460" y="215" width="40" height="32" fill="#e1bee7" stroke="#7b1fa2"/><text x="480" y="236" fill="#4a148c">12</text>
    </g>

    <!-- Memory offsets below -->
    <g font-family="ui-monospace, monospace" font-size="10" fill="#888" text-anchor="middle">
      <text x="40"  y="260">0</text>
      <text x="80"  y="260">1</text>
      <text x="120" y="260">2</text>
      <text x="160" y="260">3</text>
      <text x="200" y="260">4</text>
      <text x="240" y="260">5</text>
      <text x="280" y="260">6</text>
      <text x="320" y="260">7</text>
      <text x="360" y="260">8</text>
      <text x="400" y="260">9</text>
      <text x="440" y="260">10</text>
      <text x="480" y="260">11</text>
    </g>

    <!-- Curved arrows from columns to strip groups -->
    <!-- Col 0 center: (130, 90) -> blue group center (80, 215) -->
    <path d="M130,150 C 110,170 80,180 80,210" stroke="#1976d2" stroke-width="1.5" fill="none" marker-end="url(#arrBlue)"/>
    <!-- Col 1: (190, 90) -> orange center (200, 215) -->
    <path d="M190,150 C 195,170 200,180 200,210" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrOrange)"/>
    <!-- Col 2: (250, 90) -> green center (320, 215) -->
    <path d="M250,150 C 280,170 320,180 320,210" stroke="#2e7d32" stroke-width="1.5" fill="none" marker-end="url(#arrGreen)"/>
    <!-- Col 3: (310, 90) -> purple center (440, 215) -->
    <path d="M310,150 C 380,170 440,180 440,210" stroke="#7b1fa2" stroke-width="1.5" fill="none" marker-end="url(#arrPurple)"/>

    <!-- Bottom caption -->
    <text x="260" y="300" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#333">offset(i, j) = j · rows + i</text>
    <text x="260" y="325" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">walk a column → contiguous bytes</text>
  </g>

  <!-- Bottom unifying caption -->
  <text x="550" y="490" text-anchor="middle" font-size="14" fill="#555">
    Same 12 numbers, same shape — different walking order through linear memory.
  </text>
</svg>
