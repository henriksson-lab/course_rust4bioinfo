<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="system-ui, -apple-system, sans-serif">
  <title>Sparse CSC format — compressed sparse column</title>

  <!-- ============== Title ============== -->
  <text x="550" y="30" text-anchor="middle" font-size="22" font-weight="600" fill="#111">CSC — compressed sparse column</text>

  <!-- ============== 4x4 matrix at top-left ============== -->
  <!-- Same non-zeros as CSR: (0,2)=5, (1,1)=8, (2,0)=2, (3,3)=7 -->
  <g font-family="ui-monospace, monospace" font-size="14" text-anchor="middle">
    <text x="190" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">4 x 4 matrix A (nnz = 4)</text>

    <!-- col labels -->
    <g font-size="11" fill="#888">
      <text x="100" y="94">0</text>
      <text x="160" y="94">1</text>
      <text x="220" y="94">2</text>
      <text x="280" y="94">3</text>
    </g>
    <!-- row labels -->
    <g font-size="11" fill="#888" text-anchor="end">
      <text x="65" y="127">0</text>
      <text x="65" y="171">1</text>
      <text x="65" y="215">2</text>
      <text x="65" y="259">3</text>
    </g>

    <!-- row 0 -->
    <rect x="70"  y="102" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="130" y="102" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="190" y="102" width="60" height="44" fill="#fff3cd" stroke="#d97706"/><text x="220" y="130" fill="#7a3d00" font-weight="700">5</text>
    <rect x="250" y="102" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 1 -->
    <rect x="70"  y="146" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="130" y="146" width="60" height="44" fill="#fff3cd" stroke="#d97706"/><text x="160" y="174" fill="#7a3d00" font-weight="700">8</text>
    <rect x="190" y="146" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="250" y="146" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 2 -->
    <rect x="70"  y="190" width="60" height="44" fill="#fff3cd" stroke="#d97706"/><text x="100" y="218" fill="#7a3d00" font-weight="700">2</text>
    <rect x="130" y="190" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="190" y="190" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="250" y="190" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 3 -->
    <rect x="70"  y="234" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="130" y="234" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="190" y="234" width="60" height="44" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="250" y="234" width="60" height="44" fill="#fff3cd" stroke="#d97706"/><text x="280" y="262" fill="#7a3d00" font-weight="700">7</text>
  </g>

  <!-- ============== Three arrays to the right of the matrix ============== -->
  <!-- Same layout as CSR: cell width 72, height 36, gaps 14px.
       CSC traverses column-by-column:
         col 0: (2, 2)
         col 1: (1, 8)
         col 2: (0, 5)
         col 3: (3, 7)
       So values[] = [2, 8, 5, 7], row_indices[] = [2, 1, 0, 3], col_ptr[] = [0, 1, 2, 3, 4] -->

  <g font-family="ui-monospace, monospace" font-size="15" text-anchor="middle">
    <!-- Row labels (left of each array) -->
    <g font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#444" text-anchor="end">
      <text x="545" y="132">values[]</text>
      <text x="545" y="227">row_indices[]</text>
      <text x="545" y="322">col_ptr[]</text>
    </g>

    <!-- values[] = [2, 8, 5, 7] (CSC order: column 0 first) -->
    <rect x="560" y="110" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="596" y="134" fill="#7a3d00" font-weight="700">2</text>
    <rect x="646" y="110" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="682" y="134" fill="#7a3d00" font-weight="700">8</text>
    <rect x="732" y="110" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="768" y="134" fill="#7a3d00" font-weight="700">5</text>
    <rect x="818" y="110" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="854" y="134" fill="#7a3d00" font-weight="700">7</text>

    <g font-size="11" fill="#888">
      <text x="596" y="160">k=0</text>
      <text x="682" y="160">k=1</text>
      <text x="768" y="160">k=2</text>
      <text x="854" y="160">k=3</text>
    </g>

    <!-- row_indices[] = [2, 1, 0, 3] -->
    <rect x="560" y="205" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="596" y="229" fill="#7a3d00" font-weight="700">2</text>
    <rect x="646" y="205" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="682" y="229" fill="#7a3d00" font-weight="700">1</text>
    <rect x="732" y="205" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="768" y="229" fill="#7a3d00" font-weight="700">0</text>
    <rect x="818" y="205" width="72" height="36" fill="#fff3cd" stroke="#d97706"/><text x="854" y="229" fill="#7a3d00" font-weight="700">3</text>

    <g font-size="11" fill="#888">
      <text x="596" y="255">k=0</text>
      <text x="682" y="255">k=1</text>
      <text x="768" y="255">k=2</text>
      <text x="854" y="255">k=3</text>
    </g>

    <!-- col_ptr[] = [0, 1, 2, 3, 4] (length cols+1 = 5) -->
    <rect x="560" y="300" width="72" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="596" y="324" fill="#0d47a1" font-weight="700">0</text>
    <rect x="646" y="300" width="72" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="682" y="324" fill="#0d47a1" font-weight="700">1</text>
    <rect x="732" y="300" width="72" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="768" y="324" fill="#0d47a1" font-weight="700">2</text>
    <rect x="818" y="300" width="72" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="854" y="324" fill="#0d47a1" font-weight="700">3</text>
    <rect x="904" y="300" width="72" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="940" y="324" fill="#0d47a1" font-weight="700">4</text>

    <g font-size="11" fill="#888">
      <text x="596" y="350">j=0</text>
      <text x="682" y="350">j=1</text>
      <text x="768" y="350">j=2</text>
      <text x="854" y="350">j=3</text>
      <text x="940" y="350">j=4</text>
    </g>
  </g>

  <!-- ============== Annotation box (light blue) ============== -->
  <g>
    <rect x="80" y="400" width="940" height="92" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
    <text x="100" y="430" font-size="14" font-weight="600" fill="#0d47a1">Reading CSC</text>
    <text x="100" y="456" font-family="ui-monospace, monospace" font-size="14" fill="#444">For column j, look at values[col_ptr[j] .. col_ptr[j+1]] and the matching row_indices.</text>
    <text x="100" y="480" font-size="13" fill="#555">Example: column 1 spans k = col_ptr[1]..col_ptr[2] = 1..2, so values[1]=8 at row_indices[1]=1.</text>
  </g>

  <!-- Caption -->
  <text x="550" y="540" text-anchor="middle" font-size="13" fill="#555">Fast column access; slower for row operations than CSR.</text>
</svg>
