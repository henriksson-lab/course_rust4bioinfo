<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <title>Sparse CSC format</title>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="600" fill="#111">CSC — compressed sparse column</text>

  <!-- ============== Left matrix ============== -->
  <g transform="translate(60,80)" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle">
    <text x="125" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">5 x 5 sparse matrix</text>

    <!-- row 0 -->
    <rect x="0"   y="0"   width="50" height="40" fill="#fff3cd" stroke="#d97706"/><text x="25"  y="25" fill="#7a3d00">1.0</text>
    <rect x="50"  y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="0"   width="50" height="40" fill="#fff3cd" stroke="#d97706"/><text x="225" y="25" fill="#7a3d00">2.0</text>
    <!-- row 1 -->
    <rect x="0"   y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="40"  width="50" height="40" fill="#fff3cd" stroke="#d97706"/><text x="75"  y="65" fill="#7a3d00">3.0</text>
    <rect x="100" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 2 -->
    <rect x="0"   y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="80"  width="50" height="40" fill="#fff3cd" stroke="#d97706"/><text x="175" y="105" fill="#7a3d00">4.0</text>
    <rect x="200" y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 3 -->
    <rect x="0"   y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 4 -->
    <rect x="0"   y="160" width="50" height="40" fill="#fff3cd" stroke="#d97706"/><text x="25"  y="185" fill="#7a3d00">5.0</text>
    <rect x="50"  y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="160" width="50" height="40" fill="#fff3cd" stroke="#d97706"/><text x="225" y="185" fill="#7a3d00">6.0</text>

    <!-- column labels -->
    <g font-size="11" fill="#d97706" text-anchor="middle" font-weight="600">
      <text x="25"  y="-2">col 0</text>
      <text x="75"  y="-2">col 1</text>
      <text x="125" y="-2">col 2</text>
      <text x="175" y="-2">col 3</text>
      <text x="225" y="-2">col 4</text>
    </g>
    <!-- per-col nnz hint at bottom -->
    <g font-size="10" fill="#888" text-anchor="middle">
      <text x="25"  y="218">2 nz</text>
      <text x="75"  y="218">1 nz</text>
      <text x="125" y="218">0 nz</text>
      <text x="175" y="218">1 nz</text>
      <text x="225" y="218">2 nz</text>
    </g>
  </g>

  <!-- ============== Right arrays ============== -->
  <g transform="translate(420,80)" font-family="ui-monospace, monospace" font-size="13" text-anchor="middle">
    <text x="210" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">three arrays</text>

    <!-- values[] -->
    <text x="-20" y="22" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d97706">values[]</text>
    <rect x="0"   y="5" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="30"  y="25" fill="#7a3d00">1.0</text>
    <rect x="60"  y="5" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="90"  y="25" fill="#7a3d00">5.0</text>
    <rect x="120" y="5" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="150" y="25" fill="#7a3d00">3.0</text>
    <rect x="180" y="5" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="210" y="25" fill="#7a3d00">4.0</text>
    <rect x="240" y="5" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="270" y="25" fill="#7a3d00">2.0</text>
    <rect x="300" y="5" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="330" y="25" fill="#7a3d00">6.0</text>

    <!-- row_indices[] -->
    <text x="-20" y="72" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#d97706">row_indices[]</text>
    <rect x="0"   y="55" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="30"  y="75" fill="#7a3d00">0</text>
    <rect x="60"  y="55" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="90"  y="75" fill="#7a3d00">4</text>
    <rect x="120" y="55" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="150" y="75" fill="#7a3d00">1</text>
    <rect x="180" y="55" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="210" y="75" fill="#7a3d00">2</text>
    <rect x="240" y="55" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="270" y="75" fill="#7a3d00">0</text>
    <rect x="300" y="55" width="60" height="30" fill="#fff3cd" stroke="#d97706"/><text x="330" y="75" fill="#7a3d00">4</text>

    <g font-size="10" fill="#888" text-anchor="middle">
      <text x="30"  y="98">0</text>
      <text x="90"  y="98">1</text>
      <text x="150" y="98">2</text>
      <text x="210" y="98">3</text>
      <text x="270" y="98">4</text>
      <text x="330" y="98">5</text>
    </g>

    <!-- col_ptr[] length ncols+1=6 -->
    <text x="-20" y="142" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1976d2">col_ptr[]</text>
    <rect x="0"   y="125" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="30"  y="145" fill="#0d47a1">0</text>
    <rect x="60"  y="125" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="90"  y="145" fill="#0d47a1">2</text>
    <rect x="120" y="125" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="150" y="145" fill="#0d47a1">3</text>
    <rect x="180" y="125" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="210" y="145" fill="#0d47a1">3</text>
    <rect x="240" y="125" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="270" y="145" fill="#0d47a1">4</text>
    <rect x="300" y="125" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="330" y="145" fill="#0d47a1">6</text>

    <g font-size="10" fill="#888" text-anchor="middle">
      <text x="30"  y="170">j=0</text>
      <text x="90"  y="170">j=1</text>
      <text x="150" y="170">j=2</text>
      <text x="210" y="170">j=3</text>
      <text x="270" y="170">j=4</text>
      <text x="330" y="170">j=5</text>
    </g>
  </g>

  <!-- ============== Annotation ============== -->
  <g transform="translate(60,360)">
    <rect x="0" y="0" width="780" height="65" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2" rx="6"/>
    <text x="20" y="22" font-size="13" font-weight="600" fill="#0d47a1">Reading column j:</text>
    <text x="20" y="42" font-size="13" font-family="ui-monospace, monospace" fill="#222">
      non-zeros for column j are at indices  col_ptr[j] .. col_ptr[j+1]  in values[] and row_indices[]
    </text>
    <text x="20" y="58" font-size="12" fill="#555">
      e.g. col 0: col_ptr[0]=0, col_ptr[1]=2  →  values[0..2]=[1.0,5.0] at rows [0,4]. Col 2 is empty (col_ptr[2]=col_ptr[3]=3).
    </text>
  </g>

  <text x="450" y="450" text-anchor="middle" font-size="13" fill="#555">
    Fast column access; slower for row operations than CSR.
  </text>
</svg>
