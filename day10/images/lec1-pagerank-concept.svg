<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 600" font-family="system-ui, -apple-system, sans-serif">
  <title>PageRank — a Markov chain on the web graph</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrSurfer" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrFlow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="550" y="30" text-anchor="middle" font-size="22" font-weight="600" fill="#111">PageRank — a Markov chain on the web graph</text>

  <!-- ============== Top-left: directed graph of 5 web pages ============== -->
  <g transform="translate(30,60)">
    <text x="200" y="14" text-anchor="middle" font-size="15" font-weight="600" fill="#1976d2">web graph (5 pages, 7 links)</text>

    <!-- Node positions:
         A at (90, 90)   B at (270, 60)   C at (180, 180)   D at (320, 200)   E at (60, 220)
    -->

    <!-- Edges:
         A -> B   A -> C   B -> C   C -> A   D -> C   D -> E   E -> A
    -->

    <!-- A -> B -->
    <line x1="115" y1="85" x2="245" y2="65" stroke="#1976d2" stroke-width="1.6" marker-end="url(#arr)"/>
    <!-- A -> C -->
    <line x1="105" y1="112" x2="165" y2="160" stroke="#1976d2" stroke-width="1.6" marker-end="url(#arr)"/>
    <!-- B -> C -->
    <line x1="258" y1="82" x2="195" y2="160" stroke="#1976d2" stroke-width="1.6" marker-end="url(#arr)"/>
    <!-- C -> A (curved back to avoid overlap with A->C) -->
    <path d="M165,170 Q110,150 95,115" stroke="#1976d2" stroke-width="1.6" fill="none" marker-end="url(#arr)"/>
    <!-- D -> C -->
    <line x1="298" y1="198" x2="205" y2="185" stroke="#1976d2" stroke-width="1.6" marker-end="url(#arr)"/>
    <!-- D -> E -->
    <line x1="297" y1="208" x2="83" y2="220" stroke="#1976d2" stroke-width="1.6" marker-end="url(#arr)"/>
    <!-- E -> A -->
    <line x1="68" y1="200" x2="85" y2="115" stroke="#1976d2" stroke-width="1.6" marker-end="url(#arr)"/>

    <!-- Nodes (drawn over edges) -->
    <g font-size="11" font-weight="700">
      <circle cx="90"  cy="90"  r="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <text x="90" y="94" text-anchor="middle" fill="#0d47a1">A</text>

      <circle cx="270" cy="60"  r="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <text x="270" y="64" text-anchor="middle" fill="#0d47a1">B</text>

      <circle cx="180" cy="180" r="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <text x="180" y="184" text-anchor="middle" fill="#0d47a1">C</text>

      <circle cx="320" cy="200" r="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <text x="320" y="204" text-anchor="middle" fill="#0d47a1">D</text>

      <circle cx="60"  cy="220" r="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <text x="60" y="224" text-anchor="middle" fill="#0d47a1">E</text>
    </g>

    <!-- Node sublabel "Page X" -->
    <g font-size="10" fill="#555">
      <text x="90"  y="124" text-anchor="middle">Page A</text>
      <text x="270" y="94"  text-anchor="middle">Page B</text>
      <text x="180" y="214" text-anchor="middle">Page C</text>
      <text x="320" y="234" text-anchor="middle">Page D</text>
      <text x="60"  y="254" text-anchor="middle">Page E</text>
    </g>
  </g>

  <!-- ============== Top-right: random surfer ============== -->
  <g transform="translate(530,70)">
    <text x="135" y="0" text-anchor="middle" font-size="15" font-weight="600" fill="#d97706">random surfer</text>

    <!-- Surfer pictogram: simple stick figure -->
    <g stroke="#d97706" stroke-width="2" fill="none">
      <!-- head -->
      <circle cx="40" cy="40" r="10" fill="#fff3cd"/>
      <!-- body -->
      <line x1="40" y1="50" x2="40" y2="80"/>
      <!-- arms -->
      <line x1="40" y1="60" x2="22" y2="72"/>
      <line x1="40" y1="60" x2="58" y2="72"/>
      <!-- legs -->
      <line x1="40" y1="80" x2="28" y2="98"/>
      <line x1="40" y1="80" x2="52" y2="98"/>
    </g>

    <!-- Pages as small boxes the surfer hops between -->
    <g font-family="ui-monospace, monospace" font-size="11">
      <rect x="100" y="20" width="36" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
      <text x="118" y="36" text-anchor="middle" fill="#0d47a1" font-weight="600">A</text>

      <rect x="170" y="40" width="36" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
      <text x="188" y="56" text-anchor="middle" fill="#0d47a1" font-weight="600">C</text>

      <rect x="240" y="20" width="36" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
      <text x="258" y="36" text-anchor="middle" fill="#0d47a1" font-weight="600">A</text>

      <rect x="100" y="80" width="36" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
      <text x="118" y="96" text-anchor="middle" fill="#0d47a1" font-weight="600">B</text>

      <rect x="170" y="100" width="36" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
      <text x="188" y="116" text-anchor="middle" fill="#0d47a1" font-weight="600">C</text>

      <rect x="240" y="80" width="36" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
      <text x="258" y="96" text-anchor="middle" fill="#0d47a1" font-weight="600">E</text>
    </g>

    <!-- Hops -->
    <g stroke="#d97706" stroke-width="1.3" fill="none" stroke-dasharray="4,3">
      <line x1="62"  y1="55"  x2="98"  y2="32" marker-end="url(#arrSurfer)"/>
      <line x1="138" y1="32"  x2="168" y2="50" marker-end="url(#arrSurfer)"/>
      <line x1="208" y1="50"  x2="240" y2="32" marker-end="url(#arrSurfer)"/>
      <line x1="62"  y1="70"  x2="98"  y2="90" marker-end="url(#arrSurfer)"/>
      <line x1="138" y1="92"  x2="168" y2="108" marker-end="url(#arrSurfer)"/>
      <line x1="208" y1="108" x2="240" y2="92"  marker-end="url(#arrSurfer)"/>
    </g>

    <text x="135" y="140" text-anchor="middle" font-size="12" fill="#555" font-style="italic">at each step: pick one outgoing link uniformly</text>
  </g>

  <!-- ============== Middle: transition matrix P (5x5) ============== -->
  <g transform="translate(530,240)" font-family="ui-monospace, monospace" font-size="12" text-anchor="middle">
    <text x="155" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#2e7d32">transition matrix P (row-stochastic)</text>

    <!-- Column headers -->
    <g font-size="12" fill="#1b5e20" font-weight="600">
      <text x="65"  y="22">A</text>
      <text x="105" y="22">B</text>
      <text x="145" y="22">C</text>
      <text x="185" y="22">D</text>
      <text x="225" y="22">E</text>
    </g>
    <!-- Row headers -->
    <g font-size="12" fill="#1b5e20" font-weight="600" text-anchor="end">
      <text x="38" y="52">A</text>
      <text x="38" y="78">B</text>
      <text x="38" y="104">C</text>
      <text x="38" y="130">D</text>
      <text x="38" y="156">E</text>
    </g>

    <!-- Cells: 5x5, each 40x24, top-left at (45, 32) -->
    <!-- out-degrees: A=2 (to B,C) -> 1/2;  B=1 (to C) -> 1; C=1 (to A) -> 1;
                     D=2 (to C,E) -> 1/2;  E=1 (to A) -> 1 -->
    <g font-size="11">
      <!-- Row A: 0, 0.5, 0.5, 0, 0 -->
      <rect x="45"  y="32" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="65"  y="48" fill="#bbb">0</text>
      <rect x="85"  y="32" width="40" height="24" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="105" y="48" fill="#1b5e20" font-weight="600">.5</text>
      <rect x="125" y="32" width="40" height="24" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="145" y="48" fill="#1b5e20" font-weight="600">.5</text>
      <rect x="165" y="32" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="185" y="48" fill="#bbb">0</text>
      <rect x="205" y="32" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="225" y="48" fill="#bbb">0</text>

      <!-- Row B: 0, 0, 1, 0, 0 -->
      <rect x="45"  y="56" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="65"  y="72" fill="#bbb">0</text>
      <rect x="85"  y="56" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="105" y="72" fill="#bbb">0</text>
      <rect x="125" y="56" width="40" height="24" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="145" y="72" fill="#1b5e20" font-weight="600">1</text>
      <rect x="165" y="56" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="185" y="72" fill="#bbb">0</text>
      <rect x="205" y="56" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="225" y="72" fill="#bbb">0</text>

      <!-- Row C: 1, 0, 0, 0, 0 -->
      <rect x="45"  y="80" width="40" height="24" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="65"  y="96" fill="#1b5e20" font-weight="600">1</text>
      <rect x="85"  y="80" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="105" y="96" fill="#bbb">0</text>
      <rect x="125" y="80" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="145" y="96" fill="#bbb">0</text>
      <rect x="165" y="80" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="185" y="96" fill="#bbb">0</text>
      <rect x="205" y="80" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="225" y="96" fill="#bbb">0</text>

      <!-- Row D: 0, 0, 0.5, 0, 0.5 -->
      <rect x="45"  y="104" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="65"  y="120" fill="#bbb">0</text>
      <rect x="85"  y="104" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="105" y="120" fill="#bbb">0</text>
      <rect x="125" y="104" width="40" height="24" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="145" y="120" fill="#1b5e20" font-weight="600">.5</text>
      <rect x="165" y="104" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="185" y="120" fill="#bbb">0</text>
      <rect x="205" y="104" width="40" height="24" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="225" y="120" fill="#1b5e20" font-weight="600">.5</text>

      <!-- Row E: 1, 0, 0, 0, 0 -->
      <rect x="45"  y="128" width="40" height="24" fill="#e8f5e9" stroke="#2e7d32"/>
      <text x="65"  y="144" fill="#1b5e20" font-weight="600">1</text>
      <rect x="85"  y="128" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="105" y="144" fill="#bbb">0</text>
      <rect x="125" y="128" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="145" y="144" fill="#bbb">0</text>
      <rect x="165" y="128" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="185" y="144" fill="#bbb">0</text>
      <rect x="205" y="128" width="40" height="24" fill="#f5f5f5" stroke="#ddd"/>
      <text x="225" y="144" fill="#bbb">0</text>
    </g>

    <text x="155" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555" font-style="italic">P[i, j] = 1 / out-degree(i)  if  i → j,  else 0</text>
  </g>

  <!-- ============== Right side: flow P -> power iteration -> pi ============== -->
  <g transform="translate(870,240)" font-family="system-ui, -apple-system, sans-serif">
    <text x="100" y="0" text-anchor="middle" font-size="13" font-weight="600" fill="#555">find the rank</text>

    <!-- P box -->
    <rect x="60" y="20" width="80" height="34" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.4" rx="4"/>
    <text x="100" y="42" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20" font-family="ui-monospace, monospace">P</text>

    <!-- arrow down -->
    <line x1="100" y1="58" x2="100" y2="78" stroke="#555" stroke-width="1.4" marker-end="url(#arrFlow)"/>

    <!-- power iteration box -->
    <rect x="20" y="82" width="160" height="34" fill="#fff3cd" stroke="#d97706" stroke-width="1.4" rx="4"/>
    <text x="100" y="104" text-anchor="middle" font-size="13" fill="#7a3d00">power iteration</text>

    <!-- arrow down -->
    <line x1="100" y1="120" x2="100" y2="140" stroke="#555" stroke-width="1.4" marker-end="url(#arrFlow)"/>

    <!-- pi box -->
    <rect x="60" y="144" width="80" height="34" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4" rx="4"/>
    <text x="100" y="166" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1" font-family="ui-monospace, monospace">π</text>
  </g>

  <!-- ============== Bottom: PageRank bar chart ============== -->
  <g transform="translate(60,440)">
    <text x="500" y="0" text-anchor="middle" font-size="15" font-weight="600" fill="#1976d2">PageRank π — long-run probability per page</text>

    <!-- axes: plot area x 80..960, y 14..110 (height 96; max value 0.35 -> scale 96/0.35 ≈ 274) -->
    <g stroke="#333" stroke-width="1" fill="none">
      <line x1="80" y1="110" x2="980" y2="110"/>
      <line x1="80" y1="14"  x2="80"  y2="110"/>
    </g>
    <!-- gridlines (0.1, 0.2, 0.3) -->
    <g stroke="#eee" stroke-width="1">
      <line x1="80" y1="83" x2="980" y2="83"/>
      <line x1="80" y1="55" x2="980" y2="55"/>
      <line x1="80" y1="28" x2="980" y2="28"/>
    </g>
    <g font-size="10" fill="#666" text-anchor="end" font-family="ui-monospace, monospace">
      <text x="76" y="113">0.0</text>
      <text x="76" y="86">0.1</text>
      <text x="76" y="58">0.2</text>
      <text x="76" y="31">0.3</text>
    </g>

    <!-- 5 bars. With max 0.32 -> 0.32*274 = 87.7 ≈ 88. Use scale 274. -->
    <!-- A=0.27 -> 74,  B=0.13 -> 36,  C=0.32 -> 88,  D=0.08 -> 22,  E=0.20 -> 55 -->
    <!-- bar width 70, spacing centered at x=180, 320, 460, 600, 740 -->
    <g font-family="ui-monospace, monospace" font-size="12">
      <rect x="145" y="36"  width="70" height="74" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
      <text x="180" y="28"  text-anchor="middle" fill="#0d47a1" font-weight="600">0.27</text>
      <text x="180" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0d47a1">A</text>

      <rect x="285" y="74"  width="70" height="36" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
      <text x="320" y="66"  text-anchor="middle" fill="#0d47a1" font-weight="600">0.13</text>
      <text x="320" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0d47a1">B</text>

      <rect x="425" y="22"  width="70" height="88" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
      <text x="460" y="14"  text-anchor="middle" fill="#c62828" font-weight="700">0.32</text>
      <text x="460" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0d47a1">C</text>

      <rect x="565" y="88"  width="70" height="22" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
      <text x="600" y="80"  text-anchor="middle" fill="#0d47a1" font-weight="600">0.08</text>
      <text x="600" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0d47a1">D</text>

      <rect x="705" y="55"  width="70" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
      <text x="740" y="47"  text-anchor="middle" fill="#0d47a1" font-weight="600">0.20</text>
      <text x="740" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#0d47a1">E</text>
    </g>

    <!-- Side annotation -->
    <g font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555">
      <text x="830" y="40" font-style="italic" fill="#c62828">C is highest:</text>
      <text x="830" y="56">linked from A, B, D</text>
      <text x="830" y="82" font-style="italic">A is next:</text>
      <text x="830" y="98">linked from C and E</text>
    </g>
  </g>

  <!-- ============== Bottom caption ============== -->
  <text x="550" y="588" text-anchor="middle" font-size="13" fill="#333">
    Each page is a state; each hyperlink is a transition. π is the rank — the long-run fraction of time a random surfer spends there.
  </text>
</svg>
