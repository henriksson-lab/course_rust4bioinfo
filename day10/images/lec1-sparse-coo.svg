<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="system-ui, -apple-system, sans-serif">
  <title>Sparse COO format</title>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="600" fill="#111">COO format — coordinate (triplet) list</text>

  <!-- ============== Left: 5x5 matrix ============== -->
  <g transform="translate(60,80)" font-family="ui-monospace, monospace" font-size="14" text-anchor="middle">
    <text x="125" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">5 x 5 sparse matrix (nnz = 6)</text>

    <!-- 5x5, cell 50x40. Non-zeros at (0,0)=1, (0,4)=2, (1,1)=3, (2,3)=4, (4,0)=5, (4,4)=6 -->
    <!-- row 0 -->
    <rect x="0"   y="0"   width="50" height="40" fill="#e3f2fd" stroke="#1976d2"/><text x="25"  y="25" fill="#0d47a1">1.0</text>
    <rect x="50"  y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="0"   width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="0"   width="50" height="40" fill="#e3f2fd" stroke="#1976d2"/><text x="225" y="25" fill="#0d47a1">2.0</text>
    <!-- row 1 -->
    <rect x="0"   y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="40"  width="50" height="40" fill="#e3f2fd" stroke="#1976d2"/><text x="75"  y="65" fill="#0d47a1">3.0</text>
    <rect x="100" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="40"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 2 -->
    <rect x="0"   y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="80"  width="50" height="40" fill="#e3f2fd" stroke="#1976d2"/><text x="175" y="105" fill="#0d47a1">4.0</text>
    <rect x="200" y="80"  width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 3 -->
    <rect x="0"   y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="50"  y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="120" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 4 -->
    <rect x="0"   y="160" width="50" height="40" fill="#e3f2fd" stroke="#1976d2"/><text x="25"  y="185" fill="#0d47a1">5.0</text>
    <rect x="50"  y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="100" y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="150" y="160" width="50" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="200" y="160" width="50" height="40" fill="#e3f2fd" stroke="#1976d2"/><text x="225" y="185" fill="#0d47a1">6.0</text>

    <!-- row labels on left -->
    <g font-size="10" fill="#888" text-anchor="end">
      <text x="-6" y="25">0</text>
      <text x="-6" y="65">1</text>
      <text x="-6" y="105">2</text>
      <text x="-6" y="145">3</text>
      <text x="-6" y="185">4</text>
    </g>
    <!-- col labels on top -->
    <g font-size="10" fill="#888" text-anchor="middle">
      <text x="25"  y="-2">0</text>
      <text x="75"  y="-2">1</text>
      <text x="125" y="-2">2</text>
      <text x="175" y="-2">3</text>
      <text x="225" y="-2">4</text>
    </g>
  </g>

  <!-- ============== Right: three arrays ============== -->
  <g transform="translate(420,80)" font-family="ui-monospace, monospace" font-size="13" text-anchor="middle">
    <text x="210" y="-15" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">three parallel arrays (length nnz = 6)</text>

    <!-- row[] -->
    <text x="-20" y="22" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1976d2">row[]</text>
    <rect x="0"   y="5" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="30"  y="25" fill="#0d47a1">0</text>
    <rect x="60"  y="5" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="90"  y="25" fill="#0d47a1">0</text>
    <rect x="120" y="5" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="150" y="25" fill="#0d47a1">1</text>
    <rect x="180" y="5" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="210" y="25" fill="#0d47a1">2</text>
    <rect x="240" y="5" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="270" y="25" fill="#0d47a1">4</text>
    <rect x="300" y="5" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="330" y="25" fill="#0d47a1">4</text>

    <!-- col[] -->
    <text x="-20" y="67" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1976d2">col[]</text>
    <rect x="0"   y="50" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="30"  y="70" fill="#0d47a1">0</text>
    <rect x="60"  y="50" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="90"  y="70" fill="#0d47a1">4</text>
    <rect x="120" y="50" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="150" y="70" fill="#0d47a1">1</text>
    <rect x="180" y="50" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="210" y="70" fill="#0d47a1">3</text>
    <rect x="240" y="50" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="270" y="70" fill="#0d47a1">0</text>
    <rect x="300" y="50" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="330" y="70" fill="#0d47a1">4</text>

    <!-- val[] -->
    <text x="-20" y="112" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1976d2">val[]</text>
    <rect x="0"   y="95" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="30"  y="115" fill="#0d47a1">1.0</text>
    <rect x="60"  y="95" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="90"  y="115" fill="#0d47a1">2.0</text>
    <rect x="120" y="95" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="150" y="115" fill="#0d47a1">3.0</text>
    <rect x="180" y="95" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="210" y="115" fill="#0d47a1">4.0</text>
    <rect x="240" y="95" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="270" y="115" fill="#0d47a1">5.0</text>
    <rect x="300" y="95" width="60" height="30" fill="#e3f2fd" stroke="#1976d2"/><text x="330" y="115" fill="#0d47a1">6.0</text>

    <!-- index labels -->
    <g font-size="10" fill="#888" text-anchor="middle">
      <text x="30"  y="140">0</text>
      <text x="90"  y="140">1</text>
      <text x="150" y="140">2</text>
      <text x="210" y="140">3</text>
      <text x="270" y="140">4</text>
      <text x="330" y="140">5</text>
    </g>

    <!-- triplet annotation for first entry -->
    <text x="180" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555">
      column k of arrays = triplet (row[k], col[k], val[k])
    </text>
  </g>

  <!-- ============== Arrows from matrix non-zeros to arrays ============== -->
  <g stroke="#888" stroke-width="1.2" fill="none" marker-end="url(#arr)" opacity="0.55">
    <!-- (0,0)=1 -> col 0 of arrays. Cell center (60+25,80+25)=(85,105). Array col 0 left edge ~ (420,90) -->
    <path d="M85,105 C 240,105 280,200 450,200"/>
    <!-- (0,4)=2 -> col 1. Cell center (60+225,80+25)=(285,105). Array col 1 -> (510,200) -->
    <path d="M285,105 C 380,105 410,205 510,200"/>
    <!-- (1,1)=3 -> col 2. Cell center (60+75,80+65)=(135,145). Array -> (570,200) -->
    <path d="M135,145 C 300,180 430,210 570,200"/>
    <!-- (2,3)=4 -> col 3. Cell (60+175,80+105)=(235,185). Array -> (630,200) -->
    <path d="M235,185 C 380,210 480,215 630,200"/>
    <!-- (4,0)=5 -> col 4. Cell (60+25,80+185)=(85,265). Array -> (690,200) -->
    <path d="M85,265 C 300,300 500,260 690,200"/>
    <!-- (4,4)=6 -> col 5. Cell (60+225,80+185)=(285,265). Array -> (750,200) -->
    <path d="M285,265 C 450,300 620,260 750,200"/>
  </g>

  <!-- Caption -->
  <text x="450" y="425" text-anchor="middle" font-size="13" fill="#555">
    Simple to build, easy to load from a file; slow for matrix arithmetic.
  </text>
</svg>
