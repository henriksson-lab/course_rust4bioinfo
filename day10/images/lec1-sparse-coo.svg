<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 540" font-family="system-ui, -apple-system, sans-serif">
  <title>Sparse COO format — coordinate (triplet) list</title>

  <defs>
    <marker id="arrBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d97706"/>
    </marker>
    <marker id="arrGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#7e57c2"/>
    </marker>
  </defs>

  <!-- ============== Title ============== -->
  <text x="550" y="30" text-anchor="middle" font-size="22" font-weight="600" fill="#111">COO — coordinate (triplet) list</text>

  <!-- ============== 4x4 matrix at top ============== -->
  <!-- Cell size 56x40. Matrix occupies x=380..604, y=60..220. Non-zeros at:
       (0, 2) = 5  - blue
       (1, 1) = 8  - orange
       (2, 0) = 2  - green
       (3, 3) = 7  - purple -->
  <g font-family="ui-monospace, monospace" font-size="14" text-anchor="middle">
    <text x="492" y="52" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#555">4 x 4 sparse matrix A (nnz = 4)</text>

    <!-- col labels -->
    <g font-size="11" fill="#888">
      <text x="408" y="74">0</text>
      <text x="464" y="74">1</text>
      <text x="520" y="74">2</text>
      <text x="576" y="74">3</text>
    </g>
    <!-- row labels -->
    <g font-size="11" fill="#888" text-anchor="end">
      <text x="375" y="105">0</text>
      <text x="375" y="145">1</text>
      <text x="375" y="185">2</text>
      <text x="375" y="225">3</text>
    </g>

    <!-- row 0 -->
    <rect x="380" y="80"  width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="436" y="80"  width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="492" y="80"  width="56" height="40" fill="#e3f2fd" stroke="#1976d2"/><text x="520" y="105" fill="#0d47a1" font-weight="700">5</text>
    <rect x="548" y="80"  width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 1 -->
    <rect x="380" y="120" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="436" y="120" width="56" height="40" fill="#fff3cd" stroke="#d97706"/><text x="464" y="145" fill="#7a3d00" font-weight="700">8</text>
    <rect x="492" y="120" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="548" y="120" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 2 -->
    <rect x="380" y="160" width="56" height="40" fill="#e8f5e9" stroke="#2e7d32"/><text x="408" y="185" fill="#1b5e20" font-weight="700">2</text>
    <rect x="436" y="160" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="492" y="160" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="548" y="160" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <!-- row 3 -->
    <rect x="380" y="200" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="436" y="200" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="492" y="200" width="56" height="40" fill="#f5f5f5" stroke="#bbb"/>
    <rect x="548" y="200" width="56" height="40" fill="#ede7f6" stroke="#7e57c2"/><text x="576" y="225" fill="#4527a0" font-weight="700">7</text>
  </g>

  <!-- ============== Rail (horizontal line below matrix at y=290) ============== -->
  <!-- The rail extends to span the arrow corridor. Each colored arrow goes:
       cell-bottom -> straight DOWN to y=270 (its segment along rail at y=270 vertical area)
       -> then horizontal along rail at a unique y (270, 280, 290, 300) to align with target
       -> then down to top of target array cell at y=370.
       Use four slightly offset rails so the four arrows never overlap. -->

  <!-- Source x for each non-zero (cell centers):
       blue   (0,2): x = 520, cell bottom y = 120
       orange (1,1): x = 464, cell bottom y = 160
       green  (2,0): x = 408, cell bottom y = 200
       purple (3,3): x = 576, cell bottom y = 240 -->

  <!-- Target x for each array column (top of values[] row, y=370):
       column k=0: center x = 410
       column k=1: center x = 510
       column k=2: center x = 610
       column k=3: center x = 710 -->

  <!-- Arrow paths, right-angled. Each has a unique rail y in [260..305].
       Blue   k=0: 520,120 -> 520,260 -> 410,260 -> 410,370
       Orange k=1: 464,160 -> 464,275 -> 510,275 -> 510,370
       Green  k=2: 408,200 -> 408,290 -> 610,290 -> 610,370
       Purple k=3: 576,240 -> 576,305 -> 710,305 -> 710,370 -->

  <g fill="none" stroke-width="1.8">
    <path d="M520,120 L520,260 L410,260 L410,370" stroke="#1976d2" marker-end="url(#arrBlue)"/>
    <path d="M464,160 L464,275 L510,275 L510,370" stroke="#d97706" marker-end="url(#arrOrange)"/>
    <path d="M408,200 L408,290 L610,290 L610,370" stroke="#2e7d32" marker-end="url(#arrGreen)"/>
    <path d="M576,240 L576,305 L710,305 L710,370" stroke="#7e57c2" marker-end="url(#arrPurple)"/>
  </g>

  <!-- ============== Arrays at bottom ============== -->
  <!-- Three arrays of length 4. Cell width 80, height 36. Centered around x=560.
       Box starts at x=370 so centers are 410, 510, 610, 710.
       row[]    at y=370..406
       col[]    at y=415..451
       value[]  at y=460..496 -->

  <g font-family="ui-monospace, monospace" font-size="15" text-anchor="middle">
    <!-- Labels left of arrays -->
    <g font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#444" text-anchor="end">
      <text x="355" y="392">row[]</text>
      <text x="355" y="437">col[]</text>
      <text x="355" y="482">value[]</text>
    </g>

    <!-- row[] = [0, 1, 2, 3] -->
    <rect x="370" y="370" width="80" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="410" y="392" fill="#0d47a1" font-weight="700">0</text>
    <rect x="470" y="370" width="80" height="36" fill="#fff3cd" stroke="#d97706"/><text x="510" y="392" fill="#7a3d00" font-weight="700">1</text>
    <rect x="570" y="370" width="80" height="36" fill="#e8f5e9" stroke="#2e7d32"/><text x="610" y="392" fill="#1b5e20" font-weight="700">2</text>
    <rect x="670" y="370" width="80" height="36" fill="#ede7f6" stroke="#7e57c2"/><text x="710" y="392" fill="#4527a0" font-weight="700">3</text>

    <!-- col[] = [2, 1, 0, 3] -->
    <rect x="370" y="415" width="80" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="410" y="437" fill="#0d47a1" font-weight="700">2</text>
    <rect x="470" y="415" width="80" height="36" fill="#fff3cd" stroke="#d97706"/><text x="510" y="437" fill="#7a3d00" font-weight="700">1</text>
    <rect x="570" y="415" width="80" height="36" fill="#e8f5e9" stroke="#2e7d32"/><text x="610" y="437" fill="#1b5e20" font-weight="700">0</text>
    <rect x="670" y="415" width="80" height="36" fill="#ede7f6" stroke="#7e57c2"/><text x="710" y="437" fill="#4527a0" font-weight="700">3</text>

    <!-- value[] = [5, 8, 2, 7] -->
    <rect x="370" y="460" width="80" height="36" fill="#e3f2fd" stroke="#1976d2"/><text x="410" y="482" fill="#0d47a1" font-weight="700">5</text>
    <rect x="470" y="460" width="80" height="36" fill="#fff3cd" stroke="#d97706"/><text x="510" y="482" fill="#7a3d00" font-weight="700">8</text>
    <rect x="570" y="460" width="80" height="36" fill="#e8f5e9" stroke="#2e7d32"/><text x="610" y="482" fill="#1b5e20" font-weight="700">2</text>
    <rect x="670" y="460" width="80" height="36" fill="#ede7f6" stroke="#7e57c2"/><text x="710" y="482" fill="#4527a0" font-weight="700">7</text>

    <!-- index labels below -->
    <g font-size="11" fill="#888">
      <text x="410" y="514">k=0</text>
      <text x="510" y="514">k=1</text>
      <text x="610" y="514">k=2</text>
      <text x="710" y="514">k=3</text>
    </g>
  </g>

  <!-- Caption -->
  <text x="550" y="534" text-anchor="middle" font-size="13" fill="#555">
    Simple to build, easy to load from a file; slow for matrix arithmetic.
  </text>
</svg>
