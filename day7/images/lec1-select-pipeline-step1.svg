<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="sp-arr" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
    <marker id="sp-arr-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    SELECT as a pipeline, step 1 of 5
  </text>

  <!-- ===== SQL query box (shared across all 5 steps) ===== -->
  <rect x="40" y="50" width="820" height="130" fill="#e3f2fd" stroke="#888"
        stroke-width="1.2" rx="4"/>
  <text x="60" y="76" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    <tspan font-weight="700" fill="#1565c0">SELECT</tspan> medium, AVG(od600_24h) AS mean_od
  </text>
  <text x="60" y="98" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    <tspan font-weight="700" fill="#1565c0">FROM</tspan> assay
  </text>
  <text x="60" y="120" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    <tspan font-weight="700" fill="#1565c0">WHERE</tspan> od600_24h &gt; 0.3
  </text>
  <text x="60" y="142" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    <tspan font-weight="700" fill="#1565c0">GROUP BY</tspan> medium
  </text>
  <text x="60" y="164" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    <tspan font-weight="700" fill="#1565c0">ORDER BY</tspan> mean_od DESC <tspan font-weight="700" fill="#1565c0">LIMIT</tspan> 3;
  </text>

  <!-- ===== Pipeline stages: 5 boxes, w=150, gap=15 ===== -->
  <!-- y = 230, h = 70 -->
  <g font-family="ui-monospace, monospace">

    <!-- Stage 1: FROM (CURRENT - green) -->
    <rect x="45" y="230" width="150" height="70" fill="#e8f5e9"
          stroke="#2e7d32" stroke-width="2" rx="4"/>
    <text x="120" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">
      FROM assay
    </text>
    <text x="120" y="280" text-anchor="middle" font-size="11" fill="#555"
          font-family="system-ui, sans-serif">load source</text>
    <text x="120" y="294" text-anchor="middle" font-size="11" fill="#555"
          font-family="system-ui, sans-serif">table</text>

    <!-- Stage 2: WHERE (future - grey) -->
    <rect x="210" y="230" width="150" height="70" fill="#f5f5f5"
          stroke="#bbb" stroke-width="1.2" rx="4"/>
    <text x="285" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#888">
      WHERE
    </text>
    <text x="285" y="280" text-anchor="middle" font-size="11" fill="#aaa"
          font-family="system-ui, sans-serif">filter rows</text>

    <!-- Stage 3: GROUP BY (future) -->
    <rect x="375" y="230" width="150" height="70" fill="#f5f5f5"
          stroke="#bbb" stroke-width="1.2" rx="4"/>
    <text x="450" y="258" text-anchor="middle" font-size="14" font-weight="700" fill="#888">
      GROUP BY
    </text>
    <text x="450" y="280" text-anchor="middle" font-size="11" fill="#aaa"
          font-family="system-ui, sans-serif">bucket by column</text>

    <!-- Stage 4: SELECT + aggregations (future) -->
    <rect x="540" y="230" width="150" height="70" fill="#f5f5f5"
          stroke="#bbb" stroke-width="1.2" rx="4"/>
    <text x="615" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#888">
      SELECT +
    </text>
    <text x="615" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#888">
      aggregations
    </text>
    <text x="615" y="292" text-anchor="middle" font-size="11" fill="#aaa"
          font-family="system-ui, sans-serif">compute AVG</text>

    <!-- Stage 5: ORDER BY + LIMIT (future) -->
    <rect x="705" y="230" width="150" height="70" fill="#f5f5f5"
          stroke="#bbb" stroke-width="1.2" rx="4"/>
    <text x="780" y="256" text-anchor="middle" font-size="13" font-weight="700" fill="#888">
      ORDER BY +
    </text>
    <text x="780" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#888">
      LIMIT
    </text>
    <text x="780" y="292" text-anchor="middle" font-size="11" fill="#aaa"
          font-family="system-ui, sans-serif">sort, trim</text>
  </g>

  <!-- Arrows between stages -->
  <line x1="195" y1="265" x2="210" y2="265" stroke="#bbb" stroke-width="1.5"
        marker-end="url(#sp-arr)"/>
  <line x1="360" y1="265" x2="375" y2="265" stroke="#bbb" stroke-width="1.5"
        marker-end="url(#sp-arr)"/>
  <line x1="525" y1="265" x2="540" y2="265" stroke="#bbb" stroke-width="1.5"
        marker-end="url(#sp-arr)"/>
  <line x1="690" y1="265" x2="705" y2="265" stroke="#bbb" stroke-width="1.5"
        marker-end="url(#sp-arr)"/>

  <!-- ===== Data shape callout under current stage (FROM) ===== -->
  <!-- Pointer from FROM box down -->
  <line x1="120" y1="300" x2="120" y2="325" stroke="#2e7d32" stroke-width="1.5"
        marker-end="url(#sp-arr-green)"/>

  <rect x="45" y="332" width="380" height="80" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>
  <text x="60" y="354" font-size="13" font-weight="700" fill="#2e7d32">
    Row shape after this stage:
  </text>
  <text x="60" y="376" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    all 24 rows of assay loaded
  </text>
  <text x="60" y="398" font-size="12" fill="#555" font-style="italic">
    (strain_id, medium, od600_24h, ...)
  </text>

  <!-- ===== Caption ===== -->
  <rect x="40" y="430" width="820" height="55" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
  <text x="450" y="455" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5a07">
    Stage 1: FROM assay
  </text>
  <text x="450" y="475" text-anchor="middle" font-size="13" fill="#555">
    Start with every row of the table.
  </text>

</svg>
