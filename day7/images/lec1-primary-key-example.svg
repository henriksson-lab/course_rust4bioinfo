<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400"
     font-family="system-ui, -apple-system, sans-serif">

  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Primary key — strain_id uniquely identifies each row
  </text>

  <!-- =================== strain table =================== -->
  <text x="290" y="78" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace">strain</text>

  <!-- Outer card -->
  <rect x="40" y="90" width="500" height="244" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header band -->
  <rect x="40" y="90" width="500" height="30" fill="#e3f2fd" stroke="#888"/>
  <!-- strain_id col tinted as PK -->
  <rect x="40" y="90" width="110" height="30" fill="#e8f5e9" stroke="#888"/>

  <!-- Column headers -->
  <text x="95" y="111" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">strain_id</text>
  <text x="255" y="111" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">strain_name</text>
  <text x="450" y="111" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">species</text>

  <!-- Column dividers -->
  <line x1="150" y1="90" x2="150" y2="334" stroke="#bbb"/>
  <line x1="360" y1="90" x2="360" y2="334" stroke="#bbb"/>

  <!-- Row 1 -->
  <rect x="40" y="120" width="500" height="52" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="120" width="110" height="52" fill="#e8f5e9" stroke="#bbb"/>
  <text x="95" y="153" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>
  <text x="255" y="153" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">K-12 MG1655</text>
  <text x="450" y="153" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">Escherichia coli</text>

  <!-- Row 2 -->
  <rect x="40" y="172" width="500" height="52" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="172" width="110" height="52" fill="#e8f5e9" stroke="#bbb"/>
  <text x="95" y="205" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">2</text>
  <text x="255" y="205" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">DH5alpha</text>
  <text x="450" y="205" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">Escherichia coli</text>

  <!-- Row 3 -->
  <rect x="40" y="224" width="500" height="52" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="224" width="110" height="52" fill="#e8f5e9" stroke="#bbb"/>
  <text x="95" y="257" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">3</text>
  <text x="255" y="257" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">168</text>
  <text x="450" y="257" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">Bacillus subtilis</text>

  <!-- Row 4 -->
  <rect x="40" y="276" width="500" height="52" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="276" width="110" height="52" fill="#e8f5e9" stroke="#bbb"/>
  <text x="95" y="309" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">4</text>
  <text x="255" y="309" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">BL21(DE3)</text>
  <text x="450" y="309" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">Escherichia coli</text>

  <!-- Highlight border on strain_id column -->
  <rect x="40" y="90" width="110" height="244" fill="none"
        stroke="#2e7d32" stroke-width="3"/>

  <!-- PK badge -->
  <rect x="565" y="100" width="160" height="30" rx="6" ry="6"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="645" y="121" text-anchor="middle" font-size="14" font-weight="700"
        fill="#2e7d32" font-family="ui-monospace, monospace">PK — unique per row</text>

  <!-- Arrow from badge to the column -->
  <path d="M 565 115 C 545 115, 535 115, 515 115"
        fill="none" stroke="#2e7d32" stroke-width="1.5"
        stroke-dasharray="4 3"/>

  <!-- Callout box -->
  <rect x="565" y="150" width="295" height="180" fill="#fafafa"
        stroke="#bbb" stroke-width="1" rx="4" ry="4"/>
  <text x="580" y="180" font-size="16" font-weight="700" fill="#333">
    The promise
  </text>
  <text x="580" y="208" font-size="15" fill="#555">
    No two rows share a
  </text>
  <text x="580" y="230" font-size="15" fill="#555"
        font-family="ui-monospace, monospace">
    strain_id
  </text>
  <text x="680" y="230" font-size="15" fill="#555">.</text>
  <text x="580" y="262" font-size="15" fill="#555">
    The database refuses any
  </text>
  <text x="580" y="284" font-size="15" fill="#555">
    INSERT or UPDATE that
  </text>
  <text x="580" y="306" font-size="15" fill="#555">
    would create a duplicate.
  </text>

</svg>
