<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    LEFT JOIN — keep every row of the left table, even unmatched
  </text>

  <!-- =================== TOP-LEFT: strain =================== -->
  <text x="170" y="68" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">strain</text>

  <rect x="30" y="80" width="280" height="166" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="30" y="80" width="280" height="26" fill="#e3f2fd" stroke="#888"/>
  <rect x="30" y="80" width="80" height="26" fill="#e8f5e9" stroke="#888"/>
  <line x1="110" y1="80" x2="110" y2="246" stroke="#bbb"/>

  <text x="70"  y="98" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">strain_id</text>
  <text x="210" y="98" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">strain_name</text>

  <!-- Row 1 -->
  <rect x="30" y="106" width="280" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="30" y="106" width="80" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="70" y="128" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>
  <text x="210" y="128" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace">K-12 MG1655</text>

  <!-- Row 2 -->
  <rect x="30" y="140" width="280" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="30" y="140" width="80" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="70" y="162" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">2</text>
  <text x="210" y="162" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace">DH5alpha</text>

  <!-- Row 3 -->
  <rect x="30" y="174" width="280" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="30" y="174" width="80" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="70" y="196" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">3</text>
  <text x="210" y="196" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace">168</text>

  <!-- Row 4: HIGHLIGHTED yellow, no assays -->
  <rect x="30" y="208" width="280" height="34" fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <rect x="30" y="208" width="80" height="34" fill="#ffe082" stroke="#d97706" stroke-width="1.8"/>
  <text x="70" y="230" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#d97706">4</text>
  <text x="210" y="230" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#d97706">BL21(DE3)</text>

  <!-- annotation "no assays yet" -->
  <text x="170" y="262" text-anchor="middle" font-size="12" fill="#d97706" font-style="italic">
    no assays yet
  </text>

  <!-- =================== TOP-RIGHT: assay =================== -->
  <text x="555" y="68" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">assay</text>

  <rect x="350" y="80" width="410" height="166" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="350" y="80" width="410" height="26" fill="#e3f2fd" stroke="#888"/>
  <rect x="430" y="80" width="80" height="26" fill="#e8f5e9" stroke="#888"/>
  <line x1="430" y1="80" x2="430" y2="246" stroke="#bbb"/>
  <line x1="510" y1="80" x2="510" y2="246" stroke="#bbb"/>
  <line x1="640" y1="80" x2="640" y2="246" stroke="#bbb"/>

  <text x="390" y="98" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">assay_id</text>
  <text x="470" y="98" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">strain_id</text>
  <text x="575" y="98" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">medium</text>
  <text x="700" y="98" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">od600_24h</text>

  <!-- Row 101 -->
  <rect x="350" y="106" width="410" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="430" y="106" width="80" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="390" y="128" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">101</text>
  <text x="470" y="128" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>
  <text x="575" y="128" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">LB</text>
  <text x="700" y="128" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.85</text>

  <!-- Row 102 -->
  <rect x="350" y="140" width="410" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="430" y="140" width="80" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="390" y="162" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">102</text>
  <text x="470" y="162" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">2</text>
  <text x="575" y="162" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">LB</text>
  <text x="700" y="162" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.78</text>

  <!-- Row 103 -->
  <rect x="350" y="174" width="410" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="430" y="174" width="80" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="390" y="196" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">103</text>
  <text x="470" y="196" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">3</text>
  <text x="575" y="196" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">BHI</text>
  <text x="700" y="196" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1.25</text>

  <!-- annotation -->
  <text x="555" y="232" text-anchor="middle" font-size="12" fill="#888" font-style="italic">
    no row mentions strain_id = 4
  </text>

  <!-- =================== BOTTOM: result =================== -->
  <text x="40" y="294" font-size="14" font-weight="700" fill="#555">
    Result of
    <tspan font-family="ui-monospace, monospace">strain LEFT JOIN assay USING (strain_id)</tspan>
  </text>

  <rect x="30" y="304" width="730" height="166" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="30" y="304" width="730" height="26" fill="#e3f2fd" stroke="#888"/>
  <rect x="30" y="304" width="70" height="26" fill="#e8f5e9" stroke="#888"/>
  <line x1="100" y1="304" x2="100" y2="470" stroke="#bbb"/>
  <line x1="280" y1="304" x2="280" y2="470" stroke="#bbb"/>
  <line x1="400" y1="304" x2="400" y2="470" stroke="#bbb"/>
  <line x1="560" y1="304" x2="560" y2="470" stroke="#bbb"/>

  <text x="65"  y="322" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">strain_id</text>
  <text x="190" y="322" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">strain_name</text>
  <text x="340" y="322" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">assay_id</text>
  <text x="480" y="322" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">medium</text>
  <text x="660" y="322" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">od600_24h</text>

  <!-- Result row 1 -->
  <rect x="30" y="330" width="730" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="30" y="330" width="70" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="65" y="352" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>
  <text x="190" y="352" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">K-12 MG1655</text>
  <text x="340" y="352" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">101</text>
  <text x="480" y="352" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">LB</text>
  <text x="660" y="352" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.85</text>

  <!-- Result row 2 -->
  <rect x="30" y="364" width="730" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="30" y="364" width="70" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="65" y="386" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">2</text>
  <text x="190" y="386" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">DH5alpha</text>
  <text x="340" y="386" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">102</text>
  <text x="480" y="386" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">LB</text>
  <text x="660" y="386" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.78</text>

  <!-- Result row 3 -->
  <rect x="30" y="398" width="730" height="34" fill="#f7faff" stroke="#bbb"/>
  <rect x="30" y="398" width="70" height="34" fill="#e8f5e9" stroke="#bbb"/>
  <text x="65" y="420" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">3</text>
  <text x="190" y="420" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">168</text>
  <text x="340" y="420" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">103</text>
  <text x="480" y="420" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">BHI</text>
  <text x="660" y="420" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1.25</text>

  <!-- Result row 4: HIGHLIGHTED yellow with NULLs -->
  <rect x="30" y="432" width="730" height="34" fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <rect x="30" y="432" width="70" height="34" fill="#ffe082" stroke="#d97706" stroke-width="1.8"/>
  <text x="65" y="454" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#d97706">4</text>
  <text x="190" y="454" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#d97706">BL21(DE3)</text>
  <text x="340" y="454" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">NULL</text>
  <text x="480" y="454" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">NULL</text>
  <text x="660" y="454" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">NULL</text>

  <!-- =================== Right annotation =================== -->
  <rect x="775" y="304" width="120" height="166" fill="#fafafa"
        stroke="#bbb" rx="4"/>
  <text x="835" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#333">
    LEFT JOIN
  </text>
  <text x="835" y="350" text-anchor="middle" font-size="11" fill="#2e7d32" font-weight="700">
    keeps row 4
  </text>
  <text x="835" y="370" text-anchor="middle" font-size="11" fill="#555">
    fills assay
  </text>
  <text x="835" y="386" text-anchor="middle" font-size="11" fill="#555">
    cols with NULL
  </text>
  <line x1="785" y1="400" x2="885" y2="400" stroke="#bbb"/>
  <text x="835" y="422" text-anchor="middle" font-size="13" font-weight="700" fill="#333">
    INNER JOIN
  </text>
  <text x="835" y="444" text-anchor="middle" font-size="11" fill="#c62828" font-weight="700">
    drops row 4
  </text>
  <text x="835" y="462" text-anchor="middle" font-size="11" fill="#555">
    entirely
  </text>

</svg>
