  <!-- 105 -->
  <rect x="500" y="228" width="370" height="30" fill="white" stroke="#bbb"/>
  <rect x="570" y="228" width="70"  height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="535" y="248" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">105</text>
  <text x="605" y="248" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">3</text>
  <text x="705" y="248" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">LB</text>
  <text x="820" y="248" text-anchor="middle" font-size="14"
