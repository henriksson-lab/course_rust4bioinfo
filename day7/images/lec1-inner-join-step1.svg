  <text x="210" y="320" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace">strain_name</text>
  <text x="365" y="320" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace">assay_id</text>
  <text x="520" y="320" text-anchor="middle" font-size="13" font-weight="700"
