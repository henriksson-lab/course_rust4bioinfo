  <text x="705" y="188" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">LB</text>
  <text x="820" y="188" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.78</text>
  <!-- 104 -->
  <rect x="500" y="198" width="370" height="30" fill="white" stroke="#bbb"/>
  <rect x="570" y="198" width="70"  height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="535" y="218" text-anchor="middle" font-size="14"
