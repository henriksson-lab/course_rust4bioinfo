  <!-- Header band (shown but with no rows) -->
  <rect x="30" y="300" width="840" height="30" fill="#e3f2fd" stroke="#888"/>
  <rect x="30" y="300" width="80"  height="30" fill="#e8f5e9" stroke="#888"/>
  <text x="70"  y="320" text-anchor="middle" font-size="13" font-weight="700"
