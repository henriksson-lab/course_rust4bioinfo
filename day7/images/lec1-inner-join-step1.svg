  <rect x="30" y="80" width="370" height="28" fill="#e3f2fd" stroke="#888"/>
  <rect x="30" y="80" width="80"  height="28" fill="#e8f5e9" stroke="#888"/>
  <text x="70"  y="99" text-anchor="middle" font-size="12" font-weight="700"
