  <text x="705" y="158" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">M9</text>
  <text x="820" y="158" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.42</text>
  <!-- 103 -->
  <rect x="500" y="168" width="370" height="30" fill="white" stroke="#bbb"/>
