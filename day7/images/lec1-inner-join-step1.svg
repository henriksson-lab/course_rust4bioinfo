  <text x="255" y="99" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace">strain_name</text>
  <line x1="110" y1="80" x2="110" y2="212" stroke="#bbb"/>

  <!-- Strain rows (untinted in step 1) -->
