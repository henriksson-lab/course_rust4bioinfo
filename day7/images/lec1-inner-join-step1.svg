<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- =========================================================
       SHARED BASE LAYOUT — IDENTICAL coords across all 4 steps.

       Colour palette per strain_id:
         id 1 -> #1976d2 blue   (light tint #e3f2fd)
         id 2 -> #d97706 orange (light tint #fff3e0)
         id 3 -> #2e7d32 green  (light tint #e8f5e9)

       LEFT panel — strain table:
         card x=30..400 (w=370), y=80..212 (h=132)
         header y=80..108
         row 1 y=108..142  (centre 125)
         row 2 y=142..177  (centre 159)  (note 35 tall for visual balance)
         row 3 y=177..212  (centre 194)
       Columns: strain_id 30..110 (centre 70), strain_name 110..400 (centre 255)

       RIGHT panel — assay table:
         card x=500..870 (w=370), y=80..258 (h=178)
         header y=80..108
         5 rows, each 30 tall:
           101 y=108..138 (centre 123)
           102 y=138..168 (centre 153)
           103 y=168..198 (centre 183)
           104 y=198..228 (centre 213)
           105 y=228..258 (centre 243)
       Columns: assay_id 500..570 (centre 535),
                strain_id 570..640 (centre 605),
                medium 640..770 (centre 705),
                od600_24h 770..870 (centre 820)

       BOTTOM — result area:
         card x=30..870 (w=840), y=300..520 (h=220)
         header y=300..330
         5 rows, each 36 tall:
           r1 y=330..366
           r2 y=366..402
           r3 y=402..438
           r4 y=438..474
           r5 y=474..510
       Columns: strain_id 30..110, strain_name 110..310, assay_id 310..420,
                medium 420..620, od600_24h 620..870
       ========================================================= -->

  <!-- ===== Title / caption ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    INNER JOIN, step 1 of 4: the two tables
  </text>
  <text x="450" y="52" text-anchor="middle" font-size="14" fill="#555">
    Two tables, sharing strain_id. INNER JOIN matches rows whose strain_id agrees.
  </text>

  <!-- ===== LEFT: strain table ===== -->
  <text x="215" y="74" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace">strain</text>

  <rect x="30" y="80" width="370" height="132" fill="white"
