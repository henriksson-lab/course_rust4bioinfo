<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    INSERT — appending one row to the strain table
  </text>

  <!-- ================= BEFORE ================= -->
  <text x="40" y="62" font-size="14" font-weight="700" fill="#555">Before</text>
  <text x="120" y="62" font-size="13" fill="#888"
        font-family="ui-monospace, monospace">strain (3 rows)</text>

  <!-- Outer card -->
  <rect x="40" y="72" width="820" height="118" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header band -->
  <rect x="40" y="72" width="820" height="26" fill="#e3f2fd" stroke="#888"/>
  <rect x="40" y="72" width="80" height="26" fill="#e8f5e9" stroke="#888"/>

  <line x1="120" y1="72" x2="120" y2="190" stroke="#bbb"/>
  <line x1="280" y1="72" x2="280" y2="190" stroke="#bbb"/>
  <line x1="500" y1="72" x2="500" y2="190" stroke="#bbb"/>
  <line x1="720" y1="72" x2="720" y2="190" stroke="#bbb"/>

  <text x="80"  y="90" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">strain_id</text>
  <text x="200" y="90" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">strain_name</text>
  <text x="390" y="90" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">species</text>
  <text x="610" y="90" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">isolation_source</text>
  <text x="790" y="90" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">year_isolated</text>

  <!-- Before row 1 -->
  <rect x="40" y="98" width="820" height="30" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="98" width="80" height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="80"  y="118" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>
  <text x="200" y="118" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">K-12 MG1655</text>
  <text x="390" y="118" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">Escherichia coli</text>
  <text x="610" y="118" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">human gut</text>
  <text x="790" y="118" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1922</text>

  <!-- Before row 2 -->
  <rect x="40" y="128" width="820" height="30" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="128" width="80" height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="80"  y="148" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">2</text>
  <text x="200" y="148" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">DH5alpha</text>
  <text x="390" y="148" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">Escherichia coli</text>
  <text x="610" y="148" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">lab derivative</text>
  <text x="790" y="148" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1980</text>

  <!-- Before row 3 -->
  <rect x="40" y="158" width="820" height="30" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="158" width="80" height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="80"  y="178" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">3</text>
  <text x="200" y="178" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">168</text>
  <text x="390" y="178" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">Bacillus subtilis</text>
  <text x="610" y="178" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">soil</text>
  <text x="790" y="178" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1947</text>

  <!-- ================= OPERATION ================= -->
  <text x="40" y="220" font-size="14" font-weight="700" fill="#555">Operation</text>

  <rect x="40" y="230" width="820" height="62" fill="#fafafa" stroke="#bbb" rx="4"/>
  <text x="56" y="254" font-size="14" fill="#222"
        font-family="ui-monospace, monospace">
    INSERT INTO strain (strain_name, species, isolation_source, year_isolated)
  </text>
  <text x="56" y="278" font-size="14" fill="#222"
        font-family="ui-monospace, monospace">
    VALUES ('BL21(DE3)', 'Escherichia coli', 'protein expression', 1980);
  </text>

  <!-- Arrow down -->
  <path d="M 450 296 L 450 320" fill="none" stroke="#555" stroke-width="2"/>
  <path d="M 442 314 L 450 322 L 458 314 Z" fill="#555"/>

  <!-- ================= AFTER ================= -->
  <text x="40" y="346" font-size="14" font-weight="700" fill="#555">After</text>
  <text x="120" y="346" font-size="13" fill="#888"
        font-family="ui-monospace, monospace">strain (4 rows)</text>

  <rect x="40" y="356" width="820" height="148" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header band -->
  <rect x="40" y="356" width="820" height="26" fill="#e3f2fd" stroke="#888"/>
  <rect x="40" y="356" width="80" height="26" fill="#e8f5e9" stroke="#888"/>

  <line x1="120" y1="356" x2="120" y2="504" stroke="#bbb"/>
  <line x1="280" y1="356" x2="280" y2="504" stroke="#bbb"/>
  <line x1="500" y1="356" x2="500" y2="504" stroke="#bbb"/>
  <line x1="720" y1="356" x2="720" y2="504" stroke="#bbb"/>

  <text x="80"  y="374" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">strain_id</text>
  <text x="200" y="374" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">strain_name</text>
  <text x="390" y="374" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">species</text>
  <text x="610" y="374" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">isolation_source</text>
  <text x="790" y="374" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace">year_isolated</text>

  <!-- After rows 1-3 -->
  <rect x="40" y="382" width="820" height="30" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="382" width="80" height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="80"  y="402" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>
  <text x="200" y="402" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">K-12 MG1655</text>
  <text x="390" y="402" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">Escherichia coli</text>
  <text x="610" y="402" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">human gut</text>
  <text x="790" y="402" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1922</text>

  <rect x="40" y="412" width="820" height="30" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="412" width="80" height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="80"  y="432" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">2</text>
  <text x="200" y="432" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">DH5alpha</text>
  <text x="390" y="432" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">Escherichia coli</text>
  <text x="610" y="432" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">lab derivative</text>
  <text x="790" y="432" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1980</text>

  <rect x="40" y="442" width="820" height="30" fill="#f7faff" stroke="#bbb"/>
  <rect x="40" y="442" width="80" height="30" fill="#e8f5e9" stroke="#bbb"/>
  <text x="80"  y="462" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">3</text>
  <text x="200" y="462" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">168</text>
  <text x="390" y="462" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">Bacillus subtilis</text>
  <text x="610" y="462" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">soil</text>
  <text x="790" y="462" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1947</text>

  <!-- After row 4: NEW, highlighted in green -->
  <rect x="40" y="472" width="820" height="30" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <rect x="40" y="472" width="80" height="30" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="80"  y="492" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">4</text>
  <text x="200" y="492" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">BL21(DE3)</text>
  <text x="390" y="492" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">Escherichia coli</text>
  <text x="610" y="492" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">protein expression</text>
  <text x="790" y="492" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">1980</text>

  <!-- Yellow callout pointing at the new strain_id -->
  <rect x="135" y="416" width="240" height="30" fill="#fff3cd" stroke="#d97706" stroke-width="1.5" rx="4"/>
  <text x="255" y="436" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706"
        font-family="ui-monospace, monospace">strain_id = 4 auto-assigned</text>
  <path d="M 155 446 L 105 482" fill="none" stroke="#d97706" stroke-width="1.5"
        stroke-dasharray="3 3"/>

</svg>
