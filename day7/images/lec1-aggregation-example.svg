<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    GROUP BY — collapse rows into one per group
  </text>

  <!-- ============== LEFT: input assay table ============== -->
  <text x="180" y="68" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">assay (input)</text>

  <rect x="40" y="80" width="280" height="324" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="40" y="80" width="280" height="28" fill="#e3f2fd" stroke="#888"/>
  <line x1="180" y1="80" x2="180" y2="404" stroke="#bbb"/>

  <text x="110" y="100" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace">medium</text>
  <text x="250" y="100" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace">od600_24h</text>

  <!-- LB group: blue tint -->
  <rect x="40" y="108"  width="280" height="34" fill="#e3f2fd" stroke="#bbb"/>
  <text x="110" y="131" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#1976d2">LB</text>
  <text x="250" y="131" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.85</text>

  <rect x="40" y="142"  width="280" height="34" fill="#e3f2fd" stroke="#bbb"/>
  <text x="110" y="165" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#1976d2">LB</text>
  <text x="250" y="165" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.78</text>

  <rect x="40" y="176"  width="280" height="34" fill="#e3f2fd" stroke="#bbb"/>
  <text x="110" y="199" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#1976d2">LB</text>
  <text x="250" y="199" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1.10</text>

  <!-- M9 group: magenta tint -->
  <rect x="40" y="210"  width="280" height="34" fill="#fce4ec" stroke="#bbb"/>
  <text x="110" y="233" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#c2185b">M9</text>
  <text x="250" y="233" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.42</text>

  <rect x="40" y="244"  width="280" height="34" fill="#fce4ec" stroke="#bbb"/>
  <text x="110" y="267" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#c2185b">M9</text>
  <text x="250" y="267" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.50</text>

  <rect x="40" y="278"  width="280" height="34" fill="#fce4ec" stroke="#bbb"/>
  <text x="110" y="301" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#c2185b">M9</text>
  <text x="250" y="301" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">0.38</text>

  <!-- BHI group: orange tint -->
  <rect x="40" y="312"  width="280" height="34" fill="#fff3e0" stroke="#bbb"/>
  <text x="110" y="335" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#f57c00">BHI</text>
  <text x="250" y="335" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1.25</text>

  <rect x="40" y="346"  width="280" height="34" fill="#fff3e0" stroke="#bbb"/>
  <text x="110" y="369" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#f57c00">BHI</text>
  <text x="250" y="369" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace">1.18</text>

  <!-- Group brackets (left side, in colours) -->
  <!-- LB bracket: rows 108..210 -->
  <path d="M 28 110 L 22 110 L 22 208 L 28 208"
        fill="none" stroke="#1976d2" stroke-width="2"/>
  <!-- M9 bracket: rows 210..312 -->
  <path d="M 28 212 L 22 212 L 22 310 L 28 310"
        fill="none" stroke="#c2185b" stroke-width="2"/>
  <!-- BHI bracket: rows 312..380 -->
  <path d="M 28 314 L 22 314 L 22 378 L 28 378"
        fill="none" stroke="#f57c00" stroke-width="2"/>

  <!-- ============== MIDDLE: query/op ============== -->
  <rect x="340" y="150" width="220" height="180" fill="#fafafa"
        stroke="#bbb" rx="4"/>
  <text x="450" y="172" text-anchor="middle" font-size="13" font-weight="700" fill="#555">
    query
  </text>
  <text x="352" y="198" font-size="11" fill="#222"
        font-family="ui-monospace, monospace">SELECT medium,</text>
  <text x="352" y="216" font-size="11" fill="#222"
        font-family="ui-monospace, monospace">  AVG(od600_24h)</text>
  <text x="352" y="234" font-size="11" fill="#222"
        font-family="ui-monospace, monospace">    AS mean_od</text>
  <text x="352" y="252" font-size="11" fill="#222"
        font-family="ui-monospace, monospace">FROM assay</text>
  <text x="352" y="270" font-size="11" fill="#222"
        font-family="ui-monospace, monospace">GROUP BY medium;</text>

  <text x="450" y="304" text-anchor="middle" font-size="13" font-weight="700"
        fill="#2e7d32">8 rows → 3 rows</text>

  <!-- Arrows from input groups to middle, then to output -->
  <path d="M 320 159 C 332 159, 340 240, 340 240"
        fill="none" stroke="#1976d2" stroke-width="1.5" opacity="0.6"/>
  <path d="M 320 261 C 332 261, 340 240, 340 240"
        fill="none" stroke="#c2185b" stroke-width="1.5" opacity="0.6"/>
  <path d="M 320 346 C 332 346, 340 240, 340 240"
        fill="none" stroke="#f57c00" stroke-width="1.5" opacity="0.6"/>

  <!-- Arrows from middle to each output row -->
  <path d="M 560 200 C 575 200, 575 165, 590 165"
        fill="none" stroke="#1976d2" stroke-width="1.5" opacity="0.6"/>
  <path d="M 560 240 C 575 240, 575 235, 590 235"
        fill="none" stroke="#c2185b" stroke-width="1.5" opacity="0.6"/>
  <path d="M 560 280 C 575 280, 575 305, 590 305"
        fill="none" stroke="#f57c00" stroke-width="1.5" opacity="0.6"/>

  <!-- ============== RIGHT: output ============== -->
  <text x="730" y="68" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">result</text>

  <rect x="590" y="80" width="280" height="244" fill="white"
        stroke="#888" stroke-width="1.2"/>

  <!-- Header -->
  <rect x="590" y="80" width="280" height="28" fill="#e3f2fd" stroke="#888"/>
  <line x1="710" y1="80" x2="710" y2="324" stroke="#bbb"/>

  <text x="650" y="100" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace">medium</text>
  <text x="790" y="100" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace">mean_od</text>

  <!-- LB row -->
  <rect x="590" y="108" width="280" height="72" fill="#e3f2fd" stroke="#bbb"/>
  <text x="650" y="152" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1976d2">LB</text>
  <text x="790" y="152" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace">0.91</text>

  <!-- M9 row -->
  <rect x="590" y="180" width="280" height="72" fill="#fce4ec" stroke="#bbb"/>
  <text x="650" y="224" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c2185b">M9</text>
  <text x="790" y="224" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace">0.43</text>

  <!-- BHI row -->
  <rect x="590" y="252" width="280" height="72" fill="#fff3e0" stroke="#bbb"/>
  <text x="650" y="296" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#f57c00">BHI</text>
  <text x="790" y="296" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace">1.22</text>

  <!-- Caption -->
  <rect x="40" y="424" width="830" height="60" fill="#fafafa" stroke="#bbb" rx="4"/>
  <text x="455" y="450" text-anchor="middle" font-size="14" font-weight="700" fill="#333">
    GROUP BY medium partitions rows into one bucket per distinct medium.
  </text>
  <text x="455" y="472" text-anchor="middle" font-size="13" fill="#555">
    AVG(od600_24h) collapses each bucket into one number; one output row per group.
  </text>

</svg>
