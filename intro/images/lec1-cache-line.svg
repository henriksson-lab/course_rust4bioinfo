<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="cl-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="cl-arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="cl-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Why a single byte read pulls 64 bytes into cache
  </text>
  <text x="450" y="46" text-anchor="middle" font-size="13" font-style="italic" fill="#888">
    the cache line is the unit of transfer between RAM and CPU
  </text>

  <!-- ============================================================
       RAM strip: shows bytes 0..69 (70 cells), each 11 wide x 32 tall.
       Strip starts at x = 60, y = 90, width = 70*11 = 770
       Highlighting:
         - the cache line (bytes 0..63): light orange tint from x=60 to x=60+64*11=764
         - the requested byte (offset 5): yellow border at x=60+5*11=115
         - byte at offset 6: also inside line
         - byte at offset 50: also inside line, x=60+50*11=610
         - bytes 64..69: outside the line (greyed)
   ============================================================ -->

  <!-- RAM label -->
  <text x="60" y="80" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    RAM
  </text>
  <text x="105" y="80" font-size="12" font-style="italic" fill="#555">
    (a tiny window: bytes 0&#8211;69 of main memory)
  </text>

  <!-- Cache-line tint background (bytes 0..63) -->
  <rect x="60" y="90" width="704" height="32" fill="#fff3cd" stroke="none"/>

  <!-- Outside-line tint (bytes 64..69) -->
  <rect x="764" y="90" width="66" height="32" fill="#f5f5f5" stroke="none"/>

  <!-- All 70 cells outlines -->
  <g stroke="#888" stroke-width="0.6" fill="none">
    <rect x="60"  y="90" width="11" height="32"/>
    <rect x="71"  y="90" width="11" height="32"/>
    <rect x="82"  y="90" width="11" height="32"/>
    <rect x="93"  y="90" width="11" height="32"/>
    <rect x="104" y="90" width="11" height="32"/>
    <rect x="115" y="90" width="11" height="32"/>
    <rect x="126" y="90" width="11" height="32"/>
    <rect x="137" y="90" width="11" height="32"/>
    <rect x="148" y="90" width="11" height="32"/>
    <rect x="159" y="90" width="11" height="32"/>
    <rect x="170" y="90" width="11" height="32"/>
    <rect x="181" y="90" width="11" height="32"/>
    <rect x="192" y="90" width="11" height="32"/>
    <rect x="203" y="90" width="11" height="32"/>
    <rect x="214" y="90" width="11" height="32"/>
    <rect x="225" y="90" width="11" height="32"/>
    <rect x="236" y="90" width="11" height="32"/>
    <rect x="247" y="90" width="11" height="32"/>
    <rect x="258" y="90" width="11" height="32"/>
    <rect x="269" y="90" width="11" height="32"/>
    <rect x="280" y="90" width="11" height="32"/>
    <rect x="291" y="90" width="11" height="32"/>
    <rect x="302" y="90" width="11" height="32"/>
    <rect x="313" y="90" width="11" height="32"/>
    <rect x="324" y="90" width="11" height="32"/>
    <rect x="335" y="90" width="11" height="32"/>
    <rect x="346" y="90" width="11" height="32"/>
    <rect x="357" y="90" width="11" height="32"/>
    <rect x="368" y="90" width="11" height="32"/>
    <rect x="379" y="90" width="11" height="32"/>
    <rect x="390" y="90" width="11" height="32"/>
    <rect x="401" y="90" width="11" height="32"/>
    <rect x="412" y="90" width="11" height="32"/>
    <rect x="423" y="90" width="11" height="32"/>
    <rect x="434" y="90" width="11" height="32"/>
    <rect x="445" y="90" width="11" height="32"/>
    <rect x="456" y="90" width="11" height="32"/>
    <rect x="467" y="90" width="11" height="32"/>
    <rect x="478" y="90" width="11" height="32"/>
    <rect x="489" y="90" width="11" height="32"/>
    <rect x="500" y="90" width="11" height="32"/>
    <rect x="511" y="90" width="11" height="32"/>
    <rect x="522" y="90" width="11" height="32"/>
    <rect x="533" y="90" width="11" height="32"/>
    <rect x="544" y="90" width="11" height="32"/>
    <rect x="555" y="90" width="11" height="32"/>
    <rect x="566" y="90" width="11" height="32"/>
    <rect x="577" y="90" width="11" height="32"/>
    <rect x="588" y="90" width="11" height="32"/>
    <rect x="599" y="90" width="11" height="32"/>
    <rect x="610" y="90" width="11" height="32"/>
    <rect x="621" y="90" width="11" height="32"/>
    <rect x="632" y="90" width="11" height="32"/>
    <rect x="643" y="90" width="11" height="32"/>
    <rect x="654" y="90" width="11" height="32"/>
    <rect x="665" y="90" width="11" height="32"/>
    <rect x="676" y="90" width="11" height="32"/>
    <rect x="687" y="90" width="11" height="32"/>
    <rect x="698" y="90" width="11" height="32"/>
    <rect x="709" y="90" width="11" height="32"/>
    <rect x="720" y="90" width="11" height="32"/>
    <rect x="731" y="90" width="11" height="32"/>
    <rect x="742" y="90" width="11" height="32"/>
    <rect x="753" y="90" width="11" height="32"/>
    <rect x="764" y="90" width="11" height="32"/>
    <rect x="775" y="90" width="11" height="32"/>
    <rect x="786" y="90" width="11" height="32"/>
    <rect x="797" y="90" width="11" height="32"/>
    <rect x="808" y="90" width="11" height="32"/>
    <rect x="819" y="90" width="11" height="32"/>
  </g>

  <!-- Requested byte (offset 5) with yellow/orange highlight -->
  <rect x="115" y="90" width="11" height="32" fill="#ffeb3b" stroke="#f57f17" stroke-width="2"/>

  <!-- "..." continuation indicator after offset 69 -->
  <text x="845" y="112" font-size="14" font-family="ui-monospace, monospace" fill="#888">
    &#8230;
  </text>

  <!-- Index labels under select cells -->
  <text x="65.5" y="138" font-size="9" font-family="ui-monospace, monospace" fill="#555">0</text>
  <text x="120.5" y="138" text-anchor="middle" font-size="9" font-family="ui-monospace, monospace" fill="#f57f17" font-weight="700">5</text>
  <text x="362.5" y="138" text-anchor="middle" font-size="9" font-family="ui-monospace, monospace" fill="#555">32</text>
  <text x="615.5" y="138" text-anchor="middle" font-size="9" font-family="ui-monospace, monospace" fill="#555">50</text>
  <text x="758.5" y="138" text-anchor="middle" font-size="9" font-family="ui-monospace, monospace" fill="#555">63</text>
  <text x="769.5" y="138" text-anchor="middle" font-size="9" font-family="ui-monospace, monospace" fill="#aaa">64</text>

  <!-- Bracket above the 64-byte cache line -->
  <line x1="60" y1="70" x2="764" y2="70" stroke="#d97706" stroke-width="2"/>
  <line x1="60" y1="70" x2="60" y2="85" stroke="#d97706" stroke-width="2"/>
  <line x1="764" y1="70" x2="764" y2="85" stroke="#d97706" stroke-width="2"/>
  <text x="412" y="62" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">
    cache line: 64 bytes &#8212; fetched together as one unit
  </text>

  <!-- Pointer arrow from "CPU requests byte 5" to that cell -->
  <text x="120" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#f57f17">
    CPU requests
  </text>
  <text x="120" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#f57f17">
    byte 5
  </text>
  <line x1="120.5" y1="155" x2="120.5" y2="125"
        stroke="#f57f17" stroke-width="2" marker-end="url(#cl-arrow-orange)"/>

  <!-- ============================================================
       L1 cache box with the 64-byte line copied into it
   ============================================================ -->
  <text x="60" y="220" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    L1 cache
  </text>
  <text x="135" y="220" font-size="12" font-style="italic" fill="#555">
    (the full 64-byte line is now resident here)
  </text>

  <!-- The L1 line copy -->
  <rect x="60" y="230" width="704" height="32" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- Show 8 representative cells inside, just as visual texture -->
  <g stroke="#2e7d32" stroke-width="0.6" fill="none" opacity="0.45">
    <line x1="148" y1="230" x2="148" y2="262"/>
    <line x1="236" y1="230" x2="236" y2="262"/>
    <line x1="324" y1="230" x2="324" y2="262"/>
    <line x1="412" y1="230" x2="412" y2="262"/>
    <line x1="500" y1="230" x2="500" y2="262"/>
    <line x1="588" y1="230" x2="588" y2="262"/>
    <line x1="676" y1="230" x2="676" y2="262"/>
  </g>
  <text x="412" y="251" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    bytes 0&#8211;63 (one cache line)
  </text>

  <!-- Arrow RAM -> L1 (down + slightly right), labelled "~100 ns once" -->
  <line x1="412" y1="125" x2="412" y2="227"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#cl-arrow-green)"/>
  <text x="420" y="183" font-size="12" font-weight="700" fill="#2e7d32">
    ~100 ns
  </text>
  <text x="420" y="200" font-size="11" font-style="italic" fill="#2e7d32">
    paid once
  </text>

  <!-- ============================================================
       Four future-reads panel
   ============================================================ -->
  <text x="60" y="298" font-size="15" font-weight="700" fill="#333">
    Subsequent reads:
  </text>

  <!-- Row layout: each row 22 high, starting at y=310 -->

  <!-- Read 1: offset 5 (the original) -->
  <rect x="60" y="310" width="780" height="26" fill="#fff8e1" stroke="#f57f17" stroke-width="1" rx="3"/>
  <text x="76" y="328" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    read byte at offset 5
  </text>
  <text x="320" y="328" font-size="13" font-weight="700" fill="#f57f17">
    &#8594; the original request
  </text>
  <text x="540" y="328" font-size="12" font-family="ui-monospace, monospace" fill="#555">
    ~100 ns (RAM fetch)
  </text>

  <!-- Read 2: offset 6 -->
  <rect x="60" y="340" width="780" height="26" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" rx="3"/>
  <text x="76" y="358" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    read byte at offset 6
  </text>
  <text x="320" y="358" font-size="13" font-weight="700" fill="#2e7d32">
    &#8594; CACHE HIT
  </text>
  <text x="540" y="358" font-size="12" font-family="ui-monospace, monospace" fill="#555">
    ~1 ns (effectively free)
  </text>

  <!-- Read 3: offset 50 -->
  <rect x="60" y="370" width="780" height="26" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" rx="3"/>
  <text x="76" y="388" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    read byte at offset 50
  </text>
  <text x="320" y="388" font-size="13" font-weight="700" fill="#2e7d32">
    &#8594; CACHE HIT
  </text>
  <text x="540" y="388" font-size="12" font-family="ui-monospace, monospace" fill="#555">
    ~1 ns (still in the same line)
  </text>

  <!-- Read 4: offset 200 -->
  <rect x="60" y="400" width="780" height="26" fill="#ffebee" stroke="#c62828" stroke-width="1" rx="3"/>
  <text x="76" y="418" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    read byte at offset 200
  </text>
  <text x="320" y="418" font-size="13" font-weight="700" fill="#c62828">
    &#8594; CACHE MISS
  </text>
  <text x="540" y="418" font-size="12" font-family="ui-monospace, monospace" fill="#555">
    ~100 ns (another RAM fetch)
  </text>

  <!-- ============================================================
       Bottom caption
   ============================================================ -->
  <rect x="40" y="445" width="820" height="60" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="450" y="468" text-anchor="middle" font-size="13" fill="#0d47a1">
    Reading sequentially (<tspan font-family="ui-monospace, monospace" font-weight="700">for &amp;b in seq</tspan>)
    lets one RAM fetch amortise across 64 byte-reads &#8212;
  </text>
  <text x="450" y="490" text-anchor="middle" font-size="13" fill="#0d47a1">
    that's why iterating a <tspan font-family="ui-monospace, monospace" font-weight="700">Vec&lt;u8&gt;</tspan>
    is fast and random-access lookups are slow.
  </text>

</svg>
