<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="ku-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="ku-arrow-thick" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="26" text-anchor="middle" font-size="20" font-weight="700" fill="#333">
    User space, kernel space, and hardware
  </text>

  <!-- ============================================================ -->
  <!-- TOP BAND: User space                                          -->
  <!-- ============================================================ -->
  <rect x="30" y="50" width="840" height="140" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="48" y="74" font-size="14" font-weight="700" fill="#1565c0">
    User space
  </text>
  <text x="48" y="90" font-size="11" fill="#555" font-style="italic">
    where your programs live
  </text>

  <!-- Three process boxes -->
  <!-- firefox -->
  <rect x="80" y="100" width="220" height="78" fill="white"
        stroke="#1565c0" stroke-width="1.5" rx="3"/>
  <text x="190" y="120" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">firefox</text>
  <text x="92" y="140" font-size="11" fill="#444">- my own variables</text>
  <text x="92" y="156" font-size="11" fill="#444">- my own stack</text>
  <text x="92" y="172" font-size="11" fill="#444">- my own heap</text>

  <!-- vim -->
  <rect x="340" y="100" width="220" height="78" fill="white"
        stroke="#1565c0" stroke-width="1.5" rx="3"/>
  <text x="450" y="120" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">vim</text>
  <text x="352" y="140" font-size="11" fill="#444">- my own variables</text>
  <text x="352" y="156" font-size="11" fill="#444">- my own stack</text>
  <text x="352" y="172" font-size="11" fill="#444">- my own heap</text>

  <!-- your_program -->
  <rect x="600" y="100" width="220" height="78" fill="white"
        stroke="#1565c0" stroke-width="1.5" rx="3"/>
  <text x="710" y="120" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">your_program</text>
  <text x="612" y="140" font-size="11" fill="#444">- my own variables</text>
  <text x="612" y="156" font-size="11" fill="#444">- my own stack</text>
  <text x="612" y="172" font-size="11" fill="#444">- my own heap</text>

  <!-- ============================================================ -->
  <!-- MIDDLE BAND: Kernel space                                    -->
  <!-- ============================================================ -->
  <rect x="30" y="260" width="840" height="120" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>
  <text x="48" y="284" font-size="14" font-weight="700" fill="#d97706">
    Kernel space (the operating system)
  </text>
  <text x="48" y="300" font-size="11" fill="#555" font-style="italic">
    Linux / macOS / Windows kernel
  </text>

  <!-- Four kernel subsystem boxes -->
  <rect x="80" y="318" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="165" y="338" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    process scheduler
  </text>
  <text x="165" y="356" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    who runs next on the CPU
  </text>

  <rect x="270" y="318" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="355" y="338" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    file system
  </text>
  <text x="355" y="356" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    open / read / write
  </text>

  <rect x="460" y="318" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="545" y="338" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    memory manager
  </text>
  <text x="545" y="356" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    hands out pages of RAM
  </text>

  <rect x="650" y="318" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="735" y="338" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    network stack
  </text>
  <text x="735" y="356" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    TCP / IP / sockets
  </text>

  <!-- ============================================================ -->
  <!-- BOTTOM BAND: Hardware                                        -->
  <!-- ============================================================ -->
  <rect x="30" y="440" width="840" height="80" fill="#eeeeee"
        stroke="#666" stroke-width="1.5" rx="4"/>
  <text x="48" y="462" font-size="14" font-weight="700" fill="#555">
    Hardware
  </text>

  <!-- 4 hardware boxes -->
  <rect x="100" y="472" width="140" height="38" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="170" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#333">CPU</text>

  <rect x="280" y="472" width="140" height="38" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="350" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#333">RAM</text>

  <rect x="460" y="472" width="140" height="38" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="530" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#333">disk</text>

  <rect x="640" y="472" width="140" height="38" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="710" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#333">network</text>

  <!-- ============================================================ -->
  <!-- ARROWS: user-space -> kernel (syscalls)                      -->
  <!-- ============================================================ -->

  <!-- firefox -> kernel: send(packet) -->
  <line x1="190" y1="178" x2="190" y2="260" stroke="#1565c0" stroke-width="1.8"
        marker-end="url(#ku-arrow)"/>
  <rect x="106" y="208" width="168" height="22" fill="white" stroke="#1565c0" stroke-width="1"
        rx="3" opacity="0.95"/>
  <text x="190" y="223" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">send(packet)</text>

  <!-- vim -> kernel: open("data.fa") -->
  <line x1="450" y1="178" x2="450" y2="260" stroke="#1565c0" stroke-width="1.8"
        marker-end="url(#ku-arrow)"/>
  <rect x="356" y="208" width="188" height="22" fill="white" stroke="#1565c0" stroke-width="1"
        rx="3" opacity="0.95"/>
  <text x="450" y="223" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">open("data.fa")</text>

  <!-- your_program -> kernel: mmap(8 MiB) -->
  <line x1="710" y1="178" x2="710" y2="260" stroke="#1565c0" stroke-width="1.8"
        marker-end="url(#ku-arrow)"/>
  <rect x="626" y="208" width="168" height="22" fill="white" stroke="#1565c0" stroke-width="1"
        rx="3" opacity="0.95"/>
  <text x="710" y="223" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">mmap(8 MiB)</text>

  <text x="450" y="250" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    syscalls: the only way down
  </text>

  <!-- ============================================================ -->
  <!-- ARROWS: kernel -> hardware                                   -->
  <!-- ============================================================ -->
  <line x1="165" y1="380" x2="170" y2="472" stroke="#555" stroke-width="3"
        marker-end="url(#ku-arrow-thick)"/>
  <line x1="355" y1="380" x2="350" y2="472" stroke="#555" stroke-width="3"
        marker-end="url(#ku-arrow-thick)"/>
  <line x1="545" y1="380" x2="530" y2="472" stroke="#555" stroke-width="3"
        marker-end="url(#ku-arrow-thick)"/>
  <line x1="735" y1="380" x2="710" y2="472" stroke="#555" stroke-width="3"
        marker-end="url(#ku-arrow-thick)"/>

  <!-- ===== Caption ===== -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#333" font-style="italic">
    User programs can't touch hardware directly - the OS is the only thing that can. Your program asks; the OS does.
  </text>

</svg>
