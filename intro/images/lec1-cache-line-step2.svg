  </text>
  <text x="364" y="227" font-size="12" font-style="italic" fill="#1565c0">
    (~100 ns)
  </text>

  <!-- ===== L1 cache box (shared coords) - now FILLED ===== -->
  <text x="50" y="228" font-size="16" font-weight="700" fill="#d97706">
    L1 cache (64 bytes)
  </text>
  <rect x="50" y="240" width="608" height="34" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.8"/>

  <!-- Show some representative cells inside as visual texture -->
  <g stroke="#d97706" stroke-width="0.6" fill="none" opacity="0.45">
    <line x1="126" y1="240" x2="126" y2="274"/>
    <line x1="202" y1="240" x2="202" y2="274"/>
    <line x1="278" y1="240" x2="278" y2="274"/>
    <line x1="354" y1="240" x2="354" y2="274"/>
    <line x1="430" y1="240" x2="430" y2="274"/>
    <line x1="506" y1="240" x2="506" y2="274"/>
    <line x1="582" y1="240" x2="582" y2="274"/>
  </g>

  <!-- Byte 5 highlighted inside the cache too (same x as RAM) -->
  <rect x="97.5" y="240" width="9.5" height="34"
        fill="#ffeb3b" stroke="#d97706" stroke-width="2"/>

  <text x="354" y="262" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#8a5a07">
    bytes 0&#8211;63 (one cache line)
  </text>

  <!-- ===== CPU box (shared coords) ===== -->
  <rect x="50" y="350" width="200" height="90" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="150" y="378" text-anchor="middle" font-size="18" font-weight="700" fill="#1565c0">
    CPU
  </text>
  <text x="150" y="402" text-anchor="middle" font-size="13" fill="#333">
    got byte at
  </text>
  <text x="150" y="420" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    offset 5
  </text>

  <!-- Arrow from L1 cache down to CPU (byte 5 served from cache) -->
  <path d="M 102 274 C 102 310, 150 320, 150 350"
        fill="none" stroke="#2e7d32" stroke-width="2"
        marker-end="url(#cls2-arrow-orange)" stroke-dasharray="4,3"/>

  <!-- ===== Caption at bottom (shared y) ===== -->
  <rect x="280" y="350" width="580" height="90" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="570" y="380" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5a07">
    Step 2: the whole 64-byte line is pulled in.
  </text>
  <text x="570" y="406" text-anchor="middle" font-size="14" fill="#555">
    One RAM trip copies bytes 0&#8211;63 into L1. The CPU gets byte 5.
  </text>
  <text x="570" y="426" text-anchor="middle" font-size="13" fill="#888" font-style="italic">
    The other 63 bytes came along for free.
  </text>

