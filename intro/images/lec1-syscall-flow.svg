<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="sc-arrow-down" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="sc-arrow-up" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="sc-arrow-hw" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Crossing the syscall boundary
  </text>

  <!-- ============================================================ -->
  <!-- TOP BAND: User space                                          -->
  <!-- ============================================================ -->
  <rect x="30" y="50" width="840" height="110" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="48" y="72" font-size="14" font-weight="700" fill="#1565c0">
    User space
  </text>

  <!-- your_program box (centred) -->
  <rect x="280" y="84" width="340" height="68" fill="white"
        stroke="#1565c0" stroke-width="1.5" rx="3"/>
  <text x="450" y="104" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    your_program
  </text>
  <text x="294" y="124" font-size="11" font-family="ui-monospace, monospace" fill="#444">
    f = open("data.fa")
  </text>
  <text x="294" y="140" font-size="11" font-family="ui-monospace, monospace" fill="#444">
    buf = read(f, 1024)
  </text>

  <!-- ============================================================ -->
  <!-- Syscall boundary line                                        -->
  <!-- ============================================================ -->
  <line x1="30" y1="232" x2="870" y2="232" stroke="#c62828" stroke-width="1.5"
        stroke-dasharray="6,4"/>
  <text x="450" y="226" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828"
        font-style="italic">
    the syscall boundary
  </text>

  <!-- ============================================================ -->
  <!-- Arrows down (syscalls): between user box and kernel band     -->
  <!-- 4 syscalls evenly spaced. Down arrows blue (request).         -->
  <!-- ============================================================ -->

  <!-- open -->
  <line x1="130" y1="160" x2="130" y2="240" stroke="#1565c0" stroke-width="1.6"
        marker-end="url(#sc-arrow-down)"/>
  <rect x="60" y="174" width="160" height="22" fill="white" stroke="#1565c0" stroke-width="1"
        rx="3" opacity="0.95"/>
  <text x="140" y="189" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">open("data.fa")</text>

  <!-- read -->
  <line x1="300" y1="160" x2="300" y2="240" stroke="#1565c0" stroke-width="1.6"
        marker-end="url(#sc-arrow-down)"/>
  <rect x="222" y="174" width="172" height="22" fill="white" stroke="#1565c0" stroke-width="1"
        rx="3" opacity="0.95"/>
  <text x="308" y="189" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">read(fd, buf, 1024)</text>

  <!-- mmap -->
  <line x1="600" y1="160" x2="600" y2="240" stroke="#1565c0" stroke-width="1.6"
        marker-end="url(#sc-arrow-down)"/>
  <rect x="496" y="174" width="206" height="22" fill="white" stroke="#1565c0" stroke-width="1"
        rx="3" opacity="0.95"/>
  <text x="599" y="189" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">mmap(NULL, 1&lt;&lt;30, ...)</text>

  <!-- send -->
  <line x1="800" y1="160" x2="800" y2="240" stroke="#1565c0" stroke-width="1.6"
        marker-end="url(#sc-arrow-down)"/>
  <rect x="720" y="174" width="160" height="22" fill="white" stroke="#1565c0" stroke-width="1"
        rx="3" opacity="0.95"/>
  <text x="800" y="189" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">socket + send(...)</text>

  <!-- ===== Return arrows (up, green) ===== -->
  <line x1="180" y1="240" x2="180" y2="160" stroke="#2e7d32" stroke-width="1.6"
        marker-end="url(#sc-arrow-up)"/>
  <text x="186" y="216" font-size="11" font-family="ui-monospace, monospace" fill="#2e7d32"
        font-style="italic">fd 3</text>

  <line x1="400" y1="240" x2="400" y2="160" stroke="#2e7d32" stroke-width="1.6"
        marker-end="url(#sc-arrow-up)"/>
  <text x="406" y="216" font-size="11" font-family="ui-monospace, monospace" fill="#2e7d32"
        font-style="italic">1024 bytes</text>

  <line x1="660" y1="240" x2="660" y2="160" stroke="#2e7d32" stroke-width="1.6"
        marker-end="url(#sc-arrow-up)"/>
  <text x="666" y="216" font-size="11" font-family="ui-monospace, monospace" fill="#2e7d32"
        font-style="italic">pointer</text>

  <line x1="855" y1="240" x2="855" y2="160" stroke="#2e7d32" stroke-width="1.6"
        marker-end="url(#sc-arrow-up)"/>
  <text x="824" y="216" font-size="11" font-family="ui-monospace, monospace" fill="#2e7d32"
        font-style="italic">ack</text>

  <!-- ============================================================ -->
  <!-- MIDDLE BAND: Kernel space                                    -->
  <!-- ============================================================ -->
  <rect x="30" y="240" width="840" height="120" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>
  <text x="48" y="262" font-size="14" font-weight="700" fill="#b45309">
    Kernel space
  </text>
  <text x="48" y="278" font-size="11" fill="#555" font-style="italic">
    Linux / macOS / Windows kernel
  </text>

  <!-- Four kernel subsystem boxes -->
  <rect x="80" y="294" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="165" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    file system
  </text>
  <text x="165" y="334" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    open / read / write
  </text>

  <rect x="270" y="294" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="355" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    scheduler
  </text>
  <text x="355" y="334" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    who runs next on the CPU
  </text>

  <rect x="460" y="294" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="545" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    memory manager
  </text>
  <text x="545" y="334" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    hands out pages of RAM
  </text>

  <rect x="650" y="294" width="170" height="50" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="735" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    device drivers
  </text>
  <text x="735" y="334" text-anchor="middle" font-size="10" fill="#666" font-style="italic">
    talk to hardware
  </text>

  <!-- ============================================================ -->
  <!-- BOTTOM BAND: Hardware                                        -->
  <!-- ============================================================ -->
  <rect x="30" y="386" width="840" height="56" fill="#eeeeee"
        stroke="#666" stroke-width="1.5" rx="4"/>
  <text x="48" y="405" font-size="13" font-weight="700" fill="#555">
    Hardware
  </text>

  <rect x="140" y="408" width="130" height="28" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="205" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#333">disk</text>

  <rect x="330" y="408" width="130" height="28" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="395" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#333">CPU + RAM</text>

  <rect x="520" y="408" width="130" height="28" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="585" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#333">network</text>

  <rect x="710" y="408" width="130" height="28" fill="white" stroke="#666" stroke-width="1.2" rx="3"/>
  <text x="775" y="426" text-anchor="middle" font-size="12" font-weight="700" fill="#333">GPU / other</text>

  <!-- Arrows kernel -> hardware -->
  <line x1="165" y1="360" x2="205" y2="406" stroke="#555" stroke-width="2"
        marker-end="url(#sc-arrow-hw)"/>
  <line x1="355" y1="360" x2="395" y2="406" stroke="#555" stroke-width="2"
        marker-end="url(#sc-arrow-hw)"/>
  <line x1="545" y1="360" x2="585" y2="406" stroke="#555" stroke-width="2"
        marker-end="url(#sc-arrow-hw)"/>
  <line x1="735" y1="360" x2="775" y2="406" stroke="#555" stroke-width="2"
        marker-end="url(#sc-arrow-hw)"/>

  <!-- ===== Footer caption ===== -->
  <text x="450" y="464" text-anchor="middle" font-size="12" fill="#333" font-style="italic">
    Your program never touches hardware directly. Every file read, every network packet, every memory
  </text>
  <text x="450" y="482" text-anchor="middle" font-size="12" fill="#333" font-style="italic">
    allocation goes through a syscall -- a controlled jump from your code into the OS kernel.
  </text>

</svg>
