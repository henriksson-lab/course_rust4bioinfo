<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="ha-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#333">
    The heap: any size, any lifetime, you decide when to free
  </text>

  <!-- ============================================================ -->
  <!-- LEFT: STACK column                                            -->
  <!-- ============================================================ -->
  <text x="170" y="68" text-anchor="middle" font-size="15" font-weight="700" fill="#1565c0">
    Stack
  </text>
  <text x="170" y="86" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    tidy, fixed-size frames
  </text>

  <rect x="40" y="100" width="260" height="320" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>

  <!-- Stack frame 1 -->
  <rect x="60" y="120" width="220" height="78" fill="white"
        stroke="#1565c0" stroke-width="1.2" rx="3"/>
  <text x="170" y="140" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    frame: process_read()
  </text>
  <line x1="68" y1="148" x2="272" y2="148" stroke="#1565c0" stroke-width="0.5"/>
  <text x="72" y="166" font-size="11" font-family="ui-monospace, monospace" fill="#333">
    seq_ptr:
  </text>
  <circle cx="232" cy="162" r="5" fill="#1565c0"/>
  <text x="72" y="186" font-size="11" font-family="ui-monospace, monospace" fill="#333">
    read_id: 42
  </text>

  <!-- Stack frame 2 -->
  <rect x="60" y="208" width="220" height="78" fill="white"
        stroke="#1565c0" stroke-width="1.2" rx="3"/>
  <text x="170" y="228" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    frame: parse_fastq()
  </text>
  <line x1="68" y1="236" x2="272" y2="236" stroke="#1565c0" stroke-width="0.5"/>
  <text x="72" y="254" font-size="11" font-family="ui-monospace, monospace" fill="#333">
    buf_ptr:
  </text>
  <circle cx="232" cy="250" r="5" fill="#1565c0"/>
  <text x="72" y="274" font-size="11" font-family="ui-monospace, monospace" fill="#333">
    bytes_read: 1024
  </text>

  <!-- Stack frame 3 -->
  <rect x="60" y="296" width="220" height="60" fill="white"
        stroke="#1565c0" stroke-width="1.2" rx="3"/>
  <text x="170" y="316" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    frame: main()
  </text>
  <line x1="68" y1="324" x2="272" y2="324" stroke="#1565c0" stroke-width="0.5"/>
  <text x="72" y="342" font-size="11" font-family="ui-monospace, monospace" fill="#333">
    argc: 2
  </text>

  <text x="170" y="380" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    each frame is one size,
  </text>
  <text x="170" y="396" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    auto-freed on return
  </text>

  <!-- ============================================================ -->
  <!-- RIGHT: HEAP column                                            -->
  <!-- ============================================================ -->
  <text x="630" y="68" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">
    Heap
  </text>
  <text x="630" y="86" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    any size, any lifetime
  </text>

  <rect x="380" y="100" width="500" height="320" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>

  <!-- Heap allocations of varying sizes -->
  <!-- Small allocation -->
  <rect x="400" y="120" width="120" height="40" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="460" y="145" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#b45309">
    String "ACGT"
  </text>

  <!-- Medium allocation -->
  <rect x="540" y="120" width="200" height="40" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="640" y="145" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#b45309">
    Vec&lt;u8&gt; (1 KB read)
  </text>

  <!-- Tiny allocation -->
  <rect x="760" y="120" width="100" height="40" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="810" y="145" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#b45309">
    Box&lt;i64&gt;
  </text>

  <!-- Free gap -->
  <rect x="400" y="180" width="80" height="40" fill="#fafafa"
        stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" rx="3"/>
  <text x="440" y="205" text-anchor="middle" font-size="10" fill="#888" font-style="italic">
    free
  </text>

  <!-- Big allocation -->
  <rect x="500" y="180" width="360" height="60" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="680" y="205" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">
    Vec&lt;Record&gt; (12 MB BAM batch)
  </text>
  <text x="680" y="225" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    grew by doubling
  </text>

  <!-- Another small allocation -->
  <rect x="400" y="260" width="160" height="40" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="480" y="285" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#b45309">
    HashMap node
  </text>

  <!-- Free gap -->
  <rect x="580" y="260" width="60" height="40" fill="#fafafa"
        stroke="#888" stroke-width="0.8" stroke-dasharray="3,3" rx="3"/>
  <text x="610" y="285" text-anchor="middle" font-size="10" fill="#888" font-style="italic">
    free
  </text>

  <!-- Medium allocation -->
  <rect x="660" y="260" width="200" height="40" fill="white"
        stroke="#d97706" stroke-width="1.2" rx="3"/>
  <text x="760" y="285" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#b45309">
    Box&lt;[u8; 64KB]&gt;
  </text>

  <!-- API box at bottom of heap region -->
  <rect x="400" y="330" width="460" height="76" fill="#fffbe6"
        stroke="#d97706" stroke-width="1.2" rx="4"/>
  <text x="630" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    The allocator API
  </text>
  <text x="412" y="372" font-size="11" font-family="ui-monospace, monospace" fill="#333">
    C:     ptr = malloc(n);       free(ptr);
  </text>
  <text x="412" y="390" font-size="11" font-family="ui-monospace, monospace" fill="#333">
    Rust:  let b = Box::new(x);   // dropped at end of scope
  </text>

  <!-- ============================================================ -->
  <!-- Pointers from stack into heap                                 -->
  <!-- ============================================================ -->
  <!-- seq_ptr -> "ACGT" -->
  <line x1="238" y1="162" x2="396" y2="138" stroke="#1565c0" stroke-width="1.8"
        marker-end="url(#ha-arrow)"/>

  <!-- buf_ptr -> "Vec<u8> 1 KB read" -->
  <line x1="238" y1="250" x2="536" y2="138" stroke="#1565c0" stroke-width="1.8"
        marker-end="url(#ha-arrow)"/>

  <!-- ============================================================ -->
  <!-- Annotations to the right of the heap                          -->
  <!-- ============================================================ -->
  <g font-size="12" fill="#333">
    <text x="500" y="438" text-anchor="middle" font-weight="700" fill="#b45309">
      any size, any lifetime
    </text>
    <text x="500" y="456" text-anchor="middle" font-style="italic" fill="#555">
      mix tiny strings and multi-MB buffers in the same pool
    </text>
    <text x="500" y="478" text-anchor="middle" font-weight="700" fill="#b45309">
      you decide when to free
    </text>
    <text x="500" y="496" text-anchor="middle" font-style="italic" fill="#555">
      more bookkeeping than the stack -- but you can keep things alive across calls
    </text>
  </g>

</svg>
