<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="cpu-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Inside a modern multi-core CPU
  </text>

  <!-- ===== CPU package (outer rectangle) ===== -->
  <rect x="30" y="50" width="600" height="430" fill="#fafafa"
        stroke="#333" stroke-width="2" rx="8"/>
  <text x="330" y="73" text-anchor="middle" font-size="16" font-weight="700" fill="#333">
    CPU package (one chip)
  </text>

  <!-- ===== Four cores in a 2x2 grid ===== -->
  <!-- Core dimensions: 260 wide, 145 tall -->
  <!-- Core 0: top-left  -->
  <g>
    <rect x="50" y="85" width="275" height="160" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="187" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
      Core 0
    </text>

    <!-- Registers row -->
    <g stroke="#1565c0" stroke-width="1">
      <rect x="60" y="112" width="20" height="18" fill="white"/>
      <rect x="80" y="112" width="20" height="18" fill="white"/>
      <rect x="100" y="112" width="20" height="18" fill="white"/>
      <rect x="120" y="112" width="20" height="18" fill="white"/>
      <rect x="140" y="112" width="20" height="18" fill="white"/>
      <rect x="160" y="112" width="20" height="18" fill="white"/>
      <rect x="180" y="112" width="20" height="18" fill="white"/>
      <rect x="200" y="112" width="20" height="18" fill="white"/>
    </g>
    <text x="65" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r0</text>
    <text x="85" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r1</text>
    <text x="105" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r2</text>
    <text x="125" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r3</text>
    <text x="145" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r4</text>
    <text x="165" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r5</text>
    <text x="185" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r6</text>
    <text x="205" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">...</text>
    <text x="225" y="125" font-size="9" fill="#555" font-style="italic">Registers</text>

    <!-- ALU box -->
    <rect x="60" y="140" width="60" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="90" y="163" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ALU</text>

    <!-- L1 instruction + L1 data side by side -->
    <rect x="130" y="140" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="175" y="156" text-anchor="middle" font-size="10" fill="#333">L1 instruction</text>
    <text x="175" y="170" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <rect x="225" y="140" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="270" y="156" text-anchor="middle" font-size="10" fill="#333">L1 data</text>
    <text x="270" y="170" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <!-- L2 cache -->
    <rect x="60" y="190" width="255" height="42" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="187" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#333">L2 cache</text>
    <text x="187" y="224" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">256 KB</text>
  </g>

  <!-- Core 1: top-right -->
  <g>
    <rect x="335" y="85" width="275" height="160" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="472" y="103" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
      Core 1
    </text>
    <g stroke="#1565c0" stroke-width="1">
      <rect x="345" y="112" width="20" height="18" fill="white"/>
      <rect x="365" y="112" width="20" height="18" fill="white"/>
      <rect x="385" y="112" width="20" height="18" fill="white"/>
      <rect x="405" y="112" width="20" height="18" fill="white"/>
      <rect x="425" y="112" width="20" height="18" fill="white"/>
      <rect x="445" y="112" width="20" height="18" fill="white"/>
      <rect x="465" y="112" width="20" height="18" fill="white"/>
      <rect x="485" y="112" width="20" height="18" fill="white"/>
    </g>
    <text x="350" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r0</text>
    <text x="370" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r1</text>
    <text x="390" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r2</text>
    <text x="410" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r3</text>
    <text x="430" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r4</text>
    <text x="450" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r5</text>
    <text x="470" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">r6</text>
    <text x="490" y="125" font-size="9" font-family="ui-monospace, monospace" fill="#333">...</text>
    <text x="515" y="125" font-size="10" fill="#555" font-style="italic">Registers</text>

    <rect x="345" y="140" width="60" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="375" y="163" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ALU</text>

    <rect x="415" y="140" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="460" y="156" text-anchor="middle" font-size="10" fill="#333">L1 instruction</text>
    <text x="460" y="170" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <rect x="510" y="140" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="555" y="156" text-anchor="middle" font-size="10" fill="#333">L1 data</text>
    <text x="555" y="170" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <rect x="345" y="190" width="255" height="42" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="472" y="208" text-anchor="middle" font-size="12" font-weight="700" fill="#333">L2 cache</text>
    <text x="472" y="224" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">256 KB</text>
  </g>

  <!-- Core 2: bottom-left -->
  <g>
    <rect x="50" y="255" width="275" height="160" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="187" y="273" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
      Core 2
    </text>
    <g stroke="#1565c0" stroke-width="1">
      <rect x="60" y="282" width="20" height="18" fill="white"/>
      <rect x="80" y="282" width="20" height="18" fill="white"/>
      <rect x="100" y="282" width="20" height="18" fill="white"/>
      <rect x="120" y="282" width="20" height="18" fill="white"/>
      <rect x="140" y="282" width="20" height="18" fill="white"/>
      <rect x="160" y="282" width="20" height="18" fill="white"/>
      <rect x="180" y="282" width="20" height="18" fill="white"/>
      <rect x="200" y="282" width="20" height="18" fill="white"/>
    </g>
    <text x="65" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r0</text>
    <text x="85" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r1</text>
    <text x="105" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r2</text>
    <text x="125" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r3</text>
    <text x="145" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r4</text>
    <text x="165" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r5</text>
    <text x="185" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r6</text>
    <text x="205" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">...</text>
    <text x="225" y="295" font-size="9" fill="#555" font-style="italic">Registers</text>

    <rect x="60" y="310" width="60" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="90" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ALU</text>

    <rect x="130" y="310" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="175" y="326" text-anchor="middle" font-size="10" fill="#333">L1 instruction</text>
    <text x="175" y="340" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <rect x="225" y="310" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="270" y="326" text-anchor="middle" font-size="10" fill="#333">L1 data</text>
    <text x="270" y="340" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <rect x="60" y="360" width="255" height="42" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="187" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#333">L2 cache</text>
    <text x="187" y="394" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">256 KB</text>
  </g>

  <!-- Core 3: bottom-right -->
  <g>
    <rect x="335" y="255" width="275" height="160" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="472" y="273" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
      Core 3
    </text>
    <g stroke="#1565c0" stroke-width="1">
      <rect x="345" y="282" width="20" height="18" fill="white"/>
      <rect x="365" y="282" width="20" height="18" fill="white"/>
      <rect x="385" y="282" width="20" height="18" fill="white"/>
      <rect x="405" y="282" width="20" height="18" fill="white"/>
      <rect x="425" y="282" width="20" height="18" fill="white"/>
      <rect x="445" y="282" width="20" height="18" fill="white"/>
      <rect x="465" y="282" width="20" height="18" fill="white"/>
      <rect x="485" y="282" width="20" height="18" fill="white"/>
    </g>
    <text x="350" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r0</text>
    <text x="370" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r1</text>
    <text x="390" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r2</text>
    <text x="410" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r3</text>
    <text x="430" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r4</text>
    <text x="450" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r5</text>
    <text x="470" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">r6</text>
    <text x="490" y="295" font-size="9" font-family="ui-monospace, monospace" fill="#333">...</text>
    <text x="515" y="295" font-size="10" fill="#555" font-style="italic">Registers</text>

    <rect x="345" y="310" width="60" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="375" y="333" text-anchor="middle" font-size="12" font-weight="700" fill="#333">ALU</text>

    <rect x="415" y="310" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="460" y="326" text-anchor="middle" font-size="10" fill="#333">L1 instruction</text>
    <text x="460" y="340" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <rect x="510" y="310" width="90" height="36" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="555" y="326" text-anchor="middle" font-size="10" fill="#333">L1 data</text>
    <text x="555" y="340" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#555">32 KB</text>

    <rect x="345" y="360" width="255" height="42" fill="white" stroke="#1565c0" stroke-width="1.2"/>
    <text x="472" y="378" text-anchor="middle" font-size="12" font-weight="700" fill="#333">L2 cache</text>
    <text x="472" y="394" text-anchor="middle" font-size="11" font-family="ui-monospace, monospace" fill="#555">256 KB</text>
  </g>

  <!-- ===== L3 cache: wide rectangle below ===== -->
  <rect x="50" y="425" width="560" height="40" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>
  <text x="330" y="450" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">
    L3 cache: 8 MB &#8212; shared across all cores
  </text>

  <!-- Memory controller: small box at the bottom of L3 region -->
  <rect x="240" y="465" width="180" height="0" fill="none"/>

  <!-- Arrow leaving the chip to RAM -->
  <line x1="330" y1="480" x2="330" y2="515"
        stroke="#1565c0" stroke-width="2.5" marker-end="url(#cpu-arrow)"/>
  <text x="345" y="500" font-size="12" fill="#1565c0" font-style="italic">
    memory controller
  </text>
  <text x="345" y="515" font-size="12" fill="#1565c0" font-style="italic">
    DRAM bus -&gt; RAM (off-chip)
  </text>

  <!-- ===== Side annotations (right of package) ===== -->
  <text x="650" y="100" font-size="14" font-weight="700" fill="#333">Latency ladder</text>
  <line x1="650" y1="108" x2="870" y2="108" stroke="#888" stroke-width="1"/>

  <text x="650" y="135" font-size="14" fill="#333">
    Registers:
    <tspan font-family="ui-monospace, monospace" font-weight="700" fill="#2e7d32">~0.3 ns</tspan>
  </text>
  <text x="650" y="170" font-size="14" fill="#333">
    L1:
    <tspan font-family="ui-monospace, monospace" font-weight="700" fill="#2e7d32">~1 ns</tspan>
  </text>
  <text x="650" y="205" font-size="14" fill="#333">
    L2:
    <tspan font-family="ui-monospace, monospace" font-weight="700" fill="#2e7d32">~3 ns</tspan>
  </text>
  <text x="650" y="240" font-size="14" fill="#333">
    L3:
    <tspan font-family="ui-monospace, monospace" font-weight="700" fill="#d97706">~10 ns</tspan>
  </text>
  <text x="650" y="275" font-size="14" fill="#333">
    RAM (off-chip):
  </text>
  <text x="650" y="293" font-size="14" font-family="ui-monospace, monospace" font-weight="700" fill="#c62828">
    ~100 ns
  </text>

  <!-- Small visual gradient: registers fast, RAM slow -->
  <text x="650" y="335" font-size="11" fill="#888" font-style="italic">
    each rung down is
  </text>
  <text x="650" y="350" font-size="11" fill="#888" font-style="italic">
    roughly 3x slower
  </text>
  <text x="650" y="365" font-size="11" fill="#888" font-style="italic">
    than the one above
  </text>

  <!-- ===== Footer caption ===== -->
  <text x="450" y="540" text-anchor="middle" font-size="14" fill="#555">
    Bigger caches sit further from the cores; they're slower but they catch the misses from the smaller ones above.
  </text>

</svg>
