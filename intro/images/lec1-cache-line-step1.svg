  <!-- Byte index hints under strip -->
  <text x="54" y="168" font-size="10" font-family="ui-monospace, monospace" fill="#888">0</text>
  <text x="610" y="168" text-anchor="middle" font-size="10" font-family="ui-monospace, monospace" fill="#888">63</text>
  <text x="805" y="168" text-anchor="end" font-size="10" font-family="ui-monospace, monospace" fill="#888">79</text>

  <!-- Highlight byte 5 (x = 50 + 5*9.5 = 97.5) with yellow border -->
  <rect x="97.5" y="120" width="9.5" height="34"
        fill="#ffeb3b" stroke="#d97706" stroke-width="2"/>

  <!-- ===== L1 cache box (shared coords) - empty in step 1 =====
       L1 cache width = 64 cells * 9.5 = 608, x=50, y=240, h=34. -->
  <text x="50" y="228" font-size="16" font-weight="700" fill="#888">
    L1 cache (64 bytes)
  </text>
  <rect x="50" y="240" width="608" height="34" fill="white"
        stroke="#888" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="354" y="262" text-anchor="middle" font-size="13" fill="#888" font-style="italic">
    (empty)
  </text>

  <!-- ===== CPU box (shared coords) ===== -->
  <rect x="50" y="350" width="200" height="90" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="150" y="378" text-anchor="middle" font-size="18" font-weight="700" fill="#1565c0">
    CPU
  </text>
  <text x="150" y="402" text-anchor="middle" font-size="13" fill="#333">
    needs byte at
  </text>
  <text x="150" y="420" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#d97706">
    offset 5
  </text>

  <!-- Arrow from CPU asking for byte 5 -->
  <text x="180" y="335" font-size="13" font-weight="700" fill="#d97706">
    asks for byte 5
  </text>
  <path d="M 150 350 C 150 270, 102 200, 102 158"
        fill="none" stroke="#d97706" stroke-width="2"
        marker-end="url(#cls1-arrow-orange)"/>

  <!-- ===== Caption at bottom (shared y) ===== -->
  <rect x="280" y="350" width="580" height="90" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="570" y="380" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5a07">
    Step 1: CPU requests byte 5.
  </text>
  <text x="570" y="406" text-anchor="middle" font-size="14" fill="#555">
    The L1 cache is empty &#8212; nothing has been fetched yet.
  </text>
  <text x="570" y="426" text-anchor="middle" font-size="13" fill="#888" font-style="italic">
    A RAM trip is about to happen.
  </text>

  </g>
