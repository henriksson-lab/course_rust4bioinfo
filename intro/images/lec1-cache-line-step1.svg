<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="cls1-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <marker id="cls1-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <g transform="scale(0.8)">

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Cache line, step 1 of 3
  </text>

  <!-- ===== RAM strip (shared coords across all 3 steps) =====
       80 cells, each 9.5 wide x 34 tall.
       Strip x = 50, y = 120, width = 80 * 9.5 = 760, end x = 810. -->
  <text x="50" y="108" font-size="16" font-weight="700" fill="#1565c0">
    Main memory (RAM)
  </text>
  <text x="220" y="108" font-size="13" font-style="italic" fill="#888">
    (each cell = 1 byte)
  </text>

  <!-- Strip background -->
  <rect x="50" y="120" width="760" height="34" fill="white"
        stroke="#888" stroke-width="1"/>

  <!-- 80 cell dividers (one rect per cell, fill white for non-highlighted) -->
  <g stroke="#bbb" stroke-width="0.6" fill="none">
    <rect x="50" y="120" width="9.5" height="34"/>
    <rect x="59.5" y="120" width="9.5" height="34"/>
