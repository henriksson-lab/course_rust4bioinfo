<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="mw-callout" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- ===== Title and subtitle ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    CPU vs main-memory speed, 1980&#8211;2020 (log scale)
  </text>
  <text x="450" y="48" text-anchor="middle" font-size="12" font-style="italic" fill="#888">
    Illustrative &#8212; the exact slopes vary by metric and source; the divergence is real
  </text>

  <!-- ============================================================
       Plot area:
         x: 1980 -> 110, 2020 -> 820  (17.75 px per year)
         y: 1x -> 410,   100000x -> 80  (66 px per decade)
   ============================================================ -->

  <!-- ===== Y-axis gridlines (decades) ===== -->
  <line x1="110" y1="410" x2="820" y2="410" stroke="#eee" stroke-width="1"/>
  <line x1="110" y1="344" x2="820" y2="344" stroke="#eee" stroke-width="1"/>
  <line x1="110" y1="278" x2="820" y2="278" stroke="#eee" stroke-width="1"/>
  <line x1="110" y1="212" x2="820" y2="212" stroke="#eee" stroke-width="1"/>
  <line x1="110" y1="146" x2="820" y2="146" stroke="#eee" stroke-width="1"/>
  <line x1="110" y1="80"  x2="820" y2="80"  stroke="#eee" stroke-width="1"/>

  <!-- ===== Y-axis tick labels ===== -->
  <text x="100" y="414" text-anchor="end" font-size="12" font-family="ui-monospace, monospace" fill="#555">1&#215;</text>
  <text x="100" y="348" text-anchor="end" font-size="12" font-family="ui-monospace, monospace" fill="#555">10&#215;</text>
  <text x="100" y="282" text-anchor="end" font-size="12" font-family="ui-monospace, monospace" fill="#555">100&#215;</text>
  <text x="100" y="216" text-anchor="end" font-size="12" font-family="ui-monospace, monospace" fill="#555">1000&#215;</text>
  <text x="100" y="150" text-anchor="end" font-size="12" font-family="ui-monospace, monospace" fill="#555">10000&#215;</text>
  <text x="100" y="84"  text-anchor="end" font-size="12" font-family="ui-monospace, monospace" fill="#555">100000&#215;</text>

  <!-- ===== Y-axis title (rotated) ===== -->
  <text x="40" y="245" text-anchor="middle" font-size="13" fill="#555" font-style="italic"
        transform="rotate(-90 40 245)">
    relative speed (log scale)
  </text>

  <!-- ===== X-axis ticks ===== -->
  <line x1="110" y1="410" x2="820" y2="410" stroke="#888" stroke-width="1.2"/>
  <line x1="110" y1="80"  x2="110" y2="410" stroke="#888" stroke-width="1.2"/>

  <!-- decade ticks: 1980, 1990, 2000, 2010, 2020 -->
  <line x1="110" y1="410" x2="110" y2="416" stroke="#888" stroke-width="1.2"/>
  <line x1="287.5" y1="410" x2="287.5" y2="416" stroke="#888" stroke-width="1.2"/>
  <line x1="465" y1="410" x2="465" y2="416" stroke="#888" stroke-width="1.2"/>
  <line x1="642.5" y1="410" x2="642.5" y2="416" stroke="#888" stroke-width="1.2"/>
  <line x1="820" y1="410" x2="820" y2="416" stroke="#888" stroke-width="1.2"/>

  <text x="110" y="432" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#555">1980</text>
  <text x="287.5" y="432" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#555">1990</text>
  <text x="465" y="432" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#555">2000</text>
  <text x="642.5" y="432" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#555">2010</text>
  <text x="820" y="432" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#555">2020</text>

  <text x="465" y="455" text-anchor="middle" font-size="13" fill="#555" font-style="italic">
    year
  </text>

  <!-- ============================================================
       Shaded gap region between CPU and DRAM lines.
       Polygon goes along CPU line forward, then DRAM line backward.
       Points (CPU forward):
         (110,410) (198.75,390) (287.5,344) (376.25,278) (465,212)
         (553.75,146) (642.5,126) (731.25,115) (820,108)
       Points (DRAM backward, 2020 -> 1980):
         (820,278) (731.25,295) (642.5,312) (553.75,328) (465,344)
         (376.25,361) (287.5,378) (198.75,394) (110,410)
   ============================================================ -->
  <polygon points="110,410 198.75,390 287.5,344 376.25,278 465,212 553.75,146 642.5,126 731.25,115 820,108 820,278 731.25,295 642.5,312 553.75,328 465,344 376.25,361 287.5,378 198.75,394 110,410"
           fill="#fce4ec" stroke="none" opacity="0.85"/>

  <!-- ============================================================
       CPU performance line (blue)
   ============================================================ -->
  <polyline points="110,410 198.75,390 287.5,344 376.25,278 465,212 553.75,146 642.5,126 731.25,115 820,108"
            fill="none" stroke="#1976d2" stroke-width="3"/>
  <!-- CPU markers -->
  <circle cx="110" cy="410" r="3" fill="#1976d2"/>
  <circle cx="287.5" cy="344" r="3" fill="#1976d2"/>
  <circle cx="465" cy="212" r="3" fill="#1976d2"/>
  <circle cx="553.75" cy="146" r="3" fill="#1976d2"/>
  <circle cx="642.5" cy="126" r="3" fill="#1976d2"/>
  <circle cx="820" cy="108" r="3" fill="#1976d2"/>

  <!-- CPU end label -->
  <text x="815" y="98" text-anchor="end" font-size="14" font-weight="700" fill="#1976d2">
    CPU performance
  </text>
  <text x="815" y="80" text-anchor="end" font-size="11" font-style="italic" fill="#1976d2">
    (Moore's Law slowdown after ~2005)
  </text>

  <!-- ============================================================
       DRAM bandwidth line (orange)
   ============================================================ -->
  <polyline points="110,410 287.5,378 465,344 642.5,312 820,278"
            fill="none" stroke="#d97706" stroke-width="3"/>
  <!-- DRAM markers -->
  <circle cx="110" cy="410" r="3" fill="#d97706"/>
  <circle cx="287.5" cy="378" r="3" fill="#d97706"/>
  <circle cx="465" cy="344" r="3" fill="#d97706"/>
  <circle cx="642.5" cy="312" r="3" fill="#d97706"/>
  <circle cx="820" cy="278" r="3" fill="#d97706"/>

  <!-- DRAM end label -->
  <text x="815" y="272" text-anchor="end" font-size="14" font-weight="700" fill="#d97706">
    DRAM bandwidth
  </text>

  <!-- ============================================================
       Callout pointing at the widening gap
   ============================================================ -->
  <rect x="290" y="220" width="240" height="48" fill="white"
        stroke="#c62828" stroke-width="1.5" rx="4"/>
  <text x="410" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">
    the "memory wall"
  </text>
  <text x="410" y="258" text-anchor="middle" font-size="11" fill="#c62828">
    CPUs would stall waiting for RAM
  </text>
  <!-- Arrow into the gap, around (600, 220) -->
  <line x1="530" y1="244" x2="610" y2="220"
        stroke="#c62828" stroke-width="1.8" marker-end="url(#mw-callout)"/>

  <!-- Secondary note inside gap -->
  <text x="700" y="200" text-anchor="middle" font-size="11" font-style="italic" fill="#b71c1c">
    if it weren't for cache
  </text>

  <!-- ============================================================
       Footer caption strip
   ============================================================ -->
  <rect x="40" y="470" width="820" height="0" fill="none"/>

</svg>
