<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Inside a modern GPU: thousands of small cores
  </text>

  <!-- ============================================================ -->
  <!-- GPU package (outer rectangle)                                -->
  <!-- 4 SM clusters x 32 cores each = 128 cores total              -->
  <!-- Each SM is a 4x8 grid of cores; SMs stacked side by side      -->
  <!-- ============================================================ -->
  <rect x="30" y="55" width="560" height="395" fill="#fafafa"
        stroke="#333" stroke-width="2" rx="6"/>
  <text x="310" y="78" text-anchor="middle" font-size="16" font-weight="700" fill="#333">
    GPU package
  </text>

  <!-- ============================================================ -->
  <!-- 4 Streaming Multiprocessors (SM), arranged in a 2x2 grid      -->
  <!-- Each SM = 4 rows x 8 cols = 32 cores                          -->
  <!-- SM dimensions: 260 wide, 130 tall                             -->
  <!-- Core square: 24x24, gap 4. 8 cols = 8*24 + 7*4 = 220 wide      -->
  <!-- ============================================================ -->

  <!-- ===== SM 0: top-left ===== -->
  <g>
    <rect x="50" y="92" width="260" height="148" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="180" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">
      SM 0
    </text>
    <!-- 4x8 grid of cores (32 cores) -->
    <g fill="#1565c0" stroke="#0d3d10" stroke-width="0.4">
      <!-- row 0 -->
      <rect x="64" y="116" width="24" height="20"/>
      <rect x="92" y="116" width="24" height="20"/>
      <rect x="120" y="116" width="24" height="20"/>
      <rect x="148" y="116" width="24" height="20"/>
      <rect x="176" y="116" width="24" height="20"/>
      <rect x="204" y="116" width="24" height="20"/>
      <rect x="232" y="116" width="24" height="20"/>
      <rect x="260" y="116" width="24" height="20"/>
      <!-- row 1 -->
      <rect x="64" y="140" width="24" height="20"/>
      <rect x="92" y="140" width="24" height="20"/>
      <rect x="120" y="140" width="24" height="20"/>
      <rect x="148" y="140" width="24" height="20"/>
      <rect x="176" y="140" width="24" height="20"/>
      <rect x="204" y="140" width="24" height="20"/>
      <rect x="232" y="140" width="24" height="20"/>
      <rect x="260" y="140" width="24" height="20"/>
      <!-- row 2 -->
      <rect x="64" y="164" width="24" height="20"/>
      <rect x="92" y="164" width="24" height="20"/>
      <rect x="120" y="164" width="24" height="20"/>
      <rect x="148" y="164" width="24" height="20"/>
      <rect x="176" y="164" width="24" height="20"/>
      <rect x="204" y="164" width="24" height="20"/>
      <rect x="232" y="164" width="24" height="20"/>
      <rect x="260" y="164" width="24" height="20"/>
      <!-- row 3 -->
      <rect x="64" y="188" width="24" height="20"/>
      <rect x="92" y="188" width="24" height="20"/>
      <rect x="120" y="188" width="24" height="20"/>
      <rect x="148" y="188" width="24" height="20"/>
      <rect x="176" y="188" width="24" height="20"/>
      <rect x="204" y="188" width="24" height="20"/>
      <rect x="232" y="188" width="24" height="20"/>
      <rect x="260" y="188" width="24" height="20"/>
    </g>
    <!-- SM shared cache band -->
    <rect x="60" y="214" width="240" height="18" fill="#bbdefb"
          stroke="#1565c0" stroke-width="1"/>
    <text x="180" y="227" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">
      shared L1 / scratchpad
    </text>
  </g>

  <!-- ===== SM 1: top-right ===== -->
  <g>
    <rect x="320" y="92" width="260" height="148" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="450" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">
