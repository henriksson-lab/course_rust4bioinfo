      <rect x="362" y="116" width="24" height="20"/>
      <rect x="390" y="116" width="24" height="20"/>
      <rect x="418" y="116" width="24" height="20"/>
      <rect x="446" y="116" width="24" height="20"/>
      <rect x="474" y="116" width="24" height="20"/>
      <rect x="502" y="116" width="24" height="20"/>
      <rect x="530" y="116" width="24" height="20"/>

      <rect x="334" y="140" width="24" height="20"/>
      <rect x="362" y="140" width="24" height="20"/>
      <rect x="390" y="140" width="24" height="20"/>
      <rect x="418" y="140" width="24" height="20"/>
      <rect x="446" y="140" width="24" height="20"/>
      <rect x="474" y="140" width="24" height="20"/>
      <rect x="502" y="140" width="24" height="20"/>
      <rect x="530" y="140" width="24" height="20"/>

      <rect x="334" y="164" width="24" height="20"/>
      <rect x="362" y="164" width="24" height="20"/>
      <rect x="390" y="164" width="24" height="20"/>
      <rect x="418" y="164" width="24" height="20"/>
      <rect x="446" y="164" width="24" height="20"/>
      <rect x="474" y="164" width="24" height="20"/>
      <rect x="502" y="164" width="24" height="20"/>
      <rect x="530" y="164" width="24" height="20"/>

      <rect x="334" y="188" width="24" height="20"/>
      <rect x="362" y="188" width="24" height="20"/>
      <rect x="390" y="188" width="24" height="20"/>
      <rect x="418" y="188" width="24" height="20"/>
      <rect x="446" y="188" width="24" height="20"/>
      <rect x="474" y="188" width="24" height="20"/>
      <rect x="502" y="188" width="24" height="20"/>
      <rect x="530" y="188" width="24" height="20"/>
    </g>
    <rect x="330" y="214" width="240" height="18" fill="#bbdefb"
          stroke="#1565c0" stroke-width="1"/>
    <text x="450" y="227" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">
      shared L1 / scratchpad
    </text>
  </g>

  <!-- ===== SM 2: bottom-left ===== -->
  <g>
    <rect x="50" y="248" width="260" height="148" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="180" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">
      SM 2
    </text>
    <g fill="#1565c0" stroke="#0d3d10" stroke-width="0.4">
      <rect x="64" y="272" width="24" height="20"/>
      <rect x="92" y="272" width="24" height="20"/>
      <rect x="120" y="272" width="24" height="20"/>
      <rect x="148" y="272" width="24" height="20"/>
      <rect x="176" y="272" width="24" height="20"/>
      <rect x="204" y="272" width="24" height="20"/>
      <rect x="232" y="272" width="24" height="20"/>
      <rect x="260" y="272" width="24" height="20"/>

      <rect x="64" y="296" width="24" height="20"/>
      <rect x="92" y="296" width="24" height="20"/>
      <rect x="120" y="296" width="24" height="20"/>
      <rect x="148" y="296" width="24" height="20"/>
      <rect x="176" y="296" width="24" height="20"/>
      <rect x="204" y="296" width="24" height="20"/>
      <rect x="232" y="296" width="24" height="20"/>
      <rect x="260" y="296" width="24" height="20"/>

      <rect x="64" y="320" width="24" height="20"/>
      <rect x="92" y="320" width="24" height="20"/>
      <rect x="120" y="320" width="24" height="20"/>
      <rect x="148" y="320" width="24" height="20"/>
      <rect x="176" y="320" width="24" height="20"/>
      <rect x="204" y="320" width="24" height="20"/>
      <rect x="232" y="320" width="24" height="20"/>
      <rect x="260" y="320" width="24" height="20"/>

      <rect x="64" y="344" width="24" height="20"/>
      <rect x="92" y="344" width="24" height="20"/>
      <rect x="120" y="344" width="24" height="20"/>
      <rect x="148" y="344" width="24" height="20"/>
      <rect x="176" y="344" width="24" height="20"/>
      <rect x="204" y="344" width="24" height="20"/>
      <rect x="232" y="344" width="24" height="20"/>
      <rect x="260" y="344" width="24" height="20"/>
    </g>
    <rect x="60" y="370" width="240" height="18" fill="#bbdefb"
          stroke="#1565c0" stroke-width="1"/>
    <text x="180" y="383" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">
      shared L1 / scratchpad
    </text>
  </g>

  <!-- ===== SM 3: bottom-right ===== -->
  <g>
    <rect x="320" y="248" width="260" height="148" fill="#e3f2fd"
          stroke="#1565c0" stroke-width="1.5" rx="4"/>
    <text x="450" y="264" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">
      SM 3
    </text>
    <g fill="#1565c0" stroke="#0d3d10" stroke-width="0.4">
      <rect x="334" y="272" width="24" height="20"/>
      <rect x="362" y="272" width="24" height="20"/>
      <rect x="390" y="272" width="24" height="20"/>
      <rect x="418" y="272" width="24" height="20"/>
      <rect x="446" y="272" width="24" height="20"/>
      <rect x="474" y="272" width="24" height="20"/>
      <rect x="502" y="272" width="24" height="20"/>
      <rect x="530" y="272" width="24" height="20"/>

      <rect x="334" y="296" width="24" height="20"/>
      <rect x="362" y="296" width="24" height="20"/>
      <rect x="390" y="296" width="24" height="20"/>
      <rect x="418" y="296" width="24" height="20"/>
      <rect x="446" y="296" width="24" height="20"/>
      <rect x="474" y="296" width="24" height="20"/>
      <rect x="502" y="296" width="24" height="20"/>
      <rect x="530" y="296" width="24" height="20"/>

      <rect x="334" y="320" width="24" height="20"/>
      <rect x="362" y="320" width="24" height="20"/>
      <rect x="390" y="320" width="24" height="20"/>
      <rect x="418" y="320" width="24" height="20"/>
      <rect x="446" y="320" width="24" height="20"/>
      <rect x="474" y="320" width="24" height="20"/>
      <rect x="502" y="320" width="24" height="20"/>
      <rect x="530" y="320" width="24" height="20"/>

      <rect x="334" y="344" width="24" height="20"/>
      <rect x="362" y="344" width="24" height="20"/>
      <rect x="390" y="344" width="24" height="20"/>
      <rect x="418" y="344" width="24" height="20"/>
      <rect x="446" y="344" width="24" height="20"/>
      <rect x="474" y="344" width="24" height="20"/>
      <rect x="502" y="344" width="24" height="20"/>
      <rect x="530" y="344" width="24" height="20"/>
    </g>
    <rect x="330" y="370" width="240" height="18" fill="#bbdefb"
          stroke="#1565c0" stroke-width="1"/>
    <text x="450" y="383" text-anchor="middle" font-size="10" font-weight="700" fill="#1565c0">
      shared L1 / scratchpad
    </text>
  </g>

  <!-- ===== L2 cache band ===== -->
  <rect x="50" y="402" width="530" height="20" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.2"/>
  <text x="315" y="416" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    L2 cache (shared across all SMs)
  </text>

  <!-- ===== Memory band ===== -->
  <rect x="50" y="424" width="530" height="20" fill="#ffe0b2"
        stroke="#d97706" stroke-width="1.2"/>
  <text x="315" y="438" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    GDDR6 / HBM memory
  </text>

  <!-- ============================================================ -->
  <!-- Annotation panel (right of package)                          -->
  <!-- ============================================================ -->
  <rect x="610" y="92" width="270" height="304" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.2" rx="4"/>
  <text x="745" y="116" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">
    Real GPU core counts
  </text>
  <line x1="630" y1="124" x2="860" y2="124" stroke="#d97706" stroke-width="0.8"/>

  <text x="624" y="148" font-size="13" font-weight="700" fill="#333">
    RTX 4090 (consumer):
  </text>
  <text x="624" y="166" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">
    16,384 CUDA cores
  </text>

  <text x="624" y="196" font-size="13" font-weight="700" fill="#333">
    A100 (datacenter):
  </text>
  <text x="624" y="214" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">
    6,912 CUDA cores
  </text>
  <text x="624" y="230" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">
    + 432 tensor cores
  </text>

  <text x="624" y="262" font-size="12" fill="#555" font-style="italic">
    Each core is simpler and
  </text>
  <text x="624" y="278" font-size="12" fill="#555" font-style="italic">
    slower than a CPU core
  </text>
  <text x="624" y="294" font-size="12" fill="#555" font-style="italic">
    -- but you get thousands.
  </text>

  <text x="624" y="328" font-size="11" fill="#888" font-style="italic">
    (Diagram simplified to 4 SMs
  </text>
  <text x="624" y="342" font-size="11" fill="#888" font-style="italic">
    x 32 cores = 128.)
  </text>

  <!-- ============================================================ -->
  <!-- Footer caption                                               -->
  <!-- ============================================================ -->
  <rect x="30" y="460" width="850" height="50" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.2" rx="4"/>
  <text x="455" y="478" text-anchor="middle" font-size="13" fill="#1b5e20">GPUs win when the same simple operation must run on millions of independent data points:</text>
  <text x="455" y="496" text-anchor="middle" font-size="13" fill="#1b5e20">pixels, neural-net weights, k-mers, base-call probabilities.</text>

</svg>
