<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- ===== Title ===== -->
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="600">
    Watson-Crick base pairing
  </text>
  <text x="320" y="48" text-anchor="middle" font-size="12" fill="#555">
    A pairs with T, C pairs with G; the strands run antiparallel
  </text>

  <!-- ===== Layout =====
       Four columns of bases at x = 160, 260, 360, 460 (centres), box 70 wide.
       Top strand box y = 80..140 (centre 110); bottom strand box y = 180..240 (centre 210).
       H-bonds between bottom of top box (y=140) and top of bottom box (y=180): 40 px gap.
       5' / 3' labels on the left and right of each strand.
  -->

  <!-- top strand backbone band (light blue) -->
  <rect x="100" y="80" width="440" height="60" fill="#e3f2fd" stroke="#bbb"/>
  <!-- bottom strand backbone band -->
  <rect x="100" y="180" width="440" height="60" fill="#e3f2fd" stroke="#bbb"/>

  <!-- ===== Top strand: 5'-A T C G-3' ===== -->
  <text x="78" y="116" text-anchor="end" font-size="14" font-weight="600" fill="#555">5'</text>
  <text x="562" y="116" text-anchor="start" font-size="14" font-weight="600" fill="#555">3'</text>

  <rect x="125" y="85" width="70" height="50" fill="white" stroke="#888"/>
  <text x="160" y="120" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">A</text>

  <rect x="225" y="85" width="70" height="50" fill="white" stroke="#888"/>
  <text x="260" y="120" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">T</text>

  <rect x="325" y="85" width="70" height="50" fill="white" stroke="#888"/>
  <text x="360" y="120" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">C</text>

  <rect x="425" y="85" width="70" height="50" fill="white" stroke="#888"/>
  <text x="460" y="120" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">G</text>

  <!-- ===== Bottom strand: 3'-T A G C-5' ===== -->
  <text x="78" y="216" text-anchor="end" font-size="14" font-weight="600" fill="#555">3'</text>
  <text x="562" y="216" text-anchor="start" font-size="14" font-weight="600" fill="#555">5'</text>

  <rect x="125" y="185" width="70" height="50" fill="white" stroke="#888"/>
  <text x="160" y="220" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">T</text>

  <rect x="225" y="185" width="70" height="50" fill="white" stroke="#888"/>
  <text x="260" y="220" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">A</text>

  <rect x="325" y="185" width="70" height="50" fill="white" stroke="#888"/>
  <text x="360" y="220" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">G</text>

  <rect x="425" y="185" width="70" height="50" fill="white" stroke="#888"/>
  <text x="460" y="220" text-anchor="middle" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace">C</text>

  <!-- ===== Hydrogen bonds between paired bases =====
       gap between strand boxes is y = 140..180 (40 px tall).
       Two lines for A=T (cols 1, 2), three lines for C-G (cols 3, 4).
       Bond lines are short horizontal segments at column centre +/- 12 px.
  -->

  <!-- Column 1: A=T, 2 bonds -->
  <line x1="148" y1="153" x2="172" y2="153" stroke="#444" stroke-width="2.2"/>
  <line x1="148" y1="167" x2="172" y2="167" stroke="#444" stroke-width="2.2"/>

  <!-- Column 2: T=A, 2 bonds -->
  <line x1="248" y1="153" x2="272" y2="153" stroke="#444" stroke-width="2.2"/>
  <line x1="248" y1="167" x2="272" y2="167" stroke="#444" stroke-width="2.2"/>

  <!-- Column 3: C-G, 3 bonds -->
  <line x1="348" y1="148" x2="372" y2="148" stroke="#444" stroke-width="2.2"/>
  <line x1="348" y1="160" x2="372" y2="160" stroke="#444" stroke-width="2.2"/>
  <line x1="348" y1="172" x2="372" y2="172" stroke="#444" stroke-width="2.2"/>

  <!-- Column 4: G-C, 3 bonds -->
  <line x1="448" y1="148" x2="472" y2="148" stroke="#444" stroke-width="2.2"/>
  <line x1="448" y1="160" x2="472" y2="160" stroke="#444" stroke-width="2.2"/>
  <line x1="448" y1="172" x2="472" y2="172" stroke="#444" stroke-width="2.2"/>

  <!-- ===== Annotations =====
       Highlight column 1 (A=T, 2 H-bonds) and column 4 (G-C, 3 H-bonds).
  -->

  <!-- A=T annotation: connector from above column 1 -->
  <line x1="160" y1="270" x2="160" y2="160" stroke="#888" stroke-width="1"
        stroke-dasharray="3,3"/>
  <text x="160" y="285" text-anchor="middle" font-size="12" fill="#555">
    A=T: 2 H-bonds
  </text>

  <!-- C-G annotation: connector below column 4 -->
  <line x1="460" y1="270" x2="460" y2="160" stroke="#888" stroke-width="1"
        stroke-dasharray="3,3"/>
  <text x="460" y="285" text-anchor="middle" font-size="12" fill="#555">
    G=C: 3 H-bonds
  </text>

</svg>
