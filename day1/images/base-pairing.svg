<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-r" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="arrow-l" viewBox="0 0 10 10" refX="1" refY="5"
            markerWidth="10" markerHeight="10" orient="auto">
      <path d="M 10 0 L 0 5 L 10 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="360" y="28" text-anchor="middle" font-size="18" font-weight="600">
    Watson–Crick base pairing
  </text>
  <text x="360" y="50" text-anchor="middle" font-size="16" fill="#555">
    Antiparallel strands held together by hydrogen bonds — A:T uses 2, G:C uses 3
  </text>

  <!-- ===== Layout =====
       Backbones at y=110 (top) and y=320 (bottom).
       Four base columns at x = 200, 320, 440, 560.
       Top base centred at y=160, bottom base centred at y=270.
       H-bond region: y=180..250 (70 px tall, vertical dashes).
  -->

  <!-- ===== Top sugar-phosphate backbone =====
       Drawn as a thick line with explicit direction arrow at the 3' end.   -->
  <line x1="120" y1="110" x2="640" y2="110"
        stroke="#444" stroke-width="3" marker-end="url(#arrow-r)"/>
  <text x="92" y="115" text-anchor="end" font-size="16" font-weight="700" fill="#444">5′</text>
  <text x="664" y="115" font-size="16" font-weight="700" fill="#444">3′</text>
  <text x="380" y="92" text-anchor="middle" font-size="14" fill="#888" font-style="italic">
    sugar–phosphate backbone (reads 5′ → 3′)
  </text>

  <!-- Sugar markers (small circles where each base attaches) on top backbone -->
  <circle cx="200" cy="110" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="320" cy="110" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="440" cy="110" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="560" cy="110" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>

  <!-- Glycosidic bonds from each sugar down to the base -->
  <line x1="200" y1="115" x2="200" y2="140" stroke="#666" stroke-width="1.5"/>
  <line x1="320" y1="115" x2="320" y2="140" stroke="#666" stroke-width="1.5"/>
  <line x1="440" y1="115" x2="440" y2="140" stroke="#666" stroke-width="1.5"/>
  <line x1="560" y1="115" x2="560" y2="140" stroke="#666" stroke-width="1.5"/>

  <!-- ===== Top bases =====
       Purines (A, G): light yellow pill, slightly taller (suggesting two fused rings).
       Pyrimidines (C, T): light blue pill, slightly shorter (one ring).
  -->
  <!-- col 1: A (purine) -->
  <rect x="180" y="142" width="40" height="40" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.2"/>
  <text x="200" y="170" text-anchor="middle" font-size="22" font-weight="700"
        font-family="ui-monospace, monospace" fill="#7c4a03">A</text>

  <!-- col 2: T (pyrimidine) -->
  <rect x="304" y="150" width="32" height="32" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
  <text x="320" y="172" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">T</text>

  <!-- col 3: C (pyrimidine) -->
  <rect x="424" y="150" width="32" height="32" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
  <text x="440" y="172" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">C</text>

  <!-- col 4: G (purine) -->
  <rect x="540" y="142" width="40" height="40" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.2"/>
  <text x="560" y="170" text-anchor="middle" font-size="22" font-weight="700"
        font-family="ui-monospace, monospace" fill="#7c4a03">G</text>

  <!-- ===== Hydrogen bonds (dashed vertical lines, 2 for A:T, 3 for G:C) =====
       Vertical span: y = 185 .. 245 (60 px). Stroke dashed.                 -->

  <!-- col 1: A:T, 2 bonds -->
  <line x1="194" y1="185" x2="194" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>
  <line x1="206" y1="185" x2="206" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>

  <!-- col 2: T:A, 2 bonds -->
  <line x1="314" y1="185" x2="314" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>
  <line x1="326" y1="185" x2="326" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>

  <!-- col 3: C:G, 3 bonds -->
  <line x1="430" y1="185" x2="430" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>
  <line x1="440" y1="185" x2="440" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>
  <line x1="450" y1="185" x2="450" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>

  <!-- col 4: G:C, 3 bonds -->
  <line x1="550" y1="185" x2="550" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>
  <line x1="560" y1="185" x2="560" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>
  <line x1="570" y1="185" x2="570" y2="245" stroke="#2e7d32" stroke-width="1.8"
        stroke-dasharray="4 3"/>

  <!-- ===== Bottom bases =====
       Reading left-to-right under the top strand A T C G, the complementary
       bases are T A G C (the strand itself runs 3'→5' in that direction).  -->

  <!-- col 1 (x=200): T pairs with A above -->
  <rect x="184" y="250" width="32" height="32" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
  <text x="200" y="272" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">T</text>

  <!-- col 2 (x=320): A pairs with T above -->
  <rect x="300" y="248" width="40" height="40" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.2"/>
  <text x="320" y="276" text-anchor="middle" font-size="22" font-weight="700"
        font-family="ui-monospace, monospace" fill="#7c4a03">A</text>

  <!-- col 3 (x=440): G pairs with C above -->
  <rect x="420" y="248" width="40" height="40" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.2"/>
  <text x="440" y="276" text-anchor="middle" font-size="22" font-weight="700"
        font-family="ui-monospace, monospace" fill="#7c4a03">G</text>

  <!-- col 4 (x=560): C pairs with G above -->
  <rect x="544" y="250" width="32" height="32" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.2"/>
  <text x="560" y="272" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">C</text>

  <!-- Glycosidic bonds from each bottom base down to its sugar.
       Purines extend to y=288, pyrimidines to y=282.                   -->
  <line x1="200" y1="282" x2="200" y2="315" stroke="#666" stroke-width="1.5"/>
  <line x1="320" y1="288" x2="320" y2="315" stroke="#666" stroke-width="1.5"/>
  <line x1="440" y1="288" x2="440" y2="315" stroke="#666" stroke-width="1.5"/>
  <line x1="560" y1="282" x2="560" y2="315" stroke="#666" stroke-width="1.5"/>

  <!-- Sugar markers on bottom backbone -->
  <circle cx="200" cy="320" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="320" cy="320" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="440" cy="320" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>
  <circle cx="560" cy="320" r="5" fill="#bbb" stroke="#666" stroke-width="1"/>

  <!-- ===== Bottom backbone (antiparallel — arrow points LEFT) ===== -->
  <line x1="640" y1="320" x2="120" y2="320"
        stroke="#444" stroke-width="3" marker-end="url(#arrow-l)"/>
  <text x="92" y="325" text-anchor="end" font-size="16" font-weight="700" fill="#444">3′</text>
  <text x="664" y="325" font-size="16" font-weight="700" fill="#444">5′</text>
  <text x="380" y="345" text-anchor="middle" font-size="14" fill="#888" font-style="italic">
    complementary strand runs the opposite direction (antiparallel)
  </text>

  <!-- ===== Legend ===== -->
  <g transform="translate(120, 370)">
    <!-- purine swatch -->
    <rect x="0" y="-10" width="18" height="16" rx="3" ry="3"
          fill="#fff3cd" stroke="#d97706" stroke-width="1"/>
    <text x="24" y="2" font-size="14" fill="#444">purine (A, G)</text>

    <!-- pyrimidine swatch -->
    <rect x="140" y="-8" width="14" height="12" rx="3" ry="3"
          fill="#e3f2fd" stroke="#1976d2" stroke-width="1"/>
    <text x="160" y="2" font-size="14" fill="#444">pyrimidine (C, T)</text>

    <!-- hydrogen bond swatch -->
    <line x1="310" y1="-10" x2="310" y2="6" stroke="#2e7d32" stroke-width="1.8"
          stroke-dasharray="4 3"/>
    <text x="320" y="2" font-size="14" fill="#444">hydrogen bond (dashed)</text>
  </g>

</svg>
