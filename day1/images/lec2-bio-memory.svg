<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="bm-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="bm-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="24" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Memory cost of two bioinformatics data structures
  </text>

  <!-- ============================================================
       Shared x-axis log scale: 1 MB .. 1000 MB (3 decades)
       Plot area: x from 320 to 760 (width 440)
       log10(1)=0, log10(1000)=3, span = 3
       x(v) = 320 + log10(v) / 3 * 440
       ticks: 1 -> 320, 10 -> 320+440/3=466.7, 100 -> 320+880/3=613.3, 1000 -> 760
       intermediate: 30 -> 320 + log10(30)/3*440 = 320 + 0.4771/3*440 = 320 + 70.0 = 390.0
                     40 -> 320 + log10(40)/3*440 = 320 + 0.6021/3*440 = 320 + 88.3 = 408.3
                     80 -> 320 + log10(80)/3*440 = 320 + 0.9031/3*440 = 320 + 132.5 = 452.5
                     130 -> 320 + log10(130)/3*440 = 320 + 2.1139/3*440 = 320 + 310.0 = 630.0
                     150 -> 320 + log10(150)/3*440 = 320 + 2.1761/3*440 = 320 + 319.1 = 639.1
                     32 -> 320 + log10(32)/3*440 = 320 + 1.5051/3*440 = 320 + 220.7 = 540.8
   ============================================================ -->

  <!-- ============================================================
       GROUP A: 10 Mb DNA sequence
       y range: 55..245
   ============================================================ -->

  <!-- Group A header band -->
  <rect x="20" y="46" width="860" height="28" fill="#e3f2fd" stroke="#bbb" stroke-width="0.5"/>
  <text x="32" y="65" font-size="15" font-weight="700" fill="#0d47a1">
    A. 10 Mb DNA sequence in memory
  </text>
  <text x="510" y="65" font-size="12" fill="#555" font-style="italic">
    a single 10-megabase chromosome, just the bases
  </text>

  <!-- Gridlines for Group A -->
  <line x1="320" y1="80" x2="320" y2="248" stroke="#ccc" stroke-width="1"/>
  <line x1="466.7" y1="80" x2="466.7" y2="248" stroke="#eee" stroke-width="1"/>
  <line x1="613.3" y1="80" x2="613.3" y2="248" stroke="#eee" stroke-width="1"/>
  <line x1="760" y1="80" x2="760" y2="248" stroke="#eee" stroke-width="1"/>

  <!-- Row labels (left of bars) -->
  <!-- Bar rows centred at y = 95, 125, 155, 185, 215. height 22 -->

  <text x="312" y="99" text-anchor="end" font-size="12" font-weight="600" fill="#1976d2">
    Python <tspan font-family="ui-monospace, monospace">list[int]</tspan>
  </text>
  <text x="312" y="129" text-anchor="end" font-size="12" font-weight="600" fill="#d97706">
    R <tspan font-family="ui-monospace, monospace">integer</tspan> vector
  </text>
  <text x="312" y="159" text-anchor="end" font-size="12" font-weight="600" fill="#1976d2">
    Python <tspan font-family="ui-monospace, monospace">bytes</tspan>
  </text>
  <text x="312" y="189" text-anchor="end" font-size="12" font-weight="600" fill="#d97706">
    R <tspan font-family="ui-monospace, monospace">raw</tspan> vector
  </text>
  <text x="312" y="219" text-anchor="end" font-size="12" font-weight="600" fill="#2e7d32">
    Rust <tspan font-family="ui-monospace, monospace">Vec&lt;u8&gt;</tspan>
  </text>

  <!-- ===== Bars (Group A) =====
       80 MB  -> x_end = 320 + log10(80)/3*440 = 452.5
       40 MB  -> x_end = 320 + log10(40)/3*440 = 408.3
       10 MB  -> x_end = 466.7
       10 MB  -> 466.7
       10 MB  -> 466.7
  -->

  <!-- 1. Python list[int] 80 MB -->
  <rect x="320" y="84" width="132.5" height="22" fill="#1976d2" stroke="#0d47a1" stroke-width="0.8"/>
  <text x="458" y="100" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">80 MB</text>
  <text x="498" y="100" font-size="10" fill="#555">
    10M &#215; 8-byte pointer; small-int cache reuses the int objects
  </text>

  <!-- 2. R integer vector 40 MB -->
  <rect x="320" y="114" width="88.3" height="22" fill="#d97706" stroke="#b45309" stroke-width="0.8"/>
  <text x="414" y="130" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">40 MB</text>
  <text x="454" y="130" font-size="10" fill="#555">
    10M &#215; 4 bytes + ~32-byte SEXP header
  </text>

  <!-- 3. Python bytes 10 MB -->
  <rect x="320" y="144" width="146.7" height="22" fill="#1976d2" stroke="#0d47a1" stroke-width="0.8"/>
  <text x="472" y="160" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">10 MB</text>
  <text x="512" y="160" font-size="10" fill="#555">
    contiguous bytes, no per-element box (the smart Python choice)
  </text>

  <!-- 4. R raw vector 10 MB -->
  <rect x="320" y="174" width="146.7" height="22" fill="#d97706" stroke="#b45309" stroke-width="0.8"/>
  <text x="472" y="190" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">10 MB</text>
  <text x="512" y="190" font-size="10" fill="#555">
    contiguous bytes, +~32-byte header (rare in practice)
  </text>

  <!-- 5. Rust Vec<u8> 10 MB -->
  <rect x="320" y="204" width="146.7" height="22" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.8"/>
  <text x="472" y="220" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">10 MB</text>
  <text x="512" y="220" font-size="10" fill="#555">
    contiguous bytes, +24-byte stack header
  </text>

  <!-- Red callout: 8x the size -->
  <rect x="180" y="84" width="92" height="22" fill="#ffebee" stroke="#c62828" stroke-width="1.5" rx="3"/>
  <text x="226" y="100" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">
    8&#215; the size
  </text>
  <!-- arrow from callout down to bar 5 (Rust 10 MB) to contrast -->
  <line x1="272" y1="95" x2="316" y2="95" stroke="#c62828" stroke-width="1.5"
        marker-end="url(#bm-arrow)"/>
  <line x1="226" y1="106" x2="226" y2="208" stroke="#c62828" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="226" y1="208" x2="316" y2="208" stroke="#c62828" stroke-width="1.5"
        marker-end="url(#bm-arrow)" stroke-dasharray="3,2"/>

  <!-- Group A x-axis -->
  <line x1="320" y1="248" x2="760" y2="248" stroke="#888" stroke-width="1"/>
  <text x="320" y="262" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">1 MB</text>
  <text x="466.7" y="262" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">10 MB</text>
  <text x="613.3" y="262" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">100 MB</text>
  <text x="760" y="262" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">1000 MB</text>
  <text x="540" y="278" text-anchor="middle" font-size="10" fill="#777" font-style="italic">
    memory (log scale)
  </text>

  <!-- ============================================================
       GROUP B: k-mer counts
       y range: 295..430
   ============================================================ -->

  <!-- Group B header band -->
  <rect x="20" y="290" width="860" height="28" fill="#e3f2fd" stroke="#bbb" stroke-width="0.5"/>
  <text x="32" y="309" font-size="15" font-weight="700" fill="#0d47a1">
    B. Count of every 21-mer in 10 Mb
  </text>
  <text x="510" y="309" font-size="12" fill="#555" font-style="italic">
    key = 21-byte k-mer, value = its count (~1M unique entries)
  </text>

  <!-- Gridlines for Group B -->
  <line x1="320" y1="324" x2="320" y2="430" stroke="#ccc" stroke-width="1"/>
  <line x1="466.7" y1="324" x2="466.7" y2="430" stroke="#eee" stroke-width="1"/>
  <line x1="613.3" y1="324" x2="613.3" y2="430" stroke="#eee" stroke-width="1"/>
  <line x1="760" y1="324" x2="760" y2="430" stroke="#eee" stroke-width="1"/>

  <!-- Row labels: rows at y = 339, 369, 399 -->
  <text x="312" y="343" text-anchor="end" font-size="12" font-weight="600" fill="#1976d2">
    Python <tspan font-family="ui-monospace, monospace">dict[bytes, int]</tspan>
  </text>
  <text x="312" y="373" text-anchor="end" font-size="12" font-weight="600" fill="#d97706">
    R named <tspan font-family="ui-monospace, monospace">list</tspan>
  </text>
  <text x="312" y="403" text-anchor="end" font-size="12" font-weight="600" fill="#2e7d32">
    Rust <tspan font-family="ui-monospace, monospace">HashMap&lt;[u8;21], u32&gt;</tspan>
  </text>

  <!-- ===== Bars (Group B) =====
       130 MB -> x_end = 630.0
       150 MB -> x_end = 639.1
       32  MB -> x_end = 540.8
  -->

  <!-- 1. Python dict[bytes, int] 130 MB -->
  <rect x="320" y="328" width="310.0" height="22" fill="#1976d2" stroke="#0d47a1" stroke-width="0.8"/>
  <text x="636" y="344" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">130 MB</text>
  <text x="685" y="344" font-size="10" fill="#555">
    every key a <tspan font-family="ui-monospace, monospace">bytes</tspan> (~54 B),
  </text>
  <text x="685" y="356" font-size="10" fill="#555">
    every value a <tspan font-family="ui-monospace, monospace">PyLong</tspan> (~28 B)
  </text>

  <!-- 2. R named list 150 MB -->
  <rect x="320" y="358" width="319.1" height="22" fill="#d97706" stroke="#b45309" stroke-width="0.8"/>
  <text x="645" y="374" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">150 MB</text>
  <text x="700" y="374" font-size="10" fill="#555">
    named-list lookup is O(n);
  </text>
  <text x="700" y="386" font-size="10" fill="#555">
    use <tspan font-family="ui-monospace, monospace">environment</tspan> for hashing
  </text>

  <!-- 3. Rust HashMap 32 MB -->
  <rect x="320" y="388" width="220.7" height="22" fill="#2e7d32" stroke="#1b5e20" stroke-width="0.8"/>
  <text x="546" y="404" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">32 MB</text>
  <text x="588" y="404" font-size="10" fill="#555">
    key + value stored inline in each slot;
  </text>
  <text x="588" y="416" font-size="10" fill="#555">
    one allocation for the whole table
  </text>

  <!-- Green callout: ~4x smaller -->
  <rect x="180" y="388" width="92" height="22" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="226" y="404" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    ~4&#215; smaller
  </text>
  <line x1="272" y1="399" x2="316" y2="399" stroke="#2e7d32" stroke-width="1.5"
        marker-end="url(#bm-arrow-green)"/>
  <line x1="226" y1="388" x2="226" y2="343" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="226" y1="343" x2="316" y2="343" stroke="#2e7d32" stroke-width="1.5"
        stroke-dasharray="3,2" marker-end="url(#bm-arrow-green)"/>

  <!-- Group B x-axis -->
  <line x1="320" y1="430" x2="760" y2="430" stroke="#888" stroke-width="1"/>
  <text x="320" y="444" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">1 MB</text>
  <text x="466.7" y="444" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">10 MB</text>
  <text x="613.3" y="444" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">100 MB</text>
  <text x="760" y="444" text-anchor="middle" font-size="10" fill="#555"
        font-family="ui-monospace, monospace">1000 MB</text>
  <text x="540" y="460" text-anchor="middle" font-size="10" fill="#777" font-style="italic">
    memory (log scale)
  </text>

  <!-- ============================================================
       Bottom caveat strip
   ============================================================ -->
  <rect x="20" y="478" width="860" height="32" fill="#f5f5f5" stroke="#ccc" stroke-width="0.5"/>
  <text x="450" y="494" text-anchor="middle" font-size="10" font-style="italic" fill="#666">
    Approximate values &#8212; actual sizes vary with Python implementation (CPython 3.12 assumed), R version, allocator, and small-int caching.
  </text>
  <text x="450" y="506" text-anchor="middle" font-size="10" font-style="italic" fill="#666">
    The orders of magnitude are reliable; the exact bytes are not.
  </text>

</svg>
