<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="utf8-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="utf8-arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#333">
    Why <tspan font-family="ui-monospace, monospace">&amp;str</tspan> is more complex than <tspan font-family="ui-monospace, monospace">&amp;[u8]</tspan>
  </text>

  <!-- ============================================================ -->
  <!-- Top half: as &str (UTF-8)                                     -->
  <!-- ============================================================ -->

  <text x="60" y="68" font-size="15" font-weight="700" fill="#1565c0">
    as <tspan font-family="ui-monospace, monospace">&amp;str</tspan> (UTF-8)
  </text>

  <!-- Outer frame for the str representation -->
  <rect x="40" y="78" width="820" height="180" fill="#fafafa"
        stroke="#1565c0" stroke-width="1.2" stroke-dasharray="6,4" rx="4"/>

  <!-- 4 character boxes: c, a, f, e-acute -->
  <!-- Each character box: 80 wide, 50 tall, centred near top -->
  <g stroke="#1565c0" stroke-width="1.5">
    <rect x="120" y="98" width="80" height="50" fill="#e3f2fd"/>
    <rect x="220" y="98" width="80" height="50" fill="#e3f2fd"/>
    <rect x="320" y="98" width="80" height="50" fill="#e3f2fd"/>
    <rect x="420" y="98" width="180" height="50" fill="#fff3cd"/>
  </g>

  <!-- Character glyphs -->
  <text x="160" y="133" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">c</text>
  <text x="260" y="133" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">a</text>
  <text x="360" y="133" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">f</text>
  <text x="510" y="133" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">&#233;</text>

  <!-- Char-level label -->
  <text x="80" y="128" text-anchor="end" font-size="12" fill="#555" font-style="italic">
    chars:
  </text>

  <!-- Byte boxes below the char boxes -->
  <!-- Each byte box: 80 wide, 50 tall -->
  <g stroke="#1565c0" stroke-width="1.2">
    <rect x="120" y="178" width="80" height="50" fill="white"/>
    <rect x="220" y="178" width="80" height="50" fill="white"/>
    <rect x="320" y="178" width="80" height="50" fill="white"/>
    <rect x="420" y="178" width="80" height="50" fill="white"/>
    <rect x="520" y="178" width="80" height="50" fill="white"/>
  </g>

  <!-- Byte values -->
  <text x="160" y="210" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">0x63</text>
  <text x="260" y="210" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">0x61</text>
  <text x="360" y="210" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">0x66</text>
  <text x="460" y="210" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">0xC3</text>
  <text x="560" y="210" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">0xA9</text>

  <!-- Byte indices below -->
  <text x="160" y="246" text-anchor="middle" font-size="11" fill="#666"
        font-family="ui-monospace, monospace">[0]</text>
  <text x="260" y="246" text-anchor="middle" font-size="11" fill="#666"
        font-family="ui-monospace, monospace">[1]</text>
  <text x="360" y="246" text-anchor="middle" font-size="11" fill="#666"
        font-family="ui-monospace, monospace">[2]</text>
  <text x="460" y="246" text-anchor="middle" font-size="11" fill="#666"
        font-family="ui-monospace, monospace">[3]</text>
  <text x="560" y="246" text-anchor="middle" font-size="11" fill="#666"
        font-family="ui-monospace, monospace">[4]</text>

  <!-- Byte-level label -->
  <text x="80" y="206" text-anchor="end" font-size="12" fill="#555" font-style="italic">
    bytes:
  </text>

  <!-- Vertical guide lines from char boxes to byte boxes (1-to-1 for ASCII) -->
  <g stroke="#bbb" stroke-width="1" stroke-dasharray="3,3">
    <line x1="160" y1="148" x2="160" y2="178"/>
    <line x1="260" y1="148" x2="260" y2="178"/>
    <line x1="360" y1="148" x2="360" y2="178"/>
  </g>
  <!-- Two lines from the e-acute char to the two byte cells -->
  <g stroke="#c62828" stroke-width="1" stroke-dasharray="3,3">
    <line x1="510" y1="148" x2="460" y2="178"/>
    <line x1="510" y1="148" x2="560" y2="178"/>
  </g>

  <!-- Bracket spanning the two bytes of e-acute -->
  <line x1="420" y1="170" x2="600" y2="170" stroke="#c62828" stroke-width="2"/>
  <line x1="420" y1="170" x2="420" y2="178" stroke="#c62828" stroke-width="2"/>
  <line x1="600" y1="170" x2="600" y2="178" stroke="#c62828" stroke-width="2"/>

  <!-- PANIC marker on the right, with arrow pointing between bytes [2] and [3] -->
  <rect x="640" y="120" width="200" height="68" fill="#fdecea"
        stroke="#c62828" stroke-width="1.5" rx="4"/>
  <text x="740" y="142" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">
    &amp;s[0..3]
  </text>
  <text x="740" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#c62828">
    PANICS at runtime
  </text>
  <text x="740" y="178" text-anchor="middle" font-size="11" fill="#c62828" font-style="italic">
    byte 3 is mid-character
  </text>
  <!-- Arrow from the PANIC box to the boundary between byte [2] and byte [3] -->
  <line x1="640" y1="178" x2="412" y2="200"
        stroke="#c62828" stroke-width="1.8" marker-end="url(#utf8-arrow-red)"/>

  <!-- Caption under the str row -->
  <text x="450" y="282" text-anchor="middle" font-size="12" fill="#555">
    one character can span multiple bytes &#8212; only positions on a character boundary may be sliced
  </text>

  <!-- ============================================================ -->
  <!-- Bottom half: as &[u8] (just bytes)                            -->
  <!-- ============================================================ -->

  <text x="60" y="318" font-size="15" font-weight="700" fill="#2e7d32">
    as <tspan font-family="ui-monospace, monospace">&amp;[u8]</tspan> (just bytes)
  </text>

  <!-- Outer frame for the bytes representation -->
  <rect x="40" y="328" width="820" height="100" fill="#fafafa"
        stroke="#2e7d32" stroke-width="1.2" stroke-dasharray="6,4" rx="4"/>

  <!-- 5 byte cells in a row -->
  <g stroke="#2e7d32" stroke-width="1.5">
    <rect x="120" y="346" width="80" height="50" fill="#e8f5e9"/>
    <rect x="220" y="346" width="80" height="50" fill="#e8f5e9"/>
    <rect x="320" y="346" width="80" height="50" fill="#e8f5e9"/>
    <rect x="420" y="346" width="80" height="50" fill="#e8f5e9"/>
    <rect x="520" y="346" width="80" height="50" fill="#e8f5e9"/>
  </g>

  <text x="160" y="378" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">0x63</text>
  <text x="260" y="378" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">0x61</text>
  <text x="360" y="378" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">0x66</text>
  <text x="460" y="378" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">0xC3</text>
  <text x="560" y="378" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">0xA9</text>

  <!-- Caption beside cells: no character semantics -->
  <text x="740" y="372" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">
    every byte stands alone
  </text>
  <text x="740" y="388" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    O(1) indexing, no encoding rules
  </text>

  <!-- Caption under bytes row -->
  <text x="450" y="416" text-anchor="middle" font-size="12" fill="#555">
    no character semantics &#8212; the slice is just a contiguous run of <tspan font-family="ui-monospace, monospace">u8</tspan> values
  </text>

  <!-- ============================================================ -->
  <!-- Bottom annotation: DNA is ASCII                                -->
  <!-- ============================================================ -->
  <rect x="30" y="448" width="840" height="42" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>
  <text x="450" y="472" text-anchor="middle" font-size="13" font-weight="700" fill="#1b5e20">
    DNA is plain ASCII (A, C, G, T = 0x41, 0x43, 0x47, 0x54), one byte each &#8212;
    <tspan font-family="ui-monospace, monospace">&amp;[u8]</tspan> is exactly the right type.
  </text>

</svg>
