<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-push" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-pop" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ===== Three "notes above panel" labels ===== -->
  <text x="150" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#333">
    1. before the call
  </text>
  <text x="150" y="50" text-anchor="middle" font-size="12" fill="#555">
    main is running
  </text>

  <text x="450" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#333">
    2. inside the call
  </text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#555">
    gc_content is running; main is paused
  </text>

  <text x="750" y="32" text-anchor="middle" font-size="14" font-weight="600" fill="#333">
    3. after the call
  </text>
  <text x="750" y="50" text-anchor="middle" font-size="12" fill="#555">
    main resumes with the result
  </text>

  <!-- ===== Panel 1 (left): just main on the stack ===== -->
  <!-- main frame -->
  <rect x="40" y="240" width="220" height="120" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="55" y="262" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">main</text>
  <text x="65" y="288" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    seq: &amp;[u8]
  </text>
  <text x="65" y="310" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    g: f64 = ???
  </text>
  <text x="65" y="334" font-size="11" fill="#888" font-style="italic">
    (reserved, not yet set)
  </text>

  <!-- older frames placeholder -->
  <rect x="40" y="370" width="220" height="40" fill="#fafafa"
        stroke="#aaa" stroke-dasharray="4,3"/>
  <text x="150" y="395" text-anchor="middle" font-size="14" fill="#888">
    &#183;&#183;&#183;
  </text>

  <!-- "stack grows up" hint -->
  <text x="150" y="430" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    (top of stack = top of column)
  </text>

  <!-- ===== Panel 2 (middle): gc_content on top of main ===== -->
  <!-- gc_content frame (newest, on top) -->
  <rect x="340" y="120" width="220" height="120" fill="#fff3cd"
        stroke="#d97706" stroke-width="2"/>
  <text x="355" y="142" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">gc_content</text>
  <text x="365" y="168" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    seq: &amp;[u8]
  </text>
  <text x="365" y="190" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    gc: usize = 4
  </text>
  <text x="365" y="212" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    b: u8
  </text>
  <text x="555" y="135" text-anchor="end" font-size="10" fill="#b45309" font-style="italic">
    top of stack
  </text>

  <!-- main frame -->
  <rect x="340" y="240" width="220" height="120" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="355" y="262" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">main</text>
  <text x="365" y="288" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    seq: &amp;[u8]
  </text>
  <text x="365" y="310" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    g: f64 = ???
  </text>
  <text x="365" y="334" font-size="11" fill="#888" font-style="italic">
    (paused, waiting)
  </text>

  <!-- older frames placeholder -->
  <rect x="340" y="370" width="220" height="40" fill="#fafafa"
        stroke="#aaa" stroke-dasharray="4,3"/>
  <text x="450" y="395" text-anchor="middle" font-size="14" fill="#888">
    &#183;&#183;&#183;
  </text>

  <!-- ===== Panel 3 (right): back to main with return value ===== -->
  <rect x="640" y="240" width="220" height="120" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="655" y="262" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">main</text>
  <text x="665" y="288" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    seq: &amp;[u8]
  </text>
  <text x="665" y="310" font-size="13" font-family="ui-monospace, monospace" fill="#2e7d32" font-weight="700">
    g: f64 = 0.5
  </text>
  <text x="665" y="334" font-size="11" fill="#2e7d32" font-style="italic">
    (received the return value)
  </text>

  <!-- older frames placeholder -->
  <rect x="640" y="370" width="220" height="40" fill="#fafafa"
        stroke="#aaa" stroke-dasharray="4,3"/>
  <text x="750" y="395" text-anchor="middle" font-size="14" fill="#888">
    &#183;&#183;&#183;
  </text>

  <!-- ===== Arrows between panels ===== -->
  <!-- push frame: panel 1 -> panel 2 -->
  <line x1="265" y1="200" x2="335" y2="180"
        stroke="#2e7d32" stroke-width="3" marker-end="url(#arr-push)"/>
  <text x="300" y="170" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">
    push frame
  </text>

  <!-- pop frame: panel 2 -> panel 3 -->
  <line x1="565" y1="180" x2="635" y2="280"
        stroke="#d97706" stroke-width="3" marker-end="url(#arr-pop)"/>
  <text x="618" y="200" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">
    pop frame
  </text>

  <!-- ===== Footer ===== -->
  <text x="450" y="470" text-anchor="middle" font-size="14" fill="#333">
    Allocating a frame is just moving the stack pointer &#8212;
  </text>
  <text x="450" y="492" text-anchor="middle" font-size="14" fill="#333" font-family="ui-monospace, monospace">
    that's why <tspan font-weight="700">let x = 42;</tspan> is free.
  </text>

</svg>
