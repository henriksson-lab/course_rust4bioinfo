<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="box-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="box-arrow-sm" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    How <tspan font-family="ui-monospace, monospace">42</tspan> is stored &#8212; Rust vs Python vs R
  </text>

  <!-- ===== Column headers (code lines) ===== -->
  <text x="150" y="58" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    Rust: let x: i32 = 42;
  </text>
  <text x="450" y="58" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    Python: x = 42
  </text>
  <text x="750" y="58" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    R: x &lt;- 42L
  </text>

  <!-- Column dividers (subtle) -->
  <line x1="300" y1="70" x2="300" y2="380" stroke="#ddd" stroke-width="1"/>
  <line x1="600" y1="70" x2="600" y2="380" stroke="#ddd" stroke-width="1"/>

  <!-- ===== Region labels (Stack / Heap) for each column ===== -->
  <text x="150" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Stack</text>
  <text x="450" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Stack</text>
  <text x="750" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#1565c0">Stack</text>

  <!-- ============================================================ -->
  <!-- Column 1: Rust - value lives directly on the stack            -->
  <!-- ============================================================ -->

  <!-- Stack region (only) -->
  <rect x="40" y="96" width="220" height="80" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>

  <!-- The 4-byte cell holding 42 directly -->
  <rect x="90" y="112" width="120" height="50" fill="white"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="105" y="135" font-size="13" font-family="ui-monospace, monospace" fill="#555">
    x =
  </text>
  <text x="190" y="146" text-anchor="end" font-size="24" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    42
  </text>

  <!-- No heap needed: visual placeholder where heap would go -->
  <text x="150" y="208" text-anchor="middle" font-size="12" fill="#888" font-style="italic">
    (no heap allocation)
  </text>

  <!-- Annotation: 4 bytes total -->
  <text x="150" y="338" text-anchor="middle" font-size="17" font-weight="700" fill="#2e7d32">
    4 bytes total
  </text>

  <!-- Footnote -->
  <text x="150" y="360" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    the value lives directly on the stack;
  </text>
  <text x="150" y="374" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    no heap allocation
  </text>

  <!-- ============================================================ -->
  <!-- Column 2: Python - stack pointer to PyLongObject on heap     -->
  <!-- ============================================================ -->

  <!-- Stack box (pointer holder) -->
  <rect x="320" y="96" width="100" height="50" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="334" y="127" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    x
  </text>
  <circle cx="396" cy="122" r="5" fill="#1565c0"/>

  <!-- Heap region label -->
  <text x="500" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">Heap</text>

  <!-- Heap region tinted -->
  <rect x="430" y="96" width="160" height="180" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>

  <!-- PyLongObject box -->
  <rect x="442" y="110" width="138" height="150" fill="white"
        stroke="#d97706" stroke-width="1.2"/>
  <text x="450" y="127" font-size="11" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">
    PyLongObject
  </text>
  <line x1="442" y1="134" x2="580" y2="134" stroke="#d97706" stroke-width="0.6" stroke-dasharray="3,2"/>

  <text x="450" y="152" font-size="11" font-family="ui-monospace, monospace" fill="#555">
    refcount: 1
  </text>

  <text x="450" y="174" font-size="11" font-family="ui-monospace, monospace" fill="#555">
    ob_type:
  </text>
  <circle cx="514" cy="170" r="4" fill="#888"/>
  <line x1="518" y1="170" x2="554" y2="170" stroke="#888" stroke-width="1.5"
        marker-end="url(#box-arrow-sm)"/>
  <text x="450" y="190" font-size="9" font-family="ui-monospace, monospace" fill="#888" font-style="italic">
    PyLong_Type
  </text>

  <text x="450" y="220" font-size="12" font-family="ui-monospace, monospace" fill="#333">
    value:
  </text>
  <text x="572" y="222" text-anchor="end" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    42
  </text>

  <!-- Arrow from x to heap box -->
  <line x1="402" y1="122" x2="438" y2="160"
        stroke="#1565c0" stroke-width="2" marker-end="url(#box-arrow)"/>

  <!-- Annotation: ~28 bytes -->
  <text x="450" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#d97706">
    ~28 bytes
  </text>
  <text x="450" y="324" text-anchor="middle" font-size="10" fill="#666">
    8 (pointer) + 8 (refcount) + 8 (type)
  </text>
  <text x="450" y="338" text-anchor="middle" font-size="10" fill="#666">
    + 4 (value) + alignment
  </text>

  <!-- Footnote -->
  <text x="450" y="362" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    every integer, even <tspan font-family="ui-monospace, monospace" font-style="normal">0</tspan>,
    gets this treatment
  </text>

  <!-- ============================================================ -->
  <!-- Column 3: R - stack pointer to INTSXP on heap                -->
  <!-- ============================================================ -->

  <!-- Stack box (pointer holder) -->
  <rect x="620" y="96" width="100" height="50" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="634" y="127" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    x
  </text>
  <circle cx="696" cy="122" r="5" fill="#1565c0"/>

  <!-- Heap region label -->
  <text x="800" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">Heap</text>

  <!-- Heap region tinted -->
  <rect x="730" y="96" width="160" height="180" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>

  <!-- INTSXP box -->
  <rect x="742" y="110" width="138" height="150" fill="white"
        stroke="#d97706" stroke-width="1.2"/>
  <text x="750" y="127" font-size="11" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">
    INTSXP
  </text>
  <text x="750" y="140" font-size="9" font-family="ui-monospace, monospace" fill="#b45309" font-style="italic">
    (R integer vector)
  </text>

  <!-- SEXP header band, lightly tinted -->
  <rect x="742" y="148" width="138" height="36" fill="#fde8c8" stroke="#d97706"
        stroke-width="0.6"/>
  <text x="750" y="162" font-size="10" font-family="ui-monospace, monospace" fill="#555">
    SEXP header
  </text>
  <text x="750" y="176" font-size="10" font-family="ui-monospace, monospace" fill="#555">
    (~32 bytes)
  </text>

  <text x="750" y="204" font-size="11" font-family="ui-monospace, monospace" fill="#555">
    length: 1
  </text>

  <text x="750" y="232" font-size="12" font-family="ui-monospace, monospace" fill="#333">
    data[0]:
  </text>
  <text x="872" y="234" text-anchor="end" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    42
  </text>

  <!-- Arrow from x to heap box -->
  <line x1="702" y1="122" x2="738" y2="160"
        stroke="#1565c0" stroke-width="2" marker-end="url(#box-arrow)"/>

  <!-- Annotation: ~40 bytes -->
  <text x="750" y="305" text-anchor="middle" font-size="17" font-weight="700" fill="#d97706">
    ~40 bytes
  </text>
  <text x="750" y="324" text-anchor="middle" font-size="10" fill="#666">
    every R scalar is a length-1 vector
  </text>
  <text x="750" y="338" text-anchor="middle" font-size="10" fill="#666">
    with a full SEXP header
  </text>

  <!-- Footnote -->
  <text x="750" y="362" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    we'll come back to why this matters
  </text>
  <text x="750" y="376" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    less than it looks
  </text>

  <!-- ============================================================ -->
  <!-- Bottom callout                                               -->
  <!-- ============================================================ -->
  <rect x="30" y="402" width="840" height="100" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>

  <text x="450" y="436" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">
    Same value, three storage layouts. The metadata isn't optional in Python/R &#8212;
  </text>
  <text x="450" y="456" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">
    it's how those languages support dynamic typing and garbage collection.
  </text>
  <text x="450" y="484" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    Per-value overhead is fine for one scalar. The next slides show what happens when you have a million.
  </text>

</svg>
