<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- Title -->
  <text x="300" y="26" text-anchor="middle" font-size="16" font-weight="700">
    Container vs Rust binary
  </text>

  <!-- ====== LEFT: Container ====== -->
  <!-- Container outer shell (shipping-container styling) -->
  <rect x="40" y="58" width="240" height="380" fill="#fff3cd" stroke="#d97706"
        stroke-width="3" rx="6"/>
  <!-- corrugation lines, evocative of a shipping container -->
  <line x1="40" y1="120" x2="280" y2="120" stroke="#d97706" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="180" x2="280" y2="180" stroke="#d97706" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="240" x2="280" y2="240" stroke="#d97706" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="300" x2="280" y2="300" stroke="#d97706" stroke-width="0.8" opacity="0.4"/>
  <line x1="40" y1="360" x2="280" y2="360" stroke="#d97706" stroke-width="0.8" opacity="0.4"/>

  <!-- Container label -->
  <text x="160" y="78" text-anchor="middle" font-size="13" font-weight="700"
        fill="#b45309">Docker / Apptainer / Conda</text>

  <!-- Stack layers, bottom to top -->
  <!-- Layer 1: Linux base -->
  <rect x="60" y="380" width="200" height="42" fill="#e3f2fd" stroke="#1976d2"/>
  <text x="160" y="400" text-anchor="middle" font-size="11" font-weight="700"
        fill="#0d47a1">Linux base image</text>
  <text x="160" y="415" text-anchor="middle" font-size="10"
        fill="#1976d2">(Ubuntu, Alpine, ...)</text>

  <!-- Layer 2: System libs -->
  <rect x="60" y="330" width="200" height="42" fill="#e1bee7" stroke="#8e24aa"/>
  <text x="160" y="350" text-anchor="middle" font-size="11" font-weight="700"
        fill="#4a148c">system libraries</text>
  <text x="160" y="365" text-anchor="middle" font-size="10"
        fill="#6a1b9a">(libc, libssl, ...)</text>

  <!-- Layer 3: Runtime -->
  <rect x="60" y="280" width="200" height="42" fill="#ffe0b2" stroke="#f57c00"/>
  <text x="160" y="300" text-anchor="middle" font-size="11" font-weight="700"
        fill="#e65100">language runtime</text>
  <text x="160" y="315" text-anchor="middle" font-size="10"
        fill="#ef6c00">(Python, R)</text>

  <!-- Layer 4: Packages -->
  <rect x="60" y="230" width="200" height="42" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="160" y="250" text-anchor="middle" font-size="11" font-weight="700"
        fill="#1b5e20">pip / conda packages</text>
  <text x="160" y="265" text-anchor="middle" font-size="10"
        fill="#2e7d32">(pysam, numpy, ggplot2, ...)</text>

  <!-- Layer 5: Your script -->
  <rect x="60" y="180" width="200" height="42" fill="#fff" stroke="#333"
        stroke-width="1.5"/>
  <text x="160" y="200" text-anchor="middle" font-size="11" font-weight="700"
        fill="#333">your script</text>
  <text x="160" y="215" text-anchor="middle" font-size="10"
        fill="#666">(50 lines of analysis)</text>

  <!-- Total size badge -->
  <rect x="80" y="106" width="160" height="50" rx="6" fill="#c62828" stroke="#7f0000"
        stroke-width="1.5"/>
  <text x="160" y="127" text-anchor="middle" font-size="11" font-weight="700"
        fill="#fff">total size on disk</text>
  <text x="160" y="146" text-anchor="middle" font-size="15" font-weight="800"
        fill="#fff">~ 1-2 GB</text>

  <!-- ====== RIGHT: Rust binary ====== -->
  <!-- Floating single box, no container around it -->
  <rect x="370" y="220" width="190" height="80" rx="6" fill="#e8f5e9" stroke="#2e7d32"
        stroke-width="3"/>
  <text x="465" y="248" text-anchor="middle" font-size="13" font-weight="700"
        fill="#1b5e20">my_rust_tool</text>
  <text x="465" y="270" text-anchor="middle" font-size="11"
        fill="#2e7d32">(static binary)</text>
  <!-- Green checkmark -->
  <circle cx="465" cy="288" r="9" fill="#2e7d32"/>
  <path d="M 460 288 L 464 292 L 470 285" stroke="#fff" stroke-width="2"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Total size badge for binary -->
  <rect x="385" y="330" width="160" height="50" rx="6" fill="#2e7d32" stroke="#1b5e20"
        stroke-width="1.5"/>
  <text x="465" y="351" text-anchor="middle" font-size="11" font-weight="700"
        fill="#fff">total size on disk</text>
  <text x="465" y="370" text-anchor="middle" font-size="15" font-weight="800"
        fill="#fff">~ 4 MB</text>

  <!-- Caption above the binary, explaining what's NOT there -->
  <text x="465" y="120" text-anchor="middle" font-size="12" font-weight="700"
        fill="#1b5e20">just the code</text>
  <text x="465" y="138" text-anchor="middle" font-size="11"
        fill="#555">no OS, no runtime,</text>
  <text x="465" y="153" text-anchor="middle" font-size="11"
        fill="#555">no separate libraries</text>

  <!-- Versus arrow / divider -->
  <text x="320" y="245" text-anchor="middle" font-size="16" font-weight="700"
        fill="#888">vs</text>

  <!-- Side labels -->
  <text x="160" y="468" text-anchor="middle" font-size="11" font-weight="600"
        fill="#b45309">ship a whole OS</text>
  <text x="465" y="468" text-anchor="middle" font-size="11" font-weight="600"
        fill="#1b5e20">ship the executable</text>

</svg>
