<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600">
    Each byte of seq: &amp;[u8] flows through the loop body
  </text>

  <!-- ===== Top: horizontal array of 8 bytes =====
       Cells start at x=140, width=70, y=60, h=50
       Cell centres: 175, 245, 315, 385, 455, 525, 595, 665
       Contents: A C G T A C G A (indices 0..7)
       G/C at indices 1, 2, 5, 6 (kept)
       A/T at indices 0, 3, 4, 7 (skipped)
  -->

  <!-- seq label on the left -->
  <text x="130" y="92" text-anchor="end" font-size="14"
        font-family="ui-monospace, monospace" font-weight="700">seq:</text>
  <text x="130" y="108" text-anchor="end" font-size="11" fill="#555">&amp;[u8]</text>

  <!-- Index 0: A (skip) -->
  <rect x="140" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="175" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'A'</text>
  <text x="175" y="128" text-anchor="middle" font-size="12" fill="#555">0</text>

  <!-- Index 1: C (keep) -->
  <rect x="210" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="245" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'C'</text>
  <text x="245" y="128" text-anchor="middle" font-size="12" fill="#555">1</text>

  <!-- Index 2: G (keep) -->
  <rect x="280" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="315" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'G'</text>
  <text x="315" y="128" text-anchor="middle" font-size="12" fill="#555">2</text>

  <!-- Index 3: T (skip) -->
  <rect x="350" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="385" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'T'</text>
  <text x="385" y="128" text-anchor="middle" font-size="12" fill="#555">3</text>

  <!-- Index 4: A (skip) -->
  <rect x="420" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="455" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'A'</text>
  <text x="455" y="128" text-anchor="middle" font-size="12" fill="#555">4</text>

  <!-- Index 5: C (keep) -->
  <rect x="490" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="525" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'C'</text>
  <text x="525" y="128" text-anchor="middle" font-size="12" fill="#555">5</text>

  <!-- Index 6: G (keep) -->
  <rect x="560" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="595" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'G'</text>
  <text x="595" y="128" text-anchor="middle" font-size="12" fill="#555">6</text>

  <!-- Index 7: A (skip) -->
  <rect x="630" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="665" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'A'</text>
  <text x="665" y="128" text-anchor="middle" font-size="12" fill="#555">7</text>

  <!-- Index label -->
  <text x="720" y="128" font-size="11" fill="#555" font-style="italic">index</text>

  <!-- ===== Arrows from each cell straight down to the function box =====
       Cell bottoms y=110, labels y=128; arrow starts y=142.
       Function box top y=270; arrow ends y=268 (just above top edge).
       Each arrow is purely vertical: x stays at the cell centre.
       +1 / — labels sit at y=200, centred on the arrow's x.
  -->

  <!-- 0: A skip (grey) -->
  <line x1="175" y1="142" x2="175" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="175" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- 1: C keep (green) -->
  <line x1="245" y1="142" x2="245" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="245" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 2: G keep (green) -->
  <line x1="315" y1="142" x2="315" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="315" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 3: T skip (grey) -->
  <line x1="385" y1="142" x2="385" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="385" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- 4: A skip (grey) -->
  <line x1="455" y1="142" x2="455" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="455" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- 5: C keep (green) -->
  <line x1="525" y1="142" x2="525" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="525" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 6: G keep (green) -->
  <line x1="595" y1="142" x2="595" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="595" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 7: A skip (grey) -->
  <line x1="665" y1="142" x2="665" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="665" y="204" text-anchor="middle" font-size="14" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- ===== Function box (widened to span all 8 cell centres) ===== -->
  <rect x="140" y="270" width="580" height="100" rx="8" ry="8"
        fill="#e3f2fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="430" y="293" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">
    loop body: check &amp; maybe increment gc
  </text>
  <text x="430" y="324" text-anchor="middle" font-size="15"
        font-family="ui-monospace, monospace" fill="#222">
    if b == b'G' || b == b'C' {
  </text>
  <text x="430" y="346" text-anchor="middle" font-size="15"
        font-family="ui-monospace, monospace" fill="#222">
        gc += 1;
  </text>
  <text x="430" y="368" text-anchor="middle" font-size="15"
        font-family="ui-monospace, monospace" fill="#222">
    }
  </text>

  <!-- ===== Accumulator panel (below the function box) =====
       Layout (centred around x=450):
         label "accumulator" at top, then a horizontal row:
           "gc"   [filled box]   "= 4"   small caption
  -->
  <text x="450" y="402" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">
    accumulator
  </text>

  <!-- "gc" label -->
  <text x="345" y="450" text-anchor="end" font-size="22" font-weight="700" fill="#1b5e20"
        font-family="ui-monospace, monospace">gc</text>

  <!-- gc box: outer frame at x=360, y=420, w=120, h=40. Filled 4/8 -> left half -->
  <rect x="360" y="420" width="120" height="40" fill="white" stroke="#2e7d32" stroke-width="1.5"/>
  <rect x="360" y="420" width="60" height="40" fill="#a5d6a7" stroke="none"/>
  <!-- midline at x=420 -->
  <line x1="420" y1="420" x2="420" y2="460" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- final value -->
  <text x="495" y="450" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">= 4</text>

  <!-- caption tying it together -->
  <text x="560" y="442" font-size="12" fill="#555">four +1s from</text>
  <text x="560" y="458" font-size="12" fill="#555">the green cells</text>

  <!-- ===== Footer ===== -->
  <text x="450" y="505" text-anchor="middle" font-size="13" fill="#333">
    The pattern `&amp;b` destructures the `&amp;u8` yielded by iteration into a `u8` you can compare directly.
  </text>
  <text x="450" y="528" text-anchor="middle" font-size="11" fill="#777" font-style="italic">
    Green arrows: body took the +1 branch.  Grey arrows: condition was false, gc unchanged.
  </text>

</svg>
