<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="17" font-weight="600">
    Each byte of seq: &amp;[u8] flows through the loop body
  </text>

  <!-- ===== Top: horizontal array of 8 bytes =====
       Cells start at x=140, width=70, y=60, h=50
       Contents: A C G T A C G A (indices 0..7)
       G/C at indices 1, 2, 5, 6 (kept)
       A/T at indices 0, 3, 4, 7 (skipped)
  -->

  <!-- seq label on the left -->
  <text x="130" y="92" text-anchor="end" font-size="14"
        font-family="ui-monospace, monospace" font-weight="700">seq:</text>
  <text x="130" y="108" text-anchor="end" font-size="11" fill="#555">&amp;[u8]</text>

  <!-- helper: each cell is 70 wide, 50 tall, starting at x=140, y=60 -->
  <!-- Index 0: A (skip) -->
  <rect x="140" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="175" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'A'</text>
  <text x="175" y="128" text-anchor="middle" font-size="12" fill="#555">0</text>

  <!-- Index 1: C (keep) -->
  <rect x="210" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="245" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'C'</text>
  <text x="245" y="128" text-anchor="middle" font-size="12" fill="#555">1</text>

  <!-- Index 2: G (keep) -->
  <rect x="280" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="315" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'G'</text>
  <text x="315" y="128" text-anchor="middle" font-size="12" fill="#555">2</text>

  <!-- Index 3: T (skip) -->
  <rect x="350" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="385" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'T'</text>
  <text x="385" y="128" text-anchor="middle" font-size="12" fill="#555">3</text>

  <!-- Index 4: A (skip) -->
  <rect x="420" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="455" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'A'</text>
  <text x="455" y="128" text-anchor="middle" font-size="12" fill="#555">4</text>

  <!-- Index 5: C (keep) -->
  <rect x="490" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="525" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'C'</text>
  <text x="525" y="128" text-anchor="middle" font-size="12" fill="#555">5</text>

  <!-- Index 6: G (keep) -->
  <rect x="560" y="60" width="70" height="50" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="595" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">b'G'</text>
  <text x="595" y="128" text-anchor="middle" font-size="12" fill="#555">6</text>

  <!-- Index 7: A (skip) -->
  <rect x="630" y="60" width="70" height="50" fill="white" stroke="#888"/>
  <text x="665" y="93" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#666">b'A'</text>
  <text x="665" y="128" text-anchor="middle" font-size="12" fill="#555">7</text>

  <!-- Index label -->
  <text x="720" y="128" font-size="11" fill="#555" font-style="italic">index</text>

  <!-- ===== Arrows from each cell down to the function box =====
       Cell centres: 175, 245, 315, 385, 455, 525, 595, 665 (y=110 at bottom)
       Target: function box at x=110..560, y=270..360. Top edge y=270.
       We aim arrows toward a horizontal line near y=268 (just above the box top).
       Use different fan-in x targets along the top edge of the box for clarity.
  -->

  <!-- 0: A skip (grey) -->
  <line x1="175" y1="142" x2="170" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="155" y="200" font-size="13" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- 1: C keep (green) -->
  <line x1="245" y1="142" x2="220" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="216" y="200" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 2: G keep (green) -->
  <line x1="315" y1="142" x2="280" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="278" y="200" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 3: T skip (grey) -->
  <line x1="385" y1="142" x2="335" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="338" y="200" font-size="13" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- 4: A skip (grey) -->
  <line x1="455" y1="142" x2="390" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="398" y="200" font-size="13" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- 5: C keep (green) -->
  <line x1="525" y1="142" x2="445" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="460" y="200" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 6: G keep (green) -->
  <line x1="595" y1="142" x2="500" y2="268"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#arrow-green)"/>
  <text x="522" y="200" font-size="13" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">+1</text>

  <!-- 7: A skip (grey) -->
  <line x1="665" y1="142" x2="555" y2="268"
        stroke="#888" stroke-width="1.8" marker-end="url(#arrow-grey)"/>
  <text x="582" y="200" font-size="13" font-weight="700" fill="#888"
        font-family="ui-monospace, monospace">&#8212;</text>

  <!-- ===== Function box ===== -->
  <rect x="110" y="270" width="500" height="100" rx="8" ry="8"
        fill="#e3f2fd" stroke="#5b9bd5" stroke-width="1.5"/>
  <text x="360" y="293" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">
    loop body: check &amp; maybe increment gc
  </text>
  <text x="130" y="324" font-size="15" font-family="ui-monospace, monospace" fill="#222">
    if b == b'G' || b == b'C' {
  </text>
  <text x="130" y="346" font-size="15" font-family="ui-monospace, monospace" fill="#222">
        gc += 1;
  </text>
  <text x="130" y="368" font-size="15" font-family="ui-monospace, monospace" fill="#222">
    }
  </text>

  <!-- ===== Accumulator panel (right of function box) ===== -->
  <text x="720" y="263" text-anchor="middle" font-size="13" font-weight="600" fill="#1b5e20">
    accumulator
  </text>

  <!-- gc box: an outer frame, partially filled bottom-up.
       Frame: x=685, y=270, w=70, h=100. We're showing 4 of 8 -> half full -->
  <rect x="685" y="270" width="70" height="100" fill="white" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- filled portion (bottom half) -->
  <rect x="685" y="320" width="70" height="50" fill="#a5d6a7" stroke="none"/>
  <!-- midline -->
  <line x1="685" y1="320" x2="755" y2="320" stroke="#2e7d32" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="720" y="350" text-anchor="middle" font-size="22" font-weight="700" fill="#1b5e20"
        font-family="ui-monospace, monospace">gc</text>

  <!-- final value below -->
  <text x="720" y="392" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">gc = 4</text>

  <!-- A small caption tying it together -->
  <text x="800" y="324" text-anchor="middle" font-size="12" fill="#555">
    four +1s
  </text>
  <text x="800" y="340" text-anchor="middle" font-size="12" fill="#555">
    from the
  </text>
  <text x="800" y="356" text-anchor="middle" font-size="12" fill="#555">
    green cells
  </text>

  <!-- ===== Footer ===== -->
  <text x="450" y="438" text-anchor="middle" font-size="13" fill="#333">
    The pattern `&amp;b` destructures the `&amp;u8` yielded by iteration into a `u8` you can compare directly.
  </text>
  <text x="450" y="462" text-anchor="middle" font-size="11" fill="#777" font-style="italic">
    Green arrows: body took the +1 branch.  Grey arrows: condition was false, gc unchanged.
  </text>

</svg>
