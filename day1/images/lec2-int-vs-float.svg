  <!-- exponent bracket -->
  <line x1="38.5" y1="247" x2="132" y2="247" stroke="#2e7d32" stroke-width="1"/>
  <text x="85.25" y="263" text-anchor="middle" font-size="12" fill="#2e7d32">
    exponent (11 bits)
  </text>

  <!-- mantissa bracket -->
  <line x1="132" y1="247" x2="574" y2="247" stroke="#b85461" stroke-width="1"/>
  <text x="353" y="263" text-anchor="middle" font-size="12" fill="#b85461">
    mantissa (52 bits)
  </text>

  <!-- Range to the right -->
  <text x="595" y="220" font-size="14" font-weight="600" fill="#333">
    Range: ~&#177;1.8 &#215; 10&#179;&#8304;&#8312;
  </text>
  <text x="595" y="238" font-size="12" fill="#555">
    ~15&#8211;17 decimal digits of precision
  </text>
  <text x="595" y="264" font-size="12" fill="#b85461">
    Fractional values, but not exact &#8212;
  </text>
  <text x="595" y="280" font-size="12" font-family="ui-monospace, monospace" fill="#b85461">
    0.1 + 0.2 &#8800; 0.3 in f64.
  </text>

  <!-- ===== Comparison box ===== -->
  <rect x="60" y="330" width="780" height="120" fill="#f8f9fa" stroke="#bbb" stroke-width="1.5" rx="6"/>

  <text x="80" y="370" font-size="18" font-family="ui-monospace, monospace">
    <tspan fill="#1565c0">let n: i64 =</tspan> 1_000_000_000_000;
    <tspan fill="#2e7d32">     // exact</tspan>
  </text>
  <text x="80" y="410" font-size="18" font-family="ui-monospace, monospace">
    <tspan fill="#b45309">let g: f64 =</tspan> 0.42;
    <tspan fill="#b85461">                 // approximate</tspan>
  </text>
  <text x="80" y="438" font-size="13" fill="#555">
    Both occupy 8 bytes &#8212; the bit layout is what differs.
  </text>

