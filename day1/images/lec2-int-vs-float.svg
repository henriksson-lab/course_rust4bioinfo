  <!-- Sign bit label (above) -->
  <line x1="34.25" y1="70" x2="34.25" y2="118" stroke="#888" stroke-width="0.7"/>
  <text x="34.25" y="135" text-anchor="middle" font-size="11" fill="#b45309">sign</text>

  <!-- magnitude bracket label -->
  <line x1="38.5"  y1="112" x2="574" y2="112" stroke="#1565c0" stroke-width="1"/>
  <text x="306" y="128" text-anchor="middle" font-size="13" fill="#1565c0">
    magnitude (63 bits, two's complement)
  </text>

  <!-- Range and annotation to the right -->
  <text x="595" y="84" font-size="14" font-weight="600" fill="#333">
    Range: &#177;9.2 &#215; 10&#185;&#8312;
  </text>
  <text x="595" y="102" font-size="12" fill="#555">
    (&#8776; &#177;9 quintillion)
  </text>
  <text x="595" y="128" font-size="12" fill="#2e7d32">
    Exact integer values. No fractions.
  </text>

  <!-- ===== Bottom ribbon: f64 ===== -->
  <text x="30" y="190" font-size="20" font-weight="700">
    <tspan font-family="ui-monospace, monospace" fill="#b45309">f64</tspan>
    <tspan font-weight="400" fill="#333"> — IEEE 754 double</tspan>
  </text>

  <!-- Sign bit cell -->
  <rect x="30" y="205" width="8.5" height="36" fill="#fff3cd" stroke="#888" stroke-width="0.5"/>
  <!-- Exponent: 11 cells, light green -->
