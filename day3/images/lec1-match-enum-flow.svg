<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arr-faded" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="600">
    match on an enum — first matching arm wins
  </text>

  <!-- Input value at top (pill terminator) -->
  <rect x="370" y="55" width="240" height="40" rx="20" ry="20"
        fill="#eeeeee" stroke="#888"/>
  <text x="490" y="81" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace">value: Strand</text>

  <!-- arrow down from value into the column -->
  <line x1="490" y1="95" x2="490" y2="120"
        stroke="#555" stroke-width="2" marker-end="url(#arr-grey)"/>

  <!-- ===== Side note on the LEFT ===== -->
  <rect x="30" y="130" width="260" height="100" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="160" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#7c4a00">
    compile-time guarantee
  </text>
  <text x="44" y="178" font-size="13" fill="#333">
    the compiler checks all variants
  </text>
  <text x="44" y="196" font-size="13" fill="#333">
    are covered — exhaustiveness —
  </text>
  <text x="44" y="214" font-size="13" fill="#333">
    at compile time.
  </text>

  <!-- ===== Three arms: pattern -> result rows ===== -->
  <!-- Geometry: pattern cell x=320..540 (w=220), result cell x=600..700 (w=100), row centres y=140, 220, 300 -->

  <!-- Row 1: Strand::Plus -> 1  (MATCHED, green) -->
  <rect x="320" y="120" width="220" height="40" rx="6" ry="6"
        fill="#fff8dc" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="430" y="146" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">Strand::Plus</text>
  <!-- input arrow GREEN landing on this row -->
  <line x1="490" y1="120" x2="540" y2="140"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <!-- pattern -> result, green -->
  <line x1="540" y1="140" x2="600" y2="140"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <rect x="600" y="120" width="100" height="40" rx="6" ry="6"
        fill="#e3f2fd" stroke="#2e7d32" stroke-width="2.5"/>
  <text x="650" y="147" text-anchor="middle" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>
  <text x="715" y="135" font-size="13" font-weight="700" fill="#2e7d32">match!</text>
  <text x="715" y="153" font-size="12" fill="#2e7d32">return this value</text>

  <!-- Row 2: Strand::Minus -> -1  (faded) -->
  <rect x="320" y="200" width="220" height="40" rx="6" ry="6"
        fill="#fff8dc" stroke="#bbb" opacity="0.55"/>
  <text x="430" y="226" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace" fill="#888">Strand::Minus</text>
  <!-- faded input arrow -->
  <line x1="490" y1="120" x2="540" y2="220"
        stroke="#bbb" stroke-width="1.5" marker-end="url(#arr-faded)"/>
  <!-- red text "x" marker on pattern -->
  <text x="305" y="227" text-anchor="middle" font-size="20" font-weight="700"
        fill="#c62828" font-family="ui-monospace, monospace">x</text>
  <rect x="600" y="200" width="100" height="40" rx="6" ry="6"
        fill="#e3f2fd" stroke="#bbb" opacity="0.45"/>
  <text x="650" y="226" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace" fill="#888">-1</text>
  <text x="715" y="225" font-size="12" fill="#888">not chosen</text>

  <!-- Row 3: Strand::Unknown -> 0  (faded) -->
  <rect x="320" y="280" width="220" height="40" rx="6" ry="6"
        fill="#fff8dc" stroke="#bbb" opacity="0.55"/>
  <text x="430" y="306" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace" fill="#888">Strand::Unknown</text>
  <line x1="490" y1="120" x2="540" y2="300"
        stroke="#bbb" stroke-width="1.5" marker-end="url(#arr-faded)"/>
  <text x="305" y="307" text-anchor="middle" font-size="20" font-weight="700"
        fill="#c62828" font-family="ui-monospace, monospace">x</text>
  <rect x="600" y="280" width="100" height="40" rx="6" ry="6"
        fill="#e3f2fd" stroke="#bbb" opacity="0.45"/>
  <text x="650" y="306" text-anchor="middle" font-size="16"
        font-family="ui-monospace, monospace" fill="#888">0</text>
  <text x="715" y="305" font-size="12" fill="#888">not chosen</text>

  <!-- arrow from the green result box down to the output terminator -->
  <path d="M 650 160 L 650 380 L 720 380 L 720 405"
        fill="none" stroke="#2e7d32" stroke-width="2.2"
        marker-end="url(#arr-green)"/>

  <!-- ===== Output terminator (bottom right) ===== -->
  <rect x="540" y="410" width="350" height="48" rx="24" ry="24"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="715" y="432" text-anchor="middle" font-size="14">
    result of match expression =
  </text>
  <text x="715" y="450" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>

  <!-- Footnote / code reminder -->
  <text x="30" y="430" font-size="13" fill="#555" font-family="ui-monospace, monospace">
    match strand {
  </text>
  <text x="30" y="448" font-size="13" fill="#555" font-family="ui-monospace, monospace">
    &#160;&#160;Plus =&gt; 1, Minus =&gt; -1, Unknown =&gt; 0,
  </text>
  <text x="30" y="466" font-size="13" fill="#555" font-family="ui-monospace, monospace">
    }
  </text>

</svg>
