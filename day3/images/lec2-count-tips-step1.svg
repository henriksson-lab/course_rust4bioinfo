<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- ===== Title / caption ===== -->
  <text x="360" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    count_tips, step 1 of 4
  </text>
  <text x="360" y="56" text-anchor="middle" font-size="16" fill="#555">
    Start: the tree, no counts yet.
  </text>

  <!-- ===== Tree panel (left) ===== -->
  <rect x="20" y="80" width="380" height="400" rx="6" ry="6"
        fill="#fafafa" stroke="#bbb"/>
  <text x="32" y="100" font-size="14" font-weight="700" fill="#333">tree</text>

  <!-- Edges (drawn first so nodes sit on top).
       Root (240,150)  -> AB (160,260)  branch length 0.3
       Root (240,150)  -> C  (340,380)  branch length 0.5
       AB   (160,260)  -> A  ( 90,380)  branch length 0.1
       AB   (160,260)  -> B  (220,380)  branch length 0.2
  -->
  <g stroke="#555" stroke-width="2" fill="none">
    <line x1="240" y1="150" x2="160" y2="260"/>
    <line x1="240" y1="150" x2="340" y2="380"/>
    <line x1="160" y1="260" x2="90"  y2="380"/>
    <line x1="160" y1="260" x2="220" y2="380"/>
  </g>

  <!-- Branch length labels -->
  <g font-family="ui-monospace, monospace" font-size="13" fill="#777">
    <text x="188" y="200" text-anchor="middle">0.3</text>
    <text x="298" y="260" text-anchor="middle">0.5</text>
    <text x="113" y="325" text-anchor="middle">0.1</text>
    <text x="200" y="325" text-anchor="middle">0.2</text>
  </g>

  <!-- Root node (internal, neutral / orange) -->
  <circle cx="240" cy="150" r="20" fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="240" y="155" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5a07">
    Root
  </text>

  <!-- Internal AB -->
  <circle cx="160" cy="260" r="20" fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="160" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="#8a5a07">
    AB
  </text>

  <!-- Leaf A -->
  <circle cx="90" cy="380" r="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="90" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
    A
  </text>

  <!-- Leaf B -->
  <circle cx="220" cy="380" r="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="220" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
    B
  </text>

  <!-- Leaf C -->
  <circle cx="340" cy="380" r="20" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="340" y="385" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
    C
  </text>

  <!-- Legend below the tree -->
  <g font-size="12" fill="#555">
    <circle cx="50" cy="448" r="7" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.4"/>
    <text x="64" y="452">Leaf</text>
    <circle cx="120" cy="448" r="7" fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
    <text x="134" y="452">Internal</text>
  </g>

  <!-- ===== Calculation log panel (right) ===== -->
  <rect x="420" y="80" width="280" height="400" rx="6" ry="6"
        fill="white" stroke="#bbb"/>
  <text x="432" y="100" font-size="14" font-weight="700" fill="#333">calculation</text>

  <!-- empty placeholder line -->
  <text x="560" y="280" text-anchor="middle" font-size="14" fill="#888"
        font-style="italic">
    (no calls evaluated yet)
  </text>

</svg>
