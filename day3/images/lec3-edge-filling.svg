<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-gap" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b45309"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="17" font-weight="600">
    Row 0 and column 0 — the base cases (aligning a prefix against empty)
  </text>
  <text x="380" y="45" text-anchor="middle" font-size="14" fill="#555">
    a = "ACGT", b = "ACT"; gap = −1
  </text>

  <!-- ===== Matrix grid (origin 60,60, cell 55x50) ===== -->

  <!-- Column header band (b's letters): cells at cols 2..4 of grid -->
  <rect x="115" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="170" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="225" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="280" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <text x="142.5" y="92" text-anchor="middle" font-size="15" fill="#555">ε</text>
  <text x="197.5" y="92" text-anchor="middle" font-size="16" font-weight="700">A</text>
  <text x="252.5" y="92" text-anchor="middle" font-size="16" font-weight="700">C</text>
  <text x="307.5" y="92" text-anchor="middle" font-size="16" font-weight="700">T</text>

  <!-- Row header band (a's letters): cells at rows 2..6 of grid -->
  <rect x="60" y="110" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="160" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="210" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="260" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="310" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <text x="87.5" y="142" text-anchor="middle" font-size="15" fill="#555">ε</text>
  <text x="87.5" y="192" text-anchor="middle" font-size="16" font-weight="700">A</text>
  <text x="87.5" y="242" text-anchor="middle" font-size="16" font-weight="700">C</text>
  <text x="87.5" y="292" text-anchor="middle" font-size="16" font-weight="700">G</text>
  <text x="87.5" y="342" text-anchor="middle" font-size="16" font-weight="700">T</text>

  <!-- Empty corner cell -->
  <rect x="60" y="60" width="55" height="50" fill="#f5f5f5" stroke="#bbb"/>

  <!-- ===== Score cells ===== -->

  <!-- Row 0 (a = ε): 0, -1, -2, -3 — filled yellow base case -->
  <rect x="115" y="110" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <rect x="170" y="110" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <rect x="225" y="110" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <rect x="280" y="110" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <text x="142.5" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">0</text>
  <text x="197.5" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">−1</text>
  <text x="252.5" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">−2</text>
  <text x="307.5" y="141" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">−3</text>

  <!-- Column 0 (b = ε): -1, -2, -3, -4 — filled yellow base case
       (corner cell (0,0) already filled above as part of row 0) -->
  <rect x="115" y="160" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <rect x="115" y="210" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <rect x="115" y="260" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <rect x="115" y="310" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <text x="142.5" y="191" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">−1</text>
  <text x="142.5" y="241" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">−2</text>
  <text x="142.5" y="291" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">−3</text>
  <text x="142.5" y="341" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">−4</text>

  <!-- Interior cells (rows 1..4, cols 1..3): blank, light grey -->
  <rect x="170" y="160" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="225" y="160" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="280" y="160" width="55" height="50" fill="#fafafa" stroke="#bbb"/>

  <rect x="170" y="210" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="225" y="210" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="280" y="210" width="55" height="50" fill="#fafafa" stroke="#bbb"/>

  <rect x="170" y="260" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="225" y="260" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="280" y="260" width="55" height="50" fill="#fafafa" stroke="#bbb"/>

  <rect x="170" y="310" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="225" y="310" width="55" height="50" fill="#fafafa" stroke="#bbb"/>
  <rect x="280" y="310" width="55" height="50" fill="#fafafa" stroke="#bbb"/>

  <!-- "?" placeholder in one interior cell -->
  <text x="197.5" y="197" text-anchor="middle" font-size="22" fill="#aaa" font-weight="700">?</text>

  <!-- Label "score for empty vs empty = 0" pointing at (0,0) corner cell -->
  <line x1="200" y1="100" x2="158" y2="125"
        stroke="#b45309" stroke-width="1.5" fill="none"/>
  <text x="205" y="98" font-size="13" fill="#b45309">
    score for empty vs empty = 0
  </text>

  <!-- Rightward arrow above row 0, with "−1 per gap" label -->
  <line x1="200" y1="50" x2="305" y2="50"
        stroke="#b45309" stroke-width="2" marker-end="url(#arrow-gap)"/>
  <text x="252.5" y="45" text-anchor="middle" font-size="13" fill="#b45309" font-weight="600">
    −1 per gap
  </text>

  <!-- Downward arrow left of column 0, with "−1 per gap" label -->
  <line x1="48" y1="180" x2="48" y2="335"
        stroke="#b45309" stroke-width="2" marker-end="url(#arrow-gap)"/>
  <text x="42" y="260" text-anchor="middle" font-size="13" fill="#b45309" font-weight="600"
        transform="rotate(-90 42 260)">
    −1 per gap
  </text>

  <!-- ===== Right-hand panel: explanations ===== -->
  <text x="360" y="135" font-size="15" font-weight="600">
    Column 0  (j = 0):
  </text>
  <text x="360" y="156" font-size="13" fill="#333">
    align a[..i] against empty b
  </text>
  <text x="360" y="174" font-size="13" fill="#333">
    → i gaps → score = i × (−1) = −i
  </text>

  <text x="360" y="215" font-size="15" font-weight="600">
    Row 0  (i = 0):
  </text>
  <text x="360" y="236" font-size="13" fill="#333">
    align empty a against b[..j]
  </text>
  <text x="360" y="254" font-size="13" fill="#333">
    → j gaps → score = j × (−1) = −j
  </text>

  <text x="360" y="295" font-size="14" font-weight="600" fill="#555">
    Interior cells
  </text>
  <text x="360" y="316" font-size="13" fill="#555">
    (filled by the recurrence on
  </text>
  <text x="360" y="334" font-size="13" fill="#555">
    the next slide)
  </text>

  <!-- ===== Footer ===== -->
  <text x="380" y="405" text-anchor="middle" font-size="13" fill="#333">
    Once these edges are filled, every interior cell can be computed from its three
  </text>
  <text x="380" y="425" text-anchor="middle" font-size="13" fill="#333">
    already-computed neighbours (the recurrence on the next slide).
  </text>

</svg>
