<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    max_depth, step 4 of 4
  </text>
  <text x="360" y="52" text-anchor="middle" font-size="14" fill="#555">
    root collects the deepest path
  </text>

  <!-- ===== Tree panel ===== -->
  <rect x="20" y="70" width="420" height="370" rx="6" ry="6"
        fill="#fafafa" stroke="#bbb" stroke-width="1.2"/>
  <text x="32" y="90" font-size="14" font-weight="700" fill="#555">tree</text>

  <!-- Edges (branches); both root children are tied so both green -->
  <line x1="220" y1="95" x2="220" y2="115" stroke="#666" stroke-width="2"/>
  <line x1="220" y1="115" x2="140" y2="220" stroke="#2e7d32" stroke-width="2.6"/>
  <line x1="220" y1="115" x2="320" y2="220" stroke="#2e7d32" stroke-width="2.6"/>
  <line x1="140" y1="220" x2="80" y2="330" stroke="#bbb" stroke-width="2"/>
  <line x1="140" y1="220" x2="200" y2="330" stroke="#2e7d32" stroke-width="2.6"/>

  <!-- Branch length labels -->
  <g font-family="ui-monospace, monospace" font-size="14" fill="#333">
    <text x="160" y="166" text-anchor="end" fill="#1b5e20" font-weight="700">0.3</text>
    <text x="280" y="166" text-anchor="start" fill="#1b5e20" font-weight="700">0.5</text>
    <text x="92" y="280" text-anchor="end" fill="#888">0.1</text>
    <text x="188" y="280" text-anchor="start" fill="#1b5e20" font-weight="700">0.2</text>
  </g>

  <!-- Root node (now computed: green badge) -->
  <circle cx="220" cy="115" r="12" fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="220" y="106" text-anchor="middle" font-size="13" fill="#8a5a07" font-weight="700">root</text>
  <!-- Green badge for root: 0.5 -->
  <rect x="244" y="104" width="56" height="24" rx="12" ry="12"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.4"/>
  <text x="272" y="121" text-anchor="middle" font-size="14" font-weight="700" fill="white"
        font-family="ui-monospace, monospace">0.5</text>

  <!-- AB internal node -->
  <circle cx="140" cy="220" r="12" fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="123" y="225" text-anchor="end" font-size="13" fill="#8a5a07" font-weight="700">AB</text>
  <rect x="100" y="194" width="44" height="22" rx="11" ry="11"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.2"/>
  <text x="122" y="210" text-anchor="middle" font-size="13" font-weight="700" fill="white"
        font-family="ui-monospace, monospace">0.5</text>

  <!-- Leaf A -->
  <rect x="62" y="335" width="36" height="26" rx="4" ry="4"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4"/>
  <text x="80" y="353" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">A</text>
  <rect x="58" y="368" width="44" height="22" rx="11" ry="11"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.2"/>
  <text x="80" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="white"
        font-family="ui-monospace, monospace">0.1</text>

  <!-- Leaf B -->
  <rect x="182" y="335" width="36" height="26" rx="4" ry="4"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4"/>
  <text x="200" y="353" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">B</text>
  <rect x="178" y="368" width="44" height="22" rx="11" ry="11"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.2"/>
  <text x="200" y="384" text-anchor="middle" font-size="13" font-weight="700" fill="white"
        font-family="ui-monospace, monospace">0.2</text>

  <!-- Leaf C -->
  <rect x="302" y="225" width="36" height="26" rx="4" ry="4"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.4"/>
  <text x="320" y="243" text-anchor="middle" font-size="15" font-weight="700" fill="#0d47a1">C</text>
  <rect x="346" y="228" width="44" height="22" rx="11" ry="11"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.2"/>
  <text x="368" y="244" text-anchor="middle" font-size="13" font-weight="700" fill="white"
        font-family="ui-monospace, monospace">0.5</text>

  <!-- Final answer banner inside tree panel -->
  <rect x="40" y="405" width="380" height="28" rx="6" ry="6"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="230" y="425" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20"
        font-family="ui-monospace, monospace">
    deepest leaf = 0.5
  </text>

  <!-- ===== Calculation panel ===== -->
  <rect x="460" y="70" width="240" height="370" rx="6" ry="6"
        fill="#fafafa" stroke="#bbb" stroke-width="1.2"/>
  <text x="472" y="90" font-size="14" font-weight="700" fill="#555">calculation</text>

  <g font-family="ui-monospace, monospace" font-size="12" fill="#888">
    <text x="472" y="112">max_depth(Leaf A) = 0.1</text>
    <text x="472" y="130">max_depth(Leaf B) = 0.2</text>
    <text x="472" y="148">max_depth(Leaf C) = 0.5</text>
    <text x="472" y="172">max_depth(Internal AB)</text>
    <text x="490" y="188">= 0.3 + max(0.1, 0.2)</text>
    <text x="490" y="204">= 0.5</text>
  </g>

  <line x1="472" y1="222" x2="688" y2="222" stroke="#ddd" stroke-width="1"/>

  <!-- Highlighted final result -->
  <rect x="466" y="232" width="228" height="108" rx="6" ry="6"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.6"/>
  <g font-family="ui-monospace, monospace" font-size="13" fill="#1b5e20">
    <text x="476" y="254" font-weight="700">max_depth(Root)</text>
    <text x="494" y="276" font-weight="700">= 0.0 + max(0.5, 0.5)</text>
    <text x="494" y="296" font-weight="700">= 0.0 + 0.5</text>
    <text x="494" y="324" font-weight="700" font-size="16">= 0.5</text>
  </g>

  <!-- ===== Caption ===== -->
  <rect x="20" y="450" width="680" height="40" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.3"/>
  <text x="360" y="476" text-anchor="middle" font-size="16" font-weight="600" fill="#8a5a07">
    Three paths tie at 0.5 — every leaf is the same total distance from the root.
  </text>

</svg>
