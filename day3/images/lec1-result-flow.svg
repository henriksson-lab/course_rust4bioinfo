<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arr-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="600">
    Result&lt;T, E&gt; — every call has two outcomes
  </text>

  <!-- ===== Top process box: parse(input) ===== -->
  <rect x="300" y="55" width="300" height="56" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="78" text-anchor="middle" font-size="15"
        font-family="ui-monospace, monospace" fill="#0d47a1">let x = parse(input);</text>
  <text x="450" y="98" text-anchor="middle" font-size="12" fill="#555">
    returns Result&lt;u32, ParseError&gt;
  </text>

  <!-- arrow down to diamond -->
  <line x1="450" y1="111" x2="450" y2="135"
        stroke="#555" stroke-width="2" marker-end="url(#arr-grey)"/>

  <!-- ===== Diamond: which variant? ===== -->
  <polygon points="450,138 620,210 450,282 280,210"
           fill="#fff8dc" stroke="#888" stroke-width="1.5"/>
  <text x="450" y="205" text-anchor="middle" font-size="15"
        font-family="ui-monospace, monospace">what is the</text>
  <text x="450" y="225" text-anchor="middle" font-size="15"
        font-family="ui-monospace, monospace">variant?</text>

  <!-- ===== Right arrow: Ok(value) ===== -->
  <line x1="620" y1="210" x2="700" y2="210"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arr-green)"/>
  <text x="660" y="200" text-anchor="middle" font-size="13" font-weight="700"
        fill="#2e7d32" font-family="ui-monospace, monospace">Ok(value)</text>

  <!-- Right (Ok) box -->
  <rect x="700" y="180" width="180" height="60" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="790" y="204" text-anchor="middle" font-size="13" fill="#1b5e20" font-weight="700">
    use value in the
  </text>
  <text x="790" y="222" text-anchor="middle" font-size="13" fill="#1b5e20" font-weight="700">
    next computation
  </text>

  <!-- arrow from Ok box down to rest-of-function -->
  <line x1="790" y1="240" x2="790" y2="275"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- rest of function -->
  <rect x="700" y="278" width="180" height="40" rx="20" ry="20"
        fill="#eeeeee" stroke="#888"/>
  <text x="790" y="303" text-anchor="middle" font-size="13" fill="#333">
    rest of function
  </text>

  <!-- ===== Left arrow: Err(e) ===== -->
  <line x1="280" y1="210" x2="200" y2="210"
        stroke="#c62828" stroke-width="2.5" marker-end="url(#arr-red)"/>
  <text x="240" y="200" text-anchor="middle" font-size="13" font-weight="700"
        fill="#c62828" font-family="ui-monospace, monospace">Err(e)</text>

  <!-- Left (Err) box: handle or propagate -->
  <rect x="20" y="180" width="180" height="60" rx="8" ry="8"
        fill="#ffebee" stroke="#c62828" stroke-width="1.5"/>
  <text x="110" y="204" text-anchor="middle" font-size="13" fill="#c62828" font-weight="700">
    handle or propagate
  </text>
  <text x="110" y="224" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    two common choices below
  </text>

  <!-- arrow from Err box down to sub-options -->
  <line x1="110" y1="240" x2="110" y2="270"
        stroke="#c62828" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- sub-option 1: return early with ? -->
  <rect x="20" y="275" width="260" height="50" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.2"/>
  <text x="32" y="293" font-size="12" font-weight="700" fill="#7c4a00">
    return early with
    <tspan font-family="ui-monospace, monospace" fill="#0d47a1">?</tspan>
  </text>
  <text x="32" y="310" font-size="11" fill="#555">
    let the caller deal with it
  </text>
  <text x="32" y="322" font-size="11" font-family="ui-monospace, monospace" fill="#555">
    let v = parse(input)?;
  </text>

  <!-- sub-option 2: match -->
  <rect x="20" y="335" width="260" height="50" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.2"/>
  <text x="32" y="353" font-size="12" font-weight="700" fill="#7c4a00">
    match on the variant
  </text>
  <text x="32" y="370" font-size="11" fill="#555">
    report a friendly message
  </text>
  <text x="32" y="382" font-size="11" font-family="ui-monospace, monospace" fill="#555">
    eprintln!("bad input: {e}");
  </text>

  <!-- ===== Side note (bottom, full width) ===== -->
  <rect x="20" y="410" width="860" height="74" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="435" text-anchor="middle" font-size="14" font-weight="700" fill="#7c4a00">
    compared to Python's exceptions, Rust makes the error part of the return type
  </text>
  <text x="450" y="457" text-anchor="middle" font-size="14" fill="#333">
    — so the type system forces you to think about both paths.
  </text>
  <text x="450" y="476" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    no silent try/except wrapping the whole pipeline
  </text>

</svg>
