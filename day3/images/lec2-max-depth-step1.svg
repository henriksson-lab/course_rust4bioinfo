<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 500"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    max_depth, step 1 of 4
  </text>
  <text x="360" y="52" text-anchor="middle" font-size="14" fill="#555">
    tree: ((A:0.1, B:0.2):0.3, C:0.5);
  </text>

  <!-- ===== Tree panel ===== -->
  <rect x="20" y="70" width="420" height="370" rx="6" ry="6"
        fill="#fafafa" stroke="#bbb" stroke-width="1.2"/>
  <text x="32" y="90" font-size="14" font-weight="700" fill="#555">tree</text>

  <!-- Edges (branches) -->
  <!-- Root stub -->
  <line x1="220" y1="95" x2="220" y2="115" stroke="#666" stroke-width="2"/>

  <!-- Root -> AB (length 0.3) -->
  <line x1="220" y1="115" x2="140" y2="220" stroke="#666" stroke-width="2"/>
  <!-- Root -> C (length 0.5) -->
  <line x1="220" y1="115" x2="320" y2="220" stroke="#666" stroke-width="2"/>

  <!-- AB -> A (length 0.1) -->
  <line x1="140" y1="220" x2="80" y2="330" stroke="#666" stroke-width="2"/>
  <!-- AB -> B (length 0.2) -->
  <line x1="140" y1="220" x2="200" y2="330" stroke="#666" stroke-width="2"/>

  <!-- Branch length labels (monospace) -->
  <g font-family="ui-monospace, monospace" font-size="14" fill="#333">
    <!-- Root->AB: midpoint (180,168), label slightly left -->
    <text x="160" y="166" text-anchor="end">0.3</text>
    <!-- Root->C: midpoint (270,168), label slightly right -->
    <text x="280" y="166" text-anchor="start">0.5</text>
    <!-- AB->A: midpoint (110,275), label left -->
    <text x="92" y="280" text-anchor="end">0.1</text>
    <!-- AB->B: midpoint (170,275), label right -->
    <text x="188" y="280" text-anchor="start">0.2</text>
  </g>

  <!-- Root node (neutral) -->
  <circle cx="220" cy="115" r="11" fill="#f5f5f5" stroke="#666" stroke-width="1.6"/>
  <text x="220" y="106" text-anchor="middle" font-size="13" fill="#555" font-weight="600">root</text>

  <!-- AB internal node (neutral) -->
  <circle cx="140" cy="220" r="11" fill="#f5f5f5" stroke="#666" stroke-width="1.6"/>
  <text x="123" y="225" text-anchor="end" font-size="13" fill="#555" font-weight="600">AB</text>

  <!-- Leaf A (neutral) -->
  <rect x="62" y="335" width="36" height="26" rx="4" ry="4"
        fill="#f5f5f5" stroke="#666" stroke-width="1.4"/>
  <text x="80" y="353" text-anchor="middle" font-size="15" font-weight="700" fill="#333">A</text>

  <!-- Leaf B (neutral) -->
  <rect x="182" y="335" width="36" height="26" rx="4" ry="4"
        fill="#f5f5f5" stroke="#666" stroke-width="1.4"/>
  <text x="200" y="353" text-anchor="middle" font-size="15" font-weight="700" fill="#333">B</text>

  <!-- Leaf C (neutral) -->
  <rect x="302" y="225" width="36" height="26" rx="4" ry="4"
        fill="#f5f5f5" stroke="#666" stroke-width="1.4"/>
  <text x="320" y="243" text-anchor="middle" font-size="15" font-weight="700" fill="#333">C</text>

  <!-- ===== Calculation panel ===== -->
  <rect x="460" y="70" width="240" height="370" rx="6" ry="6"
        fill="#fafafa" stroke="#bbb" stroke-width="1.2"/>
  <text x="472" y="90" font-size="14" font-weight="700" fill="#555">calculation</text>

  <text x="580" y="250" text-anchor="middle" font-size="13" fill="#888" font-style="italic">
    (no calls yet)
  </text>

  <!-- ===== Caption ===== -->
  <rect x="20" y="450" width="680" height="40" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.3"/>
  <text x="360" y="476" text-anchor="middle" font-size="16" font-weight="600" fill="#8a5a07">
    Start: the tree with branch lengths.
  </text>

</svg>
