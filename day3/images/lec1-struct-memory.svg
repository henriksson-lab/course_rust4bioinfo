<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="sm-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    A struct in memory
  </text>
  <text x="450" y="50" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#555">
    struct GenomicInterval { chrom: String, start: u64, end: u64 }
  </text>

  <!-- ===== Stack region (left) ===== -->
  <text x="220" y="86" text-anchor="middle" font-size="18" font-weight="700" fill="#1565c0">
    Stack
  </text>
  <rect x="50" y="100" width="340" height="320" fill="#e3f2fd"
        stroke="#1565c0" stroke-dasharray="6,4" stroke-width="1.5" rx="4"/>

  <!-- Struct label -->
  <text x="220" y="128" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    iv: GenomicInterval
  </text>

  <!-- String header band: ptr / len / cap (3 x 8 bytes) -->
  <rect x="80" y="142" width="280" height="34" fill="white" stroke="#1565c0" stroke-width="1.2"/>
  <text x="92" y="164" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    chrom.ptr
  </text>
  <text x="352" y="164" text-anchor="end" font-size="12" fill="#888" font-style="italic">8 bytes</text>

  <rect x="80" y="176" width="280" height="34" fill="white" stroke="#888" stroke-width="1.2"/>
  <text x="92" y="198" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    chrom.len = 4
  </text>
  <text x="352" y="198" text-anchor="end" font-size="12" fill="#888" font-style="italic">8 bytes</text>

  <rect x="80" y="210" width="280" height="34" fill="white" stroke="#888" stroke-width="1.2"/>
  <text x="92" y="232" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    chrom.cap = 4
  </text>
  <text x="352" y="232" text-anchor="end" font-size="12" fill="#888" font-style="italic">8 bytes</text>

  <!-- start (u64) -->
  <rect x="80" y="252" width="280" height="34" fill="white" stroke="#888" stroke-width="1.2"/>
  <text x="92" y="274" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    start = 1000
  </text>
  <text x="352" y="274" text-anchor="end" font-size="12" fill="#888" font-style="italic">8 bytes</text>

  <!-- end (u64) -->
  <rect x="80" y="286" width="280" height="34" fill="white" stroke="#888" stroke-width="1.2"/>
  <text x="92" y="308" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    end = 2000
  </text>
  <text x="352" y="308" text-anchor="end" font-size="12" fill="#888" font-style="italic">8 bytes</text>

  <!-- braces grouping String header -->
  <path d="M 70 142 L 60 142 L 60 244 L 70 244" fill="none" stroke="#1565c0" stroke-width="1.5"/>
  <text x="38" y="198" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="700">
    <tspan x="38" dy="0">String</tspan>
    <tspan x="38" dy="13">header</tspan>
  </text>

  <!-- size annotation -->
  <text x="220" y="350" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">
    40 bytes on the stack
  </text>
  <text x="220" y="370" text-anchor="middle" font-size="12" fill="#555">
    (5 fields × 8 bytes — fixed at compile time)
  </text>
  <text x="220" y="395" text-anchor="middle" font-size="12" fill="#888" font-style="italic">
    Field order in memory ≈ declaration order
  </text>

  <!-- ===== Heap region (right) ===== -->
  <text x="660" y="86" text-anchor="middle" font-size="18" font-weight="700" fill="#d97706">
    Heap
  </text>
  <rect x="490" y="100" width="370" height="320" fill="#fff3cd"
        stroke="#d97706" stroke-dasharray="6,4" stroke-width="1.5" rx="4"/>

  <!-- Heap allocation for "chr1" (4 bytes) -->
  <text x="660" y="180" text-anchor="middle" font-size="13" fill="#b45309" font-weight="700">
    chrom's UTF-8 bytes
  </text>

  <g stroke="#888" stroke-width="1.2">
    <rect x="550" y="190" width="50" height="56" fill="white"/>
    <rect x="600" y="190" width="50" height="56" fill="white"/>
    <rect x="650" y="190" width="50" height="56" fill="white"/>
    <rect x="700" y="190" width="50" height="56" fill="white"/>
  </g>
  <text x="575" y="225" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">c</text>
  <text x="625" y="225" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">h</text>
  <text x="675" y="225" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">r</text>
  <text x="725" y="225" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">1</text>

  <text x="575" y="263" text-anchor="middle" font-size="10" fill="#888"
        font-family="ui-monospace, monospace">[0]</text>
  <text x="625" y="263" text-anchor="middle" font-size="10" fill="#888"
        font-family="ui-monospace, monospace">[1]</text>
  <text x="675" y="263" text-anchor="middle" font-size="10" fill="#888"
        font-family="ui-monospace, monospace">[2]</text>
  <text x="725" y="263" text-anchor="middle" font-size="10" fill="#888"
        font-family="ui-monospace, monospace">[3]</text>

  <text x="660" y="295" text-anchor="middle" font-size="12" fill="#555">
    one allocation, 4 bytes of element storage
  </text>

  <!-- ===== Arrow from chrom.ptr to heap[0] ===== -->
  <line x1="365" y1="160" x2="545" y2="210"
        stroke="#1565c0" stroke-width="2.5" marker-end="url(#sm-arrow)"/>

  <!-- Footer -->
  <text x="450" y="460" text-anchor="middle" font-size="14" fill="#333">
    Each field is laid out in place. Owned strings keep their characters on the heap;
  </text>
  <text x="450" y="482" text-anchor="middle" font-size="14" fill="#333">
    the struct itself remains a fixed-size record the compiler can pass around cheaply.
  </text>
</svg>
