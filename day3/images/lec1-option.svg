<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Option&lt;u64&gt; — the same shape, two states
  </text>
  <text x="450" y="50" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#555">
    enum Option&lt;T&gt; { Some(T), None }
  </text>

  <!-- ===========================================================
       Left panel: Some(42)
       =========================================================== -->
  <text x="220" y="90" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    let opt: Option&lt;u64&gt; = Some(42);
  </text>

  <rect x="60" y="110" width="320" height="170" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>

  <!-- tag byte (Some = 1) -->
  <rect x="90" y="160" width="80" height="80" fill="white"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="130" y="195" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">tag</text>
  <text x="130" y="222" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">1</text>

  <!-- payload (u64 = 42) -->
  <rect x="180" y="160" width="180" height="80" fill="white"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="270" y="190" text-anchor="middle" font-size="11" fill="#555"
        font-family="ui-monospace, monospace">u64 payload</text>
  <text x="270" y="222" text-anchor="middle" font-size="22" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">42</text>

  <text x="130" y="262" text-anchor="middle" font-size="11" fill="#888"
        font-family="ui-monospace, monospace">"Some"</text>
  <text x="270" y="262" text-anchor="middle" font-size="11" fill="#888"
        font-family="ui-monospace, monospace">contains the value</text>

  <!-- ===========================================================
       Right panel: None
       =========================================================== -->
  <text x="680" y="90" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">
    let opt: Option&lt;u64&gt; = None;
  </text>

  <rect x="520" y="110" width="320" height="170" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>

  <!-- tag byte (None = 0) -->
  <rect x="550" y="160" width="80" height="80" fill="white"
        stroke="#d97706" stroke-width="1.5"/>
  <text x="590" y="195" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">tag</text>
  <text x="590" y="222" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">0</text>

  <!-- payload (unused but reserved) -->
  <rect x="640" y="160" width="180" height="80" fill="#fafafa"
        stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="730" y="190" text-anchor="middle" font-size="11" fill="#888"
        font-family="ui-monospace, monospace">u64 payload</text>
  <text x="730" y="222" text-anchor="middle" font-size="16" fill="#bbb"
        font-style="italic">(unused, garbage)</text>

  <text x="590" y="262" text-anchor="middle" font-size="11" fill="#888"
        font-family="ui-monospace, monospace">"None"</text>
  <text x="730" y="262" text-anchor="middle" font-size="11" fill="#888"
        font-family="ui-monospace, monospace">compiler refuses to read</text>

  <!-- ===========================================================
       Bottom callout
       =========================================================== -->
  <rect x="60" y="310" width="780" height="120" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>

  <text x="450" y="340" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20">
    Option&lt;T&gt; replaces null. The compiler refuses to read the value
  </text>
  <text x="450" y="362" text-anchor="middle" font-size="15" font-weight="700" fill="#1b5e20">
    until you have checked which variant you have.
  </text>

  <text x="450" y="395" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">
    match opt { Some(x) =&gt; use_it(x),   None =&gt; default() }
  </text>
  <text x="450" y="418" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    No "null pointer exception" class of bug — it cannot happen at runtime.
  </text>
</svg>
