<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-chosen" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-other" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <text x="380" y="26" text-anchor="middle" font-size="17" font-weight="600">
    Needleman–Wunsch matrix for a = "ACGT", b = "ACT"
  </text>
  <text x="380" y="45" text-anchor="middle" font-size="14" fill="#555">
    match +1, mismatch −1, gap −1
  </text>

  <!-- ===== Matrix grid (origin 60,60, cell 55x50) ===== -->

  <!-- Column header band (b's letters): cells at cols 2..4 of grid -->
  <rect x="115" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="170" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="225" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="280" y="60" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <text x="142.5" y="92" text-anchor="middle" font-size="15" fill="#555">ε</text>
  <text x="197.5" y="92" text-anchor="middle" font-size="16" font-weight="700">A</text>
  <text x="252.5" y="92" text-anchor="middle" font-size="16" font-weight="700">C</text>
  <text x="307.5" y="92" text-anchor="middle" font-size="16" font-weight="700">T</text>

  <!-- Row header band (a's letters): cells at rows 2..6 of grid -->
  <rect x="60" y="110" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="160" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="210" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="260" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <rect x="60" y="310" width="55" height="50" fill="#e3f2fd" stroke="#bbb"/>
  <text x="87.5" y="142" text-anchor="middle" font-size="15" fill="#555">ε</text>
  <text x="87.5" y="192" text-anchor="middle" font-size="16" font-weight="700">A</text>
  <text x="87.5" y="242" text-anchor="middle" font-size="16" font-weight="700">C</text>
  <text x="87.5" y="292" text-anchor="middle" font-size="16" font-weight="700">G</text>
  <text x="87.5" y="342" text-anchor="middle" font-size="16" font-weight="700">T</text>

  <!-- Empty corner cell -->
  <rect x="60" y="60" width="55" height="50" fill="#f5f5f5" stroke="#bbb"/>

  <!-- ===== Score cells ===== -->
  <!-- score[i][j] sits at grid col (j+1), grid row (i+1):
       x = 60 + (j+1)*55, y = 60 + (i+1)*50, center +27.5/+25                  -->

  <!-- Row 0 (a = ε): 0, -1, -2, -3 -->
  <rect x="115" y="110" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="170" y="110" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="225" y="110" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="280" y="110" width="55" height="50" fill="white" stroke="#bbb"/>
  <text x="142.5" y="141" text-anchor="middle" font-size="15">0</text>
  <text x="197.5" y="141" text-anchor="middle" font-size="15">−1</text>
  <text x="252.5" y="141" text-anchor="middle" font-size="15">−2</text>
  <text x="307.5" y="141" text-anchor="middle" font-size="15">−3</text>

  <!-- Row 1 (a = A): -1, 1, 0, -1 -->
  <rect x="115" y="160" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="170" y="160" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="225" y="160" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="280" y="160" width="55" height="50" fill="white" stroke="#bbb"/>
  <text x="142.5" y="191" text-anchor="middle" font-size="15">−1</text>
  <text x="197.5" y="191" text-anchor="middle" font-size="15">1</text>
  <text x="252.5" y="191" text-anchor="middle" font-size="15">0</text>
  <text x="307.5" y="191" text-anchor="middle" font-size="15">−1</text>

  <!-- Row 2 (a = C): predecessor cells (2,1) and (2,2) get a tint -->
  <rect x="115" y="210" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="170" y="210" width="55" height="50" fill="#f0f0f0" stroke="#888"/>
  <rect x="225" y="210" width="55" height="50" fill="#f0f0f0" stroke="#888"/>
  <rect x="280" y="210" width="55" height="50" fill="white" stroke="#bbb"/>
  <text x="142.5" y="241" text-anchor="middle" font-size="15">−2</text>
  <text x="197.5" y="241" text-anchor="middle" font-size="15" font-weight="700">0</text>
  <text x="252.5" y="241" text-anchor="middle" font-size="15" font-weight="700">2</text>
  <text x="307.5" y="241" text-anchor="middle" font-size="15">1</text>

  <!-- Row 3 (a = G): predecessor (3,1) tinted; target (3,2) highlighted -->
  <rect x="115" y="260" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="170" y="260" width="55" height="50" fill="#f0f0f0" stroke="#888"/>
  <rect x="225" y="260" width="55" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2.5"/>
  <rect x="280" y="260" width="55" height="50" fill="white" stroke="#bbb"/>
  <text x="142.5" y="291" text-anchor="middle" font-size="15">−3</text>
  <text x="197.5" y="291" text-anchor="middle" font-size="15" font-weight="700">−1</text>
  <text x="252.5" y="291" text-anchor="middle" font-size="17" font-weight="700" fill="#b45309">1</text>
  <text x="307.5" y="291" text-anchor="middle" font-size="15">1</text>

  <!-- Row 4 (a = T) -->
  <rect x="115" y="310" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="170" y="310" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="225" y="310" width="55" height="50" fill="white" stroke="#bbb"/>
  <rect x="280" y="310" width="55" height="50" fill="white" stroke="#bbb"/>
  <text x="142.5" y="341" text-anchor="middle" font-size="15">−4</text>
  <text x="197.5" y="341" text-anchor="middle" font-size="15">−2</text>
  <text x="252.5" y="341" text-anchor="middle" font-size="15">0</text>
  <text x="307.5" y="341" text-anchor="middle" font-size="15">2</text>

  <!-- ===== Arrows into target cell (centre 252.5, 285) =====
       diag from (197.5,235) — bottom-right area
       up   from (252.5,235) — top
       left from (197.5,285) — left side                       -->

  <!-- Diagonal arrow (other) -->
  <line x1="212" y1="248" x2="241" y2="271"
        stroke="#888" stroke-width="2" marker-end="url(#arrow-other)"/>

  <!-- Up arrow (CHOSEN — gives the maximum) -->
  <line x1="252.5" y1="248" x2="252.5" y2="270"
        stroke="#2e7d32" stroke-width="3" marker-end="url(#arrow-chosen)"/>

  <!-- Left arrow (other) -->
  <line x1="217" y1="285" x2="240" y2="285"
        stroke="#888" stroke-width="2" marker-end="url(#arrow-other)"/>

  <!-- ===== Right-hand panel: recurrence calculation ===== -->
  <text x="380" y="135" font-size="16" font-weight="600">
    Filling cell (G, C) — score[3][2]
  </text>
  <text x="380" y="158" font-size="14" fill="#555">G ≠ C → mismatch (−1)</text>

  <text x="380" y="195" font-size="15" font-family="ui-monospace, monospace">
    score[3][2] = max(
  </text>

  <!-- diag line -->
  <text x="410" y="220" font-size="15" font-family="ui-monospace, monospace" fill="#555">
    ↘  score[2][1] + s(G,C)  =   0 + (−1) = −1
  </text>
  <!-- up line — chosen, green and bold -->
  <text x="410" y="245" font-size="15" font-family="ui-monospace, monospace"
        fill="#2e7d32" font-weight="700">
    ↓  score[2][2] + gap     =   2 + (−1) =  1
  </text>
  <text x="700" y="245" font-size="14" fill="#2e7d32" font-weight="700">← chosen</text>
  <!-- left line -->
  <text x="410" y="270" font-size="15" font-family="ui-monospace, monospace" fill="#555">
    →  score[3][1] + gap     =  −1 + (−1) = −2
  </text>
  <text x="380" y="295" font-size="15" font-family="ui-monospace, monospace">)</text>

  <text x="380" y="335" font-size="16" font-weight="600">
    so score[3][2] = 1, and the traceback arrow points up.
  </text>
  <text x="380" y="358" font-size="14" fill="#555">
    Walking arrows back from (n, m) recovers the alignment.
  </text>

</svg>
