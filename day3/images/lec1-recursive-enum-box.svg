<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="rec-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Recursive types need indirection
  </text>

  <!-- ===========================================================
       Left panel: forbidden direct recursion
       =========================================================== -->
  <text x="225" y="68" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">
    enum Node { Internal { left: Node, right: Node }, Leaf }
  </text>
  <text x="225" y="86" text-anchor="middle" font-size="12" fill="#c62828" font-style="italic">
    compile error: recursive type has infinite size
  </text>

  <rect x="40" y="105" width="370" height="360" fill="#ffebee"
        stroke="#c62828" stroke-width="1.5" rx="4"/>

  <!-- Russian-doll recursion: nested boxes -->
  <rect x="60" y="125" width="330" height="320" fill="white" stroke="#c62828" stroke-width="1.5"/>
  <text x="70" y="143" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">Node</text>

  <rect x="75" y="155" width="300" height="280" fill="#fafafa" stroke="#c62828" stroke-width="1.3"/>
  <text x="85" y="173" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">Node</text>

  <rect x="90" y="185" width="270" height="240" fill="white" stroke="#c62828" stroke-width="1.2"/>
  <text x="100" y="203" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">Node</text>

  <rect x="105" y="215" width="240" height="200" fill="#fafafa" stroke="#c62828" stroke-width="1.1"/>
  <text x="115" y="233" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">Node</text>

  <rect x="120" y="245" width="210" height="160" fill="white" stroke="#c62828" stroke-width="1.1"/>
  <text x="130" y="263" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">Node</text>

  <rect x="135" y="275" width="180" height="120" fill="#fafafa" stroke="#c62828" stroke-width="1"/>
  <text x="145" y="293" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">Node</text>

  <text x="225" y="350" text-anchor="middle" font-size="28" fill="#c62828" font-weight="700">…</text>
  <text x="225" y="380" text-anchor="middle" font-size="12" fill="#c62828" font-style="italic">
    ...forever
  </text>

  <text x="225" y="492" text-anchor="middle" font-size="13" fill="#c62828" font-weight="700">
    size(Node) = 1 + 2 × size(Node)
  </text>
  <text x="225" y="510" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    no fixed answer — compiler rejects
  </text>

  <!-- ===========================================================
       Right panel: Box gives a fixed-size pointer
       =========================================================== -->
  <text x="675" y="60" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    enum Node { Internal { left: Box&lt;Node&gt;,
  </text>
  <text x="675" y="78" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    right: Box&lt;Node&gt; }, Leaf }
  </text>
  <text x="675" y="98" text-anchor="middle" font-size="12" fill="#2e7d32" font-style="italic">
    Box&lt;T&gt; is a heap pointer — always 8 bytes
  </text>

  <rect x="490" y="105" width="370" height="360" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>

  <!-- Parent Node on stack -->
  <text x="560" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#1565c0">Stack</text>
  <rect x="510" y="145" width="120" height="170" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>

  <text x="570" y="170" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">Node::Internal</text>

  <rect x="520" y="185" width="100" height="40" fill="white" stroke="#1565c0" stroke-width="1.2"/>
  <text x="530" y="207" font-size="12" font-family="ui-monospace, monospace" fill="#333">left:</text>
  <circle cx="600" cy="205" r="5" fill="#1565c0"/>

  <rect x="520" y="230" width="100" height="40" fill="white" stroke="#1565c0" stroke-width="1.2"/>
  <text x="530" y="252" font-size="12" font-family="ui-monospace, monospace" fill="#333">right:</text>
  <circle cx="600" cy="250" r="5" fill="#1565c0"/>

  <text x="570" y="295" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="700">
    2 × 8 byte pointers
  </text>

  <!-- Heap region -->
  <text x="785" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#d97706">Heap</text>
  <rect x="680" y="145" width="160" height="280" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>

  <!-- child node 1 -->
  <rect x="700" y="170" width="120" height="80" fill="white" stroke="#d97706" stroke-width="1.2"/>
  <text x="760" y="195" text-anchor="middle" font-size="11" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">Node::Leaf</text>
  <text x="760" y="220" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    fixed size
  </text>

  <!-- child node 2 -->
  <rect x="700" y="290" width="120" height="80" fill="white" stroke="#d97706" stroke-width="1.2"/>
  <text x="760" y="315" text-anchor="middle" font-size="11" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">Node::Leaf</text>
  <text x="760" y="340" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    fixed size
  </text>

  <!-- arrows from pointers to child boxes -->
  <line x1="605" y1="205" x2="697" y2="200"
        stroke="#1565c0" stroke-width="2" marker-end="url(#rec-arrow)"/>
  <line x1="605" y1="250" x2="697" y2="320"
        stroke="#1565c0" stroke-width="2" marker-end="url(#rec-arrow)"/>

  <text x="675" y="492" text-anchor="middle" font-size="13" fill="#2e7d32" font-weight="700">
    size(Node) = tag + 2 × 8  (fixed)
  </text>
  <text x="675" y="510" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    children live on the heap; the parent is a small record on the stack
  </text>
</svg>
