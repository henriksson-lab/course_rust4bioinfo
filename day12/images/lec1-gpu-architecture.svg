<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arch-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="550" y="26" text-anchor="middle" font-size="20" font-weight="700" fill="#222">
    A GPU in one picture
  </text>
  <text x="550" y="48" text-anchor="middle" font-size="12" fill="#555">
    Many small cores grouped into compute units, each with its own fast scratchpad memory.
  </text>

  <!-- ===========================================================
       Big GPU chip rectangle
       =========================================================== -->
  <rect x="30" y="70" width="780" height="380" rx="10"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="2.5"/>
  <text x="420" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#1976d2">
    GPU chip
  </text>

  <!-- Grid of 8 SMs: 4 cols x 2 rows. Each SM = 175 x 150, gap 12 -->
  <!-- start x = 50, y = 110 -->
  <!-- SM positions -->
  <g>
    <!-- SM (0,0) - highlighted with the "thread runs here" label -->
    <g>
      <rect x="50" y="110" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="137" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM [streaming
      </text>
      <text x="137" y="142" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        multiprocessor]
      </text>
      <!-- 4 cores 2x2 -->
      <rect x="62"  y="152" width="36" height="30" rx="2" fill="#c62828" stroke="#7f1d1d" stroke-width="1"/>
      <rect x="104" y="152" width="36" height="30" rx="2" fill="#c62828" stroke="#7f1d1d" stroke-width="1"/>
      <rect x="62"  y="186" width="36" height="30" rx="2" fill="#c62828" stroke="#7f1d1d" stroke-width="1"/>
      <rect x="104" y="186" width="36" height="30" rx="2" fill="#c62828" stroke="#7f1d1d" stroke-width="1"/>
      <text x="80"  y="171" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">core</text>
      <text x="122" y="171" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">core</text>
      <text x="80"  y="205" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">core</text>
      <text x="122" y="205" text-anchor="middle" font-size="9" fill="#fff" font-weight="700">core</text>
      <!-- per-thread register file & per-workgroup shared memory -->
      <rect x="146" y="152" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="182" y="170" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="146" y="186" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="182" y="200" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared</text>
      <text x="182" y="212" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">memory</text>
      <!-- annotation -->
      <text x="137" y="234" text-anchor="middle" font-size="10" font-style="italic" fill="#c62828" font-weight="700">
        thread runs in a core
      </text>
      <text x="137" y="250" text-anchor="middle" font-size="9" font-style="italic" fill="#888">
        4 cores shown (real: 64-128)
      </text>
    </g>

    <!-- SM (1,0) -->
    <g>
      <rect x="237" y="110" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="324" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM (compute unit)
      </text>
      <rect x="249" y="146" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="291" y="146" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="249" y="180" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="291" y="180" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="333" y="146" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="369" y="164" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="333" y="180" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="369" y="200" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared mem</text>
      <text x="324" y="234" text-anchor="middle" font-size="10" fill="#666">4 cores + scratchpad</text>
    </g>

    <!-- SM (2,0) -->
    <g>
      <rect x="424" y="110" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="511" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM (compute unit)
      </text>
      <rect x="436" y="146" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="478" y="146" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="436" y="180" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="478" y="180" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="520" y="146" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="556" y="164" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="520" y="180" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="556" y="200" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared mem</text>
      <text x="511" y="234" text-anchor="middle" font-size="10" fill="#666">4 cores + scratchpad</text>
    </g>

    <!-- SM (3,0) -->
    <g>
      <rect x="611" y="110" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="698" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM (compute unit)
      </text>
      <rect x="623" y="146" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="665" y="146" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="623" y="180" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="665" y="180" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="707" y="146" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="743" y="164" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="707" y="180" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="743" y="200" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared mem</text>
      <text x="698" y="234" text-anchor="middle" font-size="10" fill="#666">4 cores + scratchpad</text>
    </g>

    <!-- SM (0,1) -->
    <g>
      <rect x="50" y="275" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="137" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM (compute unit)
      </text>
      <rect x="62"  y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="104" y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="62"  y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="104" y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="146" y="311" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="182" y="329" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="146" y="345" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="182" y="365" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared mem</text>
      <text x="137" y="399" text-anchor="middle" font-size="10" fill="#666">4 cores + scratchpad</text>
    </g>

    <!-- SM (1,1) -->
    <g>
      <rect x="237" y="275" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="324" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM (compute unit)
      </text>
      <rect x="249" y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="291" y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="249" y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="291" y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="333" y="311" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="369" y="329" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="333" y="345" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="369" y="365" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared mem</text>
      <text x="324" y="399" text-anchor="middle" font-size="10" fill="#666">4 cores + scratchpad</text>
    </g>

    <!-- SM (2,1) -->
    <g>
      <rect x="424" y="275" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="511" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM (compute unit)
      </text>
      <rect x="436" y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="478" y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="436" y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="478" y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="520" y="311" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="556" y="329" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="520" y="345" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="556" y="365" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared mem</text>
      <text x="511" y="399" text-anchor="middle" font-size="10" fill="#666">4 cores + scratchpad</text>
    </g>

    <!-- SM (3,1) -->
    <g>
      <rect x="611" y="275" width="175" height="150" rx="5"
            fill="#fff3cd" stroke="#b45309" stroke-width="1.5"/>
      <text x="698" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">
        SM (compute unit)
      </text>
      <rect x="623" y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="665" y="311" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="623" y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="665" y="345" width="36" height="30" rx="2" fill="#c62828"/>
      <rect x="707" y="311" width="72" height="28" rx="2" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
      <text x="743" y="329" text-anchor="middle" font-size="9" fill="#2e7d32" font-weight="700">registers</text>
      <rect x="707" y="345" width="72" height="30" rx="2" fill="#fff8e1" stroke="#b45309" stroke-width="1"/>
      <text x="743" y="365" text-anchor="middle" font-size="9" fill="#b45309" font-weight="700">shared mem</text>
      <text x="698" y="399" text-anchor="middle" font-size="10" fill="#666">4 cores + scratchpad</text>
    </g>
  </g>

  <!-- ===========================================================
       DRAM (VRAM) on the right
       =========================================================== -->
  <rect x="850" y="160" width="220" height="220" rx="8"
        fill="#f5f5f5" stroke="#888" stroke-width="2"/>
  <text x="960" y="184" text-anchor="middle" font-size="14" font-weight="700" fill="#333">
    DRAM (VRAM)
  </text>
  <text x="960" y="202" text-anchor="middle" font-size="11" fill="#666">
    [video RAM]
  </text>
  <text x="960" y="232" text-anchor="middle" font-size="11" fill="#444">
    shared by all SMs
  </text>
  <text x="960" y="252" text-anchor="middle" font-size="11" fill="#c62828" font-weight="700">
    slow (~100 cycles)
  </text>
  <text x="960" y="276" text-anchor="middle" font-size="11" fill="#444">
    big (4-24 GB)
  </text>
  <rect x="870" y="296" width="180" height="70" rx="3"
        fill="#fff" stroke="#888" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="960" y="320" text-anchor="middle" font-size="10" fill="#666">
    holds storage buffers
  </text>
  <text x="960" y="338" text-anchor="middle" font-size="10" fill="#666">
    (inputs, outputs,
  </text>
  <text x="960" y="354" text-anchor="middle" font-size="10" fill="#666">
    large tensors)
  </text>

  <!-- arrows between chip and VRAM -->
  <line x1="810" y1="220" x2="850" y2="240"
        stroke="#888" stroke-width="1.8"
        marker-end="url(#arch-arrow)"/>
  <line x1="850" y1="320" x2="810" y2="340"
        stroke="#888" stroke-width="1.8"
        marker-end="url(#arch-arrow)"/>
  <text x="830" y="285" text-anchor="middle" font-size="10" fill="#888" font-style="italic">
    bus
  </text>

  <!-- ===========================================================
       Caption at bottom
       =========================================================== -->
  <text x="550" y="478" text-anchor="middle" font-size="13" fill="#222" font-weight="700">
    Modern consumer GPU: ~8000 cores, organised into ~40 SMs, each with its own scratchpad memory.
  </text>

</svg>
