<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="mem-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2"/>
    </marker>
    <marker id="mem-arrow-back" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#222">
    GPU buffer types in a typical compute pipeline
  </text>

  <!-- ===========================================================
       CPU side LEFT
       =========================================================== -->
  <rect x="20" y="120" width="160" height="200" rx="6"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="100" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#333">
    CPU RAM
  </text>
  <text x="100" y="158" text-anchor="middle" font-size="11" fill="#666">
    host memory
  </text>
  <rect x="40" y="180" width="120" height="60" rx="3"
        fill="#bbdefb" stroke="#1976d2" stroke-width="1.2"/>
  <text x="100" y="206" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1976d2">
    input data
  </text>
  <text x="100" y="224" text-anchor="middle" font-size="11" fill="#1976d2">
    Vec&lt;f32&gt;
  </text>

  <!-- Arrow 1: CPU -> Storage (upload) -->
  <line x1="180" y1="210" x2="240" y2="210"
        stroke="#1976d2" stroke-width="2"
        marker-end="url(#mem-arrow)"/>
  <text x="210" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1976d2">
    1. upload
  </text>
  <text x="210" y="232" text-anchor="middle" font-size="10"
        font-family="ui-monospace, monospace" fill="#1976d2">
    queue.write_buffer
  </text>

  <!-- ===========================================================
       GPU side - big surrounding box
       =========================================================== -->
  <rect x="245" y="90" width="740" height="340" rx="10"
        fill="#fafafa" stroke="#2e7d32" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="615" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">
    GPU side (VRAM [video RAM, GPU's own memory])
  </text>

  <!-- Storage buffer (input, read-only on GPU) -->
  <rect x="260" y="140" width="170" height="110" rx="5"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="345" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1976d2">
    Storage buffer
  </text>
  <text x="345" y="176" text-anchor="middle" font-size="11" fill="#1976d2">
    read-only on GPU
  </text>
  <rect x="275" y="190" width="140" height="40" rx="3"
        fill="#bbdefb" stroke="#1976d2" stroke-width="1"/>
  <text x="345" y="215" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1976d2">
    uploaded data
  </text>

  <!-- Arrow 2: storage -> pipeline -->
  <line x1="430" y1="195" x2="495" y2="195"
        stroke="#1976d2" stroke-width="2"
        marker-end="url(#mem-arrow)"/>
  <text x="462" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#1976d2">
    2. bind +
  </text>
  <text x="462" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#1976d2">
    dispatch
  </text>

  <!-- Compute pipeline (middle) -->
  <rect x="500" y="135" width="200" height="160" rx="5"
        fill="#fff3cd" stroke="#b45309" stroke-width="1.8"/>
  <text x="600" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    Compute pipeline
  </text>
  <text x="600" y="170" text-anchor="middle" font-size="10" fill="#b45309">
    runs the WGSL shader
  </text>
  <!-- thread icons - small circles -->
  <g fill="#fff" stroke="#b45309" stroke-width="1">
    <circle cx="525" cy="200" r="9"/>
    <circle cx="555" cy="200" r="9"/>
    <circle cx="585" cy="200" r="9"/>
    <circle cx="615" cy="200" r="9"/>
    <circle cx="645" cy="200" r="9"/>
    <circle cx="675" cy="200" r="9"/>
    <circle cx="525" cy="225" r="9"/>
    <circle cx="555" cy="225" r="9"/>
    <circle cx="585" cy="225" r="9"/>
    <circle cx="615" cy="225" r="9"/>
    <circle cx="645" cy="225" r="9"/>
    <circle cx="675" cy="225" r="9"/>
    <circle cx="525" cy="250" r="9"/>
    <circle cx="555" cy="250" r="9"/>
    <circle cx="585" cy="250" r="9"/>
    <circle cx="615" cy="250" r="9"/>
    <circle cx="645" cy="250" r="9"/>
    <circle cx="675" cy="250" r="9"/>
  </g>
  <text x="600" y="282" text-anchor="middle" font-size="10" fill="#b45309" font-style="italic">
    many threads in parallel
  </text>

  <!-- Arrow from pipeline to results buffer -->
  <line x1="700" y1="215" x2="755" y2="215"
        stroke="#b45309" stroke-width="2"
        marker-end="url(#mem-arrow)"/>
  <text x="727" y="208" text-anchor="middle" font-size="10" font-weight="700" fill="#b45309">
    write
  </text>

  <!-- Storage buffer (output, read-write) -->
  <rect x="760" y="160" width="170" height="110" rx="5"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="845" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    Storage buffer
  </text>
  <text x="845" y="196" text-anchor="middle" font-size="11" fill="#2e7d32">
    read-write, results
  </text>
  <rect x="775" y="210" width="140" height="40" rx="3"
        fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="845" y="235" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    computed results
  </text>

  <!-- Arrow 3: results storage -> staging -->
  <line x1="845" y1="280" x2="845" y2="335"
        stroke="#2e7d32" stroke-width="2"
        marker-end="url(#mem-arrow-back)"/>
  <text x="855" y="312" font-size="11" font-weight="700" fill="#2e7d32">
    3. copy_buffer_to_buffer
  </text>

  <!-- Staging buffer (MAP_READ) -->
  <rect x="760" y="340" width="170" height="76" rx="5"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="845" y="362" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    Staging buffer
  </text>
  <text x="845" y="378" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    MAP_READ
  </text>
  <text x="845" y="395" text-anchor="middle" font-size="10" fill="#2e7d32">
    host-mappable
  </text>

  <!-- ===========================================================
       Arrow 4: staging back to CPU (curved)
       =========================================================== -->
  <path d="M 760 378 Q 600 470 200 378"
        fill="none" stroke="#2e7d32" stroke-width="2"
        marker-end="url(#mem-arrow-back)"/>
  <text x="500" y="478" text-anchor="middle" font-size="11" font-weight="700" fill="#2e7d32">
    4. map_async + read (back to CPU)
  </text>

  <!-- ===========================================================
       CPU side RIGHT - output
       =========================================================== -->
  <rect x="20" y="340" width="160" height="160" rx="6"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="100" y="362" text-anchor="middle" font-size="13" font-weight="700" fill="#333">
    CPU RAM
  </text>
  <text x="100" y="378" text-anchor="middle" font-size="11" fill="#666">
    host memory
  </text>
  <rect x="40" y="395" width="120" height="60" rx="3"
        fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="100" y="421" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    output data
  </text>
  <text x="100" y="439" text-anchor="middle" font-size="11" fill="#2e7d32">
    Vec&lt;f32&gt;
  </text>

  <!-- ===========================================================
       Side labels: uniform and workgroup memory
       =========================================================== -->
  <rect x="1000" y="130" width="190" height="80" rx="5"
        fill="#fff3cd" stroke="#b45309" stroke-width="1.2"/>
  <text x="1095" y="150" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">
    Uniform buffer
  </text>
  <text x="1010" y="170" font-size="10" fill="#444">small (&lt;= 64 KB)</text>
  <text x="1010" y="186" font-size="10" fill="#444">broadcast to every thread</text>
  <text x="1010" y="202" font-size="10" fill="#444">e.g. constants, scalars</text>

  <rect x="1000" y="230" width="190" height="86" rx="5"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="1095" y="250" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    Workgroup memory
  </text>
  <text x="1010" y="270" font-size="10" fill="#444">tiny (~16-64 KB)</text>
  <text x="1010" y="286" font-size="10" fill="#444">shared by threads inside</text>
  <text x="1010" y="300" font-size="10" fill="#444">one workgroup</text>
  <text x="1010" y="314" font-size="10" fill="#444" font-style="italic">fastest on-chip scratchpad</text>

</svg>
