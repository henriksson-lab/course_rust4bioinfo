<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="system-ui, -apple-system, sans-serif">
  <title>The four bitwise operators on one bit</title>

  <text x="500" y="30" text-anchor="middle" font-size="20" font-weight="600" fill="#111">The four bitwise operators on one bit</text>

  <!--
    Each 3-col binary table: col widths 40, 40, 80 = 160 total.
    NOT table: 2 cols x 2 rows below header: widths 40, 80 = 120 total.
    Headers: AND, OR, XOR, NOT.
    Row height: 28. Header height: 32. Total table height for 4-row: 32 + 4*28 = 144.
    NOT total: 32 + 2*28 = 88.
  -->

  <!-- Helper styles: borders #888, header bg #1976d2 with white text. -->

  <!-- ============== AND table ============== -->
  <g transform="translate(50,60)">
    <text x="80" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#111">AND  &amp;</text>

    <!-- Header -->
    <rect x="0" y="0" width="160" height="32" fill="#1976d2"/>
    <g font-family="ui-monospace, monospace" font-size="14" fill="#ffffff" text-anchor="middle">
      <text x="20" y="21">a</text>
      <text x="60" y="21">b</text>
      <text x="120" y="21">a &amp; b</text>
    </g>

    <!-- Row 0: 0 0 -> 0 -->
    <rect x="0"   y="32" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="32" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="32" width="80" height="28" fill="#f5f5f5"/>
    <!-- Row 1: 0 1 -> 0 -->
    <rect x="0"   y="60" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="60" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="60" width="80" height="28" fill="#f5f5f5"/>
    <!-- Row 2: 1 0 -> 0 -->
    <rect x="0"   y="88" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="88" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="88" width="80" height="28" fill="#f5f5f5"/>
    <!-- Row 3: 1 1 -> 1 -->
    <rect x="0"   y="116" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="116" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="116" width="80" height="28" fill="#bbdefb"/>

    <!-- Grid -->
    <g stroke="#888" stroke-width="1" fill="none">
      <rect x="0" y="0" width="160" height="144"/>
      <line x1="40" y1="32" x2="40" y2="144"/>
      <line x1="80" y1="32" x2="80" y2="144"/>
      <line x1="0" y1="60" x2="160" y2="60"/>
      <line x1="0" y1="88" x2="160" y2="88"/>
      <line x1="0" y1="116" x2="160" y2="116"/>
    </g>

    <!-- Values -->
    <g font-family="ui-monospace, monospace" font-size="14" fill="#111" text-anchor="middle">
      <text x="20" y="51">0</text> <text x="60" y="51">0</text> <text x="120" y="51" fill="#888">0</text>
      <text x="20" y="79">0</text> <text x="60" y="79">1</text> <text x="120" y="79" fill="#888">0</text>
      <text x="20" y="107">1</text><text x="60" y="107">0</text><text x="120" y="107" fill="#888">0</text>
      <text x="20" y="135">1</text><text x="60" y="135">1</text><text x="120" y="135" fill="#0d47a1" font-weight="600">1</text>
    </g>
  </g>

  <!-- ============== OR table ============== -->
  <g transform="translate(280,60)">
    <text x="80" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#111">OR  |</text>

    <rect x="0" y="0" width="160" height="32" fill="#1976d2"/>
    <g font-family="ui-monospace, monospace" font-size="14" fill="#ffffff" text-anchor="middle">
      <text x="20" y="21">a</text>
      <text x="60" y="21">b</text>
      <text x="120" y="21">a | b</text>
    </g>

    <rect x="0"   y="32" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="32" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="32" width="80" height="28" fill="#f5f5f5"/>

    <rect x="0"   y="60" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="60" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="60" width="80" height="28" fill="#bbdefb"/>

    <rect x="0"   y="88" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="88" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="88" width="80" height="28" fill="#bbdefb"/>

    <rect x="0"   y="116" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="116" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="116" width="80" height="28" fill="#bbdefb"/>

    <g stroke="#888" stroke-width="1" fill="none">
      <rect x="0" y="0" width="160" height="144"/>
      <line x1="40" y1="32" x2="40" y2="144"/>
      <line x1="80" y1="32" x2="80" y2="144"/>
      <line x1="0" y1="60" x2="160" y2="60"/>
      <line x1="0" y1="88" x2="160" y2="88"/>
      <line x1="0" y1="116" x2="160" y2="116"/>
    </g>

    <g font-family="ui-monospace, monospace" font-size="14" fill="#111" text-anchor="middle">
      <text x="20" y="51">0</text> <text x="60" y="51">0</text> <text x="120" y="51" fill="#888">0</text>
      <text x="20" y="79">0</text> <text x="60" y="79">1</text> <text x="120" y="79" fill="#0d47a1" font-weight="600">1</text>
      <text x="20" y="107">1</text><text x="60" y="107">0</text><text x="120" y="107" fill="#0d47a1" font-weight="600">1</text>
      <text x="20" y="135">1</text><text x="60" y="135">1</text><text x="120" y="135" fill="#0d47a1" font-weight="600">1</text>
    </g>
  </g>

  <!-- ============== XOR table ============== -->
  <g transform="translate(510,60)">
    <text x="80" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#111">XOR  ^</text>

    <rect x="0" y="0" width="160" height="32" fill="#1976d2"/>
    <g font-family="ui-monospace, monospace" font-size="14" fill="#ffffff" text-anchor="middle">
      <text x="20" y="21">a</text>
      <text x="60" y="21">b</text>
      <text x="120" y="21">a ^ b</text>
    </g>

    <rect x="0"   y="32" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="32" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="32" width="80" height="28" fill="#f5f5f5"/>

    <rect x="0"   y="60" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="60" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="60" width="80" height="28" fill="#bbdefb"/>

    <rect x="0"   y="88" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="88" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="88" width="80" height="28" fill="#bbdefb"/>

    <rect x="0"   y="116" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="116" width="40" height="28" fill="#ffffff"/>
    <rect x="80"  y="116" width="80" height="28" fill="#f5f5f5"/>

    <g stroke="#888" stroke-width="1" fill="none">
      <rect x="0" y="0" width="160" height="144"/>
      <line x1="40" y1="32" x2="40" y2="144"/>
      <line x1="80" y1="32" x2="80" y2="144"/>
      <line x1="0" y1="60" x2="160" y2="60"/>
      <line x1="0" y1="88" x2="160" y2="88"/>
      <line x1="0" y1="116" x2="160" y2="116"/>
    </g>

    <g font-family="ui-monospace, monospace" font-size="14" fill="#111" text-anchor="middle">
      <text x="20" y="51">0</text> <text x="60" y="51">0</text> <text x="120" y="51" fill="#888">0</text>
      <text x="20" y="79">0</text> <text x="60" y="79">1</text> <text x="120" y="79" fill="#0d47a1" font-weight="600">1</text>
      <text x="20" y="107">1</text><text x="60" y="107">0</text><text x="120" y="107" fill="#0d47a1" font-weight="600">1</text>
      <text x="20" y="135">1</text><text x="60" y="135">1</text><text x="120" y="135" fill="#888">0</text>
    </g>
  </g>

  <!-- ============== NOT table ============== -->
  <g transform="translate(770,60)">
    <text x="60" y="-8" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#111">NOT  !</text>

    <rect x="0" y="0" width="120" height="32" fill="#1976d2"/>
    <g font-family="ui-monospace, monospace" font-size="14" fill="#ffffff" text-anchor="middle">
      <text x="20" y="21">a</text>
      <text x="80" y="21">!a</text>
    </g>

    <!-- Row 0: 0 -> 1 -->
    <rect x="0"   y="32" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="32" width="80" height="28" fill="#bbdefb"/>
    <!-- Row 1: 1 -> 0 -->
    <rect x="0"   y="60" width="40" height="28" fill="#ffffff"/>
    <rect x="40"  y="60" width="80" height="28" fill="#f5f5f5"/>

    <g stroke="#888" stroke-width="1" fill="none">
      <rect x="0" y="0" width="120" height="88"/>
      <line x1="40" y1="32" x2="40" y2="88"/>
      <line x1="0" y1="60" x2="120" y2="60"/>
    </g>

    <g font-family="ui-monospace, monospace" font-size="14" fill="#111" text-anchor="middle">
      <text x="20" y="51">0</text> <text x="80" y="51" fill="#0d47a1" font-weight="600">1</text>
      <text x="20" y="79">1</text> <text x="80" y="79" fill="#888">0</text>
    </g>
  </g>

  <text x="500" y="290" text-anchor="middle" font-size="13" fill="#555">Apply to each bit of a multi-bit value independently — "bitwise".</text>
</svg>
