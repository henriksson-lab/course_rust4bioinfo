<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="system-ui, -apple-system, sans-serif">
  <title>Binary uses powers of 2</title>

  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Binary uses powers of 2</text>

  <!-- Four boxes for bits 3,2,1,0 (right-to-left order). -->
  <!-- Box width 80, height 70. Spacing 12. Start x for box 3 = 130. -->
  <!-- Box 3: x=130, Box 2: x=222, Box 1: x=314, Box 0: x=406. -->

  <!-- Position labels above boxes -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555" text-anchor="middle">
    <text x="170" y="78">bit 3</text>
    <text x="262" y="78">bit 2</text>
    <text x="354" y="78">bit 1</text>
    <text x="446" y="78">bit 0</text>
  </g>

  <!-- Boxes with bit values -->
  <g>
    <rect x="130" y="88" width="80" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <rect x="222" y="88" width="80" height="70" fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
    <rect x="314" y="88" width="80" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <rect x="406" y="88" width="80" height="70" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  </g>
  <g font-family="ui-monospace, monospace" font-size="32" font-weight="600" text-anchor="middle" fill="#0d47a1">
    <text x="170" y="135">1</text>
    <text x="262" y="135" fill="#666">0</text>
    <text x="354" y="135">1</text>
    <text x="446" y="135">1</text>
  </g>

  <!-- Weights -->
  <g font-family="ui-monospace, monospace" font-size="16" fill="#111" text-anchor="middle">
    <text x="170" y="188">2³ = 8</text>
    <text x="262" y="188">2² = 4</text>
    <text x="354" y="188">2¹ = 2</text>
    <text x="446" y="188">2⁰ = 1</text>
  </g>

  <!-- Per-position contributions -->
  <g font-family="ui-monospace, monospace" font-size="16" fill="#7a3d00" text-anchor="middle">
    <text x="170" y="222">1·8 = 8</text>
    <text x="262" y="222" fill="#888">0·4 = 0</text>
    <text x="354" y="222">1·2 = 2</text>
    <text x="446" y="222">1·1 = 1</text>
  </g>

  <!-- Horizontal rule for sum -->
  <line x1="130" y1="240" x2="486" y2="240" stroke="#333" stroke-width="1.2"/>

  <!-- Summation line -->
  <text x="308" y="272" font-family="ui-monospace, monospace" font-size="20" font-weight="600" fill="#111" text-anchor="middle">8 + 0 + 2 + 1 = 11</text>

  <!-- Source bit string -->
  <text x="308" y="320" font-family="ui-monospace, monospace" font-size="20" font-weight="600" fill="#111" text-anchor="middle">1011₂ = 11</text>

  <!-- Right-side labels: decimal / hex -->
  <g>
    <rect x="600" y="100" width="240" height="60" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="720" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1b5e20" font-weight="600">decimal: 11</text>
    <text x="720" y="148" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#1b5e20">eleven</text>

    <rect x="600" y="180" width="240" height="60" rx="8" ry="8" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
    <text x="720" y="205" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7a3d00" font-weight="600">hex: 0xb</text>
    <text x="720" y="228" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#7a3d00">one hex digit</text>
  </g>

  <text x="450" y="358" text-anchor="middle" font-size="13" fill="#555">Each bit position weights a power of 2; add the ones to get the value.</text>
</svg>
