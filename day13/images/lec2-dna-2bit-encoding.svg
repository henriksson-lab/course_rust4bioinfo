<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="system-ui, -apple-system, sans-serif">
  <title>2-bit DNA encoding</title>

  <defs>
    <marker id="arrEnc" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#555"/>
    </marker>
  </defs>

  <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="600" fill="#111">2-bit DNA encoding</text>

  <!-- 4 rows, each with: DNA letter box (left) -> arrow -> 2-bit code box (right) -->
  <!-- Row spacing 38. Start y = 78. Letter box at x=230, code box at x=460. -->
  <!-- Box size 60x32. Arrow from x=294 to x=454. -->

  <!-- Row A -->
  <g>
    <rect x="230" y="78" width="60" height="32" rx="4" ry="4" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="260" y="100" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#1b5e20">A</text>
    <line x1="294" y1="94" x2="454" y2="94" stroke="#555" stroke-width="1.5" marker-end="url(#arrEnc)"/>
    <rect x="460" y="78" width="80" height="32" rx="4" ry="4" fill="#f5f5f5" stroke="#888"/>
    <text x="500" y="100" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#111">00</text>
  </g>

  <!-- Row C -->
  <g>
    <rect x="230" y="120" width="60" height="32" rx="4" ry="4" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="260" y="142" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#0d47a1">C</text>
    <line x1="294" y1="136" x2="454" y2="136" stroke="#555" stroke-width="1.5" marker-end="url(#arrEnc)"/>
    <rect x="460" y="120" width="80" height="32" rx="4" ry="4" fill="#f5f5f5" stroke="#888"/>
    <text x="500" y="142" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#111">01</text>
  </g>

  <!-- Row G -->
  <g>
    <rect x="230" y="162" width="60" height="32" rx="4" ry="4" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
    <text x="260" y="184" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#7a3d00">G</text>
    <line x1="294" y1="178" x2="454" y2="178" stroke="#555" stroke-width="1.5" marker-end="url(#arrEnc)"/>
    <rect x="460" y="162" width="80" height="32" rx="4" ry="4" fill="#f5f5f5" stroke="#888"/>
    <text x="500" y="184" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#111">10</text>
  </g>

  <!-- Row T -->
  <g>
    <rect x="230" y="204" width="60" height="32" rx="4" ry="4" fill="#fde0e0" stroke="#c62828" stroke-width="1.5"/>
    <text x="260" y="226" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#c62828">T</text>
    <line x1="294" y1="220" x2="454" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#arrEnc)"/>
    <rect x="460" y="204" width="80" height="32" rx="4" ry="4" fill="#f5f5f5" stroke="#888"/>
    <text x="500" y="226" text-anchor="middle" font-family="ui-monospace, monospace" font-size="18" font-weight="600" fill="#111">11</text>
  </g>

  <!-- Column headers -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555" text-anchor="middle">
    <text x="260" y="68">base</text>
    <text x="500" y="68">code</text>
  </g>

  <!-- Callout 1: complement -->
  <g transform="translate(40,278)">
    <rect x="0" y="0" width="350" height="140" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
    <text x="175" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#0d47a1">Complement: bitwise-NOT</text>
    <g font-family="ui-monospace, monospace" font-size="13" fill="#0d47a1" text-anchor="middle">
      <text x="175" y="56">~A (00) = 11 = T</text>
      <text x="175" y="80">~C (01) = 10 = G</text>
      <text x="175" y="104">~G (10) = 01 = C</text>
      <text x="175" y="128">~T (11) = 00 = A</text>
    </g>
  </g>

  <!-- Callout 2: purine vs pyrimidine: low bit -->
  <g transform="translate(410,278)">
    <rect x="0" y="0" width="350" height="140" rx="8" ry="8" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
    <text x="175" y="24" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#7a3d00">Purine vs pyrimidine: low bit</text>
    <g font-family="ui-monospace, monospace" font-size="13" fill="#7a3d00" text-anchor="middle">
      <text x="175" y="56">A=00, G=10 → low bit 0 = purine</text>
      <text x="175" y="80">C=01, T=11 → low bit 1 = pyrimidine</text>
    </g>
    <text x="175" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7a3d00">
      Test with: `code &amp; 1`
    </text>
    <text x="175" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#7a3d00">
      → 0 = purine, 1 = pyrimidine
    </text>
  </g>

  <text x="400" y="446" text-anchor="middle" font-size="13" fill="#555">2 bits per base → 4× denser than 1 byte per base.</text>
</svg>
