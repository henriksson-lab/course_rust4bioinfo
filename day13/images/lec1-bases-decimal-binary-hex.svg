<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 560" font-family="system-ui, -apple-system, sans-serif">
  <title>Three views of the same number</title>

  <text x="350" y="34" text-anchor="middle" font-size="22" font-weight="600" fill="#111">Three views of the same number</text>

  <!-- Table geometry: 3 columns, 17 rows (header + 16). Centered horizontally. -->
  <!-- Column widths: 160, 200, 160. Total = 520. x start = 90. -->
  <!-- Row height 26. Header y = 70. -->

  <!-- Header background -->
  <rect x="90" y="70" width="520" height="32" fill="#1976d2"/>
  <g font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">
    <text x="170" y="91">decimal</text>
    <text x="350" y="91">binary</text>
    <text x="530" y="91">hex</text>
  </g>

  <!-- Alternating row backgrounds -->
  <g>
    <rect x="90" y="102"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="128"  width="520" height="26" fill="#ffffff"/>
    <rect x="90" y="154"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="180"  width="520" height="26" fill="#ffffff"/>
    <rect x="90" y="206"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="232"  width="520" height="26" fill="#ffffff"/>
    <rect x="90" y="258"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="284"  width="520" height="26" fill="#ffffff"/>
    <rect x="90" y="310"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="336"  width="520" height="26" fill="#ffffff"/>
    <rect x="90" y="362"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="388"  width="520" height="26" fill="#ffffff"/>
    <rect x="90" y="414"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="440"  width="520" height="26" fill="#ffffff"/>
    <rect x="90" y="466"  width="520" height="26" fill="#f5f5f5"/>
    <rect x="90" y="492"  width="520" height="26" fill="#ffffff"/>
  </g>

  <!-- Outer border + column separators -->
  <rect x="90" y="70" width="520" height="448" fill="none" stroke="#888" stroke-width="1"/>
  <line x1="250" y1="70" x2="250" y2="518" stroke="#888" stroke-width="1"/>
  <line x1="450" y1="70" x2="450" y2="518" stroke="#888" stroke-width="1"/>
  <line x1="90"  y1="102" x2="610" y2="102" stroke="#888" stroke-width="1"/>

  <!-- Data rows -->
  <g font-family="ui-monospace, monospace" font-size="15" fill="#111" text-anchor="middle">
    <!-- 0 -->
    <text x="170" y="121">0</text>   <text x="350" y="121">0000</text> <text x="530" y="121">0</text>
    <!-- 1 -->
    <text x="170" y="147">1</text>   <text x="350" y="147">0001</text> <text x="530" y="147">1</text>
    <!-- 2 -->
    <text x="170" y="173">2</text>   <text x="350" y="173">0010</text> <text x="530" y="173">2</text>
    <!-- 3 -->
    <text x="170" y="199">3</text>   <text x="350" y="199">0011</text> <text x="530" y="199">3</text>
    <!-- 4 -->
    <text x="170" y="225">4</text>   <text x="350" y="225">0100</text> <text x="530" y="225">4</text>
    <!-- 5 -->
    <text x="170" y="251">5</text>   <text x="350" y="251">0101</text> <text x="530" y="251">5</text>
    <!-- 6 -->
    <text x="170" y="277">6</text>   <text x="350" y="277">0110</text> <text x="530" y="277">6</text>
    <!-- 7 -->
    <text x="170" y="303">7</text>   <text x="350" y="303">0111</text> <text x="530" y="303">7</text>
    <!-- 8 -->
    <text x="170" y="329">8</text>   <text x="350" y="329">1000</text> <text x="530" y="329">8</text>
    <!-- 9 -->
    <text x="170" y="355">9</text>   <text x="350" y="355">1001</text> <text x="530" y="355">9</text>
    <!-- 10 -->
    <text x="170" y="381">10</text>  <text x="350" y="381">1010</text> <text x="530" y="381">a</text>
    <!-- 11 -->
    <text x="170" y="407">11</text>  <text x="350" y="407">1011</text> <text x="530" y="407">b</text>
    <!-- 12 -->
    <text x="170" y="433">12</text>  <text x="350" y="433">1100</text> <text x="530" y="433">c</text>
    <!-- 13 -->
    <text x="170" y="459">13</text>  <text x="350" y="459">1101</text> <text x="530" y="459">d</text>
    <!-- 14 -->
    <text x="170" y="485">14</text>  <text x="350" y="485">1110</text> <text x="530" y="485">e</text>
    <!-- 15 -->
    <text x="170" y="511">15</text>  <text x="350" y="511">1111</text> <text x="530" y="511">f</text>
  </g>

  <text x="350" y="544" text-anchor="middle" font-size="13" fill="#555">4 bits = 1 hex digit = one nibble.</text>
</svg>
