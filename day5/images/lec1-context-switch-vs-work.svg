<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <!--
    Log time scale.
    Decades:
      100 ns  -> x = 100
      1   us  -> x = 230
      10  us  -> x = 360
      100 us  -> x = 490
      1   ms  -> x = 620
      10  ms  -> x = 750
    Each decade = 130 px.
    log10(value/100ns) * 130 + 100 = x.
  -->

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Per-item work vs. thread overhead (log scale)
  </text>

  <!-- Annotation across the top -->
  <rect x="60" y="46" width="780" height="28" rx="4" fill="#fff3cd" stroke="#d97706"/>
  <text x="450" y="65" text-anchor="middle" font-size="14" font-weight="600" fill="#b45309">
    If per-item work is shorter than thread overhead, parallelism hurts.
  </text>

  <!-- ===== Bar 1: OS context switch ~ 5 us -->
  <!-- x = log10(5000/100)*130 + 100 = log10(50)*130+100 = 1.699*130+100 = 320.9 -->
  <text x="55" y="116" text-anchor="end" font-size="14" fill="#333">OS context switch / spawn</text>
  <rect x="100" y="100" width="220" height="22" fill="#ffcdd2" stroke="#c62828" stroke-width="1.5"/>
  <text x="328" y="116" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">~5 us</text>

  <!-- ===== Bar 2: gc_content 1000 bp ~ 1 us -->
  <!-- x = log10(1000/100)*130+100 = 1*130+100 = 230 -->
  <text x="55" y="156" text-anchor="end" font-size="14" fill="#333">gc_content on 1000-bp read</text>
  <rect x="100" y="140" width="130" height="22" fill="#ffe0b2" stroke="#d97706" stroke-width="1.5"/>
  <text x="238" y="156" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#d97706">~1 us</text>

  <!-- ===== Bar 3: gc_content 10000 bp ~ 10 us -->
  <text x="55" y="196" text-anchor="end" font-size="14" fill="#333">gc_content on 10000-bp read</text>
  <rect x="100" y="180" width="260" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="368" y="196" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#2e7d32">~10 us</text>

  <!-- ===== Bar 4: BWA-align ~ 100 us -->
  <text x="55" y="236" text-anchor="end" font-size="14" fill="#333">BWA-align one short read</text>
  <rect x="100" y="220" width="390" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="498" y="236" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#2e7d32">~100 us</text>

  <!-- ===== Bar 5: BLAST one seq small db ~ 10 ms -->
  <text x="55" y="276" text-anchor="end" font-size="14" fill="#333">BLAST one seq vs. small db</text>
  <rect x="100" y="260" width="650" height="22" fill="#a5d6a7" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="758" y="276" font-size="13" font-weight="700" font-family="ui-monospace, monospace" fill="#1b5e20">~10 ms</text>

  <!-- X-axis -->
  <line x1="100" y1="300" x2="780" y2="300" stroke="#444" stroke-width="1.5"/>

  <!-- Ticks -->
  <g stroke="#444" stroke-width="1.2">
    <line x1="100" y1="296" x2="100" y2="306"/>
    <line x1="230" y1="296" x2="230" y2="306"/>
    <line x1="360" y1="296" x2="360" y2="306"/>
    <line x1="490" y1="296" x2="490" y2="306"/>
    <line x1="620" y1="296" x2="620" y2="306"/>
    <line x1="750" y1="296" x2="750" y2="306"/>
  </g>

  <g font-size="12" font-family="ui-monospace, monospace" fill="#444" text-anchor="middle">
    <text x="100" y="322">100 ns</text>
    <text x="230" y="322">1 us</text>
    <text x="360" y="322">10 us</text>
    <text x="490" y="322">100 us</text>
    <text x="620" y="322">1 ms</text>
    <text x="750" y="322">10 ms</text>
  </g>

  <!-- Rule-of-thumb panel -->
  <rect x="60" y="350" width="780" height="120" rx="6" fill="#fafafa" stroke="#888" stroke-width="1"/>
  <text x="450" y="372" text-anchor="middle" font-size="15" font-weight="700" fill="#333">
    Rule of thumb
  </text>

  <!-- Tier 1 -->
  <rect x="80" y="386" width="240" height="70" rx="4" fill="#ffcdd2" stroke="#c62828"/>
  <text x="200" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">
    Per item &lt; 1 us
  </text>
  <text x="200" y="426" text-anchor="middle" font-size="12" fill="#333">
    don't parallelise
  </text>
  <text x="200" y="444" text-anchor="middle" font-size="12" fill="#333">
    batch first
  </text>

  <!-- Tier 2 -->
  <rect x="330" y="386" width="240" height="70" rx="4" fill="#ffe0b2" stroke="#d97706"/>
  <text x="450" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">
    Per item ~ 10 us
  </text>
  <text x="450" y="426" text-anchor="middle" font-size="12" fill="#333">
    marginal gain
  </text>
  <text x="450" y="444" text-anchor="middle" font-size="12" fill="#333">
    measure both ways
  </text>

  <!-- Tier 3 -->
  <rect x="580" y="386" width="240" height="70" rx="4" fill="#c8e6c9" stroke="#2e7d32"/>
  <text x="700" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">
    Per item &gt; 100 us
  </text>
  <text x="700" y="426" text-anchor="middle" font-size="12" fill="#333">
    clear win
  </text>
  <text x="700" y="444" text-anchor="middle" font-size="12" fill="#333">
    (most bioinformatics)
  </text>

</svg>
