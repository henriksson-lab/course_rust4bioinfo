<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440"
     font-family="system-ui, -apple-system, sans-serif">

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#222">
    Per-sequence GC content with rayon, 100 000 sequences
  </text>
  <text x="360" y="48" text-anchor="middle" font-size="12" fill="#777">
    Illustrative — actual scaling depends on core count, frequency scaling, and workload size.
  </text>

  <!-- ===== Plot area: x 120..620, y 80..320 (linear 0..8) ===== -->

  <!-- y-axis -->
  <line x1="120" y1="80" x2="120" y2="320" stroke="#444" stroke-width="1.5"/>
  <!-- x-axis -->
  <line x1="120" y1="320" x2="620" y2="320" stroke="#444" stroke-width="1.5"/>

  <!-- y-axis ticks and gridlines: 0, 2, 4, 6, 8 -->
  <!-- 8 at y=80 -->
  <line x1="115" y1="80" x2="120" y2="80" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="80" x2="620" y2="80" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="110" y="84" text-anchor="end" font-size="12" fill="#555">8</text>

  <!-- 6 at y=140 -->
  <line x1="115" y1="140" x2="120" y2="140" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="140" x2="620" y2="140" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="110" y="144" text-anchor="end" font-size="12" fill="#555">6</text>

  <!-- 4 at y=200 -->
  <line x1="115" y1="200" x2="120" y2="200" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="200" x2="620" y2="200" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="110" y="204" text-anchor="end" font-size="12" fill="#555">4</text>

  <!-- 2 at y=260 -->
  <line x1="115" y1="260" x2="120" y2="260" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="260" x2="620" y2="260" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="110" y="264" text-anchor="end" font-size="12" fill="#555">2</text>

  <!-- 0 at y=320 -->
  <line x1="115" y1="320" x2="120" y2="320" stroke="#444" stroke-width="1.5"/>
  <text x="110" y="324" text-anchor="end" font-size="12" fill="#555">0</text>

  <!-- y-axis label -->
  <text x="40" y="200" text-anchor="middle" font-size="13" fill="#333"
        transform="rotate(-90 40 200)">speedup factor (× over 1 core)</text>

  <!-- ===== Bars =====
       1 core: 1.0x -> y=290, h=30
       2 cores: 1.9x -> y=263, h=57
       4 cores: 3.7x -> y=209, h=111
       8 cores: 7.2x -> y=104, h=216 -->

  <rect x="160" y="290" width="80" height="30"  fill="#a5d6a7" stroke="#7eb582" stroke-width="1.5"/>
  <rect x="260" y="263" width="80" height="57"  fill="#81c784" stroke="#5a9c5e" stroke-width="1.5"/>
  <rect x="360" y="209" width="80" height="111" fill="#66bb6a" stroke="#4a8b4e" stroke-width="1.5"/>
  <rect x="460" y="104" width="80" height="216" fill="#43a047" stroke="#2e7a35" stroke-width="1.5"/>

  <!-- Bar value annotations (on top of bar) -->
  <text x="200" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#222">1.0×</text>
  <text x="300" y="255" text-anchor="middle" font-size="13" font-weight="700" fill="#222">1.9×</text>
  <text x="400" y="201" text-anchor="middle" font-size="13" font-weight="700" fill="#222">3.7×</text>
  <text x="500" y="96"  text-anchor="middle" font-size="13" font-weight="700" fill="#222">7.2×</text>

  <!-- x-axis labels -->
  <text x="200" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#222">1 core</text>
  <text x="300" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#222">2 cores</text>
  <text x="400" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#222">4 cores</text>
  <text x="500" y="342" text-anchor="middle" font-size="13" font-weight="600" fill="#222">8 cores</text>

  <text x="370" y="365" text-anchor="middle" font-size="12" fill="#666">
    rayon worker threads
  </text>

  <!-- ===== Perfect linear scaling markers =====
       Short dashed grey horizontal segment at the ideal height over each bar.
       Ideal values: 1, 2, 4, 8  ->  y=290, 260, 200, 80 -->

  <!-- 1 core: ideal = 1 -> y=290 -->
  <line x1="160" y1="290" x2="240" y2="290"
        stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- 2 cores: ideal = 2 -> y=260 -->
  <line x1="260" y1="260" x2="340" y2="260"
        stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- 4 cores: ideal = 4 -> y=200 -->
  <line x1="360" y1="200" x2="440" y2="200"
        stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- 8 cores: ideal = 8 -> y=80 -->
  <line x1="460" y1="80" x2="540" y2="80"
        stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Connect the ideal markers with a thin dashed guideline -->
  <line x1="200" y1="290" x2="500" y2="80"
        stroke="#999" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Legend entry for the dashed marker -->
  <line x1="560" y1="110" x2="600" y2="110"
        stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="565" y="100" font-size="11" fill="#444">perfect linear</text>
  <text x="565" y="125" font-size="11" fill="#444">scaling</text>

  <!-- footer note -->
  <text x="360" y="410" text-anchor="middle" font-size="11" fill="#777">
    Switching .iter() to .par_iter() — observed bars sit below ideal because of thread-pool overhead and Amdahl's law.
  </text>

</svg>
