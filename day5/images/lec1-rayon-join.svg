<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="rj-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#222">
    rayon::join runs two closures in parallel
  </text>

  <!-- ===== Top: process(data) ===== -->
  <rect x="270" y="55" width="160" height="50" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="350" y="86" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    process(data)
  </text>

  <!-- split arrows -->
  <line x1="320" y1="108" x2="200" y2="155" stroke="#444" stroke-width="2"
        marker-end="url(#rj-arrow)"/>
  <line x1="380" y1="108" x2="500" y2="155" stroke="#444" stroke-width="2"
        marker-end="url(#rj-arrow)"/>

  <!-- split label -->
  <text x="350" y="135" text-anchor="middle" font-size="12" font-style="italic" fill="#444">
    split
  </text>

  <!-- ===== Thread labels above the two branches ===== -->
  <text x="155" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    Thread A
  </text>
  <text x="545" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    Thread B
  </text>

  <!-- ===== Left branch box ===== -->
  <rect x="60" y="165" width="200" height="50" rx="6" ry="6"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="160" y="195" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    process(left_half)
  </text>

  <!-- ===== Right branch box ===== -->
  <rect x="440" y="165" width="200" height="50" rx="6" ry="6"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="540" y="195" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    process(right_half)
  </text>

  <!-- "in parallel" bracket-style hint between -->
  <text x="350" y="195" text-anchor="middle" font-size="13" font-weight="600" fill="#888">
    || in parallel
  </text>

  <!-- ===== second-level split (mergesort tree feel) ===== -->
  <line x1="120" y1="218" x2="90" y2="248" stroke="#444" stroke-width="1.5"
        marker-end="url(#rj-arrow)"/>
  <line x1="200" y1="218" x2="230" y2="248" stroke="#444" stroke-width="1.5"
        marker-end="url(#rj-arrow)"/>
  <line x1="480" y1="218" x2="450" y2="248" stroke="#444" stroke-width="1.5"
        marker-end="url(#rj-arrow)"/>
  <line x1="600" y1="218" x2="630" y2="248" stroke="#444" stroke-width="1.5"
        marker-end="url(#rj-arrow)"/>

  <!-- four small leaf boxes -->
  <g font-family="ui-monospace, monospace" font-size="11" fill="#1b5e20">
    <rect x="50" y="252" width="80" height="30" rx="4" ry="4"
          fill="white" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="90" y="271" text-anchor="middle">process(a)</text>

    <rect x="190" y="252" width="80" height="30" rx="4" ry="4"
          fill="white" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="230" y="271" text-anchor="middle">process(b)</text>

    <rect x="410" y="252" width="80" height="30" rx="4" ry="4"
          fill="white" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="450" y="271" text-anchor="middle">process(c)</text>

    <rect x="550" y="252" width="80" height="30" rx="4" ry="4"
          fill="white" stroke="#2e7d32" stroke-width="1.2"/>
    <text x="590" y="271" text-anchor="middle">process(d)</text>
  </g>

  <!-- merge lines back upward into combine -->
  <line x1="90" y1="285" x2="280" y2="320" stroke="#444" stroke-width="1.5"/>
  <line x1="230" y1="285" x2="300" y2="320" stroke="#444" stroke-width="1.5"/>
  <line x1="450" y1="285" x2="400" y2="320" stroke="#444" stroke-width="1.5"/>
  <line x1="590" y1="285" x2="420" y2="320" stroke="#444" stroke-width="1.5"/>

  <!-- combine box -->
  <rect x="270" y="320" width="160" height="40" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="350" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">
    combine results
  </text>

  <!-- annotation at bottom -->
  <text x="350" y="382" text-anchor="middle" font-size="12" fill="#333"
        font-family="ui-monospace, monospace">
    rayon::join(|| a(), || b())
  </text>
  <text x="350" y="397" text-anchor="middle" font-size="12" font-style="italic" fill="#444">
    runs both closures in parallel and waits for both before returning their results.
  </text>

</svg>
