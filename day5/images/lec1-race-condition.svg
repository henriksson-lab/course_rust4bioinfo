<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="rc-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#555"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Three interleavings of two threads running counter += 1
  </text>
  <text x="450" y="48" text-anchor="middle" font-size="14" fill="#666">
    Each += is really three steps: read, compute, write. Order matters.
  </text>

  <!-- Panel 1: Serial -->
  <rect x="20" y="68" width="280" height="350" rx="6" ry="6"
        fill="#f5fbf5" stroke="#2e7d32" stroke-width="2"/>
  <text x="160" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#2e7d32">
    Panel 1 - serial
  </text>
  <text x="160" y="110" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    A finishes before B starts
  </text>

  <text x="95" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Thread A</text>
  <text x="225" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Thread B</text>

  <line x1="32" y1="142" x2="32" y2="380" stroke="#888" stroke-width="1.2" marker-end="url(#rc-arrow)"/>
  <text x="14" y="270" font-size="11" fill="#888" font-style="italic" transform="rotate(-90 14 270)">time</text>

  <rect x="50" y="148" width="90" height="26" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="95" y="166" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">read 0</text>
  <rect x="50" y="180" width="90" height="26" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="95" y="198" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">compute 1</text>
  <rect x="50" y="212" width="90" height="26" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="95" y="230" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">write 1</text>

  <rect x="180" y="252" width="90" height="26" rx="3" fill="#fff3cd" stroke="#d97706"/>
  <text x="225" y="270" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#b45309">read 1</text>
  <rect x="180" y="284" width="90" height="26" rx="3" fill="#fff3cd" stroke="#d97706"/>
  <text x="225" y="302" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#b45309">compute 2</text>
  <rect x="180" y="316" width="90" height="26" rx="3" fill="#fff3cd" stroke="#d97706"/>
  <text x="225" y="334" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#b45309">write 2</text>

  <rect x="40" y="360" width="240" height="42" rx="6" ry="6"
        fill="#2e7d32" stroke="#1b5e20"/>
  <text x="160" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="white">
    final = 2
  </text>
  <text x="160" y="396" text-anchor="middle" font-size="12" fill="white">
    correct
  </text>

  <!-- Panel 2: Interleaved -->
  <rect x="310" y="68" width="280" height="350" rx="6" ry="6"
        fill="#fff5f5" stroke="#c62828" stroke-width="2"/>
  <text x="450" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#c62828">
    Panel 2 - interleaved
  </text>
  <text x="450" y="110" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    A reads, B reads (still 0!), both write 1
  </text>

  <text x="385" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Thread A</text>
  <text x="515" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Thread B</text>

  <line x1="322" y1="142" x2="322" y2="380" stroke="#888" stroke-width="1.2" marker-end="url(#rc-arrow)"/>

  <rect x="340" y="148" width="90" height="26" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="385" y="166" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">read 0</text>

  <rect x="470" y="180" width="90" height="26" rx="3" fill="#ffe0e0" stroke="#c62828" stroke-width="1.5"/>
  <text x="515" y="198" text-anchor="middle" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">read 0</text>

  <rect x="340" y="212" width="90" height="26" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="385" y="230" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">compute 1</text>

  <rect x="340" y="244" width="90" height="26" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="385" y="262" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">write 1</text>

  <rect x="470" y="276" width="90" height="26" rx="3" fill="#fff3cd" stroke="#d97706"/>
  <text x="515" y="294" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#b45309">compute 1</text>

  <rect x="470" y="308" width="90" height="26" rx="3" fill="#ffe0e0" stroke="#c62828" stroke-width="1.5"/>
  <text x="515" y="326" text-anchor="middle" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">write 1</text>

  <rect x="330" y="360" width="240" height="42" rx="6" ry="6"
        fill="#c62828" stroke="#7f1d1d"/>
  <text x="450" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="white">
    final = 1
  </text>
  <text x="450" y="396" text-anchor="middle" font-size="12" fill="white">
    lost update
  </text>

  <!-- Panel 3: Interleaved the other way -->
  <rect x="600" y="68" width="280" height="350" rx="6" ry="6"
        fill="#fff5f5" stroke="#c62828" stroke-width="2"/>
  <text x="740" y="92" text-anchor="middle" font-size="16" font-weight="700" fill="#c62828">
    Panel 3 - the other way
  </text>
  <text x="740" y="110" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    Swap A and B - same broken result
  </text>

  <text x="675" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">Thread A</text>
  <text x="805" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Thread B</text>

  <line x1="612" y1="142" x2="612" y2="380" stroke="#888" stroke-width="1.2" marker-end="url(#rc-arrow)"/>

  <rect x="760" y="148" width="90" height="26" rx="3" fill="#fff3cd" stroke="#d97706"/>
  <text x="805" y="166" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#b45309">read 0</text>

  <rect x="630" y="180" width="90" height="26" rx="3" fill="#ffe0e0" stroke="#c62828" stroke-width="1.5"/>
  <text x="675" y="198" text-anchor="middle" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">read 0</text>

  <rect x="760" y="212" width="90" height="26" rx="3" fill="#fff3cd" stroke="#d97706"/>
  <text x="805" y="230" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#b45309">compute 1</text>

  <rect x="760" y="244" width="90" height="26" rx="3" fill="#fff3cd" stroke="#d97706"/>
  <text x="805" y="262" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#b45309">write 1</text>

  <rect x="630" y="276" width="90" height="26" rx="3" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="675" y="294" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#0d47a1">compute 1</text>

  <rect x="630" y="308" width="90" height="26" rx="3" fill="#ffe0e0" stroke="#c62828" stroke-width="1.5"/>
  <text x="675" y="326" text-anchor="middle" font-size="12" font-weight="700" font-family="ui-monospace, monospace" fill="#c62828">write 1</text>

  <rect x="620" y="360" width="240" height="42" rx="6" ry="6"
        fill="#c62828" stroke="#7f1d1d"/>
  <text x="740" y="380" text-anchor="middle" font-size="14" font-weight="700" fill="white">
    final = 1
  </text>
  <text x="740" y="396" text-anchor="middle" font-size="12" fill="white">
    lost update
  </text>

  <!-- Footer -->
  <text x="450" y="450" text-anchor="middle" font-size="16" fill="#222" font-style="italic">
    Without exclusive access, the answer depends on luck.
  </text>
  <text x="450" y="474" text-anchor="middle" font-size="16" fill="#222" font-style="italic">
    In C/C++ this compiles. In Rust the borrow checker refuses.
  </text>

</svg>
