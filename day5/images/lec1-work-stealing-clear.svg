<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="ws-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="26" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Work-stealing: idle workers grab tasks from busy ones
  </text>

  <!-- ============================================================
       Row 1: BEFORE
       ============================================================ -->
  <text x="20" y="58" font-size="14" font-weight="700" fill="#444">
    Before — Worker 3 has nothing to do
  </text>
  <line x1="20" y1="64" x2="880" y2="64" stroke="#ccc" stroke-width="1"/>

  <!-- Worker labels and columns: positions 100, 300, 500, 700 (col width 120) -->

  <!-- Worker 0: 5 tasks -->
  <text x="160" y="84" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">Worker 0</text>
  <rect x="100" y="92" width="120" height="130" fill="#f5f5f5" stroke="#888" stroke-width="1" rx="3"/>
  <rect x="110" y="100" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="124" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="148" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="172" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="196" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="160" y="240" text-anchor="middle" font-size="12" fill="#1565c0">5 tasks queued</text>

  <!-- Worker 1: 3 tasks -->
  <text x="340" y="84" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">Worker 1</text>
  <rect x="280" y="92" width="120" height="130" fill="#f5f5f5" stroke="#888" stroke-width="1" rx="3"/>
  <rect x="290" y="100" width="100" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <rect x="290" y="124" width="100" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <rect x="290" y="148" width="100" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="340" y="240" text-anchor="middle" font-size="12" fill="#2e7d32">3 tasks queued</text>

  <!-- Worker 2: 1 task -->
  <text x="520" y="84" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">Worker 2</text>
  <rect x="460" y="92" width="120" height="130" fill="#f5f5f5" stroke="#888" stroke-width="1" rx="3"/>
  <rect x="470" y="100" width="100" height="22" fill="#ffe0b2" stroke="#d97706" stroke-width="1"/>
  <text x="520" y="240" text-anchor="middle" font-size="12" fill="#b45309">1 task, almost done</text>

  <!-- Worker 3: 0 tasks (idle) -->
  <text x="700" y="84" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#888">Worker 3</text>
  <rect x="640" y="92" width="120" height="130" fill="#fafafa" stroke="#888" stroke-width="1" stroke-dasharray="4,3" rx="3"/>
  <text x="700" y="160" text-anchor="middle" font-size="13" font-style="italic" fill="#888">idle</text>
  <text x="700" y="240" text-anchor="middle" font-size="12" font-weight="700" fill="#888">0 tasks — nothing to do</text>

  <!-- ============================================================
       Row 2: AFTER
       ============================================================ -->
  <text x="20" y="278" font-size="14" font-weight="700" fill="#444">
    After — Worker 3 takes one task from Worker 0 and gets to work
  </text>
  <line x1="20" y1="284" x2="880" y2="284" stroke="#ccc" stroke-width="1"/>

  <!-- Worker 0: now 4 tasks -->
  <text x="160" y="304" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">Worker 0</text>
  <rect x="100" y="312" width="120" height="130" fill="#f5f5f5" stroke="#888" stroke-width="1" rx="3"/>
  <rect x="110" y="320" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="344" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="368" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <rect x="110" y="392" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <!-- empty slot where stolen task used to be -->
  <rect x="110" y="416" width="100" height="22" fill="#fafafa" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="160" y="460" text-anchor="middle" font-size="12" fill="#1565c0">4 tasks left</text>

  <!-- Worker 1 unchanged -->
  <text x="340" y="304" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">Worker 1</text>
  <rect x="280" y="312" width="120" height="130" fill="#f5f5f5" stroke="#888" stroke-width="1" rx="3"/>
  <rect x="290" y="320" width="100" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <rect x="290" y="344" width="100" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <rect x="290" y="368" width="100" height="22" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1"/>
  <text x="340" y="460" text-anchor="middle" font-size="12" fill="#2e7d32">3 tasks</text>

  <!-- Worker 2 unchanged -->
  <text x="520" y="304" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">Worker 2</text>
  <rect x="460" y="312" width="120" height="130" fill="#f5f5f5" stroke="#888" stroke-width="1" rx="3"/>
  <rect x="470" y="320" width="100" height="22" fill="#ffe0b2" stroke="#d97706" stroke-width="1"/>
  <text x="520" y="460" text-anchor="middle" font-size="12" fill="#b45309">1 task</text>

  <!-- Worker 3: now 1 task -->
  <text x="700" y="304" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">Worker 3</text>
  <rect x="640" y="312" width="120" height="130" fill="#f5f5f5" stroke="#888" stroke-width="1" rx="3"/>
  <rect x="650" y="320" width="100" height="22" fill="#bbdefb" stroke="#1565c0" stroke-width="1.5"/>
  <text x="700" y="460" text-anchor="middle" font-size="12" fill="#1565c0">1 task — busy now</text>

  <!-- Steal arrow: from Worker 0 column over to Worker 3 column -->
  <path d="M 220 331 Q 430 270 650 331"
        fill="none" stroke="#d97706" stroke-width="2.5"
        marker-end="url(#ws-arrow)"/>
  <text x="435" y="262" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">
    steal
  </text>

  <!-- ============================================================
       Footer
       ============================================================ -->
  <text x="450" y="488" text-anchor="middle" font-size="13" fill="#333">
    No central scheduler. Workers cooperate by stealing — the runtime keeps all cores busy with zero configuration from you.
  </text>

</svg>
