<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="pim-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#222">
    par_iter_mut: disjoint chunks, in-place mutation
  </text>

  <!-- ===== Top: &mut [T] slice with 12 cells ===== -->
  <text x="60" y="68" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    &amp;mut [T]
  </text>

  <!-- 12 cells, width 40 each, starting x=60 -->
  <g font-family="ui-monospace, monospace" font-size="12" fill="#0d47a1">
    <!-- chunk 1 (cells 0..2) -->
    <rect x="60"  y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="80"  y="103" text-anchor="middle">T&#8320;</text>
    <rect x="100" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="120" y="103" text-anchor="middle">T&#8321;</text>
    <rect x="140" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="160" y="103" text-anchor="middle">T&#8322;</text>

    <!-- chunk 2 -->
    <rect x="180" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="200" y="103" text-anchor="middle">T&#8323;</text>
    <rect x="220" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="240" y="103" text-anchor="middle">T&#8324;</text>
    <rect x="260" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="280" y="103" text-anchor="middle">T&#8325;</text>

    <!-- chunk 3 -->
    <rect x="300" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="320" y="103" text-anchor="middle">T&#8326;</text>
    <rect x="340" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="360" y="103" text-anchor="middle">T&#8327;</text>
    <rect x="380" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="400" y="103" text-anchor="middle">T&#8328;</text>

    <!-- chunk 4 -->
    <rect x="420" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="440" y="103" text-anchor="middle">T&#8329;</text>
    <rect x="460" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="480" y="103" text-anchor="middle">T&#8321;&#8320;</text>
    <rect x="500" y="78" width="40" height="38" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.2"/>
    <text x="520" y="103" text-anchor="middle">T&#8321;&#8321;</text>
  </g>

  <!-- chunk underlines (visual grouping) -->
  <line x1="60"  y1="122" x2="180" y2="122" stroke="#1565c0" stroke-width="3"/>
  <line x1="180" y1="122" x2="300" y2="122" stroke="#1565c0" stroke-width="3"/>
  <line x1="300" y1="122" x2="420" y2="122" stroke="#1565c0" stroke-width="3"/>
  <line x1="420" y1="122" x2="540" y2="122" stroke="#1565c0" stroke-width="3"/>

  <!-- chunk labels -->
  <text x="120" y="142" text-anchor="middle" font-size="11" font-style="italic" fill="#555">chunk 1</text>
  <text x="240" y="142" text-anchor="middle" font-size="11" font-style="italic" fill="#555">chunk 2</text>
  <text x="360" y="142" text-anchor="middle" font-size="11" font-style="italic" fill="#555">chunk 3</text>
  <text x="480" y="142" text-anchor="middle" font-size="11" font-style="italic" fill="#555">chunk 4</text>

  <!-- ===== arrows splitting to workers ===== -->
  <line x1="120" y1="152" x2="100" y2="210" stroke="#444" stroke-width="2"
        marker-end="url(#pim-arrow)"/>
  <line x1="240" y1="152" x2="240" y2="210" stroke="#444" stroke-width="2"
        marker-end="url(#pim-arrow)"/>
  <line x1="360" y1="152" x2="380" y2="210" stroke="#444" stroke-width="2"
        marker-end="url(#pim-arrow)"/>
  <line x1="480" y1="152" x2="520" y2="210" stroke="#444" stroke-width="2"
        marker-end="url(#pim-arrow)"/>

  <!-- ===== worker thread boxes ===== -->
  <g>
    <rect x="35" y="215" width="130" height="64" rx="6" ry="6"
          fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="100" y="234" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">
      worker 1
    </text>
    <text x="100" y="252" text-anchor="middle" font-size="11"
          font-family="ui-monospace, monospace" fill="#1b5e20">
      &amp;mut [T&#8320;..T&#8322;]
    </text>
    <text x="100" y="270" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">
      [update in place]
    </text>

    <rect x="175" y="215" width="130" height="64" rx="6" ry="6"
          fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="240" y="234" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">
      worker 2
    </text>
    <text x="240" y="252" text-anchor="middle" font-size="11"
          font-family="ui-monospace, monospace" fill="#1b5e20">
      &amp;mut [T&#8323;..T&#8325;]
    </text>
    <text x="240" y="270" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">
      [update in place]
    </text>

    <rect x="315" y="215" width="130" height="64" rx="6" ry="6"
          fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="380" y="234" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">
      worker 3
    </text>
    <text x="380" y="252" text-anchor="middle" font-size="11"
          font-family="ui-monospace, monospace" fill="#1b5e20">
      &amp;mut [T&#8326;..T&#8328;]
    </text>
    <text x="380" y="270" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">
      [update in place]
    </text>

    <rect x="455" y="215" width="130" height="64" rx="6" ry="6"
          fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <text x="520" y="234" text-anchor="middle" font-size="12" font-weight="700" fill="#1b5e20">
      worker 4
    </text>
    <text x="520" y="252" text-anchor="middle" font-size="11"
          font-family="ui-monospace, monospace" fill="#1b5e20">
      &amp;mut [T&#8329;..T&#8321;&#8321;]
    </text>
    <text x="520" y="270" text-anchor="middle" font-size="10" font-style="italic" fill="#2e7d32">
      [update in place]
    </text>
  </g>

  <!-- annotation -->
  <text x="350" y="312" text-anchor="middle" font-size="13" font-style="italic" fill="#444">
    Each worker gets a disjoint chunk; no shared writes, no races.
  </text>
  <text x="350" y="332" text-anchor="middle" font-size="13" font-style="italic" fill="#444">
    Use for .recompute_qualities(), .normalise(), etc.
  </text>

</svg>
