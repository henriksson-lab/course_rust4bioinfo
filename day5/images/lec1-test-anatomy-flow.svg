<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="ta-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="ta-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="ta-arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    A Rust test = input &#8594; function &#8594; expected.
  </text>

  <!-- ===== Input box ===== -->
  <text x="120" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#0d47a1">
    known input
  </text>
  <rect x="40" y="105" width="160" height="80" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="120" y="153" text-anchor="middle" font-size="20"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    b"ACGT"
  </text>

  <!-- arrow to function -->
  <line x1="205" y1="145" x2="295" y2="145" stroke="#444" stroke-width="2"
        marker-end="url(#ta-arrow)"/>

  <!-- ===== Function box ===== -->
  <text x="380" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#b45309">
    the function under test
  </text>
  <rect x="300" y="105" width="160" height="80" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="380" y="153" text-anchor="middle" font-size="18"
        font-family="ui-monospace, monospace" fill="#b45309">
    gc_content(seq)
  </text>

  <!-- arrow with "produces" label -->
  <line x1="465" y1="145" x2="555" y2="145" stroke="#444" stroke-width="2"
        marker-end="url(#ta-arrow)"/>
  <text x="510" y="138" text-anchor="middle" font-size="13" font-style="italic" fill="#444">
    produces
  </text>

  <!-- ===== Comparison box ===== -->
  <text x="680" y="92" text-anchor="middle" font-size="14" font-weight="600" fill="#222">
    expected answer
  </text>
  <rect x="560" y="105" width="240" height="80" rx="6" ry="6"
        fill="white" stroke="#222" stroke-width="2.4"/>
  <text x="680" y="153" text-anchor="middle" font-size="17"
        font-family="ui-monospace, monospace" fill="#222">
    assert_eq!(result, 0.5)
  </text>

  <!-- branch lines from comparison box -->
  <!-- PASS branch (green) -->
  <line x1="710" y1="187" x2="780" y2="240" stroke="#2e7d32" stroke-width="2"
        marker-end="url(#ta-arrow-green)"/>
  <rect x="780" y="240" width="80" height="34" rx="17" ry="17"
        fill="#2e7d32" stroke="#1b5e20" stroke-width="1.5"/>
  <text x="820" y="263" text-anchor="middle" font-size="15" font-weight="700" fill="white">
    PASS
  </text>

  <!-- FAIL branch (red) -->
  <line x1="650" y1="187" x2="580" y2="240" stroke="#c62828" stroke-width="2"
        marker-end="url(#ta-arrow-red)"/>
  <rect x="500" y="240" width="80" height="34" rx="17" ry="17"
        fill="#c62828" stroke="#8e0000" stroke-width="1.5"/>
  <text x="540" y="263" text-anchor="middle" font-size="15" font-weight="700" fill="white">
    FAIL
  </text>

  <!-- caption -->
  <text x="450" y="316" text-anchor="middle" font-size="14" fill="#333">
    Three parts. If the comparison holds, the test passes.
  </text>
  <text x="450" y="336" text-anchor="middle" font-size="14" fill="#333">
    If not, you see the actual vs expected diff in the cargo output.
  </text>

</svg>
