<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="ws-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Rayon's work-stealing scheduler keeps every core busy
  </text>
  <text x="450" y="50" text-anchor="middle" font-size="13" fill="#777">
    Each worker has its own deque; an idle worker steals from a busy neighbour's tail
  </text>

  <!-- ===== Three worker columns ===== -->
  <!-- Column positions: x = 100, 400, 700 ; column width 160 -->

  <!-- Worker T0 -->
  <text x="180" y="100" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">Worker T0</text>
  <rect x="100" y="120" width="160" height="280" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="180" y="140" text-anchor="middle" font-size="11" fill="#555" font-style="italic">deque (head ^ / tail v)</text>

  <!-- T0 deque items (almost empty, executed many) -->
  <rect x="120" y="160" width="120" height="36" fill="#bbdefb" stroke="#1565c0" stroke-width="1"/>
  <text x="180" y="184" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">seq 7</text>

  <text x="180" y="220" text-anchor="middle" font-size="11" fill="#888" font-style="italic">(rest already done)</text>

  <text x="180" y="380" text-anchor="middle" font-size="12" fill="#1565c0">
    busy: 6 items done
  </text>

  <!-- Worker T1 -->
  <text x="480" y="100" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">Worker T1</text>
  <rect x="400" y="120" width="160" height="280" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>
  <text x="480" y="140" text-anchor="middle" font-size="11" fill="#555" font-style="italic">deque (head ^ / tail v)</text>

  <!-- T1 deque: empty -->
  <text x="480" y="200" text-anchor="middle" font-size="14" font-style="italic" fill="#888">(empty)</text>
  <text x="480" y="220" text-anchor="middle" font-size="11" fill="#888">finished its share</text>

  <text x="480" y="380" text-anchor="middle" font-size="12" fill="#2e7d32" font-weight="600">
    idle: looks for work
  </text>

  <!-- Worker T2 -->
  <text x="780" y="100" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">Worker T2</text>
  <rect x="700" y="120" width="160" height="280" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.5" rx="4"/>
  <text x="780" y="140" text-anchor="middle" font-size="11" fill="#555" font-style="italic">deque (head ^ / tail v)</text>

  <!-- T2 deque: 5 items remaining -->
  <rect x="720" y="160" width="120" height="32" fill="#ffe0b2" stroke="#d97706" stroke-width="1"/>
  <text x="780" y="181" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">seq 11</text>

  <rect x="720" y="196" width="120" height="32" fill="#ffe0b2" stroke="#d97706" stroke-width="1"/>
  <text x="780" y="217" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">seq 12</text>

  <rect x="720" y="232" width="120" height="32" fill="#ffe0b2" stroke="#d97706" stroke-width="1"/>
  <text x="780" y="253" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">seq 13</text>

  <rect x="720" y="268" width="120" height="32" fill="#ffe0b2" stroke="#d97706" stroke-width="1"/>
  <text x="780" y="289" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">seq 14</text>

  <!-- Highlight the tail (to be stolen) -->
  <rect x="720" y="304" width="120" height="32" fill="#ffcc80" stroke="#d97706" stroke-width="2.5"/>
  <text x="780" y="325" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">seq 15</text>

  <text x="870" y="325" text-anchor="end" font-size="10" fill="#d97706" font-style="italic">tail</text>

  <text x="780" y="380" text-anchor="middle" font-size="12" fill="#b45309">
    backlog of 5 items
  </text>

  <!-- ===== Steal arrow from T1 to T2's tail ===== -->
  <path d="M 560 380 Q 640 440 720 320"
        fill="none" stroke="#d97706" stroke-width="2.5"
        marker-end="url(#ws-arrow)"/>
  <text x="640" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">
    T1 steals seq 15 from T2's tail
  </text>

  <!-- Footer -->
  <text x="450" y="488" text-anchor="middle" font-size="13" fill="#333">
    No manual scheduling. Rayon's runtime balances the load while your code says only .par_iter().
  </text>

</svg>
