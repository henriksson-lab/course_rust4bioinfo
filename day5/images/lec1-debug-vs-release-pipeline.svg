<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="dr-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    One source file, two pipelines
  </text>

  <!-- ===== Source box (centre left) ===== -->
  <rect x="30" y="220" width="160" height="80" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="110" y="246" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">
    src/main.rs
  </text>
  <text x="110" y="266" text-anchor="middle" font-size="12" fill="#333" font-family="ui-monospace, monospace">
    fn count_kmers(...)
  </text>
  <text x="110" y="284" text-anchor="middle" font-size="11" fill="#666" font-style="italic">
    same code, both builds
  </text>

  <!-- Branching arrow up to debug, down to release -->
  <line x1="190" y1="240" x2="240" y2="140" stroke="#444" stroke-width="2"
        marker-end="url(#dr-arrow)"/>
  <line x1="190" y1="280" x2="240" y2="380" stroke="#444" stroke-width="2"
        marker-end="url(#dr-arrow)"/>

  <!-- ===== TOP PIPELINE: debug ===== -->
  <!-- Debug header band -->
  <rect x="240" y="80" width="630" height="32" fill="#ffebee"
        stroke="#c62828" stroke-width="1.5" rx="4"/>
  <text x="555" y="102" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">
    cargo build  (the default, used by cargo run / cargo test)
  </text>

  <!-- Debug step 1: target dir -->
  <rect x="250" y="130" width="170" height="80" fill="white"
        stroke="#c62828" stroke-width="1.5" rx="3"/>
  <text x="335" y="156" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#c62828">
    target/debug/
  </text>
  <text x="335" y="178" text-anchor="middle" font-size="11" fill="#555">opt-level = 0</text>
  <text x="335" y="194" text-anchor="middle" font-size="11" fill="#555">fast compile</text>

  <line x1="420" y1="170" x2="450" y2="170" stroke="#444" stroke-width="2"
        marker-end="url(#dr-arrow)"/>

  <!-- Debug step 2: properties -->
  <rect x="450" y="130" width="240" height="80" fill="#ffebee"
        stroke="#c62828" stroke-width="1" rx="3"/>
  <text x="570" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#c62828">
    Compiler keeps the safety net
  </text>
  <text x="570" y="172" text-anchor="middle" font-size="11" fill="#444">
    array bounds checked at every index
  </text>
  <text x="570" y="188" text-anchor="middle" font-size="11" fill="#444">
    overflow panics; no inlining
  </text>
  <text x="570" y="204" text-anchor="middle" font-size="11" fill="#444">
    full debug info embedded
  </text>

  <line x1="690" y1="170" x2="720" y2="170" stroke="#444" stroke-width="2"
        marker-end="url(#dr-arrow)"/>

  <!-- Debug step 3: slow binary -->
  <rect x="720" y="130" width="150" height="80" fill="#ffcdd2"
        stroke="#c62828" stroke-width="1.5" rx="3"/>
  <text x="795" y="158" text-anchor="middle" font-size="14" font-weight="700" fill="#c62828">
    slow binary
  </text>
  <text x="795" y="178" text-anchor="middle" font-size="12" fill="#444">
    ~40 s on the
  </text>
  <text x="795" y="194" text-anchor="middle" font-size="12" fill="#444">
    7-mer workload
  </text>

  <!-- ===== BOTTOM PIPELINE: release ===== -->
  <!-- Release header band -->
  <rect x="240" y="410" width="630" height="32" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>
  <text x="555" y="432" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    cargo build --release  (use this whenever you measure speed)
  </text>

  <!-- Release step 1: target dir -->
  <rect x="250" y="340" width="170" height="80" fill="white"
        stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="335" y="366" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    target/release/
  </text>
  <text x="335" y="388" text-anchor="middle" font-size="11" fill="#555">opt-level = 3</text>
  <text x="335" y="404" text-anchor="middle" font-size="11" fill="#555">slow compile</text>

  <line x1="420" y1="380" x2="450" y2="380" stroke="#444" stroke-width="2"
        marker-end="url(#dr-arrow)"/>

  <!-- Release step 2: properties -->
  <rect x="450" y="340" width="240" height="80" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1" rx="3"/>
  <text x="570" y="362" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">
    LLVM -O3 unleashed
  </text>
  <text x="570" y="382" text-anchor="middle" font-size="11" fill="#444">
    inlining, loop unrolling
  </text>
  <text x="570" y="398" text-anchor="middle" font-size="11" fill="#444">
    SIMD vectorisation
  </text>
  <text x="570" y="414" text-anchor="middle" font-size="11" fill="#444">
    overflow wraps silently
  </text>

  <line x1="690" y1="380" x2="720" y2="380" stroke="#444" stroke-width="2"
        marker-end="url(#dr-arrow)"/>

  <!-- Release step 3: fast binary -->
  <rect x="720" y="340" width="150" height="80" fill="#c8e6c9"
        stroke="#2e7d32" stroke-width="1.5" rx="3"/>
  <text x="795" y="368" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">
    fast binary
  </text>
  <text x="795" y="388" text-anchor="middle" font-size="12" fill="#444">
    ~0.8 s on the
  </text>
  <text x="795" y="404" text-anchor="middle" font-size="12" fill="#444">
    same workload
  </text>

  <!-- Footer -->
  <text x="450" y="490" text-anchor="middle" font-size="13" fill="#333">
    Same machine code goal, very different intermediate decisions. Always benchmark with --release.
  </text>

</svg>
