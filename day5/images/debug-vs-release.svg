<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="brace-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#222">
    k-mer counting workload: debug vs release
  </text>
  <text x="350" y="48" text-anchor="middle" font-size="14" fill="#777">
    Illustrative — your numbers will vary with hardware, workload size, and Rust version.
  </text>

  <!-- ===== Plot area: x 120..580, y 80..320 (log scale 0.1 .. 100 s) ===== -->

  <!-- y-axis -->
  <line x1="120" y1="80" x2="120" y2="320" stroke="#444" stroke-width="1.5"/>
  <!-- x-axis -->
  <line x1="120" y1="320" x2="580" y2="320" stroke="#444" stroke-width="1.5"/>

  <!-- y-axis ticks and gridlines (log: 100, 10, 1, 0.1) -->
  <!-- 100 s at y=80 -->
  <line x1="115" y1="80" x2="120" y2="80" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="80" x2="580" y2="80" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="110" y="84" text-anchor="end" font-size="14" fill="#555">100</text>

  <!-- 10 s at y=160 -->
  <line x1="115" y1="160" x2="120" y2="160" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="160" x2="580" y2="160" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="110" y="164" text-anchor="end" font-size="14" fill="#555">10</text>

  <!-- 1 s at y=240 -->
  <line x1="115" y1="240" x2="120" y2="240" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="240" x2="580" y2="240" stroke="#e0e0e0" stroke-width="1" stroke-dasharray="2,3"/>
  <text x="110" y="244" text-anchor="end" font-size="14" fill="#555">1</text>

  <!-- 0.1 s at y=320 -->
  <line x1="115" y1="320" x2="120" y2="320" stroke="#444" stroke-width="1.5"/>
  <text x="110" y="324" text-anchor="end" font-size="14" fill="#555">0.1</text>

  <!-- y-axis label -->
  <text x="40" y="200" text-anchor="middle" font-size="15" fill="#333"
        transform="rotate(-90 40 200)">wall-clock time (s, log scale)</text>

  <!-- ===== Bars =====
       debug bar: value 40 s -> top y=111.84 -->
  <rect x="200" y="112" width="100" height="208" fill="#e57373" stroke="#b85c5c" stroke-width="1.5"/>
  <!-- annotation on top -->
  <text x="250" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#222">40 s</text>

  <!-- release bar: value 0.8 s -> top y=247.75 -->
  <rect x="400" y="248" width="100" height="72" fill="#81c784" stroke="#5a9c5e" stroke-width="1.5"/>
  <text x="450" y="240" text-anchor="middle" font-size="16" font-weight="700" fill="#222">0.8 s</text>

  <!-- x-axis labels -->
  <text x="250" y="342" text-anchor="middle" font-size="16" font-weight="600" fill="#222">debug</text>
  <text x="250" y="358" text-anchor="middle" font-size="13" fill="#666">cargo run</text>

  <text x="450" y="342" text-anchor="middle" font-size="16" font-weight="600" fill="#222">release</text>
  <text x="450" y="358" text-anchor="middle" font-size="13" fill="#666">cargo run --release</text>

  <!-- ===== "50x faster" annotation between bars =====
       Horizontal arrow from debug-bar-right (300) to release-bar-left (400) at y around 180. -->
  <line x1="305" y1="180" x2="395" y2="180"
        stroke="#444" stroke-width="2"
        marker-end="url(#brace-arrow)"/>
  <!-- small tick up on left side -->
  <line x1="305" y1="175" x2="305" y2="185" stroke="#444" stroke-width="2"/>

  <text x="350" y="170" text-anchor="middle" font-size="16" font-weight="700" fill="#222">
    50× faster
  </text>

  <!-- footer note -->
  <text x="350" y="395" text-anchor="middle" font-size="13" fill="#777">
    Same workload: counting all 7-mers across N random sequences of length 1000.
  </text>

</svg>
