  <text x="795" y="176" font-size="12" fill="#2e7d32"
        font-family="ui-monospace, monospace" text-anchor="end">(~150 bp)</text>

  <!-- ===== Annotation 2: shorter-reads cluster (~y=40bp -> ~y_px=360) ===== -->
