<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="scatter-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="scatter-arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#222">
    Read lengths — 1000 reads (scatter)
  </text>

  <!-- Chart area:
       x: 0..1000 -> px [130, 770]
       y: 0..300  -> px [400, 90] -->
  <rect x="130" y="90" width="640" height="310" fill="white"
        stroke="#1976d2" stroke-width="1.6"/>

  <!-- ===== y axis ticks: 0, 100, 200, 300 =====
       y_px(v) = 400 - (v/300)*310  -> 0:400, 100:296.7, 200:193.3, 300:90 -->
  <g font-size="13" fill="#444" font-family="ui-monospace, monospace">
    <line x1="126" y1="400" x2="130" y2="400" stroke="#1976d2" stroke-width="1.4"/>
    <text x="120" y="404" text-anchor="end">0</text>
    <line x1="126" y1="297" x2="130" y2="297" stroke="#1976d2" stroke-width="1.4"/>
    <text x="120" y="301" text-anchor="end">100</text>
    <line x1="126" y1="193" x2="130" y2="193" stroke="#1976d2" stroke-width="1.4"/>
    <text x="120" y="197" text-anchor="end">200</text>
    <line x1="126" y1="90"  x2="130" y2="90"  stroke="#1976d2" stroke-width="1.4"/>
    <text x="120" y="94"  text-anchor="end">300</text>
  </g>

  <!-- y axis label -->
  <text x="75" y="245" text-anchor="middle" font-size="14" font-weight="600" fill="#222"
        transform="rotate(-90 75 245)">
    read length (bp)
  </text>

  <!-- ===== x axis ticks: 0, 200, 400, 600, 800, 1000 =====
       x_px(v) = 130 + (v/1000)*640 -> 0:130, 200:258, 400:386, 600:514, 800:642, 1000:770 -->
  <g font-size="13" fill="#444" font-family="ui-monospace, monospace">
    <line x1="130" y1="400" x2="130" y2="404" stroke="#1976d2" stroke-width="1.4"/>
    <text x="130" y="420" text-anchor="middle">0</text>
    <line x1="258" y1="400" x2="258" y2="404" stroke="#1976d2" stroke-width="1.4"/>
    <text x="258" y="420" text-anchor="middle">200</text>
    <line x1="386" y1="400" x2="386" y2="404" stroke="#1976d2" stroke-width="1.4"/>
    <text x="386" y="420" text-anchor="middle">400</text>
    <line x1="514" y1="400" x2="514" y2="404" stroke="#1976d2" stroke-width="1.4"/>
    <text x="514" y="420" text-anchor="middle">600</text>
    <line x1="642" y1="400" x2="642" y2="404" stroke="#1976d2" stroke-width="1.4"/>
    <text x="642" y="420" text-anchor="middle">800</text>
    <line x1="770" y1="400" x2="770" y2="404" stroke="#1976d2" stroke-width="1.4"/>
    <text x="770" y="420" text-anchor="middle">1000</text>
  </g>

  <!-- x axis label -->
  <text x="450" y="445" text-anchor="middle" font-size="14" font-weight="600" fill="#222">
    read index (0..1000)
  </text>

