<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-fb-dark2" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Building the noodles FASTA stack: a box in a box in a box
  </text>

  <!-- ===== Nested boxes (left half) ===== -->
  <!-- Outermost: noodles_fasta::Reader (yellow) -->
  <rect x="30" y="65" width="440" height="400" rx="10" ry="10"
        fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <text x="250" y="92" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#8a5a07">
    noodles_fasta::Reader
  </text>
  <text x="250" y="112" text-anchor="middle" font-size="12" fill="#555">
    FASTA semantics: records, IDs, sequences
  </text>

  <!-- Middle: BufReader<File> (blue) -->
  <rect x="70" y="140" width="360" height="290" rx="10" ry="10"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="2"/>
  <text x="250" y="168" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    BufReader&lt;File&gt;
  </text>
  <text x="250" y="186" text-anchor="middle" font-size="12" fill="#555">
    chunked reads, line-by-line
  </text>

  <!-- Innermost: File (grey) -->
  <rect x="120" y="220" width="260" height="180" rx="10" ry="10"
        fill="#f5f5f5" stroke="#666" stroke-width="1.8"/>
  <text x="250" y="248" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    File
  </text>
  <text x="250" y="268" text-anchor="middle" font-size="12" fill="#555">
    raw bytes from disk
  </text>
  <text x="250" y="290" text-anchor="middle" font-size="11" fill="#888" font-style="italic">
    kernel file descriptor
  </text>

  <!-- caption under nested boxes -->
  <text x="250" y="485" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    Each layer adds one capability. Together they form the streaming pipeline.
  </text>

  <!-- ===== Code on the right ===== -->
  <rect x="510" y="100" width="370" height="300" rx="8" ry="8"
        fill="#fafafa" stroke="#888" stroke-width="1.5"/>
  <text x="695" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#333">
    The code that builds the stack
  </text>

  <!-- Code lines with row positions chosen to match concentric box centres -->
  <!-- Line 1: File - inner -->
  <g id="line-file">
    <rect x="525" y="320" width="340" height="40" rx="4" ry="4"
          fill="white" stroke="#666" stroke-width="1.4"/>
    <text x="540" y="346" font-size="13" font-weight="700"
          font-family="ui-monospace, monospace" fill="#333">
      let file   = File::open(path)?;
    </text>
  </g>

  <!-- Line 2: BufReader - middle -->
  <g id="line-buf">
    <rect x="525" y="220" width="340" height="40" rx="4" ry="4"
          fill="white" stroke="#1565c0" stroke-width="1.4"/>
    <text x="540" y="246" font-size="13" font-weight="700"
          font-family="ui-monospace, monospace" fill="#1565c0">
      let buffer = BufReader::new(file);
    </text>
  </g>

  <!-- Line 3: noodles_fasta::Reader - outer -->
  <g id="line-reader">
    <rect x="525" y="140" width="340" height="40" rx="4" ry="4"
          fill="white" stroke="#d97706" stroke-width="1.4"/>
    <text x="540" y="166" font-size="13" font-weight="700"
          font-family="ui-monospace, monospace" fill="#8a5a07">
      let reader = fasta::Reader::new(buffer);
    </text>
  </g>

  <!-- arrows: code line -> matching layer box -->
  <!-- File line -> innermost (centre y=310 approximate) -->
  <line x1="525" y1="340" x2="385" y2="310"
        stroke="#666" stroke-width="1.8" marker-end="url(#arrow-fb-dark2)"/>
  <!-- BufReader line -> middle layer (centre y=285) -->
  <line x1="525" y1="240" x2="435" y2="200"
        stroke="#1565c0" stroke-width="1.8" marker-end="url(#arrow-fb-dark2)"/>
  <!-- Reader line -> outer layer (centre y=92) -->
  <line x1="525" y1="160" x2="475" y2="100"
        stroke="#d97706" stroke-width="1.8" marker-end="url(#arrow-fb-dark2)"/>

  <!-- caption under code -->
  <text x="695" y="385" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    Build from inside out.
  </text>

</svg>
