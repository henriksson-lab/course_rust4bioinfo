<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="bar-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="bar-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="bar-arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="20" font-weight="700" fill="#222">
    Anatomy of a histogram bar
  </text>

  <!-- Code snippet box at the top -->
  <rect x="120" y="55" width="660" height="46" rx="6" ry="6"
        fill="#f7f7f7" stroke="#888" stroke-width="1"/>
  <text x="135" y="84" font-size="15" font-family="ui-monospace, monospace" fill="#222">
    Rectangle::new([(bin_x_start, 0), (bin_x_end, count)], BLUE.filled())
  </text>

  <!-- Highlight the two-tuples in the array argument so the arrows can point
       at them. We approximate the x positions of "(bin_x_start, 0)" and
       "(bin_x_end, count)" with two short underlines drawn underneath. -->
  <line x1="250" y1="92" x2="365" y2="92" stroke="#2e7d32" stroke-width="2"/>
  <line x1="380" y1="92" x2="495" y2="92" stroke="#c62828" stroke-width="2"/>

  <!-- ===== Mini chart background ===== -->
  <!-- Chart area centred horizontally. We draw a wide background with
       gridlines, then a single tall bar inside. -->
  <rect x="200" y="130" width="500" height="320" fill="white"
        stroke="#1976d2" stroke-width="1.6"/>

  <!-- Light grey horizontal gridlines -->
  <g stroke="#ddd" stroke-width="1">
    <line x1="200" y1="170" x2="700" y2="170"/>
    <line x1="200" y1="210" x2="700" y2="210"/>
    <line x1="200" y1="250" x2="700" y2="250"/>
    <line x1="200" y1="290" x2="700" y2="290"/>
    <line x1="200" y1="330" x2="700" y2="330"/>
    <line x1="200" y1="370" x2="700" y2="370"/>
    <line x1="200" y1="410" x2="700" y2="410"/>
  </g>

  <!-- The bar: 200 wide, 350 tall is too big for our 500x320 chart, so
       scale to a single tall rectangle (160 wide, ~300 tall) inside it. -->
  <rect x="370" y="150" width="160" height="300"
        fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>

  <!-- Mark the bottom-left corner -->
  <circle cx="370" cy="450" r="5" fill="#2e7d32"/>
  <!-- Mark the top-right corner -->
  <circle cx="530" cy="150" r="5" fill="#c62828"/>

  <!-- Bottom-left callout: (bin_x_start, 0) -->
  <line x1="265" y1="475" x2="365" y2="452" stroke="#2e7d32" stroke-width="1.4"
        marker-end="url(#bar-arrow-green)"/>
  <text x="120" y="478" font-size="14" font-weight="700" fill="#2e7d32"
        font-family="ui-monospace, monospace">(bin_x_start, 0)</text>

  <!-- Top-right callout: (bin_x_end, count) -->
  <line x1="650" y1="148" x2="536" y2="150" stroke="#c62828" stroke-width="1.4"
        marker-end="url(#bar-arrow-red)"/>
  <text x="655" y="152" font-size="14" font-weight="700" fill="#c62828"
        font-family="ui-monospace, monospace">(bin_x_end, count)</text>

  <!-- Arrows from the underlined code tuples down to the two corners.
       Source: middle of the underline (above the snippet box at y=92);
       target: the corresponding corner of the bar. -->
  <line x1="307" y1="105" x2="370" y2="445" stroke="#2e7d32"
        stroke-width="1.2" stroke-dasharray="4 3"
        marker-end="url(#bar-arrow-green)"/>
  <line x1="437" y1="105" x2="528" y2="155" stroke="#c62828"
        stroke-width="1.2" stroke-dasharray="4 3"
        marker-end="url(#bar-arrow-red)"/>

  <!-- Annotation: the array literal as a whole -->
  <text x="380" y="120" text-anchor="middle" font-size="12" fill="#888" font-style="italic">
    the two opposite corners
  </text>

  <!-- Caption at the bottom -->
  <text x="450" y="487" text-anchor="middle" font-size="14" fill="#444" font-style="italic">
    Each Rectangle::new takes two opposite corners. plotters fills in everything between.
  </text>

</svg>
