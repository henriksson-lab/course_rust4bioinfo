<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Same histogram, three languages
  </text>
  <text x="450" y="48" text-anchor="middle" font-size="13" fill="#666" font-style="italic">
    same data, same output — different syntax
  </text>

  <!-- Three panels -->

  <!-- ============ Panel 1: matplotlib ============ -->
  <g>
    <rect x="20" y="70" width="280" height="200" rx="6" ry="6"
          fill="white" stroke="#1976d2" stroke-width="1.8"/>
    <text x="160" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#1976d2">
      matplotlib (Python)
    </text>

    <!-- mini chart -->
    <line x1="50" y1="250" x2="280" y2="250" stroke="#444" stroke-width="1.2"/>
    <line x1="50" y1="110" x2="50"  y2="250" stroke="#444" stroke-width="1.2"/>

    <rect x="55"  y="240" width="16" height="10" fill="#1976d2" opacity="0.8"/>
    <rect x="73"  y="225" width="16" height="25" fill="#1976d2" opacity="0.8"/>
    <rect x="91"  y="195" width="16" height="55" fill="#1976d2" opacity="0.8"/>
    <rect x="109" y="160" width="16" height="90" fill="#1976d2" opacity="0.8"/>
    <rect x="127" y="125" width="16" height="125" fill="#1976d2" opacity="0.8"/>
    <rect x="145" y="155" width="16" height="95" fill="#1976d2" opacity="0.8"/>
    <rect x="163" y="180" width="16" height="70" fill="#1976d2" opacity="0.8"/>
    <rect x="181" y="205" width="16" height="45" fill="#1976d2" opacity="0.8"/>
    <rect x="199" y="225" width="16" height="25" fill="#1976d2" opacity="0.8"/>
    <rect x="217" y="240" width="16" height="10" fill="#1976d2" opacity="0.8"/>
    <rect x="235" y="246" width="16" height="4"  fill="#1976d2" opacity="0.8"/>

    <text x="160" y="265" text-anchor="middle" font-size="10" fill="#555">
      read length
    </text>
  </g>

  <!-- code panel 1 -->
  <rect x="20" y="290" width="280" height="170" rx="6" ry="6"
        fill="#fafafa" stroke="#888" stroke-width="1"/>
  <g font-family="ui-monospace, monospace" font-size="11" fill="#222">
    <text x="30" y="312">import matplotlib.pyplot as plt</text>
    <text x="30" y="332">plt.hist(lengths, bins=30)</text>
    <text x="30" y="352">plt.xlabel("read length")</text>
    <text x="30" y="372">plt.ylabel("count")</text>
    <text x="30" y="392">plt.savefig("readlen.png")</text>
  </g>

  <!-- ============ Panel 2: ggplot2 ============ -->
  <g>
    <rect x="310" y="70" width="280" height="200" rx="6" ry="6"
          fill="white" stroke="#2e7d32" stroke-width="1.8"/>
    <text x="450" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d32">
      ggplot2 (R)
    </text>

    <line x1="340" y1="250" x2="570" y2="250" stroke="#444" stroke-width="1.2"/>
    <line x1="340" y1="110" x2="340" y2="250" stroke="#444" stroke-width="1.2"/>

    <rect x="345" y="240" width="16" height="10" fill="#2e7d32" opacity="0.8"/>
    <rect x="363" y="225" width="16" height="25" fill="#2e7d32" opacity="0.8"/>
    <rect x="381" y="195" width="16" height="55" fill="#2e7d32" opacity="0.8"/>
    <rect x="399" y="160" width="16" height="90" fill="#2e7d32" opacity="0.8"/>
    <rect x="417" y="125" width="16" height="125" fill="#2e7d32" opacity="0.8"/>
    <rect x="435" y="155" width="16" height="95" fill="#2e7d32" opacity="0.8"/>
    <rect x="453" y="180" width="16" height="70" fill="#2e7d32" opacity="0.8"/>
    <rect x="471" y="205" width="16" height="45" fill="#2e7d32" opacity="0.8"/>
    <rect x="489" y="225" width="16" height="25" fill="#2e7d32" opacity="0.8"/>
    <rect x="507" y="240" width="16" height="10" fill="#2e7d32" opacity="0.8"/>
    <rect x="525" y="246" width="16" height="4"  fill="#2e7d32" opacity="0.8"/>

    <text x="450" y="265" text-anchor="middle" font-size="10" fill="#555">
      read length
    </text>
  </g>

  <rect x="310" y="290" width="280" height="170" rx="6" ry="6"
        fill="#fafafa" stroke="#888" stroke-width="1"/>
  <g font-family="ui-monospace, monospace" font-size="11" fill="#222">
    <text x="320" y="312">library(ggplot2)</text>
    <text x="320" y="332">ggplot(df, aes(x = length)) +</text>
    <text x="320" y="352">  geom_histogram(bins = 30) +</text>
    <text x="320" y="372">  labs(x = "read length") +</text>
    <text x="320" y="392">  ggsave("readlen.png")</text>
  </g>

  <!-- ============ Panel 3: plotters ============ -->
  <g>
    <rect x="600" y="70" width="280" height="200" rx="6" ry="6"
          fill="white" stroke="#d97706" stroke-width="1.8"/>
    <text x="740" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#d97706">
      plotters (Rust)
    </text>

    <line x1="630" y1="250" x2="860" y2="250" stroke="#444" stroke-width="1.2"/>
    <line x1="630" y1="110" x2="630" y2="250" stroke="#444" stroke-width="1.2"/>

    <rect x="635" y="240" width="16" height="10" fill="#d97706" opacity="0.8"/>
    <rect x="653" y="225" width="16" height="25" fill="#d97706" opacity="0.8"/>
    <rect x="671" y="195" width="16" height="55" fill="#d97706" opacity="0.8"/>
    <rect x="689" y="160" width="16" height="90" fill="#d97706" opacity="0.8"/>
    <rect x="707" y="125" width="16" height="125" fill="#d97706" opacity="0.8"/>
    <rect x="725" y="155" width="16" height="95" fill="#d97706" opacity="0.8"/>
    <rect x="743" y="180" width="16" height="70" fill="#d97706" opacity="0.8"/>
    <rect x="761" y="205" width="16" height="45" fill="#d97706" opacity="0.8"/>
    <rect x="779" y="225" width="16" height="25" fill="#d97706" opacity="0.8"/>
    <rect x="797" y="240" width="16" height="10" fill="#d97706" opacity="0.8"/>
    <rect x="815" y="246" width="16" height="4"  fill="#d97706" opacity="0.8"/>

    <text x="740" y="265" text-anchor="middle" font-size="10" fill="#555">
      read length
    </text>
  </g>

  <rect x="600" y="290" width="280" height="170" rx="6" ry="6"
        fill="#fafafa" stroke="#888" stroke-width="1"/>
  <g font-family="ui-monospace, monospace" font-size="11" fill="#222">
    <text x="610" y="312">use plotters::prelude::*;</text>
    <text x="610" y="332">let root = SVGBackend::new(p, sz)</text>
    <text x="610" y="350">    .into_drawing_area();</text>
    <text x="610" y="370">ChartBuilder::on(&amp;root)</text>
    <text x="610" y="388">    .build_cartesian_2d(...);</text>
    <text x="610" y="406">chart.draw_series(bars)?;</text>
    <text x="610" y="424">root.present()?;</text>
  </g>

  <text x="450" y="485" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    Output is interchangeable. The pipeline that produces the figure is the difference.
  </text>

</svg>
