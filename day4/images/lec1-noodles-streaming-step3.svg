<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-s3-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-s3-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Streaming records, step 3 of 3
  </text>

  <!-- ===== File on disk ===== -->
  <text x="50" y="68" font-size="13" font-weight="700" fill="#555">file on disk</text>
  <rect x="50" y="78" width="800" height="60" rx="4" ry="4"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>

  <g font-family="ui-monospace, monospace" font-size="10" fill="#333">
    <!-- records 1-3 in buffer (greyed out on disk) -->
    <rect x="60" y="84" width="120" height="48" fill="#fafafa" stroke="#bbb"/>
    <text x="65" y="98" fill="#aaa">@r1</text>
    <text x="65" y="110" fill="#aaa">ACGTACGT</text>
    <text x="65" y="122" fill="#aaa">+</text>
    <text x="120" y="98" fill="#aaa">qual</text>

    <rect x="190" y="84" width="120" height="48" fill="#fafafa" stroke="#bbb"/>
    <text x="195" y="98" fill="#aaa">@r2</text>
    <text x="195" y="110" fill="#aaa">TTGCAATG</text>
    <text x="195" y="122" fill="#aaa">+</text>
    <text x="250" y="98" fill="#aaa">qual</text>

    <rect x="320" y="84" width="120" height="48" fill="#fafafa" stroke="#bbb"/>
    <text x="325" y="98" fill="#aaa">@r3</text>
    <text x="325" y="110" fill="#aaa">GGCATATG</text>
    <text x="325" y="122" fill="#aaa">+</text>
    <text x="380" y="98" fill="#aaa">qual</text>

    <!-- records 4-6 still on disk -->
    <rect x="450" y="84" width="120" height="48" fill="white" stroke="#aaa"/>
    <text x="455" y="98">@r4</text>
    <text x="455" y="110">CGTACGTA</text>
    <text x="455" y="122">+</text>
    <text x="510" y="98">qual</text>

    <rect x="580" y="84" width="120" height="48" fill="white" stroke="#aaa"/>
    <text x="585" y="98">@r5</text>
    <text x="585" y="110">AATGGCTA</text>
    <text x="585" y="122">+</text>
    <text x="640" y="98">qual</text>

    <rect x="710" y="84" width="120" height="48" fill="white" stroke="#aaa"/>
    <text x="715" y="98">@r6</text>
    <text x="715" y="110">TATGCAAT</text>
    <text x="715" y="122">+</text>
    <text x="770" y="98">qual</text>
  </g>

  <text x="700" y="150" text-anchor="middle" font-size="11" fill="#777" font-style="italic">
    still on disk
  </text>

  <!-- ===== BufReader 64 KB buffer band ===== -->
  <text x="50" y="178" font-size="13" font-weight="700" fill="#d97706">
    BufReader 64 KB buffer
  </text>
  <rect x="50" y="188" width="800" height="50" rx="4" ry="4"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>

  <!-- r1 region: greyed because already served and freed -->
  <rect x="55" y="192" width="125" height="42" fill="#f0f0f0" stroke="#bbb"/>
  <g font-family="ui-monospace, monospace" font-size="11" fill="#aaa">
    <text x="65" y="208">@r1 (consumed)</text>
  </g>

  <g font-family="ui-monospace, monospace" font-size="11" fill="#7a4a09">
    <text x="195" y="208">@r2 TTGCAATG + qual</text>
  </g>
  <g font-family="ui-monospace, monospace" font-size="11" fill="#7a4a09">
    <text x="335" y="208">@r3 GGCATATG + qual</text>
  </g>
  <text x="700" y="218" text-anchor="middle" font-size="11" fill="#777" font-style="italic">
    (room for many more)
  </text>

  <!-- highlight r2 on the file/buffer as the new "in flight" -->
  <rect x="190" y="84" width="120" height="48"
        fill="none" stroke="#d97706" stroke-width="3"/>

  <!-- arrow buffer -> your code with r2 -->
  <line x1="250" y1="240" x2="250" y2="290"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-s3-green)"/>
  <text x="265" y="270" font-size="12" font-weight="700" fill="#2e7d32">
    Record r2
  </text>

  <!-- "dropped" arrow from old record location to a small grey "dropped" tag -->
  <line x1="120" y1="290" x2="120" y2="240"
        stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-s3-grey)"/>
  <text x="125" y="275" font-size="11" fill="#888" font-style="italic">
    r1 dropped
  </text>

  <!-- ===== your code box ===== -->
  <rect x="50" y="290" width="800" height="80" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="450" y="318" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    for record in reader.records() { ... }
  </text>

  <!-- the new record held: r2 -->
  <rect x="350" y="332" width="200" height="28" rx="4" ry="4"
        fill="white" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="450" y="352" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    record = Record { @r2, ... }
  </text>

  <!-- a "ghost" of r1 to the left (greyed) -->
  <rect x="100" y="332" width="160" height="28" rx="4" ry="4"
        fill="#fafafa" stroke="#bbb" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="180" y="352" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#aaa">
    (r1 was here)
  </text>

  <!-- ===== Caption ===== -->
  <rect x="50" y="385" width="800" height="50" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
  <text x="450" y="408" text-anchor="middle" font-size="14" font-weight="700" fill="#8a5a07">
    Step 3: you drop record 1; the reader fetches record 2 from the buffer.
  </text>
  <text x="450" y="426" text-anchor="middle" font-size="12" fill="#555">
    When the buffer empties, BufReader re-fills it from disk &#8212; one record at a time, forever.
  </text>

</svg>
