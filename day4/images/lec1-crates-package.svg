<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ===== Browser window chrome ===== -->
  <rect x="20" y="20" width="860" height="510" rx="10" ry="10"
        fill="white" stroke="#888" stroke-width="1.5"/>

  <!-- URL bar strip -->
  <rect x="20" y="20" width="860" height="40" rx="10" ry="10"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <rect x="20" y="46" width="860" height="14"
        fill="#f5f5f5" stroke="none"/>
  <line x1="20" y1="60" x2="880" y2="60" stroke="#888" stroke-width="1.5"/>

  <!-- traffic-light dots -->
  <circle cx="40"  cy="40" r="5" fill="#e57373"/>
  <circle cx="56"  cy="40" r="5" fill="#ffb74d"/>
  <circle cx="72"  cy="40" r="5" fill="#81c784"/>

  <!-- URL pill -->
  <rect x="100" y="30" width="700" height="22" rx="11" ry="11"
        fill="white" stroke="#bbb"/>
  <text x="450" y="45" text-anchor="middle" font-size="14" fill="#333"
        font-family="ui-monospace, monospace">https://crates.io/crates/noodles-fasta</text>

  <!-- ===== Page header ===== -->
  <text x="40" y="96" font-size="22" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    noodles-fasta
  </text>
  <text x="230" y="96" font-size="16"
        font-family="ui-monospace, monospace" fill="#555">
    0.40.0
  </text>
  <text x="40" y="120" font-size="14" fill="#333">
    FASTA format reader and writer for the noodles ecosystem of
  </text>
  <text x="40" y="138" font-size="14" fill="#333">
    bioinformatics I/O crates.
  </text>

  <!-- divider -->
  <line x1="40" y1="152" x2="860" y2="152" stroke="#ddd" stroke-width="1"/>

  <!-- ===== Main area: README with example ===== -->
  <text x="40" y="178" font-size="15" font-weight="700" fill="#333">
    README
  </text>
  <text x="40" y="200" font-size="13" fill="#444">
    Streaming FASTA I/O. Records are iterated lazily, so files
  </text>
  <text x="40" y="218" font-size="13" fill="#444">
    larger than memory work without changes.
  </text>

  <!-- code block -->
  <rect x="40" y="232" width="490" height="120" rx="4" ry="4"
        fill="#f7f7f7" stroke="#ccc" stroke-width="1"/>
  <text x="52" y="252" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">use noodles_fasta as fasta;</text>
  <text x="52" y="270" font-size="13"
        font-family="ui-monospace, monospace" fill="#333"></text>
  <text x="52" y="288" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">let mut reader = fasta::Reader::new(...);</text>
  <text x="52" y="306" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">for result in reader.records() {</text>
  <text x="52" y="324" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">&#160;&#160;&#160;&#160;let record = result?;</text>
  <text x="52" y="342" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">}</text>

  <text x="40" y="376" font-size="13" fill="#444">
    See the documentation for the full API.
  </text>

  <!-- ===== Sidebar metadata box ===== -->
  <rect x="560" y="170" width="300" height="290" rx="6" ry="6"
        fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text x="574" y="194" font-size="14" font-weight="700" fill="#333">
    Metadata
  </text>
  <line x1="574" y1="204" x2="846" y2="204" stroke="#ddd" stroke-width="1"/>

  <text x="574" y="226" font-size="13" font-weight="600" fill="#555">License</text>
  <text x="574" y="244" font-size="13" font-family="ui-monospace, monospace" fill="#222">MIT</text>

  <text x="574" y="270" font-size="13" font-weight="600" fill="#555">Repository</text>
  <text x="574" y="288" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">github.com/zaeleus/noodles</text>

  <text x="574" y="314" font-size="13" font-weight="600" fill="#555">Last updated</text>
  <text x="574" y="332" font-size="13" font-family="ui-monospace, monospace" fill="#222">2025-03-14</text>

  <!-- Highlighted Documentation row -->
  <rect x="566" y="346" width="288" height="46" rx="4" ry="4"
        fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <text x="574" y="364" font-size="13" font-weight="600" fill="#7a4a09">Documentation</text>
  <text x="574" y="384" font-size="13" font-family="ui-monospace, monospace" fill="#b45309">docs.rs/noodles-fasta</text>

  <text x="574" y="414" font-size="13" font-weight="600" fill="#555">Owners</text>
  <text x="574" y="432" font-size="13" font-family="ui-monospace, monospace" fill="#222">@zaeleus</text>

  <!-- ===== Annotation arrow + box ===== -->
  <path d="M 400 500 C 440 480, 500 410, 560 372"
        fill="none" stroke="#d97706" stroke-width="2"
        marker-end="url(#arr-orange)"/>
  <rect x="40" y="478" width="360" height="44" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="50" y="496" font-size="13" fill="#7a4a09">
    Check the license, the repo, the last-updated date.
  </text>
  <text x="50" y="514" font-size="13" fill="#7a4a09" font-weight="600">
    Is the crate alive and trustworthy?
  </text>

</svg>
