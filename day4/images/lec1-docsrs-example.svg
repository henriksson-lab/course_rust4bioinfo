<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ===== Browser window chrome ===== -->
  <rect x="20" y="20" width="860" height="510" rx="10" ry="10"
        fill="white" stroke="#888" stroke-width="1.5"/>

  <!-- URL bar strip -->
  <rect x="20" y="20" width="860" height="40" rx="10" ry="10"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <rect x="20" y="46" width="860" height="14"
        fill="#f5f5f5" stroke="none"/>
  <line x1="20" y1="60" x2="880" y2="60" stroke="#888" stroke-width="1.5"/>

  <!-- traffic-light dots -->
  <circle cx="40"  cy="40" r="5" fill="#e57373"/>
  <circle cx="56"  cy="40" r="5" fill="#ffb74d"/>
  <circle cx="72"  cy="40" r="5" fill="#81c784"/>

  <!-- URL pill -->
  <rect x="100" y="30" width="760" height="22" rx="11" ry="11"
        fill="white" stroke="#bbb"/>
  <text x="480" y="45" text-anchor="middle" font-size="13" fill="#333"
        font-family="ui-monospace, monospace">https://docs.rs/noodles-fasta/latest/noodles_fasta/struct.Reader.html#examples</text>

  <!-- ===== Page header ===== -->
  <text x="40" y="98" font-size="18" font-weight="700" fill="#222">
    Struct
  </text>
  <text x="110" y="98" font-size="18" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    noodles_fasta::Reader
  </text>

  <!-- breadcrumb / hint of being scrolled -->
  <text x="40" y="120" font-size="12" fill="#888" font-style="italic">
    ...scrolled to #examples
  </text>

  <!-- divider -->
  <line x1="40" y1="132" x2="860" y2="132" stroke="#ddd" stroke-width="1"/>

  <!-- Examples header -->
  <text x="40" y="158" font-size="17" font-weight="700" fill="#333">
    Examples
  </text>
  <line x1="40" y1="166" x2="160" y2="166" stroke="#1565c0" stroke-width="2"/>

  <!-- ===== Code block ===== -->
  <rect x="40" y="180" width="820" height="248" rx="4" ry="4"
        fill="#1a1a1a" stroke="#444" stroke-width="1"/>
  <text x="54" y="204" font-size="14"
        font-family="ui-monospace, monospace" fill="#c5cae9">use std::{fs::File, io::BufReader};</text>
  <text x="54" y="222" font-size="14"
        font-family="ui-monospace, monospace" fill="#c5cae9">use noodles_fasta as fasta;</text>
  <text x="54" y="240" font-size="14"
        font-family="ui-monospace, monospace" fill="#e0e0e0"></text>
  <text x="54" y="258" font-size="14"
        font-family="ui-monospace, monospace" fill="#e0e0e0">let file = File::open("ref.fa")?;</text>
  <text x="54" y="276" font-size="14"
        font-family="ui-monospace, monospace" fill="#e0e0e0">let mut reader = fasta::Reader::new(BufReader::new(file));</text>
  <text x="54" y="294" font-size="14"
        font-family="ui-monospace, monospace" fill="#e0e0e0"></text>
  <text x="54" y="312" font-size="14"
        font-family="ui-monospace, monospace" fill="#a8e6a8">for result in reader.records() {</text>
  <text x="54" y="330" font-size="14"
        font-family="ui-monospace, monospace" fill="#a8e6a8">&#160;&#160;&#160;&#160;let record = result?;</text>
  <text x="54" y="348" font-size="14"
        font-family="ui-monospace, monospace" fill="#a8e6a8">&#160;&#160;&#160;&#160;println!("{}", record.name());</text>
  <text x="54" y="366" font-size="14"
        font-family="ui-monospace, monospace" fill="#a8e6a8">}</text>

  <!-- Faded "Run" button bottom-right of code block -->
  <rect x="790" y="396" width="60" height="22" rx="4" ry="4"
        fill="#2a2a2a" stroke="#666" stroke-width="1" opacity="0.7"/>
  <text x="820" y="412" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#aaa">
    Run
  </text>

  <!-- ===== Annotation ===== -->
  <path d="M 450 470 C 380 440, 320 410, 280 380"
        fill="none" stroke="#d97706" stroke-width="2"
        marker-end="url(#arr-orange)"/>
  <rect x="200" y="460" width="540" height="50" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="210" y="480" font-size="14" fill="#7a4a09">
    Copy this into your project as a starting point —
  </text>
  <text x="210" y="500" font-size="14" font-weight="600" fill="#7a4a09">
    verify it runs, then customise.
  </text>

</svg>
