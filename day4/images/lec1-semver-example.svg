<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-sv-dark" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Semantic versioning: three kinds of bump
  </text>
  <text x="450" y="52" text-anchor="middle" font-size="13" fill="#555" font-style="italic">
    MAJOR.MINOR.PATCH
  </text>

  <!-- ===== Row 1: PATCH ===== -->
  <rect x="30" y="75" width="840" height="80" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <!-- transition -->
  <text x="80" y="108" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">1.4.2</text>
  <line x1="140" y1="103" x2="180" y2="103"
        stroke="#444" stroke-width="2" marker-end="url(#arrow-sv-dark)"/>
  <text x="190" y="108" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">1.4.3</text>
  <!-- badge -->
  <rect x="290" y="88" width="90" height="32" rx="16" ry="16" fill="#2e7d32"/>
  <text x="335" y="110" text-anchor="middle" font-size="14" font-weight="700" fill="white">
    PATCH
  </text>
  <!-- explanation -->
  <text x="410" y="100" font-size="14" font-weight="700" fill="#1b5e20">
    bug fix
  </text>
  <text x="410" y="120" font-size="13" fill="#333">
    Your code keeps working. No new API, just corrections.
  </text>
  <text x="410" y="140" font-size="11" fill="#666" font-style="italic">
    Example: division-by-zero patched in a sequence-length helper.
  </text>

  <!-- ===== Row 2: MINOR ===== -->
  <rect x="30" y="170" width="840" height="80" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="80" y="203" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">1.4.2</text>
  <line x1="140" y1="198" x2="180" y2="198"
        stroke="#444" stroke-width="2" marker-end="url(#arrow-sv-dark)"/>
  <text x="190" y="203" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">1.5.0</text>
  <rect x="290" y="183" width="90" height="32" rx="16" ry="16" fill="#d97706"/>
  <text x="335" y="205" text-anchor="middle" font-size="14" font-weight="700" fill="white">
    MINOR
  </text>
  <text x="410" y="195" font-size="14" font-weight="700" fill="#8a5a07">
    new feature added
  </text>
  <text x="410" y="215" font-size="13" fill="#333">
    Old API still works. New functions and types are available.
  </text>
  <text x="410" y="235" font-size="11" fill="#666" font-style="italic">
    Example: a new gzip-compressed reader constructor.
  </text>

  <!-- ===== Row 3: MAJOR ===== -->
  <rect x="30" y="265" width="840" height="80" rx="8" ry="8"
        fill="#fdecea" stroke="#c62828" stroke-width="1.5"/>
  <text x="80" y="298" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">1.4.2</text>
  <line x1="140" y1="293" x2="180" y2="293"
        stroke="#444" stroke-width="2" marker-end="url(#arrow-sv-dark)"/>
  <text x="190" y="298" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">2.0.0</text>
  <rect x="290" y="278" width="90" height="32" rx="16" ry="16" fill="#c62828"/>
  <text x="335" y="300" text-anchor="middle" font-size="14" font-weight="700" fill="white">
    MAJOR
  </text>
  <text x="410" y="290" font-size="14" font-weight="700" fill="#c62828">
    breaking change
  </text>
  <text x="410" y="310" font-size="13" fill="#333">
    Your code may not compile. Function signatures or types changed.
  </text>
  <text x="410" y="330" font-size="11" fill="#666" font-style="italic">
    Example: Reader::new now takes a Path instead of a String.
  </text>

  <!-- ===== Cargo.toml meaning panel ===== -->
  <rect x="30" y="365" width="840" height="135" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="450" y="390" text-anchor="middle" font-size="14" font-weight="700" fill="#1565c0">
    What "0.40" in Cargo.toml actually means
  </text>

  <!-- left: Cargo.toml line -->
  <rect x="55" y="408" width="300" height="36" rx="4" ry="4"
        fill="white" stroke="#1565c0" stroke-width="1.2"/>
  <text x="205" y="432" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    noodles-fasta = "0.40"
  </text>

  <!-- arrow -->
  <line x1="358" y1="426" x2="420" y2="426"
        stroke="#444" stroke-width="2" marker-end="url(#arrow-sv-dark)"/>

  <!-- right: meaning -->
  <text x="430" y="424" font-size="13" fill="#222">
    <tspan font-weight="700">means: ^0.40</tspan>
    <tspan> &#8212; any </tspan>
    <tspan font-family="ui-monospace, monospace">0.40.x</tspan>
    <tspan>, but NOT </tspan>
    <tspan font-family="ui-monospace, monospace">0.41</tspan>
    <tspan>.</tspan>
  </text>

  <text x="55" y="468" font-size="12" fill="#c62828" font-weight="700">
    Note for 0.x.y crates (pre-1.0):
  </text>
  <text x="55" y="486" font-size="12" fill="#333">
    every minor bump (0.40 -&gt; 0.41) is treated as breaking. Many bio crates live here.
  </text>

</svg>
