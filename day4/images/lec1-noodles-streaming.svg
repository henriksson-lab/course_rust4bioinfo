<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-noodles" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-drop" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    noodles: streaming records, constant memory
  </text>

  <!-- ===== 1. FASTQ file (left) ===== -->
  <rect x="30" y="80" width="200" height="320" rx="6" ry="6"
        fill="#fafafa" stroke="#888" stroke-width="1.5"/>
  <text x="130" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#333">
    sample.fastq
  </text>
  <text x="130" y="123" text-anchor="middle" font-size="12" fill="#777" font-style="italic">
    3 GB on disk
  </text>

  <g font-family="ui-monospace, monospace" font-size="12" fill="#333">
    <text x="45" y="150">@read1</text>
    <text x="45" y="166">ACGTACGTAC</text>
    <text x="45" y="182">+</text>
    <text x="45" y="198">!!!!!!!!!!</text>
    <text x="45" y="220">@read2</text>
    <text x="45" y="236">TTGCAATGCA</text>
    <text x="45" y="252">+</text>
    <text x="45" y="268">IIIIIIIIII</text>
    <text x="45" y="290">@read3</text>
    <text x="45" y="306">GGCATATGCC</text>
    <text x="45" y="322">+</text>
    <text x="45" y="338">JJJJJJJJJJ</text>
    <text x="45" y="365" fill="#aaa">    ...</text>
    <text x="45" y="385" fill="#aaa">(50M more)</text>
  </g>

  <!-- arrow file -> reader -->
  <line x1="235" y1="240" x2="328" y2="240"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-noodles)"/>
  <text x="282" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">
    BufRead
  </text>

  <!-- ===== 2. noodles Reader (middle) ===== -->
  <rect x="330" y="160" width="200" height="170" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="430" y="188" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    fastq::io::Reader
  </text>
  <text x="430" y="208" text-anchor="middle" font-size="12" fill="#444">
    parses one record
  </text>
  <text x="430" y="224" text-anchor="middle" font-size="12" fill="#444">
    at a time
  </text>

  <g font-family="ui-monospace, monospace" font-size="12" fill="#1565c0">
    <text x="345" y="258">for r in reader</text>
    <text x="345" y="276">    .records() {</text>
    <text x="345" y="294">  let rec = r?;</text>
    <text x="345" y="312">  ...</text>
  </g>

  <!-- arrow reader -> emitted record -->
  <line x1="535" y1="240" x2="628" y2="240"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-noodles)"/>
  <text x="582" y="228" text-anchor="middle" font-size="12" font-weight="600" fill="#2e7d32">
    yields
  </text>

  <!-- ===== 3. One Record struct (right) ===== -->
  <rect x="630" y="160" width="240" height="170" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="750" y="188" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    fastq::Record
  </text>

  <g font-family="ui-monospace, monospace" font-size="13" fill="#333">
    <rect x="645" y="205" width="210" height="28" fill="white" stroke="#a5d6a7"/>
    <text x="655" y="223">name: "read2"</text>

    <rect x="645" y="237" width="210" height="28" fill="white" stroke="#a5d6a7"/>
    <text x="655" y="255">sequence: TTGCAATGCA</text>

    <rect x="645" y="269" width="210" height="28" fill="white" stroke="#a5d6a7"/>
    <text x="655" y="287">quality:  IIIIIIIIII</text>
  </g>
  <text x="750" y="318" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    one record on the stack
  </text>

  <!-- "dropped" arrow back -->
  <line x1="750" y1="345" x2="750" y2="395"
        stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-drop)"/>
  <text x="745" y="375" text-anchor="end" font-size="12" fill="#666" font-style="italic">
    next iteration:
  </text>
  <text x="745" y="390" text-anchor="end" font-size="12" fill="#666" font-style="italic">
    dropped
  </text>

  <!-- ===== Footer callout ===== -->
  <rect x="30" y="420" width="840" height="80" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="450" y="448" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">
    Constant memory regardless of file size
  </text>
  <text x="450" y="470" text-anchor="middle" font-size="13" fill="#333">
    Each record is parsed, handed to your loop body, then dropped when the iteration ends.
  </text>
  <text x="450" y="488" text-anchor="middle" font-size="13" fill="#333">
    A 3 GB FASTQ uses the same RAM as a 3 KB one.
  </text>

</svg>
