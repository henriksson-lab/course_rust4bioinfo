<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ===== Browser window chrome ===== -->
  <rect x="20" y="20" width="860" height="510" rx="10" ry="10"
        fill="white" stroke="#888" stroke-width="1.5"/>

  <!-- URL bar strip -->
  <rect x="20" y="20" width="860" height="40" rx="10" ry="10"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <rect x="20" y="46" width="860" height="14"
        fill="#f5f5f5" stroke="none"/>
  <line x1="20" y1="60" x2="880" y2="60" stroke="#888" stroke-width="1.5"/>

  <!-- traffic-light dots -->
  <circle cx="40"  cy="40" r="5" fill="#e57373"/>
  <circle cx="56"  cy="40" r="5" fill="#ffb74d"/>
  <circle cx="72"  cy="40" r="5" fill="#81c784"/>

  <!-- URL pill -->
  <rect x="100" y="30" width="700" height="22" rx="11" ry="11"
        fill="white" stroke="#bbb"/>
  <text x="450" y="45" text-anchor="middle" font-size="14" fill="#333"
        font-family="ui-monospace, monospace">https://docs.rs/noodles-fasta/latest/noodles_fasta/</text>

  <!-- ===== Sidebar ===== -->
  <rect x="40" y="80" width="200" height="440" rx="6" ry="6"
        fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text x="54" y="104" font-size="14" font-weight="700" fill="#333">
    noodles_fasta
  </text>
  <line x1="54" y1="114" x2="226" y2="114" stroke="#ddd" stroke-width="1"/>

  <text x="54" y="136" font-size="13" font-weight="600" fill="#555">Modules</text>
  <text x="64" y="156" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">fai</text>
  <text x="64" y="174" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">record</text>
  <text x="64" y="192" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">repository</text>

  <text x="54" y="220" font-size="13" font-weight="600" fill="#555">Structs</text>
  <text x="64" y="240" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">Reader</text>
  <text x="64" y="258" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">Writer</text>
  <text x="64" y="276" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">Record</text>

  <text x="54" y="304" font-size="13" font-weight="600" fill="#555">Functions</text>
  <text x="64" y="324" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">indexed_reader</text>

  <text x="54" y="352" font-size="13" font-weight="600" fill="#555">Type Aliases</text>
  <text x="64" y="372" font-size="13" font-family="ui-monospace, monospace" fill="#1565c0">Result</text>

  <!-- ===== Main content area ===== -->
  <text x="260" y="100" font-size="20" font-weight="700" fill="#222">
    Crate
  </text>
  <text x="320" y="100" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    noodles_fasta
  </text>

  <text x="260" y="128" font-size="13" fill="#444">
    Reads and writes the FASTA format. Records are iterated lazily
  </text>
  <text x="260" y="146" font-size="13" fill="#444">
    from a Read source; Writers emit to anything implementing Write.
  </text>

  <text x="260" y="178" font-size="15" font-weight="700" fill="#333">
    Quick start
  </text>

  <!-- Highlighted code block -->
  <rect x="260" y="190" width="600" height="180" rx="4" ry="4"
        fill="#1a1a1a" stroke="#d97706" stroke-width="2.5"/>
  <text x="274" y="212" font-size="13"
        font-family="ui-monospace, monospace" fill="#c5cae9">use std::{fs::File, io::BufReader};</text>
  <text x="274" y="230" font-size="13"
        font-family="ui-monospace, monospace" fill="#c5cae9">use noodles_fasta as fasta;</text>
  <text x="274" y="250" font-size="13"
        font-family="ui-monospace, monospace" fill="#e0e0e0"></text>
  <text x="274" y="268" font-size="13"
        font-family="ui-monospace, monospace" fill="#e0e0e0">let file = File::open("ref.fa")?;</text>
  <text x="274" y="286" font-size="13"
        font-family="ui-monospace, monospace" fill="#e0e0e0">let mut reader = fasta::Reader::new(BufReader::new(file));</text>
  <text x="274" y="306" font-size="13"
        font-family="ui-monospace, monospace" fill="#e0e0e0"></text>
  <text x="274" y="324" font-size="13"
        font-family="ui-monospace, monospace" fill="#a8e6a8">for result in reader.records() {</text>
  <text x="274" y="342" font-size="13"
        font-family="ui-monospace, monospace" fill="#a8e6a8">&#160;&#160;&#160;&#160;let record = result?;</text>
  <text x="274" y="360" font-size="13"
        font-family="ui-monospace, monospace" fill="#a8e6a8">}</text>

  <!-- ===== Annotation ===== -->
  <path d="M 600 460 C 700 440, 820 400, 860 376"
        fill="none" stroke="#d97706" stroke-width="2"
        marker-end="url(#arr-orange)"/>
  <rect x="260" y="438" width="400" height="48" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="270" y="458" font-size="14" fill="#7a4a09">
    If the top of the docs doesn't show
  </text>
  <text x="270" y="476" font-size="14" font-weight="600" fill="#7a4a09">
    a runnable example — red flag.
  </text>

</svg>
