<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="anatomy-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Anatomy of a chart
  </text>

  <!-- Drawing area: outer dashed rectangle (the whole canvas) -->
  <rect x="150" y="60" width="500" height="380" rx="6" ry="6"
        fill="#fafafa" stroke="#888" stroke-width="1.5" stroke-dasharray="6 4"/>

  <!-- chart title -->
  <text x="400" y="92" text-anchor="middle" font-size="17" font-weight="700" fill="#222">
    Read length distribution
  </text>

  <!-- Chart area: solid rectangle (axes border) -->
  <rect x="220" y="115" width="380" height="270" fill="white"
        stroke="#1976d2" stroke-width="1.6"/>

  <!-- y axis tick marks + labels -->
  <g font-size="12" fill="#444" font-family="ui-monospace, monospace">
    <line x1="216" y1="385" x2="220" y2="385" stroke="#1976d2" stroke-width="1.4"/>
    <text x="210" y="389" text-anchor="end">0</text>
    <line x1="216" y1="320" x2="220" y2="320" stroke="#1976d2" stroke-width="1.4"/>
    <text x="210" y="324" text-anchor="end">25</text>
    <line x1="216" y1="255" x2="220" y2="255" stroke="#1976d2" stroke-width="1.4"/>
    <text x="210" y="259" text-anchor="end">50</text>
    <line x1="216" y1="190" x2="220" y2="190" stroke="#1976d2" stroke-width="1.4"/>
    <text x="210" y="194" text-anchor="end">75</text>
    <line x1="216" y1="125" x2="220" y2="125" stroke="#1976d2" stroke-width="1.4"/>
    <text x="210" y="129" text-anchor="end">100</text>
  </g>

  <!-- x axis tick marks + labels -->
  <g font-size="12" fill="#444" font-family="ui-monospace, monospace">
    <line x1="240" y1="385" x2="240" y2="389" stroke="#1976d2" stroke-width="1.4"/>
    <text x="240" y="403" text-anchor="middle">0</text>
    <line x1="320" y1="385" x2="320" y2="389" stroke="#1976d2" stroke-width="1.4"/>
    <text x="320" y="403" text-anchor="middle">50</text>
    <line x1="400" y1="385" x2="400" y2="389" stroke="#1976d2" stroke-width="1.4"/>
    <text x="400" y="403" text-anchor="middle">100</text>
    <line x1="480" y1="385" x2="480" y2="389" stroke="#1976d2" stroke-width="1.4"/>
    <text x="480" y="403" text-anchor="middle">150</text>
    <line x1="560" y1="385" x2="560" y2="389" stroke="#1976d2" stroke-width="1.4"/>
    <text x="560" y="403" text-anchor="middle">200</text>
  </g>

  <!-- axis labels -->
  <text x="410" y="426" text-anchor="middle" font-size="14" font-weight="600" fill="#222">
    read length (bp)
  </text>
  <text x="170" y="250" text-anchor="middle" font-size="14" font-weight="600" fill="#222"
        transform="rotate(-90 170 250)">
    count
  </text>

  <!-- Data series 1: bars -->
  <g>
    <rect x="245" y="360" width="22" height="25" fill="#1976d2" opacity="0.75"/>
    <rect x="275" y="320" width="22" height="65" fill="#1976d2" opacity="0.75"/>
    <rect x="305" y="270" width="22" height="115" fill="#1976d2" opacity="0.75"/>
    <rect x="335" y="200" width="22" height="185" fill="#1976d2" opacity="0.75"/>
    <rect x="365" y="155" width="22" height="230" fill="#1976d2" opacity="0.75"/>
    <rect x="395" y="200" width="22" height="185" fill="#1976d2" opacity="0.75"/>
    <rect x="425" y="245" width="22" height="140" fill="#1976d2" opacity="0.75"/>
    <rect x="455" y="295" width="22" height="90" fill="#1976d2" opacity="0.75"/>
    <rect x="485" y="335" width="22" height="50" fill="#1976d2" opacity="0.75"/>
    <rect x="515" y="358" width="22" height="27" fill="#1976d2" opacity="0.75"/>
    <rect x="545" y="372" width="22" height="13" fill="#1976d2" opacity="0.75"/>
    <rect x="575" y="378" width="22" height="7"  fill="#1976d2" opacity="0.75"/>
  </g>

  <!-- Data series 2: points (overlaid summary) -->
  <g fill="#d97706" stroke="#8a5a07" stroke-width="0.8">
    <circle cx="256" cy="365" r="3"/>
    <circle cx="286" cy="325" r="3"/>
    <circle cx="316" cy="278" r="3"/>
    <circle cx="346" cy="208" r="3"/>
    <circle cx="376" cy="165" r="3"/>
    <circle cx="406" cy="210" r="3"/>
    <circle cx="436" cy="252" r="3"/>
    <circle cx="466" cy="302" r="3"/>
    <circle cx="496" cy="340" r="3"/>
    <circle cx="526" cy="362" r="3"/>
    <circle cx="556" cy="375" r="3"/>
    <circle cx="586" cy="380" r="3"/>
  </g>

  <!-- Legend -->
  <rect x="490" y="125" width="100" height="48" fill="white" stroke="#888" stroke-width="1"/>
  <rect x="498" y="135" width="14" height="10" fill="#1976d2" opacity="0.75"/>
  <text x="518" y="145" font-size="11" fill="#222">bars: counts</text>
  <circle cx="505" cy="160" r="3" fill="#d97706" stroke="#8a5a07" stroke-width="0.7"/>
  <text x="518" y="164" font-size="11" fill="#222">points: peak</text>

  <!-- ===== Annotations / callouts ===== -->

  <!-- Drawing area label (top-left) -->
  <text x="40" y="80" font-size="13" font-weight="700" fill="#444" font-family="ui-monospace, monospace">
    drawing area
  </text>
  <text x="40" y="96" font-size="11" fill="#666">
    (full canvas + margin)
  </text>
  <line x1="120" y1="80" x2="155" y2="68" stroke="#888" stroke-width="1.2"
        marker-end="url(#anatomy-arrow)"/>

  <!-- Chart title callout -->
  <text x="755" y="85" font-size="13" font-weight="700" fill="#444" font-family="ui-monospace, monospace">
    chart title
  </text>
  <line x1="750" y1="89" x2="475" y2="90" stroke="#888" stroke-width="1.2"
        marker-end="url(#anatomy-arrow)"/>

  <!-- Chart area callout -->
  <text x="660" y="160" font-size="13" font-weight="700" fill="#444" font-family="ui-monospace, monospace">
    chart area
  </text>
  <text x="660" y="176" font-size="11" fill="#666">
    (axes + plot)
  </text>
  <line x1="655" y1="160" x2="605" y2="148" stroke="#888" stroke-width="1.2"
        marker-end="url(#anatomy-arrow)"/>

  <!-- y axis callout -->
  <text x="40" y="200" font-size="13" font-weight="700" fill="#444" font-family="ui-monospace, monospace">
    y-axis
  </text>
  <text x="40" y="216" font-size="11" fill="#666">
    ticks + labels
  </text>
  <line x1="105" y1="200" x2="215" y2="200" stroke="#888" stroke-width="1.2"
        marker-end="url(#anatomy-arrow)"/>

  <!-- data series callout -->
  <text x="40" y="290" font-size="13" font-weight="700" fill="#444" font-family="ui-monospace, monospace">
    data series
  </text>
  <text x="40" y="306" font-size="11" fill="#666">
    bars and points
  </text>
  <line x1="135" y1="290" x2="240" y2="265" stroke="#888" stroke-width="1.2"
        marker-end="url(#anatomy-arrow)"/>

  <!-- legend callout -->
  <text x="660" y="195" font-size="13" font-weight="700" fill="#444" font-family="ui-monospace, monospace">
    legend
  </text>
  <line x1="655" y1="195" x2="595" y2="160" stroke="#888" stroke-width="1.2"
        marker-end="url(#anatomy-arrow)"/>

  <!-- x axis callout -->
  <text x="660" y="395" font-size="13" font-weight="700" fill="#444" font-family="ui-monospace, monospace">
    x-axis
  </text>
  <text x="660" y="411" font-size="11" fill="#666">
    ticks + label
  </text>
  <line x1="655" y1="395" x2="610" y2="395" stroke="#888" stroke-width="1.2"
        marker-end="url(#anatomy-arrow)"/>

  <!-- Footer -->
  <text x="450" y="475" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    matplotlib, ggplot2 and plotters all draw the same pieces — only the API differs.
  </text>

</svg>
