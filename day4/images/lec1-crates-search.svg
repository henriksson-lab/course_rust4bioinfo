<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 550"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <!-- ===== Browser window chrome ===== -->
  <rect x="20" y="20" width="860" height="510" rx="10" ry="10"
        fill="white" stroke="#888" stroke-width="1.5"/>

  <!-- URL bar strip -->
  <rect x="20" y="20" width="860" height="40" rx="10" ry="10"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <rect x="20" y="46" width="860" height="14"
        fill="#f5f5f5" stroke="none"/>
  <line x1="20" y1="60" x2="880" y2="60" stroke="#888" stroke-width="1.5"/>

  <!-- traffic-light dots -->
  <circle cx="40"  cy="40" r="5" fill="#e57373"/>
  <circle cx="56"  cy="40" r="5" fill="#ffb74d"/>
  <circle cx="72"  cy="40" r="5" fill="#81c784"/>

  <!-- URL pill -->
  <rect x="100" y="30" width="700" height="22" rx="11" ry="11"
        fill="white" stroke="#bbb"/>
  <text x="450" y="45" text-anchor="middle" font-size="14" fill="#333"
        font-family="ui-monospace, monospace">https://crates.io/search?q=fasta</text>

  <!-- ===== Page header ===== -->
  <text x="40" y="92" font-size="18" font-weight="700" fill="#222">
    Search results for "fasta"
  </text>
  <text x="40" y="112" font-size="13" fill="#666">
    1 - 4 of 42 results
  </text>

  <!-- ===== Result 1: noodles-fasta (highlighted) ===== -->
  <rect x="40" y="124" width="820" height="78" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="2.5"/>
  <text x="54" y="148" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    noodles-fasta
  </text>
  <text x="200" y="148" font-size="14"
        font-family="ui-monospace, monospace" fill="#555">
    v0.40.0
  </text>
  <text x="54" y="170" font-size="14" fill="#333">
    FASTA format reader and writer for the noodles ecosystem
  </text>
  <text x="54" y="190" font-size="13" fill="#1565c0" font-weight="600"
        font-family="ui-monospace, monospace">
    12,345,678 downloads
  </text>

  <!-- ===== Result 2: bio ===== -->
  <rect x="40" y="212" width="820" height="68" rx="6" ry="6"
        fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="54" y="234" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    bio
  </text>
  <text x="120" y="234" font-size="14"
        font-family="ui-monospace, monospace" fill="#555">
    v2.0.3
  </text>
  <text x="54" y="254" font-size="14" fill="#333">
    A bioinformatics library for Rust
  </text>
  <text x="54" y="272" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">
    4,567,890 downloads
  </text>

  <!-- ===== Result 3: rust-bio ===== -->
  <rect x="40" y="290" width="820" height="68" rx="6" ry="6"
        fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="54" y="312" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    rust-bio
  </text>
  <text x="160" y="312" font-size="14"
        font-family="ui-monospace, monospace" fill="#555">
    v1.7.0
  </text>
  <text x="54" y="332" font-size="14" fill="#333">
    Bioinformatics utilities
  </text>
  <text x="54" y="350" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">
    2,345,678 downloads
  </text>

  <!-- ===== Result 4: needletail ===== -->
  <rect x="40" y="368" width="820" height="68" rx="6" ry="6"
        fill="white" stroke="#bbb" stroke-width="1"/>
  <text x="54" y="390" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    needletail
  </text>
  <text x="170" y="390" font-size="14"
        font-family="ui-monospace, monospace" fill="#555">
    v0.5.1
  </text>
  <text x="54" y="410" font-size="14" fill="#333">
    Fast FASTX parsing
  </text>
  <text x="54" y="428" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">
    890,123 downloads
  </text>

  <!-- ===== Annotation: arrow pointing at download count of noodles-fasta ===== -->
  <path d="M 700 460 C 600 460, 350 220, 230 198"
        fill="none" stroke="#d97706" stroke-width="2"
        marker-end="url(#arr-orange)"/>
  <rect x="500" y="465" width="360" height="48" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="510" y="484" font-size="14" fill="#7a4a09">
    Download count = rough proxy for
  </text>
  <text x="510" y="503" font-size="14" fill="#7a4a09" font-weight="600">
    "is this trusted by the community?"
  </text>

</svg>
