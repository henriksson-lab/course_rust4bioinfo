  </text>

  <!-- Right panel: thick line -->
  <rect x="580" y="220" width="280" height="120" fill="white" stroke="#000" stroke-width="1.2"/>
  <text x="720" y="212" text-anchor="middle" font-size="13" fill="#666" font-family="ui-monospace, monospace">after</text>
  <polyline fill="none" stroke="#1976d2" stroke-width="3"
            points="595,310 630,275 665,290 700,245 735,260 770,225 805,240 840,210"/>

