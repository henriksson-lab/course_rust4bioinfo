  </text>

  <!-- ============ ROW 1: colour ============ -->
  <!-- Row band ~ y 60 to 195 -->

  <!-- Left panel (before): RED scatter -->
  <rect x="40" y="70" width="280" height="120" fill="white" stroke="#000" stroke-width="1.2"/>
  <text x="180" y="62" text-anchor="middle" font-size="13" fill="#666" font-family="ui-monospace, monospace">before</text>
  <g fill="#c62828">
    <circle cx="70"  cy="160" r="4"/>
    <circle cx="98"  cy="142" r="4"/>
    <circle cx="125" cy="155" r="4"/>
    <circle cx="148" cy="125" r="4"/>
    <circle cx="172" cy="135" r="4"/>
    <circle cx="198" cy="110" r="4"/>
    <circle cx="220" cy="120" r="4"/>
    <circle cx="245" cy="98"  r="4"/>
    <circle cx="270" cy="105" r="4"/>
    <circle cx="295" cy="88"  r="4"/>
  </g>

  <!-- Middle label -->
  <text x="450" y="125" text-anchor="middle" font-size="15" font-weight="600" fill="#222" font-family="ui-monospace, monospace">
    colour: RED
  </text>
  <text x="450" y="148" text-anchor="middle" font-size="15" font-weight="600" fill="#222" font-family="ui-monospace, monospace">
    &#8594; BLUE
  </text>

  <!-- Right panel (after): BLUE scatter, same points -->
  <rect x="580" y="70" width="280" height="120" fill="white" stroke="#000" stroke-width="1.2"/>
  <text x="720" y="62" text-anchor="middle" font-size="13" fill="#666" font-family="ui-monospace, monospace">after</text>
  <g fill="#1976d2">
    <circle cx="610" cy="160" r="4"/>
    <circle cx="638" cy="142" r="4"/>
    <circle cx="665" cy="155" r="4"/>
    <circle cx="688" cy="125" r="4"/>
    <circle cx="712" cy="135" r="4"/>
    <circle cx="738" cy="110" r="4"/>
    <circle cx="760" cy="120" r="4"/>
    <circle cx="785" cy="98"  r="4"/>
    <circle cx="810" cy="105" r="4"/>
    <circle cx="835" cy="88"  r="4"/>
  </g>

  <!-- ============ ROW 2: stroke width ============ -->
