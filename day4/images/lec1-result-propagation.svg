<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-ok" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-err" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    The ? operator: a fork at every fallible call
  </text>

  <!-- function signature header -->
  <rect x="30" y="55" width="840" height="40" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
  <text x="450" y="82" text-anchor="middle" font-size="15" font-weight="700"
        font-family="ui-monospace, monospace" fill="#8a5a07">
    fn first_line(path: &amp;Path) -&gt; Result&lt;String, io::Error&gt;
  </text>

  <!-- ===== Step 1: File::open ===== -->
  <rect x="60" y="160" width="180" height="80" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="150" y="190" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    File::open(path)?
  </text>
  <text x="150" y="212" text-anchor="middle" font-size="11" fill="#555">
    may fail: file missing,
  </text>
  <text x="150" y="226" text-anchor="middle" font-size="11" fill="#555">
    permission denied
  </text>

  <!-- ok arrow to step 2 -->
  <line x1="245" y1="200" x2="338" y2="200"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-ok)"/>
  <text x="291" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    Ok(File)
  </text>

  <!-- err arrow up -->
  <line x1="150" y1="155" x2="150" y2="115"
        stroke="#c62828" stroke-width="2.5" marker-end="url(#arrow-err)"/>
  <text x="160" y="135" font-size="12" font-weight="700" fill="#c62828">
    Err: return early
  </text>

  <!-- ===== Step 2: BufReader::new ===== -->
  <rect x="340" y="160" width="180" height="80" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="430" y="188" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    BufReader::new(f)
  </text>
  <text x="430" y="210" text-anchor="middle" font-size="11" fill="#555">
    infallible
  </text>
  <text x="430" y="226" text-anchor="middle" font-size="11" fill="#555">
    (no ? needed)
  </text>

  <!-- arrow to step 3 -->
  <line x1="525" y1="200" x2="618" y2="200"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-ok)"/>
  <text x="571" y="190" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    BufReader
  </text>

  <!-- ===== Step 3: lines().next() ===== -->
  <rect x="620" y="160" width="220" height="80" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="730" y="186" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    .lines().next()
  </text>
  <text x="730" y="202" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    .ok_or(empty)??
  </text>
  <text x="730" y="222" text-anchor="middle" font-size="11" fill="#555">
    may fail: empty file, I/O error
  </text>

  <!-- err arrow up (only from the fallible step) -->
  <line x1="730" y1="155" x2="730" y2="115"
        stroke="#c62828" stroke-width="2.5" marker-end="url(#arrow-err)"/>

  <!-- top exit lane -->
  <rect x="30" y="100" width="840" height="20" rx="4" ry="4"
        fill="#fdecea" stroke="#c62828" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#c62828">
    any ? hits Err  -&gt;  caller sees Err(io::Error), function body never reaches Ok
  </text>

  <!-- ok arrow down to result -->
  <line x1="730" y1="245" x2="730" y2="300"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-ok)"/>
  <text x="740" y="278" font-size="12" font-weight="700" fill="#2e7d32">
    Ok(line)
  </text>

  <!-- ===== Final return ===== -->
  <rect x="600" y="305" width="260" height="60" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="730" y="332" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    Ok(line)
  </text>
  <text x="730" y="352" text-anchor="middle" font-size="11" fill="#385a3c">
    happy-path return
  </text>

  <!-- ===== Code panel ===== -->
  <rect x="30" y="395" width="840" height="105" rx="8" ry="8"
        fill="#fafafa" stroke="#888" stroke-width="1.2"/>
  <g font-family="ui-monospace, monospace" font-size="14" fill="#222">
    <text x="50" y="420">fn first_line(path: &amp;Path) -&gt; Result&lt;String, io::Error&gt; {</text>
    <text x="50" y="440">    let file   = File::open(path)?;</text>
    <text x="50" y="460">    let reader = BufReader::new(file);</text>
    <text x="50" y="480">    reader.lines().next().ok_or_else(|| io::Error::other("empty"))?</text>
    <text x="50" y="496">}</text>
  </g>

</svg>
