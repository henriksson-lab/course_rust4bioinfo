<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-fl-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arrow-fl-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
    <marker id="arrow-fl-dark" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    A streaming filter: keep long reads, drop short ones
  </text>

  <!-- ===== 1. Source FASTQ ===== -->
  <rect x="20" y="120" width="120" height="100" rx="8" ry="8"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="80" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#333">
    Source
  </text>
  <text x="80" y="168" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    in.fastq
  </text>
  <text x="80" y="190" text-anchor="middle" font-size="11" fill="#777" font-style="italic">
    huge file
  </text>
  <text x="80" y="206" text-anchor="middle" font-size="11" fill="#777" font-style="italic">
    on disk
  </text>

  <!-- arrow -->
  <line x1="143" y1="170" x2="188" y2="170"
        stroke="#444" stroke-width="2" marker-end="url(#arrow-fl-dark)"/>

  <!-- ===== 2. Reader ===== -->
  <rect x="190" y="130" width="140" height="80" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="260" y="156" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#8a5a07">
    fastq::Reader
  </text>
  <text x="260" y="176" text-anchor="middle" font-size="11" fill="#555">
    parses Record
  </text>
  <text x="260" y="194" text-anchor="middle" font-size="11" fill="#555">
    one at a time
  </text>

  <!-- arrow Reader -> filter diamond -->
  <line x1="333" y1="170" x2="395" y2="170"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-fl-green)"/>
  <text x="364" y="160" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">
    Record
  </text>

  <!-- ===== 3. Filter diamond ===== -->
  <polygon points="495,90 605,170 495,250 385,170"
           fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="495" y="160" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    record.sequence()
  </text>
  <text x="495" y="178" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1565c0">
    .len() &gt;= min_len
  </text>
  <text x="495" y="200" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    decision
  </text>

  <!-- ===== Yes branch (green) ===== -->
  <line x1="608" y1="170" x2="668" y2="170"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-fl-green)"/>
  <text x="638" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#2e7d32">
    Yes
  </text>

  <!-- ===== 4. Writer ===== -->
  <rect x="670" y="130" width="140" height="80" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="740" y="156" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#8a5a07">
    fastq::Writer
  </text>
  <text x="740" y="176" text-anchor="middle" font-size="11" fill="#555">
    serialises kept
  </text>
  <text x="740" y="194" text-anchor="middle" font-size="11" fill="#555">
    records back out
  </text>

  <!-- arrow Writer -> destination -->
  <line x1="813" y1="170" x2="858" y2="170"
        stroke="#444" stroke-width="2" marker-end="url(#arrow-fl-dark)"/>

  <!-- ===== 5. Destination FASTQ ===== -->
  <rect x="860" y="120" width="40" height="100" rx="8" ry="8"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="880" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#333"
        transform="rotate(-90 880 160)">
    out.fastq
  </text>

  <!-- ===== No branch (red, dashed) - downward ===== -->
  <line x1="495" y1="252" x2="495" y2="310"
        stroke="#c62828" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-fl-red)"/>
  <text x="505" y="285" font-size="12" font-weight="700" fill="#c62828">
    No
  </text>

  <!-- "dropped" box -->
  <rect x="400" y="315" width="190" height="50" rx="8" ry="8"
        fill="#fdecea" stroke="#c62828" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="495" y="338" text-anchor="middle" font-size="13" font-weight="700" fill="#c62828">
    dropped
  </text>
  <text x="495" y="356" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    no further processing
  </text>

  <!-- ===== Memory annotation (bottom band) ===== -->
  <rect x="20" y="385" width="880" height="55" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="460" y="410" text-anchor="middle" font-size="14" font-weight="700" fill="#1b5e20">
    1 record in flight at a time.
  </text>
  <text x="460" y="430" text-anchor="middle" font-size="12" fill="#333">
    Constant memory regardless of file size &#8212; a 10 GB FASTQ uses the same RAM as a 10 KB one.
  </text>

</svg>
