<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow-grey-cd" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arrow-green-cd" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Cargo.toml to running binary
  </text>

  <!-- ===== 1. Cargo.toml (top left) ===== -->
  <rect x="30" y="60" width="320" height="170" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="190" y="83" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#8a5a07">
    Cargo.toml
  </text>
  <g font-family="ui-monospace, monospace" font-size="13" fill="#333">
    <text x="50" y="108">[package]</text>
    <text x="50" y="124">name = "qc-report"</text>
    <text x="50" y="140">edition = "2021"</text>

    <text x="50" y="166" font-weight="700">[dependencies]</text>
    <text x="50" y="184" id="dep-fasta">noodles-fasta = "0.50"</text>
    <text x="50" y="200" id="dep-plot">plotters      = "0.3"</text>
    <text x="50" y="216" id="dep-zip">zip           = "0.6"</text>
  </g>

  <!-- arrows from each dep line down to crates.io -->
  <line x1="370" y1="184" x2="470" y2="270"
        stroke="#888" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#arrow-grey-cd)"/>
  <line x1="370" y1="200" x2="475" y2="275"
        stroke="#888" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#arrow-grey-cd)"/>
  <line x1="370" y1="216" x2="480" y2="280"
        stroke="#888" stroke-width="1.4" stroke-dasharray="3,3" marker-end="url(#arrow-grey-cd)"/>

  <!-- ===== 2. crates.io cloud (middle) ===== -->
  <g>
    <!-- cloud shape -->
    <ellipse cx="490" cy="280" rx="80" ry="34" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <ellipse cx="450" cy="270" rx="40" ry="26" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <ellipse cx="530" cy="270" rx="40" ry="26" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
    <text x="490" y="278" text-anchor="middle" font-size="14" font-weight="700"
          font-family="ui-monospace, monospace" fill="#1565c0">
      crates.io
    </text>
    <text x="490" y="296" text-anchor="middle" font-size="11" fill="#555">
      public registry
    </text>
  </g>
  <text x="490" y="334" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    "0.50" resolves to e.g. 0.50.3
  </text>

  <!-- arrow cloud -> local cache -->
  <line x1="490" y1="345" x2="490" y2="395"
        stroke="#888" stroke-width="2" marker-end="url(#arrow-grey-cd)"/>
  <text x="500" y="375" font-size="12" fill="#555" font-style="italic">
    cached locally
  </text>

  <!-- ===== 3. Local cache (bottom-middle) ===== -->
  <rect x="380" y="400" width="220" height="60" rx="6" ry="6"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <text x="490" y="424" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#333">
    ~/.cargo/registry/
  </text>
  <text x="490" y="444" text-anchor="middle" font-size="11" fill="#555">
    downloaded once, reused forever
  </text>

  <!-- arrow cache -> compile/link -->
  <line x1="605" y1="430" x2="688" y2="280"
        stroke="#2e7d32" stroke-width="2" marker-end="url(#arrow-green-cd)"/>
  <text x="660" y="370" font-size="12" fill="#2e7d32" font-weight="600">
    linked in
  </text>

  <!-- ===== 4. rustc compile + link (right) ===== -->
  <rect x="640" y="220" width="220" height="80" rx="8" ry="8"
        fill="#ffe0b2" stroke="#d97706" stroke-width="2"/>
  <text x="750" y="246" text-anchor="middle" font-size="15" font-weight="700" fill="#b45309">
    rustc + linker
  </text>
  <text x="750" y="266" text-anchor="middle" font-size="12" fill="#7a4a09">
    your code + crates
  </text>
  <text x="750" y="284" text-anchor="middle" font-size="12" fill="#7a4a09">
    = one binary
  </text>

  <!-- arrow rustc -> binary -->
  <line x1="750" y1="305" x2="750" y2="395"
        stroke="#2e7d32" stroke-width="2.5" marker-end="url(#arrow-green-cd)"/>
  <text x="760" y="355" font-size="13" font-weight="600" fill="#2e7d32">
    produces
  </text>

  <!-- ===== 5. binary ===== -->
  <rect x="640" y="400" width="220" height="60" rx="6" ry="6"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="750" y="425" text-anchor="middle" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    target/debug/qc-report
  </text>
  <text x="750" y="445" text-anchor="middle" font-size="11" fill="#385a3c">
    contains every byte of every dep
  </text>

  <!-- footer -->
  <text x="450" y="495" text-anchor="middle" font-size="13" fill="#555">
    You add one line to Cargo.toml. Cargo handles fetching, version resolution, caching, and linking.
  </text>

</svg>
