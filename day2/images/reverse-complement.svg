<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 420"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="rc-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <text x="310" y="26" text-anchor="middle" font-size="17" font-weight="600">
    Reverse complement of ATTGC: reverse, then complement
  </text>

  <!-- ===== Row 1: input ATTGC (5 cells, each 50x50, starting x=185, y=60) ===== -->
  <text x="120" y="92" text-anchor="end" font-size="15" fill="#555">input:</text>

  <rect x="185" y="60" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="235" y="60" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="285" y="60" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="335" y="60" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="385" y="60" width="50" height="50" fill="white" stroke="#888"/>

  <text x="210" y="94" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">A</text>
  <text x="260" y="94" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="310" y="94" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="360" y="94" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">G</text>
  <text x="410" y="94" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">C</text>

  <!-- ===== arrow between row 1 and row 2: "reverse" (a left-pointing arrow) ===== -->
  <!-- horizontal arrow spanning roughly the row, pointing left -->
  <line x1="410" y1="140" x2="210" y2="140"
        stroke="#444" stroke-width="2" marker-end="url(#rc-arrow)"/>
  <text x="310" y="132" text-anchor="middle" font-size="15" fill="#444"
        font-weight="600">reverse</text>

  <!-- ===== Row 2: reversed CGTTA ===== -->
  <text x="120" y="192" text-anchor="end" font-size="15" fill="#555">reversed:</text>

  <rect x="185" y="160" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="235" y="160" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="285" y="160" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="335" y="160" width="50" height="50" fill="white" stroke="#888"/>
  <rect x="385" y="160" width="50" height="50" fill="white" stroke="#888"/>

  <text x="210" y="194" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">C</text>
  <text x="260" y="194" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">G</text>
  <text x="310" y="194" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="360" y="194" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="410" y="194" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace">A</text>

  <!-- ===== arrow between row 2 and row 3: complement (down) ===== -->
  <line x1="310" y1="220" x2="310" y2="258"
        stroke="#444" stroke-width="2" marker-end="url(#rc-arrow)"/>
  <text x="325" y="244" font-size="15" fill="#444" font-weight="600">
    complement (A↔T, C↔G)
  </text>

  <!-- ===== Row 3: reverse complement GCAAT (highlighted) ===== -->
  <text x="120" y="292" text-anchor="end" font-size="11" fill="#555">reverse complement:</text>

  <rect x="185" y="260" width="50" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2.5"/>
  <rect x="235" y="260" width="50" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2.5"/>
  <rect x="285" y="260" width="50" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2.5"/>
  <rect x="335" y="260" width="50" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2.5"/>
  <rect x="385" y="260" width="50" height="50" fill="#fff3cd" stroke="#d97706" stroke-width="2.5"/>

  <text x="210" y="294" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">G</text>
  <text x="260" y="294" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">C</text>
  <text x="310" y="294" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">A</text>
  <text x="360" y="294" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">A</text>
  <text x="410" y="294" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#b45309">T</text>

  <!-- ===== Footer note ===== -->
  <text x="310" y="350" text-anchor="middle" font-size="15" fill="#333">
    Complementing each base then reversing the order yields the same result.
  </text>
  <text x="310" y="370" text-anchor="middle" font-size="12" fill="#777">
    The two operations commute, so the order is a matter of taste — and of cache friendliness.
  </text>

</svg>
