<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="le-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Lifetime elision &#8212; the compiler infers what's safe
  </text>

  <!-- Panel A: what you write -->
  <text x="450" y="80" text-anchor="middle" font-size="14" fill="#555">
    What you write:
  </text>
  <rect x="120" y="98" width="660" height="58" fill="#e3f2fd"
        stroke="#1565c0" stroke-width="1.5" rx="4"/>
  <text x="450" y="136" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#0d47a1">
    fn quality_trim(qual: &amp;[u8], min: u8) -&gt; &amp;[u8]
  </text>

  <!-- Panel B: what the compiler infers -->
  <text x="450" y="200" text-anchor="middle" font-size="14" fill="#555">
    What the compiler actually sees:
  </text>
  <rect x="80" y="218" width="740" height="80" fill="#e8f5e9"
        stroke="#2e7d32" stroke-width="1.5" rx="4"/>
  <text x="450" y="258" text-anchor="middle" font-size="20" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    fn quality_trim&lt;'a&gt;(qual: &amp;'a [u8], min: u8) -&gt; &amp;'a [u8]
  </text>
  <text x="450" y="284" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#2e7d32" font-style="italic">
    same lifetime 'a on input and output &#8212; the output borrows from qual
  </text>

  <!-- arrows linking input 'a -> output 'a -->
  <!-- input position roughly under &'a [u8] -->
  <path d="M 318 270 Q 450 340 600 270"
        fill="none" stroke="#2e7d32" stroke-width="2.2" stroke-dasharray="6,4"
        marker-end="url(#le-arrow)"/>
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#2e7d32">
    output lives no longer than the input
  </text>

  <!-- Footer -->
  <rect x="40" y="370" width="820" height="56" fill="#fafafa"
        stroke="#aaa" stroke-dasharray="6,4" stroke-width="1" rx="4"/>
  <text x="450" y="394" text-anchor="middle" font-size="14" fill="#333">
    Rule: one reference in, one reference out &#8594; output's lifetime is the input's.
  </text>
  <text x="450" y="414" text-anchor="middle" font-size="13" fill="#666" font-style="italic">
    With two input references that could feed the output, you have to spell out
    <tspan font-family="ui-monospace, monospace">'a</tspan> yourself. (Later in the week.)
  </text>

</svg>
