<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 460"
     font-family="system-ui, -apple-system, sans-serif">

  <text x="380" y="26" text-anchor="middle" font-size="17" font-weight="600">
    Three k=3 sliding windows over one backing <tspan font-family="ui-monospace, monospace">Vec&lt;u8&gt;</tspan>
  </text>
  <text x="380" y="46" text-anchor="middle" font-size="12" fill="#555">
    Each window is a slice (pointer + length); no bytes are copied.
  </text>

  <!-- ====== Backing buffer label ====== -->
  <text x="60" y="92" font-size="12" fill="#0d47a1" font-weight="600">
    Vec&lt;u8&gt; (7 bytes on the heap):
  </text>

  <!-- ====== The 7-cell backing rectangle ======
       cell width 70, cell height 60, origin x=80, y=100 -->
  <rect x="80"  y="100" width="70" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="150" y="100" width="70" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="220" y="100" width="70" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="290" y="100" width="70" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="360" y="100" width="70" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="430" y="100" width="70" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>
  <rect x="500" y="100" width="70" height="60" fill="#f5f5f5" stroke="#444" stroke-width="1.5"/>

  <text x="115" y="140" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace">A</text>
  <text x="185" y="140" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace">C</text>
  <text x="255" y="140" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace">G</text>
  <text x="325" y="140" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="395" y="140" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace">A</text>
  <text x="465" y="140" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace">C</text>
  <text x="535" y="140" text-anchor="middle" font-size="26" font-weight="700"
        font-family="ui-monospace, monospace">G</text>

  <!-- index labels under each cell -->
  <text x="115" y="180" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">0</text>
  <text x="185" y="180" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">1</text>
  <text x="255" y="180" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">2</text>
  <text x="325" y="180" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">3</text>
  <text x="395" y="180" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">4</text>
  <text x="465" y="180" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">5</text>
  <text x="535" y="180" text-anchor="middle" font-size="13" fill="#555"
        font-family="ui-monospace, monospace">6</text>

  <!-- ====== Window 1: indices 0..3 (blue) ======
       brackets sit at y=200..212 spanning x=80..290 -->
  <path d="M 80 212 L 80 200 L 290 200 L 290 212"
        stroke="#1565c0" stroke-width="2.5" fill="none"/>
  <text x="185" y="232" text-anchor="middle" font-size="13" fill="#1565c0"
        font-family="ui-monospace, monospace" font-weight="700">
    &amp;seq[0..3]  →  b"ACG"
  </text>

  <!-- ====== Window 2: indices 1..4 (orange) ====== -->
  <path d="M 150 264 L 150 252 L 360 252 L 360 264"
        stroke="#d97706" stroke-width="2.5" fill="none"/>
  <text x="255" y="284" text-anchor="middle" font-size="13" fill="#b45309"
        font-family="ui-monospace, monospace" font-weight="700">
    &amp;seq[1..4]  →  b"CGT"
  </text>

  <!-- ====== Window 3: indices 2..5 (green) ====== -->
  <path d="M 220 316 L 220 304 L 430 304 L 430 316"
        stroke="#2e7d32" stroke-width="2.5" fill="none"/>
  <text x="325" y="336" text-anchor="middle" font-size="13" fill="#2e7d32"
        font-family="ui-monospace, monospace" font-weight="700">
    &amp;seq[2..5]  →  b"GTA"
  </text>

  <!-- ====== Note box ====== -->
  <rect x="60" y="370" width="640" height="70" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="75" y="392" font-size="13" font-weight="700" fill="#0d47a1">
    What is a slice?
  </text>
  <text x="75" y="412" font-size="12" fill="#333">
    Each <tspan font-family="ui-monospace, monospace">&amp;[u8]</tspan> is a pointer plus a length — 16 bytes on a 64-bit machine — pointing into the same <tspan font-family="ui-monospace, monospace">Vec&lt;u8&gt;</tspan>.
  </text>
  <text x="75" y="430" font-size="12" fill="#333">
    All three windows above share the same backing storage; the seven DNA bytes are never copied.
  </text>

</svg>
