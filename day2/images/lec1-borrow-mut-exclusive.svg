<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="bmx-arrow-orange" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
    <marker id="bmx-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="bmx-arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#c62828"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Mutable borrows are <tspan font-style="italic">exclusive</tspan>
  </text>
  <text x="450" y="56" text-anchor="middle" font-size="14" fill="#555">
    one <tspan font-family="ui-monospace, monospace">&amp;mut T</tspan>, and nothing else, while it is alive
  </text>

  <!-- ============== Left panel: OK ============== -->
  <rect x="30" y="80" width="400" height="380" fill="#f1f8e9"
        stroke="#2e7d32" stroke-width="1.8" rx="6"/>
  <text x="230" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#1b5e20">
    OK &#8212; one mutable borrow
  </text>

  <text x="50" y="138" font-size="13"
        font-family="ui-monospace, monospace" fill="#1565c0">
    let mut v = vec![b'A', b'C', b'G'];
  </text>
  <text x="50" y="158" font-size="13"
        font-family="ui-monospace, monospace" fill="#1565c0">
    let m = &amp;mut v;
  </text>
  <text x="50" y="178" font-size="13"
        font-family="ui-monospace, monospace" fill="#1565c0">
    m.push(b'T');
  </text>

  <!-- v box -->
  <rect x="80" y="210" width="140" height="55" fill="white"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="92" y="232" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    v: Vec&lt;u8&gt;
  </text>
  <text x="92" y="252" font-size="11" font-family="ui-monospace, monospace" fill="#888">
    ptr/len/cap
  </text>

  <!-- m box -->
  <rect x="80" y="295" width="140" height="45" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.8"/>
  <text x="92" y="322" font-size="13" font-family="ui-monospace, monospace" fill="#b45309">
    m: &amp;mut v
  </text>

  <!-- arrow from m to v -->
  <line x1="180" y1="295" x2="180" y2="265"
        stroke="#d97706" stroke-width="2.2" marker-end="url(#bmx-arrow-orange)"/>
  <text x="230" y="285" font-size="13" fill="#d97706" font-weight="600">
    sole writer
  </text>

  <text x="230" y="380" text-anchor="middle" font-size="13" fill="#1b5e20" font-weight="600">
    compiles. Runs.
  </text>
  <text x="230" y="402" text-anchor="middle" font-size="12" fill="#666">
    No other borrow exists while
  </text>
  <text x="230" y="418" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#666">
    m is alive.
  </text>
  <text x="230" y="442" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    push may reallocate &#8212; safe, no aliases.
  </text>

  <!-- ============== Right panel: ERROR ============== -->
  <rect x="470" y="80" width="400" height="380" fill="#fdecea"
        stroke="#c62828" stroke-width="1.8" rx="6"/>
  <text x="670" y="108" text-anchor="middle" font-size="16" font-weight="700" fill="#b71c1c">
    Compile error &#8212; aliasing a mutable borrow
  </text>

  <text x="490" y="138" font-size="13"
        font-family="ui-monospace, monospace" fill="#1565c0">
    let mut v = vec![b'A', b'C', b'G'];
  </text>
  <text x="490" y="158" font-size="13"
        font-family="ui-monospace, monospace" fill="#1565c0">
    let m = &amp;mut v;
  </text>
  <text x="490" y="178" font-size="13"
        font-family="ui-monospace, monospace" fill="#c62828">
    let r = &amp;v;       <tspan fill="#888" font-family="system-ui, sans-serif" font-style="italic">// also tried: let n = &amp;mut v;</tspan>
  </text>

  <!-- v box -->
  <rect x="520" y="210" width="140" height="55" fill="white"
        stroke="#1565c0" stroke-width="1.5"/>
  <text x="532" y="232" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    v: Vec&lt;u8&gt;
  </text>
  <text x="532" y="252" font-size="11" font-family="ui-monospace, monospace" fill="#888">
    ptr/len/cap
  </text>

  <!-- m -->
  <rect x="490" y="295" width="120" height="45" fill="#fff3cd"
        stroke="#d97706" stroke-width="1.8"/>
  <text x="502" y="322" font-size="13" font-family="ui-monospace, monospace" fill="#b45309">
    m: &amp;mut v
  </text>

  <!-- r (rejected) -->
  <rect x="700" y="295" width="120" height="45" fill="#fdecea"
        stroke="#c62828" stroke-width="1.8" stroke-dasharray="5,3"/>
  <text x="712" y="322" font-size="13" font-family="ui-monospace, monospace" fill="#c62828">
    r: &amp;v
  </text>
  <line x1="700" y1="295" x2="820" y2="340" stroke="#c62828" stroke-width="2.5"/>
  <line x1="820" y1="295" x2="700" y2="340" stroke="#c62828" stroke-width="2.5"/>

  <!-- arrows -->
  <line x1="560" y1="295" x2="570" y2="265"
        stroke="#d97706" stroke-width="2.2" marker-end="url(#bmx-arrow-orange)"/>
  <line x1="750" y1="295" x2="640" y2="265"
        stroke="#c62828" stroke-width="2.2" stroke-dasharray="5,3"
        marker-end="url(#bmx-arrow-red)"/>

  <text x="670" y="380" text-anchor="middle" font-size="13" fill="#b71c1c" font-weight="600">
    error[E0502]: cannot borrow `v` as immutable
  </text>
  <text x="670" y="398" text-anchor="middle" font-size="13" fill="#b71c1c" font-weight="600">
    because it is also borrowed as mutable
  </text>
  <text x="670" y="424" text-anchor="middle" font-size="12" fill="#666" font-style="italic">
    No data race is possible &#8212; the compiler refused.
  </text>

  <!-- Footer -->
  <text x="450" y="495" text-anchor="middle" font-size="14" fill="#333">
    The rule: at any program point, a value has either
    <tspan font-weight="700" fill="#2e7d32"> any number of &amp;T</tspan>
    or
    <tspan font-weight="700" fill="#d97706">exactly one &amp;mut T</tspan>.
  </text>

</svg>
