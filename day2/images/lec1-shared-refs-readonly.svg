<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="sr-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2"/>
    </marker>
    <marker id="sr-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="700" fill="#333">
    Many shared borrows &#8212; same data, multiple views, all read-only
  </text>

  <!-- Stack region label -->
  <rect x="30" y="70" width="260" height="280" fill="#e3f2fd" stroke="#1976d2"
        stroke-width="1.5" rx="6"/>
  <text x="160" y="92" text-anchor="middle" font-size="14" fill="#1976d2" font-weight="700">
    Stack
  </text>

  <!-- v (owner) -->
  <rect x="55" y="110" width="210" height="60" fill="white" stroke="#1976d2" stroke-width="1.8"/>
  <text x="65" y="130" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    v: Vec&lt;u8&gt;
  </text>
  <text x="65" y="150" font-size="12" font-family="ui-monospace, monospace" fill="#555">
    ptr | len:4 | cap:4
  </text>
  <text x="65" y="165" font-size="11" fill="#2e7d32" font-style="italic">
    owner
  </text>

  <!-- r -->
  <rect x="55" y="195" width="210" height="48" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="65" y="215" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    r: &amp;Vec&lt;u8&gt;
  </text>
  <text x="65" y="232" font-size="11" fill="#2e7d32" font-style="italic">
    shared borrow &#8212; read only
  </text>

  <!-- s -->
  <rect x="55" y="263" width="210" height="48" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="65" y="283" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    s: &amp;Vec&lt;u8&gt;
  </text>
  <text x="65" y="300" font-size="11" fill="#2e7d32" font-style="italic">
    shared borrow &#8212; read only
  </text>

  <!-- Heap region label -->
  <rect x="510" y="70" width="260" height="280" fill="#fff3cd" stroke="#d97706"
        stroke-width="1.5" rx="6"/>
  <text x="640" y="92" text-anchor="middle" font-size="14" fill="#d97706" font-weight="700">
    Heap
  </text>

  <!-- 4 cells A C G T -->
  <g>
    <rect x="540" y="180" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <rect x="590" y="180" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <rect x="640" y="180" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <rect x="690" y="180" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <text x="565" y="216" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">A</text>
    <text x="615" y="216" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">C</text>
    <text x="665" y="216" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">G</text>
    <text x="715" y="216" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">T</text>
  </g>
  <text x="640" y="260" text-anchor="middle" font-size="11" fill="#888" font-family="ui-monospace, monospace">
    4 bytes
  </text>

  <!-- Arrows from v, r, s to heap data -->
  <!-- v -> heap (blue, owner) -->
  <line x1="265" y1="140" x2="540" y2="195"
        stroke="#1976d2" stroke-width="2.2" marker-end="url(#sr-arrow-blue)"/>
  <!-- r -> heap (green) -->
  <line x1="265" y1="219" x2="540" y2="210"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#sr-arrow-green)"/>
  <!-- s -> heap (green) -->
  <line x1="265" y1="287" x2="540" y2="225"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#sr-arrow-green)"/>

  <!-- Bottom note -->
  <line x1="30" y1="365" x2="770" y2="365" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="388" text-anchor="middle" font-size="14" fill="#333">
    Any number of shared borrows can co-exist; while they're alive, nobody (not even the owner) can mutate the data.
  </text>

</svg>
