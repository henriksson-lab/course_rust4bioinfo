<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="buf-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
    <marker id="buf-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <text x="490" y="28" text-anchor="middle" font-size="17" font-weight="600">
    The same heap allocation across three states of the caller's buffer
  </text>
  <text x="490" y="48" text-anchor="middle" font-size="14" fill="#555">
    len = used elements, cap = reserved cells, ptr = address of the heap block
  </text>

  <!-- ====== layout constants ======
       Each state is a horizontal row.
       Vec header: x=40..200, height 70.
       ptr arrow:  x=200..260.
       Allocation: x=260..900 (640 px wide = 10 px per cell × 64 cells).
       cell width = 10 px, cell height = 36 px.
       Row Y centres:
         State A: y top of header 90, allocation y=98..134
         State B: y top of header 240, allocation y=248..284
         State C: y top of header 390, allocation y=398..434
  -->

  <!-- ====== STATE A — before clear() ====== -->
  <text x="40" y="78" font-size="16" font-weight="700">State A — before the call</text>

  <!-- Vec header box -->
  <rect x="40" y="88" width="160" height="60" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="50" y="106" font-size="14" fill="#0d47a1" font-weight="600">Vec&lt;u8&gt; (stack)</text>
  <text x="50" y="124" font-size="14" font-family="ui-monospace, monospace">len = 12</text>
  <text x="50" y="140" font-size="14" font-family="ui-monospace, monospace">cap = 64</text>
  <text x="120" y="124" font-size="14" font-family="ui-monospace, monospace">ptr</text>

  <!-- ptr arrow -->
  <line x1="155" y1="120" x2="258" y2="116"
        stroke="#444" stroke-width="2" marker-end="url(#buf-arrow)"/>

  <!-- Allocation rectangle: 64 cells, drawn as one rect with internal group dividers -->
  <rect x="260" y="98" width="640" height="36" fill="white" stroke="#444" stroke-width="1.5"/>
  <!-- group dividers every 8 cells (light grey) -->
  <line x1="340" y1="98" x2="340" y2="134" stroke="#ccc"/>
  <line x1="420" y1="98" x2="420" y2="134" stroke="#ccc"/>
  <line x1="500" y1="98" x2="500" y2="134" stroke="#ccc"/>
  <line x1="580" y1="98" x2="580" y2="134" stroke="#ccc"/>
  <line x1="660" y1="98" x2="660" y2="134" stroke="#ccc"/>
  <line x1="740" y1="98" x2="740" y2="134" stroke="#ccc"/>
  <line x1="820" y1="98" x2="820" y2="134" stroke="#ccc"/>
  <!-- shade the live region (first 12 cells = 120 px) -->
  <rect x="260" y="98" width="120" height="36" fill="#e3f2fd"/>
  <!-- per-cell dividers across the first 12 cells -->
  <line x1="270" y1="98" x2="270" y2="134" stroke="#bbb"/>
  <line x1="280" y1="98" x2="280" y2="134" stroke="#bbb"/>
  <line x1="290" y1="98" x2="290" y2="134" stroke="#bbb"/>
  <line x1="300" y1="98" x2="300" y2="134" stroke="#bbb"/>
  <line x1="310" y1="98" x2="310" y2="134" stroke="#bbb"/>
  <line x1="320" y1="98" x2="320" y2="134" stroke="#bbb"/>
  <line x1="330" y1="98" x2="330" y2="134" stroke="#bbb"/>
  <line x1="340" y1="98" x2="340" y2="134" stroke="#bbb"/>
  <line x1="350" y1="98" x2="350" y2="134" stroke="#bbb"/>
  <line x1="360" y1="98" x2="360" y2="134" stroke="#bbb"/>
  <line x1="370" y1="98" x2="370" y2="134" stroke="#bbb"/>
  <!-- mark the live boundary at cell 12 -->
  <line x1="380" y1="92" x2="380" y2="140" stroke="#1565c0" stroke-width="2"/>

  <!-- bytes A T G C A T G C A T G C -->
  <text x="265" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">A</text>
  <text x="275" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="285" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">G</text>
  <text x="295" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">C</text>
  <text x="305" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">A</text>
  <text x="315" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="325" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">G</text>
  <text x="335" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">C</text>
  <text x="345" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">A</text>
  <text x="355" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">T</text>
  <text x="365" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">G</text>
  <text x="375" y="123" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace">C</text>

  <!-- below the allocation: cell counts -->
  <text x="320" y="153" text-anchor="middle" font-size="13" fill="#0d47a1">
    12 live bytes
  </text>
  <text x="640" y="153" text-anchor="middle" font-size="13" fill="#777">
    52 reserved cells (uninitialised, but allocated)
  </text>
  <text x="40" y="170" font-size="14" fill="#333">
    Caller-provided buffer with some prior contents.
  </text>

  <!-- ====== STATE B — after buf.clear() ====== -->
  <text x="40" y="220" font-size="16" font-weight="700">State B — after <tspan font-family="ui-monospace, monospace">buf.clear()</tspan></text>

  <rect x="40" y="230" width="160" height="60" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="50" y="248" font-size="14" fill="#0d47a1" font-weight="600">Vec&lt;u8&gt; (stack)</text>
  <text x="50" y="266" font-size="14" font-family="ui-monospace, monospace" fill="#2e7d32" font-weight="700">len = 0</text>
  <text x="50" y="282" font-size="14" font-family="ui-monospace, monospace">cap = 64</text>
  <text x="120" y="266" font-size="14" font-family="ui-monospace, monospace">ptr</text>

  <line x1="155" y1="262" x2="258" y2="258"
        stroke="#444" stroke-width="2" marker-end="url(#buf-arrow)"/>

  <rect x="260" y="240" width="640" height="36" fill="white" stroke="#444" stroke-width="1.5"/>
  <line x1="340" y1="240" x2="340" y2="276" stroke="#ccc"/>
  <line x1="420" y1="240" x2="420" y2="276" stroke="#ccc"/>
  <line x1="500" y1="240" x2="500" y2="276" stroke="#ccc"/>
  <line x1="580" y1="240" x2="580" y2="276" stroke="#ccc"/>
  <line x1="660" y1="240" x2="660" y2="276" stroke="#ccc"/>
  <line x1="740" y1="240" x2="740" y2="276" stroke="#ccc"/>
  <line x1="820" y1="240" x2="820" y2="276" stroke="#ccc"/>
  <!-- the live boundary is at the left edge: len = 0 -->
  <line x1="260" y1="234" x2="260" y2="282" stroke="#1565c0" stroke-width="2"/>

  <text x="580" y="296" text-anchor="middle" font-size="13" fill="#777">
    64 reserved cells (logically empty, physically untouched)
  </text>
  <text x="40" y="313" font-size="14" fill="#333">
    <tspan font-family="ui-monospace, monospace">clear()</tspan> drops length to 0; capacity and pointer unchanged — no deallocation.
  </text>

  <!-- ====== STATE C — after revcomp_into(input, &mut buf) ====== -->
  <text x="40" y="370" font-size="16" font-weight="700">State C — after <tspan font-family="ui-monospace, monospace">revcomp_into(input, &amp;mut buf)</tspan></text>

  <rect x="40" y="380" width="160" height="60" fill="#e3f2fd" stroke="#1565c0"/>
  <text x="50" y="398" font-size="14" fill="#0d47a1" font-weight="600">Vec&lt;u8&gt; (stack)</text>
  <text x="50" y="416" font-size="14" font-family="ui-monospace, monospace">len = 12</text>
  <text x="50" y="432" font-size="14" font-family="ui-monospace, monospace">cap = 64</text>
  <text x="120" y="416" font-size="14" font-family="ui-monospace, monospace">ptr</text>

  <line x1="155" y1="412" x2="258" y2="408"
        stroke="#444" stroke-width="2" marker-end="url(#buf-arrow)"/>

  <rect x="260" y="390" width="640" height="36" fill="white" stroke="#444" stroke-width="1.5"/>
  <line x1="340" y1="390" x2="340" y2="426" stroke="#ccc"/>
  <line x1="420" y1="390" x2="420" y2="426" stroke="#ccc"/>
  <line x1="500" y1="390" x2="500" y2="426" stroke="#ccc"/>
  <line x1="580" y1="390" x2="580" y2="426" stroke="#ccc"/>
  <line x1="660" y1="390" x2="660" y2="426" stroke="#ccc"/>
  <line x1="740" y1="390" x2="740" y2="426" stroke="#ccc"/>
  <line x1="820" y1="390" x2="820" y2="426" stroke="#ccc"/>
  <!-- live region tint (first 12 cells), green to indicate freshly written -->
  <rect x="260" y="390" width="120" height="36" fill="#e8f5e9"/>
  <line x1="270" y1="390" x2="270" y2="426" stroke="#bbb"/>
  <line x1="280" y1="390" x2="280" y2="426" stroke="#bbb"/>
  <line x1="290" y1="390" x2="290" y2="426" stroke="#bbb"/>
  <line x1="300" y1="390" x2="300" y2="426" stroke="#bbb"/>
  <line x1="310" y1="390" x2="310" y2="426" stroke="#bbb"/>
  <line x1="320" y1="390" x2="320" y2="426" stroke="#bbb"/>
  <line x1="330" y1="390" x2="330" y2="426" stroke="#bbb"/>
  <line x1="340" y1="390" x2="340" y2="426" stroke="#bbb"/>
  <line x1="350" y1="390" x2="350" y2="426" stroke="#bbb"/>
  <line x1="360" y1="390" x2="360" y2="426" stroke="#bbb"/>
  <line x1="370" y1="390" x2="370" y2="426" stroke="#bbb"/>
  <line x1="380" y1="384" x2="380" y2="432" stroke="#1565c0" stroke-width="2"/>

  <!-- reverse complement of ATGCATGCATGC = GCATGCATGCAT -->
  <text x="265" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">G</text>
  <text x="275" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">C</text>
  <text x="285" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">A</text>
  <text x="295" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">T</text>
  <text x="305" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">G</text>
  <text x="315" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">C</text>
  <text x="325" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">A</text>
  <text x="335" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">T</text>
  <text x="345" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">G</text>
  <text x="355" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">C</text>
  <text x="365" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">A</text>
  <text x="375" y="415" font-size="14" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">T</text>

  <text x="320" y="445" text-anchor="middle" font-size="13" fill="#2e7d32">
    12 fresh bytes (reverse complement)
  </text>
  <text x="640" y="445" text-anchor="middle" font-size="13" fill="#777">
    52 reserved cells (unchanged)
  </text>
  <text x="40" y="462" font-size="14" fill="#333">
    Filled with new contents — no allocation, no copy beyond the bytes themselves.
  </text>

  <!-- ====== Bottom annotation ====== -->
  <rect x="40" y="500" width="900" height="90" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="60" y="525" font-size="15" font-weight="700" fill="#7a4a00">
    Same heap allocation across all three states
  </text>
  <text x="60" y="548" font-size="14" fill="#333">
    The 64-byte block on the heap is allocated once (by the caller) and outlives every call into the function.
  </text>
  <text x="60" y="566" font-size="14" fill="#333">
    Only the Vec header's <tspan font-family="ui-monospace, monospace">len</tspan> field changes; the <tspan font-family="ui-monospace, monospace">ptr</tspan> and <tspan font-family="ui-monospace, monospace">cap</tspan> stay put.
  </text>
  <text x="60" y="584" font-size="14" fill="#333">
    The caller decides when the block is freed — when the <tspan font-family="ui-monospace, monospace">Vec</tspan> goes out of scope, not when the function returns.
  </text>

</svg>
