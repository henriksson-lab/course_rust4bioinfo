<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="sba-arrow-blue" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1976d2"/>
    </marker>
    <marker id="sba-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" markerUnits="userSpaceOnUse"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title (visible from start) -->
  <text x="400" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#333">
    Borrows accumulate &#8212; all read-only
  </text>

  <!-- Stack region -->
  <rect x="30" y="60" width="260" height="350" fill="#e3f2fd" stroke="#1976d2"
        stroke-width="1.5" rx="6"/>
  <text x="160" y="82" text-anchor="middle" font-size="14" fill="#1976d2" font-weight="700">
    Stack
  </text>

  <!-- v (owner) - always visible -->
  <rect x="55" y="100" width="210" height="60" fill="white" stroke="#1976d2" stroke-width="1.8"/>
  <text x="65" y="120" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    v: Vec&lt;u8&gt;
  </text>
  <text x="65" y="140" font-size="12" font-family="ui-monospace, monospace" fill="#555">
    ptr | len:4 | cap:4
  </text>
  <text x="65" y="155" font-size="11" fill="#2e7d32" font-style="italic">
    owner
  </text>

  <!-- r1 - appears at t=1s -->
  <g opacity="0">
    <rect x="55" y="180" width="210" height="48" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
    <text x="65" y="200" font-size="13" font-family="ui-monospace, monospace" fill="#333">
      r1: &amp;Vec&lt;u8&gt;
    </text>
    <text x="65" y="217" font-size="11" fill="#2e7d32" font-style="italic">
      shared borrow
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- r2 - appears at t=2s -->
  <g opacity="0">
    <rect x="55" y="240" width="210" height="48" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
    <text x="65" y="260" font-size="13" font-family="ui-monospace, monospace" fill="#333">
      r2: &amp;Vec&lt;u8&gt;
    </text>
    <text x="65" y="277" font-size="11" fill="#2e7d32" font-style="italic">
      shared borrow
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- r3 - appears at t=3s -->
  <g opacity="0">
    <rect x="55" y="300" width="210" height="48" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
    <text x="65" y="320" font-size="13" font-family="ui-monospace, monospace" fill="#333">
      r3: &amp;Vec&lt;u8&gt;
    </text>
    <text x="65" y="337" font-size="11" fill="#2e7d32" font-style="italic">
      shared borrow
    </text>
    <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.4s" fill="freeze"/>
  </g>

  <!-- Heap region -->
  <rect x="510" y="60" width="260" height="350" fill="#fff3cd" stroke="#d97706"
        stroke-width="1.5" rx="6"/>
  <text x="640" y="82" text-anchor="middle" font-size="14" fill="#d97706" font-weight="700">
    Heap
  </text>

  <!-- 4 cells A C G T - always visible -->
  <g>
    <rect x="540" y="200" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <rect x="590" y="200" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <rect x="640" y="200" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <rect x="690" y="200" width="50" height="55" fill="white" stroke="#d97706" stroke-width="1.8"/>
    <text x="565" y="236" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">A</text>
    <text x="615" y="236" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">C</text>
    <text x="665" y="236" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">G</text>
    <text x="715" y="236" text-anchor="middle" font-size="20" font-family="ui-monospace, monospace" fill="#333" font-weight="700">T</text>
  </g>

  <!-- v -> heap arrow (always visible) -->
  <line x1="265" y1="130" x2="540" y2="210"
        stroke="#1976d2" stroke-width="2.2" marker-end="url(#sba-arrow-blue)"/>

  <!-- r1 -> heap arrow (appears t=1s) -->
  <line x1="265" y1="204" x2="540" y2="222"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#sba-arrow-green)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1s" dur="0.4s" fill="freeze"/>
  </line>

  <!-- r2 -> heap arrow (appears t=2s) -->
  <line x1="265" y1="264" x2="540" y2="232"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#sba-arrow-green)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="2s" dur="0.4s" fill="freeze"/>
  </line>

  <!-- r3 -> heap arrow (appears t=3s) -->
  <line x1="265" y1="324" x2="540" y2="242"
        stroke="#2e7d32" stroke-width="2.2" marker-end="url(#sba-arrow-green)" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="3s" dur="0.4s" fill="freeze"/>
  </line>

  <!-- Caption (visible at t=4s) -->
  <line x1="30" y1="430" x2="770" y2="430" stroke="#ccc" stroke-width="1"/>
  <text x="400" y="455" text-anchor="middle" font-size="14" fill="#333" opacity="0">
    Three concurrent shared borrows &#8212; no contention because nobody writes.
    <animate attributeName="opacity" from="0" to="1" begin="4s" dur="0.5s" fill="freeze"/>
  </text>

</svg>
