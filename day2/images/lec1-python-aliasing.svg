<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 540"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto"
            markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto"
            markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c62828"/>
    </marker>
  </defs>

  <text x="270" y="22" text-anchor="middle" font-size="14" font-weight="700">
    Python list aliasing — `first` and `v[0]` share heap object
  </text>

  <!-- ============== PANEL 1 — BEFORE ============== -->
  <text x="135" y="50" text-anchor="middle" font-size="12" font-weight="700"
        fill="#444">before</text>

  <!-- Stack -->
  <rect x="20" y="68" width="230" height="80" fill="#e3f2fd" stroke="#1976d2"
        stroke-width="1.5" rx="3"/>
  <text x="135" y="84" text-anchor="middle" font-size="10" font-weight="700"
        fill="#0d47a1">stack</text>
  <!-- v variable -->
  <rect x="40" y="96" width="60" height="40" fill="#fff" stroke="#1976d2"/>
  <text x="70" y="113" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">v</text>
  <circle cx="70" cy="126" r="3" fill="#1976d2"/>
  <!-- first variable -->
  <rect x="170" y="96" width="60" height="40" fill="#fff" stroke="#1976d2"/>
  <text x="200" y="113" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">first</text>
  <circle cx="200" cy="126" r="3" fill="#1976d2"/>

  <!-- Heap -->
  <rect x="20" y="160" width="230" height="180" fill="#fff3cd" stroke="#d97706"
        stroke-width="1.5" rx="3"/>
  <text x="135" y="176" text-anchor="middle" font-size="10" font-weight="700"
        fill="#b45309">heap</text>

  <!-- Outer list -->
  <rect x="40" y="186" width="80" height="48" fill="#fff" stroke="#d97706"/>
  <text x="80" y="200" text-anchor="middle" font-size="10" fill="#555">v (outer)</text>
  <line x1="60" y1="206" x2="60" y2="234" stroke="#d97706" stroke-width="0.5"/>
  <line x1="80" y1="206" x2="80" y2="234" stroke="#d97706" stroke-width="0.5"/>
  <line x1="100" y1="206" x2="100" y2="234" stroke="#d97706" stroke-width="0.5"/>
  <text x="50" y="225" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">●</text>
  <text x="70" y="225" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">●</text>

  <!-- [1, 2] object -->
  <rect x="140" y="186" width="90" height="48" fill="#e8f5e9" stroke="#2e7d32"
        stroke-width="1.5"/>
  <text x="185" y="200" text-anchor="middle" font-size="10" fill="#555">inner</text>
  <text x="185" y="222" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace">[1, 2]</text>

  <!-- [3, 4] object -->
  <rect x="40" y="266" width="90" height="48" fill="#fff" stroke="#d97706"/>
  <text x="85" y="280" text-anchor="middle" font-size="10" fill="#555">inner</text>
  <text x="85" y="302" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace">[3, 4]</text>

  <!-- Arrows: v -> outer -->
  <path d="M 70 130 L 70 186" stroke="#1976d2" stroke-width="1.5" fill="none"
        marker-end="url(#arrow)"/>
  <!-- outer[0] -> [1,2] -->
  <path d="M 60 234 C 60 250, 100 250, 140 218" stroke="#d97706" stroke-width="1.2"
        fill="none" marker-end="url(#arrow)"/>
  <!-- outer[1] -> [3,4] -->
  <path d="M 80 234 L 80 266" stroke="#d97706" stroke-width="1.2" fill="none"
        marker-end="url(#arrow)"/>
  <!-- first -> [1,2] -->
  <path d="M 200 130 C 200 160, 200 195, 230 210" stroke="#2e7d32" stroke-width="1.5"
        fill="none" marker-end="url(#arrow)"/>

  <!-- ============== PANEL 2 — AFTER ============== -->
  <text x="405" y="50" text-anchor="middle" font-size="12" font-weight="700"
        fill="#444">after v[0].append(99)</text>

  <!-- Stack -->
  <rect x="290" y="68" width="230" height="80" fill="#e3f2fd" stroke="#1976d2"
        stroke-width="1.5" rx="3"/>
  <text x="405" y="84" text-anchor="middle" font-size="10" font-weight="700"
        fill="#0d47a1">stack</text>
  <rect x="310" y="96" width="60" height="40" fill="#fff" stroke="#1976d2"/>
  <text x="340" y="113" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">v</text>
  <circle cx="340" cy="126" r="3" fill="#1976d2"/>
  <rect x="440" y="96" width="60" height="40" fill="#fff" stroke="#1976d2"/>
  <text x="470" y="113" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">first</text>
  <circle cx="470" cy="126" r="3" fill="#1976d2"/>

  <!-- Heap -->
  <rect x="290" y="160" width="230" height="180" fill="#fff3cd" stroke="#d97706"
        stroke-width="1.5" rx="3"/>
  <text x="405" y="176" text-anchor="middle" font-size="10" font-weight="700"
        fill="#b45309">heap</text>

  <!-- Outer list — grew to 3 -->
  <rect x="310" y="186" width="100" height="48" fill="#fff" stroke="#d97706"/>
  <text x="360" y="200" text-anchor="middle" font-size="10" fill="#555">v (outer, grew)</text>
  <text x="325" y="225" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">●</text>
  <text x="360" y="225" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">●</text>
  <text x="395" y="225" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace">●</text>
  <line x1="345" y1="206" x2="345" y2="234" stroke="#d97706" stroke-width="0.5"/>
  <line x1="380" y1="206" x2="380" y2="234" stroke="#d97706" stroke-width="0.5"/>

  <!-- [1, 2, 99] object — mutated -->
  <rect x="425" y="186" width="90" height="48" fill="#ffcdd2" stroke="#c62828"
        stroke-width="2"/>
  <text x="470" y="200" text-anchor="middle" font-size="10" fill="#555">inner (mutated)</text>
  <text x="470" y="222" text-anchor="middle" font-size="13" font-weight="700"
        fill="#c62828" font-family="ui-monospace, monospace">[1, 2, 99]</text>

  <!-- [3, 4] -->
  <rect x="310" y="248" width="80" height="40" fill="#fff" stroke="#d97706"/>
  <text x="350" y="265" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace">[3, 4]</text>

  <!-- [5, 6] new -->
  <rect x="400" y="248" width="80" height="40" fill="#fff" stroke="#d97706"/>
  <text x="440" y="265" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace">[5, 6]</text>

  <!-- Arrows: v -> outer -->
  <path d="M 340 130 L 340 186" stroke="#1976d2" stroke-width="1.5" fill="none"
        marker-end="url(#arrow)"/>
  <!-- outer[0] -> [1,2,99] -->
  <path d="M 325 234 C 325 250, 380 250, 425 218" stroke="#d97706" stroke-width="1.2"
        fill="none" marker-end="url(#arrow)"/>
  <!-- outer[1] -> [3,4] -->
  <path d="M 360 234 L 350 248" stroke="#d97706" stroke-width="1.2" fill="none"
        marker-end="url(#arrow)"/>
  <!-- outer[2] -> [5,6] -->
  <path d="M 395 234 L 425 248" stroke="#d97706" stroke-width="1.2" fill="none"
        marker-end="url(#arrow)"/>
  <!-- first -> [1,2,99] (silent change) -->
  <path d="M 470 130 L 470 186" stroke="#c62828" stroke-width="1.8" fill="none"
        marker-end="url(#arrow-red)"/>
  <text x="500" y="160" font-size="9" font-weight="700" fill="#c62828">still here</text>

  <!-- Caption -->
  <text x="270" y="370" text-anchor="middle" font-size="11" fill="#c62828"
        font-weight="700">
    print(first) → [1, 2, 99]   — neither v nor first was reassigned
  </text>
  <text x="270" y="388" text-anchor="middle" font-size="10" fill="#555">
    Aliasing: two names, one heap object. Mutation through one is visible through the other.
  </text>

</svg>
