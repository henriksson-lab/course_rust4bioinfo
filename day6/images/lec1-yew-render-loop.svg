<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-step" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-back" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d97706"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    A Yew component is a function that runs on every render
  </text>

  <!-- ===== 1. State box ===== -->
  <rect x="40" y="80" width="170" height="100" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="125" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#b45309">
    state
  </text>
  <text x="125" y="132" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">typed: String</text>
  <text x="125" y="152" text-anchor="middle" font-size="11" fill="#888" font-style="italic">
    held in use_state
  </text>
  <text x="125" y="168" text-anchor="middle" font-size="11" fill="#888" font-style="italic">
    (survives rerenders)
  </text>

  <line x1="212" y1="130" x2="263" y2="130" stroke="#1565c0" stroke-width="2"
        marker-end="url(#arr-step)"/>

  <!-- ===== 2. Function body ===== -->
  <rect x="265" y="80" width="190" height="100" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="360" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#1565c0">
    component fn
  </text>
  <text x="360" y="130" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#333">fn app() -&gt; Html</text>
  <text x="360" y="152" text-anchor="middle" font-size="12" fill="#555">
    returns a virtual DOM
  </text>
  <text x="360" y="168" text-anchor="middle" font-size="12" fill="#555">
    (a tree of Html nodes)
  </text>

  <line x1="457" y1="130" x2="508" y2="130" stroke="#1565c0" stroke-width="2"
        marker-end="url(#arr-step)"/>

  <!-- ===== 3. Diff ===== -->
  <rect x="510" y="80" width="180" height="100" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="600" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#1565c0">
    diff
  </text>
  <text x="600" y="132" text-anchor="middle" font-size="12" fill="#333">
    new vDOM vs.
  </text>
  <text x="600" y="150" text-anchor="middle" font-size="12" fill="#333">
    previous vDOM
  </text>
  <text x="600" y="170" text-anchor="middle" font-size="11" fill="#888" font-style="italic">
    finds the minimum change
  </text>

  <line x1="692" y1="130" x2="743" y2="130" stroke="#1565c0" stroke-width="2"
        marker-end="url(#arr-step)"/>

  <!-- ===== 4. Real DOM patch ===== -->
  <rect x="745" y="80" width="130" height="100" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="810" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#2e7d32">
    patch
  </text>
  <text x="810" y="130" text-anchor="middle" font-size="12" fill="#333">
    real DOM
  </text>
  <text x="810" y="150" text-anchor="middle" font-size="12" fill="#333">
    nodes update
  </text>
  <text x="810" y="170" text-anchor="middle" font-size="11" fill="#888" font-style="italic">
    minimal changes only
  </text>

  <!-- ===== Event arrow back to state ===== -->
  <path d="M 810 200 C 810 280, 125 320, 125 200"
        fill="none" stroke="#d97706" stroke-width="2.5"
        marker-end="url(#arr-back)"/>
  <text x="500" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#b45309">
    event handler calls handle.set(new_value)
  </text>
  <text x="500" y="313" text-anchor="middle" font-size="13" fill="#b45309">
    (oninput, onclick, ...)
  </text>
  <text x="500" y="330" text-anchor="middle" font-size="12" fill="#888" font-style="italic">
    state changes → Yew re-runs the function → cycle repeats
  </text>

  <!-- ===== Footer / React comparison ===== -->
  <rect x="80" y="370" width="740" height="80" rx="6" ry="6"
        fill="#fafafa" stroke="#888" stroke-dasharray="6,4" stroke-width="1.5"/>
  <text x="450" y="395" text-anchor="middle" font-size="14" font-weight="600" fill="#333">
    Same model as React.
  </text>
  <text x="450" y="418" text-anchor="middle" font-size="13" fill="#555">
    Components are functions. State lives in hooks. Render returns a virtual DOM.
  </text>
  <text x="450" y="438" text-anchor="middle" font-size="13" fill="#555">
    The framework diffs and patches — you describe what the page should look like, not how to update it.
  </text>

</svg>
