<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="bp1-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="bp1-arrow-grey" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#bbb"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Build pipeline, step 1 of 3
  </text>
  <text x="450" y="58" text-anchor="middle" font-size="14" fill="#666" font-style="italic">
    From your .rs files to a running browser app
  </text>

  <!-- =========================================================
       Stage 1: Rust source (ACTIVE - orange)
       x = 30, y = 120, w = 170, h = 130
       ========================================================= -->
  <!-- folder tab -->
  <path d="M 40 110 L 95 110 L 105 120 L 195 120 L 195 130 L 35 130 L 35 115 Z"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <!-- folder body -->
  <rect x="30" y="128" width="170" height="122" rx="4" ry="4"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="115" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#8a4a09">
    Rust source
  </text>
  <!-- file rows -->
  <rect x="48" y="172" width="14" height="18" fill="white" stroke="#666"/>
  <line x1="51" y1="178" x2="59" y2="178" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="182" x2="59" y2="182" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="186" x2="59" y2="186" stroke="#666" stroke-width="0.8"/>
  <text x="68" y="186" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    src/main.rs
  </text>

  <rect x="48" y="202" width="14" height="18" fill="white" stroke="#666"/>
  <line x1="51" y1="208" x2="59" y2="208" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="212" x2="59" y2="212" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="216" x2="59" y2="216" stroke="#666" stroke-width="0.8"/>
  <text x="68" y="216" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    Cargo.toml
  </text>

  <text x="115" y="240" text-anchor="middle" font-size="11" fill="#7a4a09" font-style="italic">
    you write this
  </text>

  <!-- arrow placeholder (greyed/invisible) -->
  <line x1="205" y1="185" x2="235" y2="185"
        stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#bp1-arrow-grey)"/>

  <!-- =========================================================
       Stage 2: cargo + wasm-bindgen (GREYED OUT)
       x = 240, y = 120, w = 210, h = 130
       ========================================================= -->
  <rect x="240" y="120" width="210" height="130" rx="8" ry="8"
        fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="345" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#aaa">
    cargo + wasm-bindgen
  </text>
  <text x="345" y="180" text-anchor="middle" font-size="13" fill="#bbb"
        font-family="ui-monospace, monospace">
    (compiler)
  </text>
  <text x="345" y="222" text-anchor="middle" font-size="11" fill="#bbb" font-style="italic">
    not yet
  </text>

  <!-- arrow placeholder -->
  <line x1="455" y1="185" x2="485" y2="185"
        stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#bp1-arrow-grey)"/>

  <!-- =========================================================
       Stage 3: trunk (GREYED OUT)
       x = 490, y = 120, w = 170, h = 130
       ========================================================= -->
  <rect x="490" y="120" width="170" height="130" rx="8" ry="8"
        fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="575" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#aaa">
    trunk
  </text>
  <text x="575" y="180" text-anchor="middle" font-size="13" fill="#bbb">
    (orchestrator)
  </text>
  <text x="575" y="222" text-anchor="middle" font-size="11" fill="#bbb" font-style="italic">
    not yet
  </text>

  <!-- arrow placeholder -->
  <line x1="665" y1="185" x2="695" y2="185"
        stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#bp1-arrow-grey)"/>

  <!-- =========================================================
       Stage 4: dist/ (GREYED OUT)
       x = 700, y = 110, w = 170, h = 150
       ========================================================= -->
  <rect x="700" y="110" width="170" height="150" rx="8" ry="8"
        fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="785" y="134" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#aaa">
    dist/
  </text>
  <text x="785" y="166" text-anchor="middle" font-size="13" fill="#bbb"
        font-family="ui-monospace, monospace">index.html</text>
  <text x="785" y="186" text-anchor="middle" font-size="13" fill="#bbb"
        font-family="ui-monospace, monospace">app.wasm</text>
  <text x="785" y="206" text-anchor="middle" font-size="13" fill="#bbb"
        font-family="ui-monospace, monospace">app.js</text>
  <text x="785" y="240" text-anchor="middle" font-size="11" fill="#bbb" font-style="italic">
    not yet
  </text>

  <!-- arrow dist -> Browser (greyed) -->
  <line x1="785" y1="265" x2="785" y2="295"
        stroke="#ddd" stroke-width="2" stroke-dasharray="4,4"
        marker-end="url(#bp1-arrow-grey)"/>

  <!-- =========================================================
       Browser (GREYED OUT)
       x = 700, y = 300, w = 170, h = 80
       ========================================================= -->
  <rect x="700" y="300" width="170" height="80" rx="6" ry="6"
        fill="#f5f5f5" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- browser top bar -->
  <rect x="700" y="300" width="170" height="18" rx="6" ry="6"
        fill="#eee" stroke="#bbb" stroke-width="1.5" stroke-dasharray="5,4"/>
  <circle cx="710" cy="309" r="3" fill="#ddd"/>
  <circle cx="720" cy="309" r="3" fill="#ddd"/>
  <circle cx="730" cy="309" r="3" fill="#ddd"/>
  <text x="785" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#aaa">
    Browser
  </text>
  <text x="785" y="365" text-anchor="middle" font-size="11" fill="#bbb" font-style="italic">
    loads → executes
  </text>

  <!-- =========================================================
       Caption
       ========================================================= -->
  <rect x="50" y="420" width="800" height="80" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
  <text x="450" y="450" text-anchor="middle" font-size="16" font-weight="700" fill="#8a5a07">
    Step 1: your Rust source.
  </text>
  <text x="450" y="476" text-anchor="middle" font-size="14" fill="#555">
    Same <tspan font-family="ui-monospace, monospace" fill="#333">cargo new</tspan> /
    <tspan font-family="ui-monospace, monospace" fill="#333">cargo build</tspan> workflow you already know.
  </text>
  <text x="450" y="494" text-anchor="middle" font-size="13" fill="#777" font-style="italic">
    The rest of the toolchain hasn't kicked in yet.
  </text>

</svg>
