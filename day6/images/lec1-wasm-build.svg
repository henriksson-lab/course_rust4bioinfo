<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-build" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-load" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    From .rs files to a .wasm module running in the browser
  </text>

  <!-- ===== Source files ===== -->
  <rect x="30" y="70" width="170" height="120" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="115" y="93" text-anchor="middle" font-size="16" font-weight="600" fill="#1565c0">
    Source
  </text>
  <text x="115" y="124" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#333">main.rs</text>
  <text x="115" y="146" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#333">lib.rs</text>
  <text x="115" y="168" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#333">Cargo.toml</text>

  <!-- arrow source -> cargo -->
  <line x1="205" y1="130" x2="258" y2="130" stroke="#2e7d32" stroke-width="2"
        marker-end="url(#arr-build)"/>

  <!-- ===== cargo build ===== -->
  <rect x="260" y="80" width="220" height="100" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="370" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#b45309">
    cargo build
  </text>
  <text x="370" y="130" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">--target</text>
  <text x="370" y="150" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">wasm32-unknown-unknown</text>
  <text x="370" y="170" text-anchor="middle" font-size="12" fill="#888" font-style="italic">
    (rustc + LLVM)
  </text>

  <!-- arrow cargo -> wasm-bindgen -->
  <line x1="482" y1="130" x2="538" y2="130" stroke="#2e7d32" stroke-width="2"
        marker-end="url(#arr-build)"/>

  <!-- ===== wasm-bindgen ===== -->
  <rect x="540" y="80" width="180" height="100" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="630" y="105" text-anchor="middle" font-size="16" font-weight="600" fill="#b45309">
    wasm-bindgen
  </text>
  <text x="630" y="130" text-anchor="middle" font-size="12" fill="#555">
    generates JS glue
  </text>
  <text x="630" y="148" text-anchor="middle" font-size="12" fill="#555">
    so the browser can
  </text>
  <text x="630" y="166" text-anchor="middle" font-size="12" fill="#555">
    talk to .wasm exports
  </text>

  <!-- arrow wasm-bindgen -> outputs -->
  <line x1="722" y1="130" x2="775" y2="130" stroke="#2e7d32" stroke-width="2"
        marker-end="url(#arr-build)"/>

  <!-- ===== Output bundle ===== -->
  <rect x="777" y="65" width="108" height="135" rx="6" ry="6"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="831" y="86" text-anchor="middle" font-size="14" font-weight="600" fill="#2e7d32">
    Output
  </text>
  <text x="831" y="110" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#333">app.wasm</text>
  <text x="831" y="125" text-anchor="middle" font-size="10" fill="#888">binary</text>
  <text x="831" y="148" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#333">app.js</text>
  <text x="831" y="163" text-anchor="middle" font-size="10" fill="#888">loader glue</text>
  <text x="831" y="186" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#333">index.html</text>

  <!-- big curved arrow from output down into browser -->
  <path d="M 831 205 C 831 250, 500 250, 470 280"
        fill="none" stroke="#1565c0" stroke-width="2.5"
        marker-end="url(#arr-load)"/>
  <text x="700" y="245" text-anchor="middle" font-size="13" fill="#1565c0" font-style="italic">
    served over HTTP, loaded by the browser
  </text>

  <!-- ===== Browser window (bottom) ===== -->
  <rect x="80" y="290" width="740" height="200" rx="10" ry="10"
        fill="white" stroke="#888" stroke-width="1.5"/>
  <rect x="80" y="290" width="740" height="32" rx="10" ry="10"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <rect x="80" y="312" width="740" height="10" fill="#f5f5f5" stroke="none"/>
  <line x1="80" y1="322" x2="820" y2="322" stroke="#888" stroke-width="1.5"/>
  <circle cx="100" cy="306" r="4" fill="#e57373"/>
  <circle cx="114" cy="306" r="4" fill="#ffb74d"/>
  <circle cx="128" cy="306" r="4" fill="#81c784"/>
  <rect x="170" y="298" width="600" height="16" rx="8" ry="8"
        fill="white" stroke="#bbb"/>
  <text x="470" y="310" text-anchor="middle" font-size="11" fill="#555"
        font-family="ui-monospace, monospace">https://your-site.com/</text>

  <!-- JS VM box -->
  <rect x="115" y="345" width="320" height="125" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="275" y="368" text-anchor="middle" font-size="15" font-weight="600" fill="#1565c0">
    JS VM
  </text>
  <text x="275" y="392" text-anchor="middle" font-size="13" fill="#333">
    runs app.js
  </text>
  <text x="275" y="412" text-anchor="middle" font-size="12" fill="#555">
    fetches app.wasm,
  </text>
  <text x="275" y="428" text-anchor="middle" font-size="12" fill="#555">
    instantiates it,
  </text>
  <text x="275" y="444" text-anchor="middle" font-size="12" fill="#555">
    calls exported functions
  </text>

  <!-- WASM VM box -->
  <rect x="465" y="345" width="320" height="125" rx="6" ry="6"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="625" y="368" text-anchor="middle" font-size="15" font-weight="600" fill="#b45309">
    WASM VM
  </text>
  <text x="625" y="392" text-anchor="middle" font-size="13" fill="#333">
    runs app.wasm
  </text>
  <text x="625" y="412" text-anchor="middle" font-size="12" fill="#555">
    sandboxed: no DOM,
  </text>
  <text x="625" y="428" text-anchor="middle" font-size="12" fill="#555">
    no filesystem, no network
  </text>
  <text x="625" y="444" text-anchor="middle" font-size="12" fill="#555">
    of its own
  </text>

  <!-- bridge arrows between JS and WASM -->
  <line x1="436" y1="395" x2="463" y2="395" stroke="#888" stroke-width="1.5"
        marker-end="url(#arr-load)"/>
  <line x1="463" y1="425" x2="436" y2="425" stroke="#888" stroke-width="1.5"
        marker-end="url(#arr-load)"/>
  <text x="450" y="385" text-anchor="middle" font-size="10" fill="#888">call</text>
  <text x="450" y="445" text-anchor="middle" font-size="10" fill="#888">return</text>

  <text x="450" y="510" text-anchor="middle" font-size="13" fill="#888">
    The .wasm runs beside the JS VM in the same browser process. JS glue bridges the two.
  </text>

</svg>
