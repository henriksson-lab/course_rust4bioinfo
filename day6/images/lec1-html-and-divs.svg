<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-map" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    HTML — a page is a tree of boxes
  </text>

  <!-- ===== Left panel: HTML source ===== -->
  <rect x="30" y="60" width="370" height="380" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="215" y="86" text-anchor="middle" font-size="16" font-weight="600" fill="#1565c0">
    HTML source
  </text>

  <!-- code lines -->
  <text x="50" y="118" font-size="14" font-family="ui-monospace, monospace" fill="#333">&lt;html&gt;</text>
  <text x="50" y="138" font-size="14" font-family="ui-monospace, monospace" fill="#333">  &lt;body&gt;</text>
  <text x="50" y="158" font-size="14" font-family="ui-monospace, monospace" fill="#333">    &lt;h1&gt;Sequence inspector&lt;/h1&gt;</text>
  <text x="50" y="178" font-size="14" font-family="ui-monospace, monospace" fill="#333">    &lt;p&gt;Paste DNA below:&lt;/p&gt;</text>
  <text x="50" y="198" font-size="14" font-family="ui-monospace, monospace" fill="#333">    &lt;div&gt;</text>
  <text x="50" y="218" font-size="14" font-family="ui-monospace, monospace" fill="#333">      &lt;textarea&gt;&lt;/textarea&gt;</text>
  <text x="50" y="238" font-size="14" font-family="ui-monospace, monospace" fill="#333">      &lt;p&gt;GC content: 50%&lt;/p&gt;</text>
  <text x="50" y="258" font-size="14" font-family="ui-monospace, monospace" fill="#333">    &lt;/div&gt;</text>
  <text x="50" y="278" font-size="14" font-family="ui-monospace, monospace" fill="#333">  &lt;/body&gt;</text>
  <text x="50" y="298" font-size="14" font-family="ui-monospace, monospace" fill="#333">&lt;/html&gt;</text>

  <!-- Highlight anchors for arrow sources (subtle rectangles around target tags) -->
  <rect x="120" y="146" width="180" height="18" fill="none" stroke="#888" stroke-dasharray="3,2" stroke-width="1"/>
  <rect x="120" y="166" width="180" height="18" fill="none" stroke="#888" stroke-dasharray="3,2" stroke-width="1"/>
  <rect x="120" y="186" width="60" height="78" fill="none" stroke="#888" stroke-dasharray="3,2" stroke-width="1"/>

  <!-- ===== Right panel: browser window ===== -->
  <!-- browser frame -->
  <rect x="490" y="60" width="380" height="380" rx="8" ry="8"
        fill="white" stroke="#888" stroke-width="1.5"/>
  <!-- URL bar strip -->
  <rect x="490" y="60" width="380" height="32" rx="8" ry="8"
        fill="#f5f5f5" stroke="#888" stroke-width="1.5"/>
  <rect x="490" y="82" width="380" height="10" fill="#f5f5f5" stroke="none"/>
  <line x1="490" y1="92" x2="870" y2="92" stroke="#888" stroke-width="1.5"/>

  <!-- traffic-light dots -->
  <circle cx="506" cy="76" r="4" fill="#e57373"/>
  <circle cx="520" cy="76" r="4" fill="#ffb74d"/>
  <circle cx="534" cy="76" r="4" fill="#81c784"/>

  <!-- URL pill -->
  <rect x="560" y="68" width="280" height="16" rx="8" ry="8"
        fill="white" stroke="#bbb"/>
  <text x="700" y="80" text-anchor="middle" font-size="11" fill="#555"
        font-family="ui-monospace, monospace">localhost:8080</text>

  <!-- Panel title above content -->
  <text x="680" y="112" text-anchor="middle" font-size="14" font-weight="600" fill="#555">
    Rendered in the browser
  </text>

  <!-- h1 heading -->
  <text x="510" y="148" font-size="22" font-weight="700" fill="#222">
    Sequence inspector
  </text>

  <!-- paragraph -->
  <text x="510" y="180" font-size="16" fill="#333">
    Paste DNA below:
  </text>

  <!-- div bordered box -->
  <rect x="510" y="200" width="340" height="220" rx="4" ry="4"
        fill="#fafafa" stroke="#666" stroke-width="1.5"/>

  <!-- textarea inside div -->
  <rect x="528" y="218" width="304" height="120" rx="4" ry="4"
        fill="white" stroke="#bbb" stroke-width="1.5"/>
  <line x1="540" y1="240" x2="540" y2="258" stroke="#555" stroke-width="1.5"/>

  <!-- GC content p inside div -->
  <text x="528" y="370" font-size="15" fill="#333">
    GC content: 50%
  </text>

  <!-- ===== Arrows: source → rendered ===== -->
  <!-- h1 arrow -->
  <path d="M 300 155 C 400 155, 420 148, 500 148"
        fill="none" stroke="#888" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arr-map)"/>

  <!-- p arrow -->
  <path d="M 300 175 C 400 175, 420 180, 500 180"
        fill="none" stroke="#888" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arr-map)"/>

  <!-- div arrow (to bordered box) -->
  <path d="M 180 225 C 320 320, 420 310, 503 310"
        fill="none" stroke="#888" stroke-width="1.5"
        stroke-dasharray="6,4" marker-end="url(#arr-map)"/>

  <!-- Footer caption -->
  <text x="450" y="475" text-anchor="middle" font-size="14" fill="#555">
    Each tag in the source produces an element in the rendered page.
  </text>

</svg>
