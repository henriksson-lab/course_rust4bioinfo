<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="sod-arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Day 6 — four stages, one app
  </text>

  <!--
    Layout: 4 stages, each w=180 h=180, top y=90.
    x positions: 30, 230, 430, 630, 830 (gaps of 20 between stages).
    Arrows between stages occupy x=212..228, x=412..428, x=612..628 at y=180.
    Badge row below at y=300 (w=180, h=42).
  -->

  <!-- ============================================================
       Stage 1: Foundations (light blue)
       ============================================================ -->
  <rect x="30" y="90" width="180" height="180" rx="10" ry="10"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="120" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1565c0">
    Foundations
  </text>
  <line x1="50" y1="132" x2="190" y2="132" stroke="#90caf9" stroke-width="1"/>
  <text x="120" y="158" text-anchor="middle" font-size="14" fill="#333">HTML</text>
  <text x="120" y="180" text-anchor="middle" font-size="14" fill="#333">HTTP</text>
  <text x="120" y="202" text-anchor="middle" font-size="14" fill="#333">JSON</text>
  <text x="120" y="224" text-anchor="middle" font-size="14" fill="#333">ports</text>
  <text x="120" y="254" text-anchor="middle" font-size="12" fill="#1565c0" font-style="italic">
    the web vocabulary
  </text>

  <!-- arrow 1 -> 2 -->
  <line x1="212" y1="180" x2="228" y2="180"
        stroke="#444" stroke-width="2.2"
        marker-end="url(#sod-arrow)"/>

  <!-- ============================================================
       Stage 2: Backend (light orange)
       ============================================================ -->
  <rect x="230" y="90" width="180" height="180" rx="10" ry="10"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="320" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#8a4a09">
    Backend
  </text>
  <line x1="250" y1="132" x2="390" y2="132" stroke="#ffd28b" stroke-width="1"/>
  <text x="320" y="158" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#333">axum</text>
  <text x="320" y="180" text-anchor="middle" font-size="14" fill="#333">REST</text>
  <text x="320" y="202" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#333">serde</text>
  <text x="320" y="254" text-anchor="middle" font-size="12" fill="#8a4a09" font-style="italic">
    a server in Rust
  </text>

  <!-- arrow 2 -> 3 -->
  <line x1="412" y1="180" x2="428" y2="180"
        stroke="#444" stroke-width="2.2"
        marker-end="url(#sod-arrow)"/>

  <!-- ============================================================
       Stage 3: Frontend (light green)
       ============================================================ -->
  <rect x="430" y="90" width="180" height="180" rx="10" ry="10"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="520" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#1b5e20">
    Frontend
  </text>
  <line x1="450" y1="132" x2="590" y2="132" stroke="#a5d6a7" stroke-width="1"/>
  <text x="520" y="158" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#333">Yew</text>
  <text x="520" y="180" text-anchor="middle" font-size="14"
        font-family="ui-monospace, monospace" fill="#333">html!</text>
  <text x="520" y="202" text-anchor="middle" font-size="14" fill="#333">WASM</text>
  <text x="520" y="254" text-anchor="middle" font-size="12" fill="#1b5e20" font-style="italic">
    a UI in Rust
  </text>

  <!-- arrow 3 -> 4 -->
  <line x1="612" y1="180" x2="628" y2="180"
        stroke="#444" stroke-width="2.2"
        marker-end="url(#sod-arrow)"/>

  <!-- ============================================================
       Stage 4: Integration (light yellow)
       ============================================================ -->
  <rect x="630" y="90" width="240" height="180" rx="10" ry="10"
        fill="#fff8e1" stroke="#c79610" stroke-width="1.8"/>
  <text x="750" y="120" text-anchor="middle" font-size="17" font-weight="700" fill="#7a5d09">
    Integration
  </text>
  <line x1="650" y1="132" x2="850" y2="132" stroke="#e8d896" stroke-width="1"/>
  <text x="750" y="160" text-anchor="middle" font-size="13" fill="#333">
    fetch from frontend
  </text>
  <text x="750" y="182" text-anchor="middle" font-size="13" fill="#333">
    → backend
  </text>
  <text x="750" y="204" text-anchor="middle" font-size="13" fill="#333">
    → render
  </text>
  <text x="750" y="254" text-anchor="middle" font-size="12" fill="#7a5d09" font-style="italic">
    one working app
  </text>

  <!-- ============================================================
       Exercise badges (one under each stage)
       Badge: w varies to fit text, h=42, y=300
       ============================================================ -->
  <!-- ex01 -->
  <rect x="38" y="300" width="164" height="44" rx="6" ry="6"
        fill="white" stroke="#1565c0" stroke-width="1.4"/>
  <text x="120" y="320" text-anchor="middle" font-size="11" fill="#1565c0" font-weight="600">
    exercise
  </text>
  <text x="120" y="337" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#222">
    ex01-hello-yew
  </text>

  <!-- ex02 -->
  <rect x="238" y="300" width="164" height="44" rx="6" ry="6"
        fill="white" stroke="#d97706" stroke-width="1.4"/>
  <text x="320" y="320" text-anchor="middle" font-size="11" fill="#8a4a09" font-weight="600">
    exercise
  </text>
  <text x="320" y="337" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#222">
    ex02-reactive-stats
  </text>

  <!-- ex03 -->
  <rect x="438" y="300" width="164" height="44" rx="6" ry="6"
        fill="white" stroke="#2e7d32" stroke-width="1.4"/>
  <text x="520" y="320" text-anchor="middle" font-size="11" fill="#1b5e20" font-weight="600">
    exercise
  </text>
  <text x="520" y="337" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#222">
    ex03-fetch-from-backend
  </text>

  <!-- ex04 -->
  <rect x="638" y="300" width="224" height="44" rx="6" ry="6"
        fill="white" stroke="#c79610" stroke-width="1.4"/>
  <text x="750" y="320" text-anchor="middle" font-size="11" fill="#7a5d09" font-weight="600">
    exercise
  </text>
  <text x="750" y="337" text-anchor="middle" font-size="13" font-weight="700"
        font-family="ui-monospace, monospace" fill="#222">
    ex04-sequence-inspector
  </text>

  <!-- ============================================================
       Footer caption
       ============================================================ -->
  <rect x="50" y="375" width="800" height="50" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
  <text x="450" y="406" text-anchor="middle" font-size="14" font-weight="700" fill="#8a5a07">
    By the end: a working sequence inspector you can show a colleague.
  </text>

</svg>
