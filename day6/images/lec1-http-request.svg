<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-req" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
    <marker id="arr-resp" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    Anatomy of an HTTP request / response
  </text>

  <!-- ===== Browser box (left) ===== -->
  <rect x="40" y="80" width="180" height="100" rx="10" ry="10"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="130" y="118" text-anchor="middle" font-size="18" font-weight="600" fill="#1565c0">
    Browser
  </text>
  <text x="130" y="146" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    client
  </text>

  <!-- ===== Server box (right) ===== -->
  <rect x="680" y="80" width="180" height="100" rx="10" ry="10"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="770" y="118" text-anchor="middle" font-size="18" font-weight="600" fill="#2e7d32">
    Server
  </text>
  <text x="770" y="146" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    example.com
  </text>

  <!-- ===== Request arrow (top, left -> right) ===== -->
  <line x1="225" y1="112" x2="675" y2="112" stroke="#1565c0" stroke-width="2.5"
        marker-end="url(#arr-req)"/>
  <text x="450" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#1565c0">
    Request
  </text>

  <!-- Request details box (hangs below the arrow) -->
  <rect x="245" y="200" width="410" height="120" rx="6" ry="6"
        fill="white" stroke="#1565c0" stroke-width="1.2"/>
  <text x="260" y="222" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    Method:   GET
  </text>
  <text x="260" y="242" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    URL:      /api/samples/42
  </text>
  <text x="260" y="262" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    Headers:  Host: example.com
  </text>
  <text x="260" y="280" font-size="14" font-family="ui-monospace, monospace" fill="#333">
              User-Agent: Mozilla/5.0
  </text>
  <text x="260" y="302" font-size="14" font-family="ui-monospace, monospace" fill="#888">
    Body:     (empty for GET)
  </text>

  <!-- thin connector from arrow to box -->
  <line x1="450" y1="112" x2="450" y2="200" stroke="#1565c0" stroke-width="1"
        stroke-dasharray="3,3"/>

  <!-- ===== Response arrow (bottom, right -> left) ===== -->
  <line x1="675" y1="408" x2="225" y2="408" stroke="#2e7d32" stroke-width="2.5"
        marker-end="url(#arr-resp)"/>
  <text x="450" y="430" text-anchor="middle" font-size="14" font-weight="600" fill="#2e7d32">
    Response
  </text>

  <!-- Response details box (hangs above the arrow) -->
  <rect x="245" y="330" width="410" height="68" rx="6" ry="6"
        fill="white" stroke="#2e7d32" stroke-width="1.2"/>
  <text x="260" y="352" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    Status:   200 OK
  </text>
  <text x="260" y="372" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    Headers:  Content-Type: application/json
  </text>
  <text x="260" y="392" font-size="14" font-family="ui-monospace, monospace" fill="#333">
    Body:     {"id": 42, "name": "K-12 ..."}
  </text>

  <!-- thin connector from response box to arrow -->
  <line x1="450" y1="398" x2="450" y2="408" stroke="#2e7d32" stroke-width="1"
        stroke-dasharray="3,3"/>

  <!-- ===== Footer caption ===== -->
  <text x="450" y="475" text-anchor="middle" font-size="14" fill="#555">
    The browser does thousands of these per page load — usually without you noticing.
  </text>

</svg>
