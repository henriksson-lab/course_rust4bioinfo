<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="bp3-arrow-green" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="450" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#222">
    Build pipeline, step 3 of 3
  </text>
  <text x="450" y="58" text-anchor="middle" font-size="14" fill="#666" font-style="italic">
    From your .rs files to a running browser app
  </text>

  <!-- =========================================================
       Stage 1: Rust source (ACTIVE)
       ========================================================= -->
  <path d="M 40 110 L 95 110 L 105 120 L 195 120 L 195 130 L 35 130 L 35 115 Z"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <rect x="30" y="128" width="170" height="122" rx="4" ry="4"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.8"/>
  <text x="115" y="156" text-anchor="middle" font-size="16" font-weight="700" fill="#8a4a09">
    Rust source
  </text>
  <rect x="48" y="172" width="14" height="18" fill="white" stroke="#666"/>
  <line x1="51" y1="178" x2="59" y2="178" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="182" x2="59" y2="182" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="186" x2="59" y2="186" stroke="#666" stroke-width="0.8"/>
  <text x="68" y="186" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    src/main.rs
  </text>

  <rect x="48" y="202" width="14" height="18" fill="white" stroke="#666"/>
  <line x1="51" y1="208" x2="59" y2="208" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="212" x2="59" y2="212" stroke="#666" stroke-width="0.8"/>
  <line x1="51" y1="216" x2="59" y2="216" stroke="#666" stroke-width="0.8"/>
  <text x="68" y="216" font-size="13" font-family="ui-monospace, monospace" fill="#333">
    Cargo.toml
  </text>

  <text x="115" y="240" text-anchor="middle" font-size="11" fill="#7a4a09" font-style="italic">
    you write this
  </text>

  <!-- ===== Arrow source -> cargo ===== -->
  <line x1="205" y1="185" x2="235" y2="185"
        stroke="#2e7d32" stroke-width="2.5"
        marker-end="url(#bp3-arrow-green)"/>

  <!-- =========================================================
       Stage 2: cargo + wasm-bindgen (ACTIVE)
       ========================================================= -->
  <rect x="240" y="120" width="210" height="130" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <text x="345" y="146" text-anchor="middle" font-size="16" font-weight="700" fill="#1565c0">
    cargo + wasm-bindgen
  </text>
  <text x="345" y="166" text-anchor="middle" font-size="12" fill="#555"
        font-family="ui-monospace, monospace">
    --target wasm32-...
  </text>
  <text x="345" y="190" text-anchor="middle" font-size="12" fill="#1565c0" font-weight="600">
    produces:
  </text>
  <rect x="260" y="198" width="80" height="22" rx="3" ry="3"
        fill="white" stroke="#1565c0" stroke-width="1"/>
  <text x="300" y="213" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#1565c0">app.wasm</text>

  <rect x="350" y="198" width="80" height="22" rx="3" ry="3"
        fill="white" stroke="#1565c0" stroke-width="1"/>
  <text x="390" y="213" text-anchor="middle" font-size="12"
        font-family="ui-monospace, monospace" fill="#1565c0">app.js</text>

  <text x="345" y="240" text-anchor="middle" font-size="10" fill="#1565c0" font-style="italic">
    JS glue lets browser call Rust
  </text>

  <!-- ===== Arrow cargo -> trunk ===== -->
  <line x1="455" y1="185" x2="485" y2="185"
        stroke="#2e7d32" stroke-width="2.5"
        marker-end="url(#bp3-arrow-green)"/>

  <!-- =========================================================
       Stage 3: trunk (ACTIVE)
       ========================================================= -->
  <rect x="490" y="120" width="170" height="130" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="575" y="148" text-anchor="middle" font-size="16" font-weight="700" fill="#1b5e20">
    trunk
  </text>
  <text x="575" y="172" text-anchor="middle" font-size="12" fill="#385a3c">
    bundles
  </text>
  <text x="575" y="190" text-anchor="middle" font-size="12" fill="#385a3c">
    + serves
  </text>
  <text x="575" y="208" text-anchor="middle" font-size="12" fill="#385a3c">
    + hot-reloads
  </text>
  <text x="575" y="234" text-anchor="middle" font-size="11" fill="#1b5e20" font-style="italic">
    one command does it all
  </text>

  <!-- ===== Arrow trunk -> dist ===== -->
  <line x1="665" y1="185" x2="695" y2="185"
        stroke="#2e7d32" stroke-width="2.5"
        marker-end="url(#bp3-arrow-green)"/>

  <!-- =========================================================
       Stage 4: dist/ (ACTIVE)
       ========================================================= -->
  <rect x="700" y="110" width="170" height="150" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.8"/>
  <text x="785" y="134" text-anchor="middle" font-size="16" font-weight="700"
        font-family="ui-monospace, monospace" fill="#1b5e20">
    dist/
  </text>
  <line x1="715" y1="142" x2="855" y2="142" stroke="#a5d6a7" stroke-width="1"/>
  <text x="785" y="166" text-anchor="middle" font-size="13" fill="#1b5e20"
        font-family="ui-monospace, monospace">index.html</text>
  <text x="785" y="188" text-anchor="middle" font-size="13" fill="#1b5e20"
        font-family="ui-monospace, monospace">app.wasm</text>
  <text x="785" y="210" text-anchor="middle" font-size="13" fill="#1b5e20"
        font-family="ui-monospace, monospace">app.js</text>
  <text x="785" y="240" text-anchor="middle" font-size="11" fill="#385a3c" font-style="italic">
    ready to serve
  </text>

  <!-- ===== Arrow dist -> Browser (with localhost:8080 label) ===== -->
  <line x1="785" y1="265" x2="785" y2="295"
        stroke="#2e7d32" stroke-width="2.5"
        marker-end="url(#bp3-arrow-green)"/>
  <rect x="610" y="270" width="160" height="22" rx="3" ry="3"
        fill="white" stroke="#2e7d32" stroke-width="1"/>
  <text x="690" y="285" text-anchor="middle" font-size="12" font-weight="700"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    localhost:8080
  </text>

  <!-- =========================================================
       Browser (ACTIVE)
       ========================================================= -->
  <rect x="700" y="300" width="170" height="80" rx="6" ry="6"
        fill="white" stroke="#1565c0" stroke-width="1.8"/>
  <rect x="700" y="300" width="170" height="18" rx="6" ry="6"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.8"/>
  <circle cx="710" cy="309" r="3" fill="#e57373"/>
  <circle cx="720" cy="309" r="3" fill="#ffb74d"/>
  <circle cx="730" cy="309" r="3" fill="#81c784"/>
  <text x="785" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#1565c0">
    Browser
  </text>
  <text x="785" y="365" text-anchor="middle" font-size="11" fill="#1565c0" font-style="italic">
    loads → executes
  </text>

  <!-- =========================================================
       Caption
       ========================================================= -->
  <rect x="50" y="420" width="800" height="80" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.4"/>
  <text x="450" y="446" text-anchor="middle" font-size="15" font-weight="700" fill="#8a5a07">
    Step 3: <tspan font-family="ui-monospace, monospace" fill="#5b3705">trunk serve</tspan>
    bundles everything into <tspan font-family="ui-monospace, monospace" fill="#5b3705">dist/</tspan>
  </text>
  <text x="450" y="472" text-anchor="middle" font-size="14" fill="#555">
    and serves it at <tspan font-family="ui-monospace, monospace" fill="#333">localhost:8080</tspan>.
  </text>
  <text x="450" y="492" text-anchor="middle" font-size="13" fill="#777" font-style="italic">
    Edit your code, save, the browser reloads.
  </text>

</svg>
