<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480"
     font-family="system-ui, -apple-system, sans-serif">

  <defs>
    <marker id="arr-ser" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2e7d32"/>
    </marker>
    <marker id="arr-de" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1565c0"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#333">
    serde — one struct, both ends of the wire
  </text>

  <!-- ===== Backend struct (left) ===== -->
  <rect x="40" y="80" width="240" height="190" rx="8" ry="8"
        fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="160" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#2e7d32">
    backend (Rust struct)
  </text>
  <text x="60" y="138" font-size="13" font-family="ui-monospace, monospace" fill="#333">#[derive(Serialize,</text>
  <text x="60" y="156" font-size="13" font-family="ui-monospace, monospace" fill="#333">         Deserialize)]</text>
  <text x="60" y="178" font-size="13" font-family="ui-monospace, monospace" fill="#333">struct SampleRecord {</text>
  <text x="60" y="198" font-size="13" font-family="ui-monospace, monospace" fill="#333">  id: u32,</text>
  <text x="60" y="216" font-size="13" font-family="ui-monospace, monospace" fill="#333">  name: String,</text>
  <text x="60" y="234" font-size="13" font-family="ui-monospace, monospace" fill="#333">  sequence: String,</text>
  <text x="60" y="252" font-size="13" font-family="ui-monospace, monospace" fill="#333">}</text>

  <!-- ===== Frontend struct (right) ===== -->
  <rect x="620" y="80" width="240" height="190" rx="8" ry="8"
        fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="740" y="106" text-anchor="middle" font-size="15" font-weight="600" fill="#1565c0">
    frontend (Rust struct)
  </text>
  <text x="640" y="138" font-size="13" font-family="ui-monospace, monospace" fill="#333">#[derive(Serialize,</text>
  <text x="640" y="156" font-size="13" font-family="ui-monospace, monospace" fill="#333">         Deserialize)]</text>
  <text x="640" y="178" font-size="13" font-family="ui-monospace, monospace" fill="#333">struct SampleRecord {</text>
  <text x="640" y="198" font-size="13" font-family="ui-monospace, monospace" fill="#333">  id: u32,</text>
  <text x="640" y="216" font-size="13" font-family="ui-monospace, monospace" fill="#333">  name: String,</text>
  <text x="640" y="234" font-size="13" font-family="ui-monospace, monospace" fill="#333">  sequence: String,</text>
  <text x="640" y="252" font-size="13" font-family="ui-monospace, monospace" fill="#333">}</text>

  <!-- ===== Wire (middle) ===== -->
  <rect x="310" y="110" width="280" height="130" rx="8" ry="8"
        fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="134" text-anchor="middle" font-size="14" font-weight="600" fill="#b45309">
    JSON on the wire
  </text>
  <text x="450" y="166" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#333">{"id": 42,</text>
  <text x="450" y="186" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#333"> "name": "lambda",</text>
  <text x="450" y="206" text-anchor="middle" font-size="13"
        font-family="ui-monospace, monospace" fill="#333"> "sequence": "ACGT..."}</text>
  <text x="450" y="230" text-anchor="middle" font-size="11" fill="#888" font-style="italic">
    bytes over HTTP
  </text>

  <!-- arrow backend -> wire (serialize) -->
  <line x1="282" y1="155" x2="308" y2="155" stroke="#2e7d32" stroke-width="2"
        marker-end="url(#arr-ser)"/>
  <text x="295" y="100" text-anchor="middle" font-size="11" font-weight="600" fill="#2e7d32">
    serialize
  </text>
  <text x="295" y="142" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#2e7d32">
    to_string
  </text>

  <!-- arrow wire -> frontend (deserialize) -->
  <line x1="592" y1="200" x2="618" y2="200" stroke="#1565c0" stroke-width="2"
        marker-end="url(#arr-de)"/>
  <text x="605" y="266" text-anchor="middle" font-size="11" font-weight="600" fill="#1565c0">
    deserialize
  </text>
  <text x="605" y="282" text-anchor="middle" font-size="11"
        font-family="ui-monospace, monospace" fill="#1565c0">
    from_str
  </text>

  <!-- side notes -->
  <text x="160" y="295" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    axum::Json&lt;SampleRecord&gt;
  </text>
  <text x="160" y="312" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    calls serde for you
  </text>

  <text x="740" y="295" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    resp.json::&lt;SampleRecord&gt;()
  </text>
  <text x="740" y="312" text-anchor="middle" font-size="12" fill="#555" font-style="italic">
    calls serde for you
  </text>

  <!-- bottom callout -->
  <rect x="80" y="370" width="740" height="80" rx="8" ry="8"
        fill="#fafafa" stroke="#888" stroke-dasharray="6,4" stroke-width="1.5"/>
  <text x="450" y="396" text-anchor="middle" font-size="14" font-weight="600" fill="#333">
    Define the struct once in the shared crate.
  </text>
  <text x="450" y="418" text-anchor="middle" font-size="13" fill="#555">
    Both sides derive Serialize/Deserialize from the same definition.
  </text>
  <text x="450" y="438" text-anchor="middle" font-size="13" fill="#555">
    Rename a field — both crates fail to compile until they agree again.
  </text>

</svg>
