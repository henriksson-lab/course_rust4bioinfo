<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sequence inspector</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        max-width: 50rem;
        margin: 2rem auto;
        padding: 0 1rem;
        line-height: 1.5;
        color: #222;
      }
      h1, h2 { font-weight: 600; }
      h2 { margin-top: 1.5rem; font-size: 1.1rem; color: #444; }
      textarea {
        width: 100%;
        min-height: 6rem;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 0.9rem;
        padding: 0.5rem;
        box-sizing: border-box;
      }
      button {
        padding: 0.4rem 0.8rem;
        font: inherit;
        cursor: pointer;
        background: #f5f5f7;
        border: 1px solid #ddd;
        border-radius: 4px;
        margin: 0.15rem 0;
      }
      button:hover { background: #ececef; }
      table { border-collapse: collapse; margin: 1rem 0; }
      th, td { padding: 0.3rem 0.8rem; text-align: left; border-bottom: 1px solid #eee; }
      th { color: #555; font-weight: 500; }
      ul { padding-left: 0; list-style: none; }
      .sequence {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        word-break: break-all;
        max-height: 12rem;
        overflow-y: auto;
        padding: 0.5rem;
        background: #f7f7f7;
        border-radius: 4px;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body></body>
</html>
