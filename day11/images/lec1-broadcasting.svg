<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="sans-serif" font-size="14">
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="bold">Broadcasting: a size-1 axis is stretched without copying</text>

  <!-- a: [5,3] -->
  <text x="120" y="80" text-anchor="middle" font-weight="bold">a: [5, 3]</text>
  <g transform="translate(40,95)" fill="#eef5ff" stroke="#3a6fb5">
    <rect width="50" height="30"/><rect x="50" width="50" height="30"/><rect x="100" width="50" height="30"/>
    <rect y="30" width="50" height="30"/><rect x="50" y="30" width="50" height="30"/><rect x="100" y="30" width="50" height="30"/>
    <rect y="60" width="50" height="30"/><rect x="50" y="60" width="50" height="30"/><rect x="100" y="60" width="50" height="30"/>
    <rect y="90" width="50" height="30"/><rect x="50" y="90" width="50" height="30"/><rect x="100" y="90" width="50" height="30"/>
    <rect y="120" width="50" height="30"/><rect x="50" y="120" width="50" height="30"/><rect x="100" y="120" width="50" height="30"/>
  </g>

  <!-- + sign -->
  <text x="245" y="180" font-size="36">+</text>

  <!-- b: [1,3] -->
  <text x="370" y="80" text-anchor="middle" font-weight="bold">b: [1, 3]</text>
  <g transform="translate(290,150)" fill="#fff0e0" stroke="#c97a13" stroke-width="2">
    <rect width="50" height="30"/><rect x="50" width="50" height="30"/><rect x="100" width="50" height="30"/>
  </g>

  <!-- arrow -->
  <text x="475" y="180" font-size="36">=</text>

  <!-- Stretched b -->
  <text x="635" y="80" text-anchor="middle" font-weight="bold">b stretched to [5, 3]</text>
  <g transform="translate(555,95)" fill="#fff0e0" stroke="#c97a13" stroke-dasharray="3,3">
    <rect width="50" height="30"/><rect x="50" width="50" height="30"/><rect x="100" width="50" height="30"/>
    <rect y="30" width="50" height="30"/><rect x="50" y="30" width="50" height="30"/><rect x="100" y="30" width="50" height="30"/>
    <rect y="60" width="50" height="30" stroke="#c97a13" stroke-width="2" stroke-dasharray="0"/>
    <rect x="50" y="60" width="50" height="30" stroke="#c97a13" stroke-width="2" stroke-dasharray="0"/>
    <rect x="100" y="60" width="50" height="30" stroke="#c97a13" stroke-width="2" stroke-dasharray="0"/>
    <rect y="90" width="50" height="30"/><rect x="50" y="90" width="50" height="30"/><rect x="100" y="90" width="50" height="30"/>
    <rect y="120" width="50" height="30"/><rect x="50" y="120" width="50" height="30"/><rect x="100" y="120" width="50" height="30"/>
  </g>

  <text x="785" y="180" font-size="36">=</text>

  <!-- result -->
  <text x="900" y="80" text-anchor="middle" font-weight="bold">c: [5, 3]</text>
  <g transform="translate(820,95)" fill="#eaf7ee" stroke="#3a9b54">
    <rect width="50" height="30"/><rect x="50" width="50" height="30"/><rect x="100" width="50" height="30"/>
    <rect y="30" width="50" height="30"/><rect x="50" y="30" width="50" height="30"/><rect x="100" y="30" width="50" height="30"/>
    <rect y="60" width="50" height="30"/><rect x="50" y="60" width="50" height="30"/><rect x="100" y="60" width="50" height="30"/>
    <rect y="90" width="50" height="30"/><rect x="50" y="90" width="50" height="30"/><rect x="100" y="90" width="50" height="30"/>
    <rect y="120" width="50" height="30"/><rect x="50" y="120" width="50" height="30"/><rect x="100" y="120" width="50" height="30"/>
  </g>

  <!-- Rule -->
  <text x="500" y="295" text-anchor="middle" font-size="14" font-weight="bold">Rule:</text>
  <text x="500" y="315" text-anchor="middle" font-size="13">Align shapes from the right. Each axis must either match or be 1.</text>
  <text x="500" y="335" text-anchor="middle" font-size="13">Size-1 axes are repeated <tspan font-style="italic">virtually</tspan> — no memory copy.</text>
</svg>
