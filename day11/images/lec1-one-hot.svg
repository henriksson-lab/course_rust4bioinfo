<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="sans-serif" font-size="14">
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="bold">One-hot encoding turns letters into a [4, L] block of 0s and 1s</text>

  <!-- DNA -->
  <text x="160" y="70" font-weight="bold">DNA (length L = 5):</text>
  <g transform="translate(140,80)" font-family="monospace" font-size="22">
    <rect width="50" height="40" fill="#ffe9b5" stroke="#c97a13"/>
    <rect x="50" width="50" height="40" fill="#cfe9d4" stroke="#3a9b54"/>
    <rect x="100" width="50" height="40" fill="#cfdef9" stroke="#3a6fb5"/>
    <rect x="150" width="50" height="40" fill="#f9c3c3" stroke="#a52020"/>
    <rect x="200" width="50" height="40" fill="#ffe9b5" stroke="#c97a13"/>
    <text x="25" y="28" text-anchor="middle">A</text>
    <text x="75" y="28" text-anchor="middle">C</text>
    <text x="125" y="28" text-anchor="middle">G</text>
    <text x="175" y="28" text-anchor="middle">T</text>
    <text x="225" y="28" text-anchor="middle">A</text>
  </g>

  <text x="265" y="105" text-anchor="middle" font-size="22">→</text>

  <!-- 4 x L one-hot grid -->
  <text x="700" y="70" text-anchor="middle" font-weight="bold">one-hot: [4, 5]</text>

  <g transform="translate(560,80)" font-family="monospace" font-size="18">
    <!-- Row labels -->
    <text x="-12" y="22" text-anchor="end" font-weight="bold" fill="#c97a13">A</text>
    <text x="-12" y="52" text-anchor="end" font-weight="bold" fill="#3a9b54">C</text>
    <text x="-12" y="82" text-anchor="end" font-weight="bold" fill="#3a6fb5">G</text>
    <text x="-12" y="112" text-anchor="end" font-weight="bold" fill="#a52020">T</text>

    <!-- Column headers -->
    <text x="20" y="-4" text-anchor="middle" font-size="12" fill="#666">A</text>
    <text x="60" y="-4" text-anchor="middle" font-size="12" fill="#666">C</text>
    <text x="100" y="-4" text-anchor="middle" font-size="12" fill="#666">G</text>
    <text x="140" y="-4" text-anchor="middle" font-size="12" fill="#666">T</text>
    <text x="180" y="-4" text-anchor="middle" font-size="12" fill="#666">A</text>

    <!-- Row A: 1 0 0 0 1 -->
    <rect width="40" height="30" fill="#ffe9b5" stroke="#c97a13"/>
    <rect x="40" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="80" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="120" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="160" width="40" height="30" fill="#ffe9b5" stroke="#c97a13"/>
    <text x="20" y="22" text-anchor="middle">1</text>
    <text x="60" y="22" text-anchor="middle" fill="#ccc">0</text>
    <text x="100" y="22" text-anchor="middle" fill="#ccc">0</text>
    <text x="140" y="22" text-anchor="middle" fill="#ccc">0</text>
    <text x="180" y="22" text-anchor="middle">1</text>

    <!-- Row C -->
    <rect y="30" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="40" y="30" width="40" height="30" fill="#cfe9d4" stroke="#3a9b54"/>
    <rect x="80" y="30" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="120" y="30" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="160" y="30" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <text x="20" y="52" text-anchor="middle" fill="#ccc">0</text>
    <text x="60" y="52" text-anchor="middle">1</text>
    <text x="100" y="52" text-anchor="middle" fill="#ccc">0</text>
    <text x="140" y="52" text-anchor="middle" fill="#ccc">0</text>
    <text x="180" y="52" text-anchor="middle" fill="#ccc">0</text>

    <!-- Row G -->
    <rect y="60" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="40" y="60" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="80" y="60" width="40" height="30" fill="#cfdef9" stroke="#3a6fb5"/>
    <rect x="120" y="60" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="160" y="60" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <text x="20" y="82" text-anchor="middle" fill="#ccc">0</text>
    <text x="60" y="82" text-anchor="middle" fill="#ccc">0</text>
    <text x="100" y="82" text-anchor="middle">1</text>
    <text x="140" y="82" text-anchor="middle" fill="#ccc">0</text>
    <text x="180" y="82" text-anchor="middle" fill="#ccc">0</text>

    <!-- Row T -->
    <rect y="90" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="40" y="90" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="80" y="90" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <rect x="120" y="90" width="40" height="30" fill="#f9c3c3" stroke="#a52020"/>
    <rect x="160" y="90" width="40" height="30" fill="#fff" stroke="#ccc"/>
    <text x="20" y="112" text-anchor="middle" fill="#ccc">0</text>
    <text x="60" y="112" text-anchor="middle" fill="#ccc">0</text>
    <text x="100" y="112" text-anchor="middle" fill="#ccc">0</text>
    <text x="140" y="112" text-anchor="middle">1</text>
    <text x="180" y="112" text-anchor="middle" fill="#ccc">0</text>

    <!-- column tickmarks pointing to position -->
    <text x="-12" y="148" text-anchor="end" font-size="11" fill="#666">position</text>
    <text x="20" y="148" text-anchor="middle" font-size="11" fill="#666">0</text>
    <text x="60" y="148" text-anchor="middle" font-size="11" fill="#666">1</text>
    <text x="100" y="148" text-anchor="middle" font-size="11" fill="#666">2</text>
    <text x="140" y="148" text-anchor="middle" font-size="11" fill="#666">3</text>
    <text x="180" y="148" text-anchor="middle" font-size="11" fill="#666">4</text>
  </g>

  <!-- Footer -->
  <text x="500" y="270" text-anchor="middle" font-size="14" fill="#333">
    Each position picks exactly one of the four channels (rows) — column-sum is 1 everywhere.
  </text>
  <text x="500" y="295" text-anchor="middle" font-size="14" fill="#333">
    For a batch of N sequences the full tensor is <tspan font-family="monospace">[N, 4, L]</tspan> — the standard input for every sequence model.
  </text>
  <text x="500" y="325" text-anchor="middle" font-size="13" fill="#666">
    Burn: `seqs.one_hot(4).float().swap_dims(1, 2)` &nbsp;·&nbsp; PyTorch: `F.one_hot(seqs, 4).float().transpose(1, 2)`
  </text>
</svg>
