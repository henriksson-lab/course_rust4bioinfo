<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 360" font-family="sans-serif" font-size="14">
  <text x="500" y="30" text-anchor="middle" font-size="18" font-weight="bold">Anatomy of one GPU operation</text>

  <!-- Timeline base -->
  <line x1="60" y1="120" x2="940" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arrh)"/>
  <defs>
    <marker id="arrh" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>
  <text x="950" y="125" font-size="12" fill="#444">time</text>

  <!-- Steps -->
  <g>
    <rect x="80" y="80" width="120" height="60" rx="6" fill="#eef5ff" stroke="#3a6fb5"/>
    <text x="140" y="108" text-anchor="middle" font-weight="bold" fill="#1c3a66">host setup</text>
    <text x="140" y="128" text-anchor="middle" font-size="12">prepare Vec / shape</text>

    <rect x="210" y="80" width="170" height="60" rx="6" fill="#ffeccc" stroke="#c97a13"/>
    <text x="295" y="108" text-anchor="middle" font-weight="bold" fill="#7a4a08">upload to VRAM</text>
    <text x="295" y="128" text-anchor="middle" font-size="12">across PCIe</text>

    <rect x="390" y="80" width="190" height="60" rx="6" fill="#eaf7ee" stroke="#3a9b54"/>
    <text x="485" y="108" text-anchor="middle" font-weight="bold" fill="#1a5c2c">GPU kernel runs</text>
    <text x="485" y="128" text-anchor="middle" font-size="12">10 000 ALUs in parallel</text>

    <rect x="590" y="80" width="170" height="60" rx="6" fill="#ffeccc" stroke="#c97a13"/>
    <text x="675" y="108" text-anchor="middle" font-weight="bold" fill="#7a4a08">download result</text>
    <text x="675" y="128" text-anchor="middle" font-size="12">across PCIe</text>

    <rect x="770" y="80" width="140" height="60" rx="6" fill="#eef5ff" stroke="#3a6fb5"/>
    <text x="840" y="108" text-anchor="middle" font-weight="bold" fill="#1c3a66">read on host</text>
    <text x="840" y="128" text-anchor="middle" font-size="12">to_data() / Vec&lt;f32&gt;</text>
  </g>

  <!-- Small vs big comparison -->
  <text x="60" y="190" font-size="14" font-weight="bold">Small problem (~10⁴ floats):</text>
  <rect x="80" y="200" width="60" height="22" fill="#eef5ff" stroke="#3a6fb5"/>
  <rect x="140" y="200" width="180" height="22" fill="#ffeccc" stroke="#c97a13"/>
  <rect x="320" y="200" width="22" height="22" fill="#eaf7ee" stroke="#3a9b54"/>
  <rect x="342" y="200" width="180" height="22" fill="#ffeccc" stroke="#c97a13"/>
  <rect x="522" y="200" width="60" height="22" fill="#eef5ff" stroke="#3a6fb5"/>
  <text x="600" y="216" font-size="12">→ transfers dominate, GPU loses</text>

  <text x="60" y="260" font-size="14" font-weight="bold">Big problem (~10⁹ floats):</text>
  <rect x="80" y="270" width="40" height="22" fill="#eef5ff" stroke="#3a6fb5"/>
  <rect x="120" y="270" width="80" height="22" fill="#ffeccc" stroke="#c97a13"/>
  <rect x="200" y="270" width="500" height="22" fill="#eaf7ee" stroke="#3a9b54"/>
  <rect x="700" y="270" width="80" height="22" fill="#ffeccc" stroke="#c97a13"/>
  <rect x="780" y="270" width="40" height="22" fill="#eef5ff" stroke="#3a6fb5"/>
  <text x="830" y="286" font-size="12">→ kernel dominates, GPU wins</text>

  <text x="500" y="330" text-anchor="middle" font-size="13" fill="#333">
    Keep tensors on-device, batch work, avoid round-tripping per element.
  </text>
</svg>
