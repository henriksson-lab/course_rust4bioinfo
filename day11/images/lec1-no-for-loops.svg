<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="sans-serif" font-size="14">
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="bold">One whole-tensor op &gt;&gt; a thousand per-element ops</text>

  <!-- BAD: for loop -->
  <text x="60" y="78" font-weight="bold" fill="#a52020">BAD — for-loop per element</text>
  <text x="60" y="96" font-size="12" fill="#666">each iteration is a tiny kernel launch + a transfer</text>

  <g transform="translate(60,110)">
    <rect width="30" height="30" fill="#fee2e2" stroke="#a52020"/>
    <rect x="40" width="30" height="30" fill="#fee2e2" stroke="#a52020"/>
    <rect x="80" width="30" height="30" fill="#fee2e2" stroke="#a52020"/>
    <rect x="120" width="30" height="30" fill="#fee2e2" stroke="#a52020"/>
    <rect x="160" width="30" height="30" fill="#fee2e2" stroke="#a52020"/>
    <text x="200" y="20" font-family="monospace">... × N</text>
    <text x="15" y="20" text-anchor="middle" font-size="11">k0</text>
    <text x="55" y="20" text-anchor="middle" font-size="11">k1</text>
    <text x="95" y="20" text-anchor="middle" font-size="11">k2</text>
    <text x="135" y="20" text-anchor="middle" font-size="11">k3</text>
    <text x="175" y="20" text-anchor="middle" font-size="11">k4</text>
  </g>

  <text x="60" y="170" font-size="13" fill="#666">total time ≈ N × (launch overhead + per-element work)</text>

  <!-- Divider -->
  <line x1="60" y1="200" x2="940" y2="200" stroke="#ccc"/>

  <!-- GOOD: one kernel -->
  <text x="60" y="230" font-weight="bold" fill="#1a5c2c">GOOD — one whole-tensor op</text>
  <text x="60" y="248" font-size="12" fill="#666">one kernel processes all N elements in parallel</text>

  <g transform="translate(60,262)">
    <rect width="400" height="60" fill="#dcfae3" stroke="#1a5c2c" stroke-width="2"/>
    <text x="200" y="36" text-anchor="middle" font-weight="bold" fill="#1a5c2c">one kernel — N elements in parallel</text>
    <!-- Indicator that internally many ALUs work -->
    <g font-size="10" fill="#1a5c2c">
      <text x="20" y="56" text-anchor="middle">⚙</text>
      <text x="60" y="56" text-anchor="middle">⚙</text>
      <text x="100" y="56" text-anchor="middle">⚙</text>
      <text x="140" y="56" text-anchor="middle">⚙</text>
      <text x="180" y="56" text-anchor="middle">⚙</text>
      <text x="220" y="56" text-anchor="middle">⚙</text>
      <text x="260" y="56" text-anchor="middle">⚙</text>
      <text x="300" y="56" text-anchor="middle">⚙</text>
      <text x="340" y="56" text-anchor="middle">⚙</text>
      <text x="380" y="56" text-anchor="middle">⚙</text>
    </g>
  </g>

  <text x="60" y="345" font-size="13" fill="#333">
    Same mental shift as Python → NumPy: every per-element `for` is a missed GPU kernel.
  </text>
  <text x="60" y="365" font-size="13" fill="#333">
    If you find yourself writing <tspan font-family="monospace">for i in 0..n</tspan> over tensor entries, stop — reach for a tensor op.
  </text>
</svg>
