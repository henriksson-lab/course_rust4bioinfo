<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 200" font-family="system-ui, -apple-system, sans-serif" font-size="14">
  <defs>
    <marker id="arrm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <text x="500" y="24" text-anchor="middle" font-size="18" font-weight="bold">PromoterNet: a tiny sequence classifier as a Burn `Module`</text>

  <!-- Input -->
  <g transform="translate(20,50)">
    <rect width="120" height="100" rx="6" fill="#eef5ff" stroke="#3a6fb5"/>
    <text x="60" y="36" text-anchor="middle" font-weight="bold">Input</text>
    <text x="60" y="62" text-anchor="middle" font-family="monospace" font-size="14">[N, 4, L]</text>
    <text x="60" y="84" text-anchor="middle" font-size="12" fill="#666">one-hot DNA</text>
  </g>
  <line x1="140" y1="100" x2="170" y2="100" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Conv1d -->
  <g transform="translate(170,50)">
    <rect width="140" height="100" rx="6" fill="#fde0c4" stroke="#c97a13"/>
    <text x="70" y="36" text-anchor="middle" font-weight="bold">Conv1d</text>
    <text x="70" y="62" text-anchor="middle" font-size="13">4 → C channels, k = 6</text>
    <text x="70" y="84" text-anchor="middle" font-size="12" fill="#666">learnable PWMs + bias</text>
  </g>
  <line x1="310" y1="100" x2="340" y2="100" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- ReLU -->
  <g transform="translate(340,50)">
    <rect width="100" height="100" rx="6" fill="#fff5d8" stroke="#b59000"/>
    <text x="50" y="36" text-anchor="middle" font-weight="bold">ReLU</text>
    <text x="50" y="62" text-anchor="middle" font-family="monospace" font-size="13">[N, C, L−5]</text>
    <text x="50" y="84" text-anchor="middle" font-size="12" fill="#666">max(0, ·)</text>
  </g>
  <line x1="440" y1="100" x2="470" y2="100" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Max pool -->
  <g transform="translate(470,50)">
    <rect width="140" height="100" rx="6" fill="#eaf7ee" stroke="#3a9b54"/>
    <text x="70" y="36" text-anchor="middle" font-weight="bold">max over L</text>
    <text x="70" y="62" text-anchor="middle" font-family="monospace" font-size="13">[N, C, ·] → [N, C]</text>
    <text x="70" y="84" text-anchor="middle" font-size="12" fill="#666">global max-pool</text>
  </g>
  <line x1="610" y1="100" x2="640" y2="100" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Linear -->
  <g transform="translate(640,50)">
    <rect width="140" height="100" rx="6" fill="#fde0c4" stroke="#c97a13"/>
    <text x="70" y="36" text-anchor="middle" font-weight="bold">Linear</text>
    <text x="70" y="62" text-anchor="middle" font-size="13">C → 1</text>
    <text x="70" y="84" text-anchor="middle" font-size="12" fill="#666">W : [1, C] + bias</text>
  </g>
  <line x1="780" y1="100" x2="810" y2="100" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Output -->
  <g transform="translate(810,50)">
    <rect width="170" height="100" rx="6" fill="#dcfae3" stroke="#1a5c2c"/>
    <text x="85" y="36" text-anchor="middle" font-weight="bold">Output</text>
    <text x="85" y="62" text-anchor="middle" font-family="monospace" font-size="14">[N, 1]</text>
    <text x="85" y="84" text-anchor="middle" font-size="12" fill="#666">promoter logit per seq.</text>
  </g>

  <!-- Annotation: which parts have params -->
  <text x="500" y="185" text-anchor="middle" font-size="13" fill="#333">
    Learnable parameters live in <tspan font-family="monospace" fill="#7a4a08">Conv1d</tspan> (one filter per motif) and <tspan font-family="monospace" fill="#7a4a08">Linear</tspan> (one weight per channel) — collected by <tspan font-family="monospace">derive(Module)</tspan>.
  </text>
</svg>
