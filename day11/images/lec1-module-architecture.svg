<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" font-family="sans-serif" font-size="13">
  <defs>
    <marker id="arrm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="bold">PromoterNet: a tiny sequence classifier as a Burn `Module`</text>

  <!-- Input -->
  <g transform="translate(20,80)">
    <rect width="120" height="80" rx="6" fill="#eef5ff" stroke="#3a6fb5"/>
    <text x="60" y="32" text-anchor="middle" font-weight="bold">Input</text>
    <text x="60" y="55" text-anchor="middle" font-family="monospace">[N, 4, L]</text>
    <text x="60" y="75" text-anchor="middle" font-size="11" fill="#666">one-hot DNA</text>
  </g>
  <line x1="140" y1="120" x2="170" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Conv1d -->
  <g transform="translate(170,80)">
    <rect width="140" height="80" rx="6" fill="#fde0c4" stroke="#c97a13"/>
    <text x="70" y="32" text-anchor="middle" font-weight="bold">Conv1d</text>
    <text x="70" y="55" text-anchor="middle" font-size="12">4 → C channels, k = 6</text>
    <text x="70" y="73" text-anchor="middle" font-size="11" fill="#666">learnable PWMs + bias</text>
  </g>
  <line x1="310" y1="120" x2="340" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- ReLU -->
  <g transform="translate(340,80)">
    <rect width="100" height="80" rx="6" fill="#fff5d8" stroke="#b59000"/>
    <text x="50" y="32" text-anchor="middle" font-weight="bold">ReLU</text>
    <text x="50" y="55" text-anchor="middle" font-family="monospace">[N, C, L−5]</text>
    <text x="50" y="73" text-anchor="middle" font-size="11" fill="#666">max(0, ·)</text>
  </g>
  <line x1="440" y1="120" x2="470" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Max pool -->
  <g transform="translate(470,80)">
    <rect width="140" height="80" rx="6" fill="#eaf7ee" stroke="#3a9b54"/>
    <text x="70" y="32" text-anchor="middle" font-weight="bold">max over L</text>
    <text x="70" y="55" text-anchor="middle" font-family="monospace">[N, C, ·] → [N, C]</text>
    <text x="70" y="73" text-anchor="middle" font-size="11" fill="#666">global max-pool</text>
  </g>
  <line x1="610" y1="120" x2="640" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Linear -->
  <g transform="translate(640,80)">
    <rect width="140" height="80" rx="6" fill="#fde0c4" stroke="#c97a13"/>
    <text x="70" y="32" text-anchor="middle" font-weight="bold">Linear</text>
    <text x="70" y="55" text-anchor="middle" font-size="12">C → 1</text>
    <text x="70" y="73" text-anchor="middle" font-size="11" fill="#666">W : [1, C] + bias</text>
  </g>
  <line x1="780" y1="120" x2="810" y2="120" stroke="#444" stroke-width="2" marker-end="url(#arrm)"/>

  <!-- Output -->
  <g transform="translate(810,80)">
    <rect width="170" height="80" rx="6" fill="#dcfae3" stroke="#1a5c2c"/>
    <text x="85" y="32" text-anchor="middle" font-weight="bold">Output</text>
    <text x="85" y="55" text-anchor="middle" font-family="monospace">[N, 1]</text>
    <text x="85" y="73" text-anchor="middle" font-size="11" fill="#666">promoter logit per seq.</text>
  </g>

  <!-- Annotation: which parts have params -->
  <text x="500" y="200" text-anchor="middle" font-size="13" fill="#333">
    Learnable parameters live in <tspan font-family="monospace" fill="#7a4a08">Conv1d</tspan> (one filter per motif) and
    <tspan font-family="monospace" fill="#7a4a08">Linear</tspan> (one weight per channel).
  </text>
  <text x="500" y="225" text-anchor="middle" font-size="13" fill="#333">
    The `derive(Module)` macro collects them so the optimiser knows what to update.
  </text>
  <text x="500" y="255" text-anchor="middle" font-size="12" fill="#666">
    Exactly the architecture used by classical sequence-ML papers (DeepBind) before residual / attention layers stacked on top.
  </text>
</svg>
