<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="sans-serif" font-size="13">
  <text x="500" y="26" text-anchor="middle" font-size="18" font-weight="bold">Sliding a PWM across DNA = 1-D convolution</text>

  <!-- one-hot DNA strip (12 positions) -->
  <text x="60" y="68" font-weight="bold">one-hot DNA [4, L]:</text>
  <g transform="translate(60,80)" font-family="monospace" font-size="13">
    <!-- 4 x 12 grid; small cells -->
    <g stroke="#aaa" fill="#fff">
      <!-- generate cells -->
      <g>
        <!-- pos 0..11 across, base A C G T -->
        <!-- A row -->
        <rect width="40" height="22"/>
        <rect x="40" width="40" height="22" fill="#cfdef9"/>  <!-- C? - we'll mark differently -->
      </g>
    </g>
  </g>
  <!-- Simpler: replace the above generated cells with explicit ones -->
  <g transform="translate(60,80)" font-family="monospace" font-size="12">
    <!-- We'll draw a 4 row by 12 col grid; highlight the GATA at columns 4..7 -->
    <!-- DNA: A C G T A C  G A T A  C C  (so G at 6 starts GATA: G A T A at 6,7,8,9) -->
    <!-- Row labels -->
    <text x="-8" y="14" text-anchor="end" font-weight="bold">A</text>
    <text x="-8" y="36" text-anchor="end" font-weight="bold">C</text>
    <text x="-8" y="58" text-anchor="end" font-weight="bold">G</text>
    <text x="-8" y="80" text-anchor="end" font-weight="bold">T</text>

    <!-- 12 positions, each 32px wide, 22px tall -->
    <!-- Draw all empty cells -->
    <g fill="#fff" stroke="#ddd">
      <!-- For simplicity, draw via repetition -->
      <rect x="0"    y="0" width="32" height="22"/><rect x="32"   y="0" width="32" height="22"/>
      <rect x="64"   y="0" width="32" height="22"/><rect x="96"   y="0" width="32" height="22"/>
      <rect x="128"  y="0" width="32" height="22"/><rect x="160"  y="0" width="32" height="22"/>
      <rect x="192"  y="0" width="32" height="22"/><rect x="224"  y="0" width="32" height="22"/>
      <rect x="256"  y="0" width="32" height="22"/><rect x="288"  y="0" width="32" height="22"/>
      <rect x="320"  y="0" width="32" height="22"/><rect x="352"  y="0" width="32" height="22"/>

      <rect x="0"   y="22" width="32" height="22"/><rect x="32"  y="22" width="32" height="22"/>
      <rect x="64"  y="22" width="32" height="22"/><rect x="96"  y="22" width="32" height="22"/>
      <rect x="128" y="22" width="32" height="22"/><rect x="160" y="22" width="32" height="22"/>
      <rect x="192" y="22" width="32" height="22"/><rect x="224" y="22" width="32" height="22"/>
      <rect x="256" y="22" width="32" height="22"/><rect x="288" y="22" width="32" height="22"/>
      <rect x="320" y="22" width="32" height="22"/><rect x="352" y="22" width="32" height="22"/>

      <rect x="0"   y="44" width="32" height="22"/><rect x="32"  y="44" width="32" height="22"/>
      <rect x="64"  y="44" width="32" height="22"/><rect x="96"  y="44" width="32" height="22"/>
      <rect x="128" y="44" width="32" height="22"/><rect x="160" y="44" width="32" height="22"/>
      <rect x="192" y="44" width="32" height="22"/><rect x="224" y="44" width="32" height="22"/>
      <rect x="256" y="44" width="32" height="22"/><rect x="288" y="44" width="32" height="22"/>
      <rect x="320" y="44" width="32" height="22"/><rect x="352" y="44" width="32" height="22"/>

      <rect x="0"   y="66" width="32" height="22"/><rect x="32"  y="66" width="32" height="22"/>
      <rect x="64"  y="66" width="32" height="22"/><rect x="96"  y="66" width="32" height="22"/>
      <rect x="128" y="66" width="32" height="22"/><rect x="160" y="66" width="32" height="22"/>
      <rect x="192" y="66" width="32" height="22"/><rect x="224" y="66" width="32" height="22"/>
      <rect x="256" y="66" width="32" height="22"/><rect x="288" y="66" width="32" height="22"/>
      <rect x="320" y="66" width="32" height="22"/><rect x="352" y="66" width="32" height="22"/>
    </g>

    <!-- Hot cells: DNA = A C G T A C G A T A C C (positions 0..11) -->
    <!-- A: pos 0,4,7,9 -->
    <g fill="#ffe9b5" stroke="#c97a13">
      <rect x="0"   y="0" width="32" height="22"/>
      <rect x="128" y="0" width="32" height="22"/>
      <rect x="224" y="0" width="32" height="22"/>
      <rect x="288" y="0" width="32" height="22"/>
    </g>
    <!-- C: pos 1,5,10,11 -->
    <g fill="#cfe9d4" stroke="#3a9b54">
      <rect x="32"  y="22" width="32" height="22"/>
      <rect x="160" y="22" width="32" height="22"/>
      <rect x="320" y="22" width="32" height="22"/>
      <rect x="352" y="22" width="32" height="22"/>
    </g>
    <!-- G: pos 2,6 -->
    <g fill="#cfdef9" stroke="#3a6fb5">
      <rect x="64"  y="44" width="32" height="22"/>
      <rect x="192" y="44" width="32" height="22"/>
    </g>
    <!-- T: pos 3,8 -->
    <g fill="#f9c3c3" stroke="#a52020">
      <rect x="96"  y="66" width="32" height="22"/>
      <rect x="256" y="66" width="32" height="22"/>
    </g>

    <!-- 1s in hot cells -->
    <g font-size="12">
      <text x="16"  y="14">1</text><text x="48"  y="36">1</text><text x="80"  y="58">1</text><text x="112" y="80">1</text>
      <text x="144" y="14">1</text><text x="176" y="36">1</text><text x="208" y="58">1</text><text x="240" y="14">1</text>
      <text x="272" y="80">1</text><text x="304" y="14">1</text><text x="336" y="36">1</text><text x="368" y="36">1</text>
    </g>

    <!-- Position labels -->
    <g font-size="10" fill="#666">
      <text x="16"  y="102" text-anchor="middle">0</text>
      <text x="48"  y="102" text-anchor="middle">1</text>
      <text x="80"  y="102" text-anchor="middle">2</text>
      <text x="112" y="102" text-anchor="middle">3</text>
      <text x="144" y="102" text-anchor="middle">4</text>
      <text x="176" y="102" text-anchor="middle">5</text>
      <text x="208" y="102" text-anchor="middle">6</text>
      <text x="240" y="102" text-anchor="middle">7</text>
      <text x="272" y="102" text-anchor="middle">8</text>
      <text x="304" y="102" text-anchor="middle">9</text>
      <text x="336" y="102" text-anchor="middle">10</text>
      <text x="368" y="102" text-anchor="middle">11</text>
    </g>
  </g>

  <!-- PWM window at GATA (positions 6..9) -->
  <g transform="translate(60,80)">
    <rect x="192" y="-4" width="128" height="96" fill="none" stroke="#c97a13" stroke-width="3" stroke-dasharray="4,3"/>
    <text x="256" y="-10" text-anchor="middle" font-size="12" font-weight="bold" fill="#c97a13">PWM window (width 4)</text>
  </g>

  <!-- PWM kernel display -->
  <g transform="translate(60,230)" font-family="monospace" font-size="13">
    <text x="0" y="-6" font-weight="bold">PWM [4, w=4]: motif GATA</text>
    <g stroke="#aaa">
      <rect x="0"   y="0" width="32" height="22" fill="#fff"/>
      <rect x="32"  y="0" width="32" height="22" fill="#fff"/>
      <rect x="64"  y="0" width="32" height="22" fill="#fff"/>
      <rect x="96"  y="0" width="32" height="22" fill="#fff"/>

      <rect x="0"   y="22" width="32" height="22" fill="#fff"/>
      <rect x="32"  y="22" width="32" height="22" fill="#fff"/>
      <rect x="64"  y="22" width="32" height="22" fill="#fff"/>
      <rect x="96"  y="22" width="32" height="22" fill="#fff"/>

      <rect x="0"   y="44" width="32" height="22" fill="#fff"/>
      <rect x="32"  y="44" width="32" height="22" fill="#fff"/>
      <rect x="64"  y="44" width="32" height="22" fill="#fff"/>
      <rect x="96"  y="44" width="32" height="22" fill="#fff"/>

      <rect x="0"   y="66" width="32" height="22" fill="#fff"/>
      <rect x="32"  y="66" width="32" height="22" fill="#fff"/>
      <rect x="64"  y="66" width="32" height="22" fill="#fff"/>
      <rect x="96"  y="66" width="32" height="22" fill="#fff"/>
    </g>
    <!-- PWM values: G A T A pattern, row A: 0 1 0 1; row C: 0; row G: 1 0 0 0; row T: 0 0 1 0 -->
    <g font-size="12">
      <text x="-8" y="14" text-anchor="end">A</text>
      <text x="-8" y="36" text-anchor="end">C</text>
      <text x="-8" y="58" text-anchor="end">G</text>
      <text x="-8" y="80" text-anchor="end">T</text>

      <text x="16" y="14" text-anchor="middle">0</text><text x="48" y="14" text-anchor="middle" font-weight="bold">1</text>
      <text x="80" y="14" text-anchor="middle">0</text><text x="112" y="14" text-anchor="middle" font-weight="bold">1</text>

      <text x="16" y="36" text-anchor="middle">0</text><text x="48" y="36" text-anchor="middle">0</text>
      <text x="80" y="36" text-anchor="middle">0</text><text x="112" y="36" text-anchor="middle">0</text>

      <text x="16" y="58" text-anchor="middle" font-weight="bold">1</text><text x="48" y="58" text-anchor="middle">0</text>
      <text x="80" y="58" text-anchor="middle">0</text><text x="112" y="58" text-anchor="middle">0</text>

      <text x="16" y="80" text-anchor="middle">0</text><text x="48" y="80" text-anchor="middle">0</text>
      <text x="80" y="80" text-anchor="middle" font-weight="bold">1</text><text x="112" y="80" text-anchor="middle">0</text>
    </g>
  </g>

  <!-- Output scores -->
  <g transform="translate(260,230)" font-family="monospace" font-size="13">
    <text x="0" y="-6" font-weight="bold">scores [L − w + 1 = 9]:</text>
    <g stroke="#aaa" fill="#fff">
      <rect width="32" height="32"/>
      <rect x="32"  width="32" height="32"/>
      <rect x="64"  width="32" height="32"/>
      <rect x="96"  width="32" height="32"/>
      <rect x="128" width="32" height="32"/>
      <rect x="160" width="32" height="32"/>
      <rect x="192" width="32" height="32"/>
      <rect x="224" width="32" height="32"/>
      <rect x="256" width="32" height="32"/>
    </g>
    <!-- Highlight position 6 where GATA matches perfectly -->
    <rect x="192" width="32" height="32" fill="#ffd9a8" stroke="#c97a13" stroke-width="2"/>
    <g font-size="12">
      <text x="16"  y="20" text-anchor="middle">0</text>
      <text x="48"  y="20" text-anchor="middle">1</text>
      <text x="80"  y="20" text-anchor="middle">1</text>
      <text x="112" y="20" text-anchor="middle">2</text>
      <text x="144" y="20" text-anchor="middle">2</text>
      <text x="176" y="20" text-anchor="middle">2</text>
      <text x="208" y="20" text-anchor="middle" font-weight="bold">4</text>
      <text x="240" y="20" text-anchor="middle">1</text>
      <text x="272" y="20" text-anchor="middle">0</text>
    </g>
    <g font-size="10" fill="#666">
      <text x="16"  y="46" text-anchor="middle">0</text><text x="48"  y="46" text-anchor="middle">1</text>
      <text x="80"  y="46" text-anchor="middle">2</text><text x="112" y="46" text-anchor="middle">3</text>
      <text x="144" y="46" text-anchor="middle">4</text><text x="176" y="46" text-anchor="middle">5</text>
      <text x="208" y="46" text-anchor="middle">6</text><text x="240" y="46" text-anchor="middle">7</text>
      <text x="272" y="46" text-anchor="middle">8</text>
    </g>
    <text x="144" y="80" text-anchor="middle" font-size="11" fill="#c97a13">score 4 = perfect match (GATA at position 6)</text>
  </g>

  <!-- Math -->
  <text x="500" y="370" text-anchor="middle" font-size="14" font-weight="bold" fill="#444">
    score(p) = Σ<tspan baseline-shift="sub" font-size="10">b,k</tspan> one_hot[b, p+k] · PWM[b, k]   +   bias
  </text>
  <text x="500" y="395" text-anchor="middle" font-size="12" fill="#666">
    Each Conv1d output channel is one motif; the per-channel bias shifts the score (useful for a learned threshold).
  </text>
</svg>
