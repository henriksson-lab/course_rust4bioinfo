<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="sans-serif" font-size="14">
  <text x="500" y="28" text-anchor="middle" font-size="18" font-weight="bold">"Rank" = number of axes &nbsp;&nbsp;|&nbsp;&nbsp; "dims" = the size of each axis</text>

  <!-- 1D vector -->
  <text x="160" y="70" text-anchor="middle" font-weight="bold">Rank 1 — vector</text>
  <g>
    <rect x="40" y="90" width="40" height="40" fill="#eef5ff" stroke="#3a6fb5"/>
    <rect x="80" y="90" width="40" height="40" fill="#eef5ff" stroke="#3a6fb5"/>
    <rect x="120" y="90" width="40" height="40" fill="#eef5ff" stroke="#3a6fb5"/>
    <rect x="160" y="90" width="40" height="40" fill="#eef5ff" stroke="#3a6fb5"/>
    <rect x="200" y="90" width="40" height="40" fill="#eef5ff" stroke="#3a6fb5"/>
    <text x="60" y="115" text-anchor="middle">1</text>
    <text x="100" y="115" text-anchor="middle">2</text>
    <text x="140" y="115" text-anchor="middle">3</text>
    <text x="180" y="115" text-anchor="middle">4</text>
    <text x="220" y="115" text-anchor="middle">5</text>
  </g>
  <text x="140" y="160" text-anchor="middle" font-size="13">dims = [5]</text>
  <text x="140" y="180" text-anchor="middle" font-size="12" fill="#666">Tensor&lt;B, 1&gt;</text>

  <!-- 2D matrix -->
  <text x="490" y="70" text-anchor="middle" font-weight="bold">Rank 2 — matrix</text>
  <g>
    <!-- 3 rows, 4 cols -->
    <g transform="translate(380,90)">
      <rect width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="40" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="80" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="120" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect y="40" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="40" y="40" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="80" y="40" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="120" y="40" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect y="80" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="40" y="80" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="80" y="80" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
      <rect x="120" y="80" width="40" height="40" fill="#eaf7ee" stroke="#3a9b54"/>
    </g>
    <text x="490" y="225" text-anchor="middle" font-size="13">dims = [3, 4]</text>
    <text x="490" y="245" text-anchor="middle" font-size="12" fill="#666">Tensor&lt;B, 2&gt;</text>
    <text x="365" y="135" text-anchor="end" font-size="12" fill="#444">axis 0 ↓</text>
    <text x="540" y="80" font-size="12" fill="#444">axis 1 →</text>
  </g>

  <!-- 3D tensor -->
  <text x="820" y="70" text-anchor="middle" font-weight="bold">Rank 3 — 3-D tensor</text>
  <g>
    <!-- Back layer -->
    <g transform="translate(720,80)" fill="#fde0c4" stroke="#c97a13">
      <rect x="20" y="20" width="120" height="60"/>
      <line x1="20" y1="35" x2="140" y2="35"/>
      <line x1="20" y1="50" x2="140" y2="50"/>
      <line x1="20" y1="65" x2="140" y2="65"/>
      <line x1="50" y1="20" x2="50" y2="80"/>
      <line x1="80" y1="20" x2="80" y2="80"/>
      <line x1="110" y1="20" x2="110" y2="80"/>
    </g>
    <!-- Middle layer -->
    <g transform="translate(730,100)" fill="#ffd9a8" stroke="#c97a13">
      <rect x="20" y="20" width="120" height="60"/>
      <line x1="20" y1="35" x2="140" y2="35"/>
      <line x1="20" y1="50" x2="140" y2="50"/>
      <line x1="20" y1="65" x2="140" y2="65"/>
      <line x1="50" y1="20" x2="50" y2="80"/>
      <line x1="80" y1="20" x2="80" y2="80"/>
      <line x1="110" y1="20" x2="110" y2="80"/>
    </g>
    <!-- Front layer -->
    <g transform="translate(740,120)" fill="#ffc78c" stroke="#c97a13">
      <rect x="20" y="20" width="120" height="60"/>
      <line x1="20" y1="35" x2="140" y2="35"/>
      <line x1="20" y1="50" x2="140" y2="50"/>
      <line x1="20" y1="65" x2="140" y2="65"/>
      <line x1="50" y1="20" x2="50" y2="80"/>
      <line x1="80" y1="20" x2="80" y2="80"/>
      <line x1="110" y1="20" x2="110" y2="80"/>
    </g>
    <text x="820" y="245" text-anchor="middle" font-size="13">dims = [3, 4, 5]</text>
    <text x="820" y="265" text-anchor="middle" font-size="12" fill="#666">Tensor&lt;B, 3&gt;</text>
  </g>

  <!-- Bottom helper text -->
  <text x="500" y="320" text-anchor="middle" font-size="14" fill="#333">
    In sequence ML the convention is <tspan font-family="monospace" fill="#000">[N, C, L]</tspan>
    — batch (N), channels (C, here 4 bases), length (L).
  </text>
  <text x="500" y="345" text-anchor="middle" font-size="13" fill="#666">
    `tensor.dims()` returns the array of sizes;
    `Tensor&lt;B, D&gt;` carries the rank D in the type system.
  </text>
</svg>
