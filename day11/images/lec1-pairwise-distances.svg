<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" font-family="sans-serif" font-size="13">
  <text x="500" y="26" text-anchor="middle" font-size="18" font-weight="bold">Pairwise distances by broadcasting — the "[N,1,D] − [1,N,D]" trick</text>

  <!-- x: [N,D] -->
  <text x="100" y="68" text-anchor="middle" font-weight="bold">x : [N, D]</text>
  <g transform="translate(60,80)" fill="#eef5ff" stroke="#3a6fb5">
    <rect width="80" height="20"/>
    <rect y="20" width="80" height="20"/>
    <rect y="40" width="80" height="20"/>
    <rect y="60" width="80" height="20"/>
  </g>
  <text x="100" y="170" text-anchor="middle" font-size="12">N samples, each a D-vector</text>

  <text x="170" y="125" font-size="20">→</text>

  <!-- a = x.unsqueeze(1): [N,1,D] -->
  <text x="280" y="68" text-anchor="middle" font-weight="bold">a = x.unsqueeze(1): [N, 1, D]</text>
  <g transform="translate(240,80)">
    <!-- Four little single-row strips, each [1,D] -->
    <g fill="#eef5ff" stroke="#3a6fb5">
      <rect width="80" height="14"/>
      <rect y="22" width="80" height="14"/>
      <rect y="44" width="80" height="14"/>
      <rect y="66" width="80" height="14"/>
    </g>
    <!-- Indicate stretched -->
    <text x="40" y="100" text-anchor="middle" font-size="11" fill="#666">stretched along axis 1</text>
  </g>

  <text x="350" y="125" font-size="22" fill="#a52020">−</text>

  <!-- b = x.unsqueeze(0): [1,N,D] -->
  <text x="460" y="68" text-anchor="middle" font-weight="bold">b = x.unsqueeze(0): [1, N, D]</text>
  <g transform="translate(420,80)" fill="#fde0c4" stroke="#c97a13">
    <rect width="80" height="80"/>
    <line x1="0" y1="20" x2="80" y2="20"/>
    <line x1="0" y1="40" x2="80" y2="40"/>
    <line x1="0" y1="60" x2="80" y2="60"/>
  </g>
  <text x="460" y="180" text-anchor="middle" font-size="11" fill="#666">stretched along axis 0</text>

  <text x="525" y="125" font-size="22">=</text>

  <!-- diff: [N,N,D] cube -->
  <text x="660" y="68" text-anchor="middle" font-weight="bold">diff: [N, N, D]</text>
  <g transform="translate(605,80)">
    <!-- Three stacked grids to give a cube look -->
    <g fill="#cce4d6" stroke="#1a5c2c">
      <rect x="0" y="0" width="90" height="60"/>
    </g>
    <g fill="#bcd9c7" stroke="#1a5c2c">
      <rect x="6" y="6" width="90" height="60"/>
    </g>
    <g fill="#aacdb6" stroke="#1a5c2c">
      <rect x="12" y="12" width="90" height="60"/>
      <line x1="12" y1="32" x2="102" y2="32"/>
      <line x1="12" y1="52" x2="102" y2="52"/>
      <line x1="42" y1="12" x2="42" y2="72"/>
      <line x1="72" y1="12" x2="72" y2="72"/>
    </g>
    <text x="55" y="100" text-anchor="middle" font-size="11" fill="#666">N × N × D virtual cube</text>
  </g>

  <text x="750" y="125" font-size="22">→</text>

  <!-- result: [N,N] -->
  <text x="860" y="68" text-anchor="middle" font-weight="bold">D[i,j]: [N, N]</text>
  <g transform="translate(810,80)" fill="#dcfae3" stroke="#1a5c2c">
    <rect width="80" height="80"/>
    <line x1="0" y1="20" x2="80" y2="20"/>
    <line x1="0" y1="40" x2="80" y2="40"/>
    <line x1="0" y1="60" x2="80" y2="60"/>
    <line x1="20" y1="0" x2="20" y2="80"/>
    <line x1="40" y1="0" x2="40" y2="80"/>
    <line x1="60" y1="0" x2="60" y2="80"/>
  </g>
  <text x="850" y="180" text-anchor="middle" font-size="11" fill="#666">.pow(2).sum_dim(2).sqrt().squeeze_dim(2)</text>

  <!-- Footer -->
  <text x="500" y="270" text-anchor="middle" font-size="13" fill="#333">
    Adding size-1 axes turns a 2-D thing into a virtual 3-D cube, lets broadcasting stretch it,
  </text>
  <text x="500" y="295" text-anchor="middle" font-size="13" fill="#333">
    and the subtraction + reduction then produces all N×N pairs in one kernel.
  </text>
  <text x="500" y="330" text-anchor="middle" font-size="14" fill="#444" font-weight="bold">
    D[i,j] = √(Σ<tspan baseline-shift="sub" font-size="10">k</tspan> (x[i,k] − x[j,k])²)
  </text>
  <text x="500" y="365" text-anchor="middle" font-size="12" fill="#666">
    For N = 10⁴ samples in D = 1000: ~10⁸ subtractions and squares — CPU ~5 s, GPU ~50 ms.
  </text>
</svg>
