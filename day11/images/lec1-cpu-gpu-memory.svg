<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" font-family="sans-serif" font-size="14">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#444"/>
    </marker>
  </defs>

  <!-- Host side -->
  <rect x="20" y="40" width="320" height="300" rx="12" fill="#eef5ff" stroke="#3a6fb5" stroke-width="2"/>
  <text x="180" y="70" text-anchor="middle" font-size="18" font-weight="bold" fill="#1c3a66">Host (CPU side)</text>

  <rect x="50" y="100" width="120" height="80" rx="6" fill="#fff" stroke="#3a6fb5"/>
  <text x="110" y="135" text-anchor="middle" font-weight="bold">CPU</text>
  <text x="110" y="158" text-anchor="middle" font-size="12">~10 cores</text>

  <rect x="190" y="100" width="130" height="80" rx="6" fill="#fff" stroke="#3a6fb5"/>
  <text x="255" y="130" text-anchor="middle" font-weight="bold">Host RAM</text>
  <text x="255" y="152" text-anchor="middle" font-size="12">tens of GB</text>
  <text x="255" y="170" text-anchor="middle" font-size="12">`Vec`, `Array2`</text>

  <text x="180" y="220" text-anchor="middle" font-size="13" fill="#1c3a66">Rust types: Vec&lt;f32&gt;, ndarray::Array2,</text>
  <text x="180" y="240" text-anchor="middle" font-size="13" fill="#1c3a66">Tensor&lt;NdArray, D&gt;</text>

  <!-- PCIe bridge -->
  <rect x="370" y="160" width="160" height="60" rx="8" fill="#ffeccc" stroke="#c97a13" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-weight="bold" fill="#7a4a08">PCIe bus</text>
  <text x="450" y="205" text-anchor="middle" font-size="12" fill="#7a4a08">~16–64 GB/s</text>

  <line x1="320" y1="180" x2="370" y2="180" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="530" y1="190" x2="580" y2="190" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="580" y1="200" x2="530" y2="200" stroke="#444" stroke-width="2" marker-end="url(#arr)"/>

  <text x="450" y="140" text-anchor="middle" font-size="12" fill="#444">upload</text>
  <text x="450" y="250" text-anchor="middle" font-size="12" fill="#444">download</text>

  <!-- Device side -->
  <rect x="560" y="40" width="320" height="300" rx="12" fill="#eaf7ee" stroke="#3a9b54" stroke-width="2"/>
  <text x="720" y="70" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5c2c">Device (GPU side)</text>

  <rect x="590" y="100" width="120" height="80" rx="6" fill="#fff" stroke="#3a9b54"/>
  <text x="650" y="135" text-anchor="middle" font-weight="bold">GPU</text>
  <text x="650" y="158" text-anchor="middle" font-size="12">~10 000 ALUs</text>

  <rect x="730" y="100" width="130" height="80" rx="6" fill="#fff" stroke="#3a9b54"/>
  <text x="795" y="130" text-anchor="middle" font-weight="bold">VRAM</text>
  <text x="795" y="152" text-anchor="middle" font-size="12">8–80 GB</text>
  <text x="795" y="170" text-anchor="middle" font-size="12">device tensors</text>

  <text x="720" y="220" text-anchor="middle" font-size="13" fill="#1a5c2c">Rust types: Tensor&lt;Wgpu, D&gt;,</text>
  <text x="720" y="240" text-anchor="middle" font-size="13" fill="#1a5c2c">Tensor&lt;Cuda, D&gt;, Tensor&lt;Autodiff&lt;...&gt;, D&gt;</text>

  <!-- Footer -->
  <text x="450" y="310" text-anchor="middle" font-size="13" fill="#333">Two separate memory pools — every tensor lives on exactly one of them.</text>
  <text x="450" y="330" text-anchor="middle" font-size="13" fill="#333">An operation between two tensors requires they share a device.</text>
</svg>
