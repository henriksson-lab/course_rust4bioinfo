<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">
    One trait, three impls &#8212; three different output strings
  </text>

  <!-- LEFT COLUMN: three struct boxes -->
  <!-- GenomicInterval -->
  <rect x="20" y="70" width="220" height="80" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="130" y="100" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">struct GenomicInterval</text>
  <text x="130" y="125" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">{ chrom, start, end }</text>

  <!-- Strand -->
  <rect x="20" y="180" width="220" height="90" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="130" y="208" text-anchor="middle" font-size="15" font-weight="bold" fill="#1976d2">enum Strand</text>
  <text x="130" y="232" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">Forward | Reverse</text>
  <text x="130" y="252" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">| Unknown</text>

  <!-- f64 -->
  <rect x="20" y="300" width="220" height="90" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="130" y="328" text-anchor="middle" font-size="15" font-weight="bold" font-family="ui-monospace, monospace" fill="#1976d2">f64</text>
  <text x="130" y="352" text-anchor="middle" font-size="12" fill="#444">the standard library</text>
  <text x="130" y="370" text-anchor="middle" font-size="12" fill="#444">already impls Display for this</text>

  <!-- MIDDLE: trait box -->
  <rect x="320" y="150" width="260" height="160" rx="12" ry="12" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="185" text-anchor="middle" font-size="17" font-weight="bold" fill="#d97706">trait Display</text>
  <text x="450" y="230" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">fn fmt(&amp;self,</text>
  <text x="450" y="252" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">       f: &amp;mut Formatter)</text>
  <text x="450" y="274" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">    -&gt; fmt::Result</text>

  <!-- Arrows from left to trait -->
  <line x1="240" y1="110" x2="320" y2="190" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="225" x2="320" y2="230" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="240" y1="345" x2="320" y2="270" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RIGHT COLUMN: three output strings -->
  <!-- Output 1 -->
  <rect x="660" y="70" width="220" height="80" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="770" y="100" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#2e7d32">format!("{}", x) &#8594;</text>
  <text x="770" y="128" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">"chr1:1000-2000"</text>

  <!-- Output 2 -->
  <rect x="660" y="180" width="220" height="80" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="770" y="210" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#2e7d32">format!("{}", x) &#8594;</text>
  <text x="770" y="238" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">"forward"</text>

  <!-- Output 3 -->
  <rect x="660" y="290" width="220" height="80" rx="8" ry="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
  <text x="770" y="320" text-anchor="middle" font-size="12" font-family="ui-monospace, monospace" fill="#2e7d32">format!("{}", x) &#8594;</text>
  <text x="770" y="348" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">"0.42"</text>

  <!-- Arrows from trait to outputs -->
  <line x1="580" y1="190" x2="660" y2="110" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="230" x2="660" y2="220" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="270" x2="660" y2="330" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Caption -->
  <text x="450" y="425" text-anchor="middle" font-size="14" fill="#444">
    Each type decides how to format itself; the same
    <tspan font-family="ui-monospace, monospace" fill="#222">format!("{}", x)</tspan>
    call works for all of them.
  </text>
</svg>
