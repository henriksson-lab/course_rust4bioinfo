<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="system-ui, -apple-system, sans-serif">
  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">
    Same recursive shape; the type T inside Leaf { data: T } changes
  </text>

  <!-- Three trees, each in a region 280 wide; positions: 30, 320, 610 -->

  <!-- ============ TREE 1: Node<&str> species names ============ -->
  <rect x="20" y="55" width="280" height="240" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="160" y="80" text-anchor="middle" font-size="15" font-weight="bold" font-family="ui-monospace, monospace" fill="#1976d2">Node&lt;&amp;str&gt;</text>
  <text x="160" y="98" text-anchor="middle" font-size="12" fill="#444">species names</text>

  <!-- Tree shape: root at (160,130), internal at (110,180), leaves Human(75,235), Chimp(140,235), Gorilla(225,235) -->
  <!-- Edges -->
  <line x1="160" y1="130" x2="110" y2="180" stroke="#444" stroke-width="2"/>
  <line x1="160" y1="130" x2="225" y2="235" stroke="#444" stroke-width="2"/>
  <line x1="110" y1="180" x2="75" y2="235" stroke="#444" stroke-width="2"/>
  <line x1="110" y1="180" x2="140" y2="235" stroke="#444" stroke-width="2"/>
  <!-- Nodes -->
  <circle cx="160" cy="130" r="5" fill="#1976d2"/>
  <circle cx="110" cy="180" r="5" fill="#1976d2"/>
  <!-- Leaves -->
  <circle cx="75" cy="240" r="5" fill="#2e7d32"/>
  <circle cx="140" cy="240" r="5" fill="#2e7d32"/>
  <circle cx="225" cy="240" r="5" fill="#2e7d32"/>
  <text x="75" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">Human</text>
  <text x="140" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">Chimp</text>
  <text x="225" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">Gorilla</text>

  <!-- ============ TREE 2: Node<u64> sample IDs ============ -->
  <rect x="310" y="55" width="280" height="240" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="450" y="80" text-anchor="middle" font-size="15" font-weight="bold" font-family="ui-monospace, monospace" fill="#1976d2">Node&lt;u64&gt;</text>
  <text x="450" y="98" text-anchor="middle" font-size="12" fill="#444">sample IDs</text>

  <!-- Same shape, shifted by +290 -->
  <line x1="450" y1="130" x2="400" y2="180" stroke="#444" stroke-width="2"/>
  <line x1="450" y1="130" x2="515" y2="235" stroke="#444" stroke-width="2"/>
  <line x1="400" y1="180" x2="365" y2="235" stroke="#444" stroke-width="2"/>
  <line x1="400" y1="180" x2="430" y2="235" stroke="#444" stroke-width="2"/>
  <circle cx="450" cy="130" r="5" fill="#1976d2"/>
  <circle cx="400" cy="180" r="5" fill="#1976d2"/>
  <circle cx="365" cy="240" r="5" fill="#2e7d32"/>
  <circle cx="430" cy="240" r="5" fill="#2e7d32"/>
  <circle cx="515" cy="240" r="5" fill="#2e7d32"/>
  <text x="365" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">S001</text>
  <text x="430" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">S002</text>
  <text x="515" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">S003</text>

  <!-- ============ TREE 3: Node<GeneSymbol> ============ -->
  <rect x="600" y="55" width="280" height="240" rx="8" ry="8" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="740" y="80" text-anchor="middle" font-size="15" font-weight="bold" font-family="ui-monospace, monospace" fill="#1976d2">Node&lt;GeneSymbol&gt;</text>
  <text x="740" y="98" text-anchor="middle" font-size="12" fill="#444">gene symbols</text>

  <line x1="740" y1="130" x2="690" y2="180" stroke="#444" stroke-width="2"/>
  <line x1="740" y1="130" x2="805" y2="235" stroke="#444" stroke-width="2"/>
  <line x1="690" y1="180" x2="655" y2="235" stroke="#444" stroke-width="2"/>
  <line x1="690" y1="180" x2="720" y2="235" stroke="#444" stroke-width="2"/>
  <circle cx="740" cy="130" r="5" fill="#1976d2"/>
  <circle cx="690" cy="180" r="5" fill="#1976d2"/>
  <circle cx="655" cy="240" r="5" fill="#2e7d32"/>
  <circle cx="720" cy="240" r="5" fill="#2e7d32"/>
  <circle cx="805" cy="240" r="5" fill="#2e7d32"/>
  <text x="655" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">BRCA1</text>
  <text x="720" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">BRCA2</text>
  <text x="805" y="272" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">RAD51</text>

  <!-- Monospace summary box -->
  <rect x="60" y="325" width="780" height="90" rx="8" ry="8" fill="#fff3cd" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="355" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">enum Node&lt;T&gt; {</text>
  <text x="450" y="377" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">    Leaf { data: T, branch_length: f64 },</text>
  <text x="450" y="399" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">    Internal { children: Vec&lt;Node&lt;T&gt;&gt; } }</text>

  <!-- Caption -->
  <text x="450" y="450" text-anchor="middle" font-size="14" fill="#444">
    Generic over T. Write the recursion once; reuse it for any tip content.
  </text>
</svg>
