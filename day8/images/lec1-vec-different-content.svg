<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1976d2">
    Vec works for any element type
  </text>

  <!-- LEFT: Vec<u64> -->
  <text x="160" y="75" text-anchor="middle" font-size="16" font-weight="bold" font-family="ui-monospace, monospace" fill="#1976d2">Vec&lt;u64&gt;</text>
  <!-- Three cells -->
  <rect x="40"  y="90" width="80" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <rect x="120" y="90" width="80" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <rect x="200" y="90" width="80" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="80"  y="125" text-anchor="middle" font-size="17" font-family="ui-monospace, monospace" fill="#222">42</text>
  <text x="160" y="125" text-anchor="middle" font-size="17" font-family="ui-monospace, monospace" fill="#222">100</text>
  <text x="240" y="125" text-anchor="middle" font-size="17" font-family="ui-monospace, monospace" fill="#222">7</text>

  <!-- RIGHT: Vec<String> -->
  <text x="740" y="75" text-anchor="middle" font-size="16" font-weight="bold" font-family="ui-monospace, monospace" fill="#1976d2">Vec&lt;String&gt;</text>
  <rect x="620" y="90" width="80" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <rect x="700" y="90" width="80" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <rect x="780" y="90" width="80" height="55" fill="#e3f2fd" stroke="#1976d2" stroke-width="1.5"/>
  <text x="660" y="125" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">"chr1"</text>
  <text x="740" y="125" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">"chr2"</text>
  <text x="820" y="125" text-anchor="middle" font-size="15" font-family="ui-monospace, monospace" fill="#222">"chrX"</text>

  <!-- MIDDLE: shared methods panel -->
  <rect x="310" y="180" width="280" height="170" rx="10" ry="10" fill="#fff3cd" stroke="#d97706" stroke-width="2"/>
  <text x="450" y="208" text-anchor="middle" font-size="16" font-weight="bold" fill="#d97706">shared methods</text>
  <text x="450" y="234" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">.iter()    .push(x)    [i]</text>
  <text x="450" y="256" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">.len()    .is_empty()</text>
  <text x="450" y="278" text-anchor="middle" font-size="14" font-family="ui-monospace, monospace" fill="#222">.sort()    .into_iter()</text>
  <text x="450" y="315" text-anchor="middle" font-size="13" fill="#444">Vec is generic over its element type</text>
  <text x="450" y="333" text-anchor="middle" font-size="13" fill="#444">&#8212; same methods, any T.</text>

  <!-- Arrows from each Vec into shared methods panel -->
  <line x1="160" y1="145" x2="340" y2="185" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="740" y1="145" x2="560" y2="185" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Caption -->
  <text x="450" y="380" text-anchor="middle" font-size="14" fill="#444">
    The trait impls on Vec
    <tspan font-family="ui-monospace, monospace" fill="#222">(Index, IntoIterator, Clone where T: Clone, ...)</tspan>
    make this work.
  </text>
</svg>
